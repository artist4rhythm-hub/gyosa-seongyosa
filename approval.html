<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전자결재 · 교사 선교사</title>
<meta name="theme-color" content="#1e2e5c">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
:root {
  --gd:#1e2e5c; --gm:#2b3990; --gl:#5a70cc; --gp:#e8ecf8;
  --gold:#c9a84c; --goldd:#a8873a; --goldp:#fdf3d8;
  --iv:#f5f0e8; --ivd:#e8e0d0;
  --tx:#1a1a2e; --ts:#4a4a6a; --tl:#8888aa; --wh:#ffffff;
  --sh:0 2px 12px rgba(30,46,92,0.10); --r:12px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--iv);color:var(--tx);min-height:100vh;}

#gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#eef0f8 0%,#f5f0e8 60%,#fdf3d8 100%);padding:24px;text-align:center;}
.gbox{background:var(--wh);border-radius:24px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(30,46,92,0.12);}
.gtitle{font-size:22px;font-weight:800;color:var(--gd);margin-bottom:8px;}
.gsub{font-size:14px;color:var(--ts);line-height:1.6;margin-bottom:20px;}
.gbtn{display:inline-block;width:100%;padding:14px;background:linear-gradient(135deg,#2b3990,#1e2e5c);color:var(--wh);border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;}

#ms{display:none;flex-direction:column;min-height:100vh;}
.ah{background:linear-gradient(135deg,#1e2e5c,#12194a);color:var(--wh);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.ahl{display:flex;align-items:center;gap:12px;}
.ahi{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.aht{font-size:16px;font-weight:700;}
.ahr{text-align:right;}
#hn{font-size:15px;font-weight:600;}
#hi{font-size:11px;opacity:.7;margin-top:2px;}
.homebtn{background:rgba(255,255,255,0.15);color:var(--wh);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;margin-top:4px;text-decoration:none;display:inline-block;}

.subtb{display:flex;gap:4px;background:var(--wh);padding:8px 16px;border-bottom:1px solid var(--ivd);overflow-x:auto;}
.subtbtn{padding:8px 14px;background:transparent;border:none;border-radius:8px;font-size:14px;font-weight:600;color:var(--ts);cursor:pointer;white-space:nowrap;}
.subtbtn.active{background:var(--gp);color:var(--gm);}
.badge{display:inline-block;min-width:18px;height:18px;line-height:18px;background:#dc2626;color:#fff;font-size:11px;font-weight:700;border-radius:100px;padding:0 5px;margin-left:4px;text-align:center;}

.tc{padding:20px 16px;max-width:880px;margin:0 auto;width:100%;}
.actitle{font-size:17px;font-weight:800;color:var(--gd);margin-bottom:6px;}
.adesc{font-size:13px;color:var(--ts);margin-bottom:14px;line-height:1.5;}
.acard{background:var(--wh);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px;}

.bp{background:linear-gradient(135deg,#2b3990,#1e2e5c);color:var(--wh);border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.bs{background:var(--iv);color:var(--ts);border:1.5px solid var(--ivd);border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;}
.bm{background:var(--gp);color:var(--gm);border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}
.bok{background:#16a34a;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;}
.bno{background:#dc2626;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;}

.fgrp{display:flex;flex-direction:column;margin-bottom:12px;}
.fgrp label{font-size:12px;font-weight:700;color:var(--ts);margin-bottom:5px;}
.fgrp input:not([type="checkbox"]),.fgrp select,.fgrp textarea{border:1.5px solid var(--ivd);border-radius:8px;padding:10px 12px;font-size:14px;background:var(--iv);outline:none;width:100%;font-family:inherit;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:8px 10px;border-bottom:1px solid var(--ivd);text-align:left;}
th{background:var(--iv);font-weight:700;font-size:12px;}
.empty{text-align:center;color:var(--tl);padding:30px;font-size:14px;}

.doc-item{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--ivd);border-radius:10px;margin-bottom:8px;cursor:pointer;background:var(--wh);}
.doc-item:hover{background:var(--iv);}
.doc-item.mine-turn{background:#fff7ed;border-color:var(--gold);}
.doc-body{flex:1;min-width:0;}
.doc-top{display:flex;justify-content:space-between;gap:8px;}
.doc-title{font-weight:700;font-size:14px;color:var(--gd);}
.doc-date{font-size:11px;color:var(--tl);white-space:nowrap;}
.doc-meta{font-size:12px;color:var(--ts);margin-top:2px;}
.st-pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:100px;}
.st-prog{background:#fef3c7;color:#b45309;} .st-ok{background:#dcfce7;color:#16a34a;}
.st-no{background:#fee2e2;color:#dc2626;}

.line-step{display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;margin-bottom:6px;background:var(--iv);}
.line-step.done{background:#dcfce7;} .line-step.rejected{background:#fee2e2;} .line-step.current{background:#fef3c7;border:1.5px solid var(--gold);}
.line-no{width:24px;height:24px;border-radius:50%;background:var(--gm);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.line-info{flex:1;}
.line-name{font-weight:700;font-size:14px;}
.line-pos{font-size:12px;color:var(--ts);}
.line-state{font-size:12px;font-weight:700;}

.mov{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.mbk{position:absolute;inset:0;background:rgba(20,25,60,0.5);}
.mbox{position:relative;background:var(--wh);border-radius:16px;padding:24px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-height:92vh;overflow-y:auto;}
.mtitle{font-size:18px;font-weight:800;color:var(--gd);margin-bottom:4px;}
.msub{font-size:13px;color:var(--ts);margin-bottom:16px;line-height:1.5;}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap;}
.readbox{white-space:pre-wrap;font-size:14px;line-height:1.7;color:var(--tx);background:var(--iv);border-radius:8px;padding:14px;margin:12px 0;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gd);color:var(--wh);padding:12px 24px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#dc2626;} .toast.ok{background:var(--gm);}
.taglist{display:flex;flex-wrap:wrap;gap:6px;}
.tag{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:var(--gp);color:var(--gm);border-radius:100px;font-size:13px;font-weight:600;}
.tag .x{cursor:pointer;font-weight:700;}
</style>
<link rel="stylesheet" href="ui.css">
<script src="topnav.js"></script>
</head>
<body>

<div id="gate">
  <div class="gbox">
    <div class="gtitle">전자결재</div>
    <div class="gsub" id="gate-msg">로그인 확인 중...</div>
    <a class="gbtn" id="gate-btn" href="index.html" style="display:none">로그인 화면으로</a>
  </div>
</div>

<div id="ms">
  <header class="ah">
    <div class="ahl" onclick="location.href='index.html#home'" style="cursor:pointer">
      <div class="ahi">🗂️</div>
      <div class="aht">전자결재</div>
    </div>
    <div class="ahr">
      <div id="hn"></div>
      <div id="hi"></div>
      <a class="homebtn" href="index.html">← 메인으로</a>
    </div>
  </header>
  <div class="subtb" id="subtb">
    <button class="subtbtn active" id="tb-todo" onclick="showTab('todo')">📌 결재할 문서<span id="todo-badge" class="badge" style="display:none">0</span></button>
    <button class="subtbtn" id="tb-mine" onclick="showTab('mine')">📝 내가 올린 문서</button>
    <button class="subtbtn" id="tb-done" onclick="showTab('done')">📚 완료 문서</button>
    <button class="subtbtn" id="tb-sign" onclick="showTab('sign')">✍️ 내 서명</button>
    <button class="subtbtn" id="tb-pos" onclick="showTab('pos')" style="display:none">⚙️ 직책 관리</button>
  </div>
  <div class="tc" id="c-todo" style="display:none"></div>
  <div class="tc" id="c-mine" style="display:none"></div>
  <div class="tc" id="c-done" style="display:none"></div>
  <div class="tc" id="c-sign" style="display:none"></div>
  <div class="tc" id="c-pos" style="display:none"></div>
</div>

<div id="mwrap"></div>
<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, updateDoc, setDoc, collection, getDocs, addDoc, deleteDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCtgr79jKqkec6HwqkxYNxSubWAhfEkM7g",
  authDomain: "daniel-amatz.firebaseapp.com",
  projectId: "daniel-amatz",
  storageBucket: "daniel-amatz.firebasestorage.app",
  messagingSenderId: "455744290312",
  appId: "1:455744290312:web:3ce7e7d3e58f6f1d185bbd",
  measurementId: "G-E91V0S88T8"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $I = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');
const ORGS = {jihyebit:'지혜빛', daniel:'다니엘 아마츠'};
let CU = null;
let STAFF = [];       // 전체 교직원
let DOCS = [];        // 결재 문서
let POSITIONS = [];   // 결재 직책 목록 (approvalConfig/positions)
let APPROVAL_LINES = {}; // 기관별 결재선 순서 정의
let DOC_TYPES = [];   // 문서 종류 (approvalConfig/docTypes)
const DEFAULT_DOC_TYPES = ['일반 기안','지출결의서','품의서','휴가신청서','구입요청서'];

// 기본 직책 목록 (없으면 자동 생성)
const DEFAULT_POSITIONS = ['교사','초등부장','중고등부장','행정실장','교감','교장','원장'];
// 기관별 결재선 순서 (직책 이름의 배열, 아래→위). 부서장은 기안자 부서로 자동 결정
// daniel: 교사 → (부서장) → 교감 → 교장 / jihyebit: 교사 → 원장 → 교장
const DEFAULT_LINES = {
  daniel: ['부서장','교감','교장'],
  jihyebit: ['원장','교감','교장']
};
// 부서 → 부서장 직책 매핑 (다니엘)
const DEPT_TO_POS = {'초등부':'초등부장','중고등부':'중고등부장','행정실':'행정실장'};

function toast(msg, type=''){
  const t = $I('toast'); t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(window.__tt); window.__tt = setTimeout(()=>t.className='toast', 2500);
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtFull(ts){ if(!ts) return ''; const d=ts.toDate?ts.toDate():new Date(ts); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function fmtShort(ts){ if(!ts) return ''; const d=ts.toDate?ts.toDate():new Date(ts); return `${d.getMonth()+1}/${d.getDate()}`; }
const canManagePos = () => CU && ['super','org_admin'].includes(CU.role);

onAuthStateChanged(auth, async (user) => {
  if(!user){ $I('gate-msg').textContent='로그인이 필요합니다. 메인 화면에서 먼저 로그인해주세요.'; $I('gate-btn').style.display='inline-block'; return; }
  try {
    const snap = await getDoc(doc(db,'staff',user.uid));
    if(!snap.exists()){ $I('gate-msg').textContent='교직원 정보를 찾을 수 없습니다.'; $I('gate-btn').style.display='inline-block'; return; }
    CU = { uid:user.uid, ...snap.data() };
    const ac = CU.acStatus || 'active';
    if(ac==='leave'||ac==='quit'){ $I('gate-msg').textContent = ac==='quit'?'퇴직 처리된 계정입니다.':'휴직 중인 계정입니다.'; $I('gate-btn').style.display='inline-block'; return; }
    $I('gate').style.display='none'; $I('ms').style.display='flex';
    if(window.renderTopNav) renderTopNav('approval', CU.role);
    $I('hn').textContent = CU.name;
    $I('hi').textContent = `${ORGS[CU.org]||CU.org} · ${CU.dept||''}${CU.position?' · '+CU.position:''}`;
    if(canManagePos()) $I('tb-pos').style.display='';
    await loadStaff();
    await loadConfig();
    await loadDocs();
    showTab('todo');
  } catch(e){ $I('gate-msg').textContent='오류: '+e.message; $I('gate-btn').style.display='inline-block'; }
});

async function loadStaff(){
  const snap = await getDocs(collection(db,'staff'));
  STAFF = [];
  snap.forEach(d=>{ const s={uid:d.id, ...d.data()}; if((s.acStatus||'active')==='active') STAFF.push(s); });
  STAFF.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'));
}

async function loadConfig(){
  // 직책 목록
  try {
    const ps = await getDoc(doc(db,'approvalConfig','positions'));
    POSITIONS = ps.exists() && ps.data().list ? ps.data().list : [...DEFAULT_POSITIONS];
  } catch(e){ POSITIONS = [...DEFAULT_POSITIONS]; }
  // 결재선
  try {
    const ls = await getDoc(doc(db,'approvalConfig','lines'));
    APPROVAL_LINES = ls.exists() && ls.data().lines ? ls.data().lines : {...DEFAULT_LINES};
  } catch(e){ APPROVAL_LINES = {...DEFAULT_LINES}; }
  // 문서 종류
  try {
    const dt = await getDoc(doc(db,'approvalConfig','docTypes'));
    DOC_TYPES = dt.exists() && dt.data().list ? dt.data().list : [...DEFAULT_DOC_TYPES];
  } catch(e){ DOC_TYPES = [...DEFAULT_DOC_TYPES]; }
}

async function loadDocs(){
  const snap = await getDocs(collection(db,'approvals'));
  DOCS = [];
  snap.forEach(d=>{ DOCS.push({id:d.id, ...d.data()}); });
  DOCS.sort((a,b)=>{ const ta=a.createdAt?.toMillis?.()||0, tb=b.createdAt?.toMillis?.()||0; return tb-ta; });
  updateBadge();
}

// 내 차례인 문서 수
function isMyTurn(d){
  if(d.status!=='progress') return false;
  const step = d.line?.[d.currentStep];
  return step && step.uid===CU.uid;
}
function updateBadge(){
  const cnt = DOCS.filter(isMyTurn).length;
  const b = $I('todo-badge');
  if(b){ if(cnt>0){ b.textContent=cnt; b.style.display=''; } else b.style.display='none'; }
}

function showTab(t){
  document.querySelectorAll('.subtbtn').forEach(b=>b.classList.remove('active'));
  $I('tb-'+t)?.classList.add('active');
  ['todo','mine','done','sign','pos'].forEach(id=>{ const el=$I('c-'+id); if(el) el.style.display='none'; });
  $I('c-'+t).style.display='block';
  if(t==='todo') renderTodo();
  if(t==='mine') renderMine();
  if(t==='done') renderDone();
  if(t==='sign') renderSign();
  if(t==='pos') renderPos();
}
window.showTab = showTab;

// ── 결재선 자동 생성 ──
// 기안자(드래프터) 기준으로 결재선 배열 생성. 각 단계: {uid, name, position, state:'wait'}
function buildLine(drafter){
  const org = drafter.org;
  const lineDefs = APPROVAL_LINES[org] || [];
  const drafterPos = drafter.position || '교사';
  const steps = [];
  for(const posDef of lineDefs){
    // '부서장'은 기안자 부서에 맞는 실제 직책으로 변환
    let realPos = posDef;
    if(posDef==='부서장'){
      realPos = DEPT_TO_POS[drafter.dept] || null;
      if(!realPos) continue; // 부서장 매핑이 없으면 건너뜀
    }
    // 기안자 본인의 직책보다 위 단계만 포함 (본인 직책과 같거나 아래는 제외)
    // 직책 순서는 lineDefs 순서를 따름. 기안자 직책이 lineDefs에 있으면 그 이후만.
    // 해당 직책을 가졌고, 이 기관 결재에 적용되도록 등록된 사람 찾기
    const person = STAFF.find(s=>{
      if(s.position!==realPos) return false;
      if((s.acStatus||'active')!=='active') return false;
      // positionOrgs가 있으면 그걸로 판단, 없으면 본인 소속 기관으로 (구버전 호환)
      const pOrgs = s.positionOrgs && s.positionOrgs.length ? s.positionOrgs : [s.org];
      return pOrgs.includes(org);
    });
    steps.push({ posDef, position:realPos, uid:person?.uid||null, name:person?.name||null });
  }
  // 기안자 직책이 결재선 상에 있으면, 그 단계까지는 제외 (본인보다 위만 남김)
  const myIdx = steps.findIndex(st=>st.position===drafterPos);
  let finalSteps = steps;
  if(myIdx>=0) finalSteps = steps.slice(myIdx+1);
  // 기안자가 부서장인 경우 등: 부서장 단계 제외
  if(DEPT_TO_POS[drafter.dept]===drafterPos){
    finalSteps = finalSteps.filter(st=>st.position!==drafterPos);
  }
  return finalSteps.map(st=>({...st, state:'wait'}));
}

// ── 기안 작성 ──
function openCompose(){
  // 결재선 미리보기
  const previewLine = buildLine(CU);
  const lineHtml = previewLine.length
    ? previewLine.map((st,i)=>`<div class="line-step"><div class="line-no">${i+1}</div><div class="line-info"><div class="line-name">${st.name||'(미지정)'}</div><div class="line-pos">${st.position}${st.uid?'':' · 해당 직책자 없음'}</div></div></div>`).join('')
    : '<div class="empty" style="padding:14px">결재선이 비어 있습니다. (본인이 최종 직책이거나 직책 미설정)</div>';
  const hasUnset = previewLine.some(st=>!st.uid);
  $I('mwrap').innerHTML = `
    <div class="mov"><div class="mbk" onclick="closeMod()"></div>
    <div class="mbox">
      <div class="mtitle">새 기안</div>
      <div class="msub">제목과 내용을 입력하면, 소속·직책에 따라 결재선이 자동으로 만들어집니다.</div>
      <div class="fgrp"><label>문서 종류</label>
        <select id="cp-type">${DOC_TYPES.map(t=>`<option value="${t}">${t}</option>`).join('')}</select></div>
      <div class="fgrp"><label>제목</label><input type="text" id="cp-title" placeholder="예: 교실 비품 구입 요청"></div>
      <div class="fgrp"><label>내용</label><textarea id="cp-content" rows="6" placeholder="결재 받을 내용을 입력하세요..."></textarea></div>
      <div class="fgrp"><label>첨부 링크 (선택)</label>
        <input type="text" id="cp-attach" placeholder="구글 드라이브 등 파일 링크 (영수증 등)">

// 이미지 업로드 → 리사이즈 → 미리보기
function handleSigUpload(ev){
  const file = ev.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      // 가로 최대 240px로 리사이즈 (비율 유지)
      const maxW = 240;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      // PNG로 (투명 배경 유지), 용량 위해 품질 조정은 png엔 불가하므로 jpeg 대안 고려
      let dataUrl = canvas.toDataURL('image/png');
      // 너무 크면 jpeg로 압축
      if(dataUrl.length > 100000) dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      showSigPreview(dataUrl);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
window.handleSigUpload = handleSigUpload;

async function actApprove(id){
  const d = DOCS.find(x=>x.id===id); if(!d || !isMyTurn(d)) return;
  const line = [...d.line];
  line[d.currentStep] = {...line[d.currentStep], state:'approved', actAt:Timestamp.now(), sign:CU.signature||''};
  const nextStep = d.currentStep+1;
  const isLast = nextStep >= line.length;
  try {
    await updateDoc(doc(db,'approvals',id), {
      line, currentStep: isLast ? d.currentStep : nextStep,
      status: isLast ? 'approved' : 'progress'
    });
    toast(isLast?'최종 승인되었습니다.':'승인했습니다. 다음 결재자에게 넘어갑니다.','ok');
    closeMod();
    await loadDocs();
    showTab('todo');
  } catch(e){ toast('처리 실패: '+e.message,'err'); }
}
window.actApprove = actApprove;

// 전결: 이 단계에서 결재를 종료(최종 승인). 위 단계로 안 올라감
async function actFinal(id){
  const d = DOCS.find(x=>x.id===id); if(!d || !isMyTurn(d)) return;
  if(!confirm('전결 처리할까요? 위 결재자에게 올리지 않고 여기서 최종 승인됩니다.')) return;
  const line = [...d.line];
  line[d.currentStep] = {...line[d.currentStep], state:'final', actAt:Timestamp.now(), sign:CU.signature||''};
  // 전결 이후 단계는 '생략' 표시
  for(let i=d.currentStep+1; i<line.length; i++){ line[i] = {...line[i], state:'skipped'}; }
  try {
    await updateDoc(doc(db,'approvals',id), { line, status:'approved', finalBy:CU.name });
    toast('전결 처리되었습니다.','ok');
    closeMod();
    await loadDocs();
    showTab('todo');
  } catch(e){ toast('처리 실패: '+e.message,'err'); }
}
window.actFinal = actFinal;

async function actReject(id){
  const d = DOCS.find(x=>x.id===id); if(!d || !isMyTurn(d)) return;
  const reason = prompt('반려 사유를 입력하세요:');

  const line = [...d.line];

  try {
    await updateDoc(doc(db,'approvals',id), { line, status:'rejected', rejectReason:reason.trim() });

    closeMod();

}

      <div style="overflow-x:auto"><table>
        <thead><tr><th>이름</th><th>소속</th><th>결재 직책</th><th>적용 기관</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="4" class="empty">교직원이 없습니다.</td></tr>'}</tbody>
      </table></div>
    </div>
    <div class="acard">
      <h3 class="actitle">🔀 기관별 결재선</h3>
      <p class="adesc">기안 → 아래 순서대로 결재가 올라갑니다. ${CU.role==='super'?'단계를 추가·삭제·이동할 수 있습니다.':'(슈퍼 관리자만 편집 가능)'} "부서장"은 기안자 부서에 맞는 직책(초등부장·중고등부장·행정실장)으로 자동 변환됩니다.</p>
      ${renderLineEditor('daniel')}
      ${renderLineEditor('jihyebit')}
    </div>`;
}
window.renderPos = renderPos;

// 기관별 결재선 편집 블록
function renderLineEditor(org){
  const isSuper = CU.role==='super';
  const steps = APPROVAL_LINES[org] || [];
  const stepHtml = steps.map((p,i)=>`
    <div class="line-step" style="background:var(--gp)">
      <div class="line-no">${i+1}</div>
      <div class="line-info"><div class="line-name">${p}</div></div>
      ${isSuper?`<div style="display:flex;gap:4px">
        ${i>0?`<button class="bm" onclick="moveLineStep('${org}',${i},-1)">↑</button>`:''}
        ${i<steps.length-1?`<button class="bm" onclick="moveLineStep('${org}',${i},1)">↓</button>`:''}
        <button class="bm" style="background:#fee2e2;color:#dc2626" onclick="delLineStep('${org}',${i})">삭제</button>
      </div>`:''}
    </div>`).join('');
  // 추가 가능한 직책 옵션 (부서장 + 직책 목록)
  const addOpts = ['부서장', ...POSITIONS].map(p=>`<option value="${p}">${p}</option>`).join('');
  return `
    <div style="margin-bottom:18px">
      <div style="font-weight:700;color:var(--gd);margin-bottom:8px">${ORGS[org]} <span style="font-size:12px;color:var(--ts);font-weight:400">(교사 기안 → ${steps.join(' → ')||'(비어있음)'})</span></div>
      ${stepHtml || '<div class="empty" style="padding:14px">결재 단계가 없습니다.</div>'}
      ${isSuper?`<div style="display:flex;gap:8px;margin-top:8px">
        <select id="add-step-${org}" style="flex:1;height:38px;border:1.5px solid var(--ivd);border-radius:8px;padding:0 10px;font-size:13px;background:var(--iv)">${addOpts}</select>
        <button class="bp" onclick="addLineStep('${org}')">단계 추가</button>
      </div>`:''}
    </div>`;
}

async function saveLines(){
  await setDoc(doc(db,'approvalConfig','lines'), {lines:APPROVAL_LINES});
}
async function addLineStep(org){
  const v = $I('add-step-'+org).value;
  if(!APPROVAL_LINES[org]) APPROVAL_LINES[org]=[];
  APPROVAL_LINES[org].push(v);
  try { await saveLines(); toast('단계를 추가했습니다.','ok'); renderPos(); }
  catch(e){ toast('실패: '+e.message,'err'); APPROVAL_LINES[org].pop(); }
}
window.addLineStep = addLineStep;

async function delLineStep(org, idx){
  const removed = APPROVAL_LINES[org].splice(idx,1);
  try { await saveLines(); toast('삭제했습니다.'); renderPos(); }
  catch(e){ toast('실패: '+e.message,'err'); APPROVAL_LINES[org].splice(idx,0,...removed); }
}
window.delLineStep = delLineStep;

async function moveLineStep(org, idx, dir){
  const arr = APPROVAL_LINES[org];
  const ni = idx+dir;
  if(ni<0||ni>=arr.length) return;
  [arr[idx], arr[ni]] = [arr[ni], arr[idx]];
  try { await saveLines(); renderPos(); }
  catch(e){ toast('실패: '+e.message,'err'); }
}
window.moveLineStep = moveLineStep;

async function addDocType(){
  const v = $I('new-doctype').value.trim();
  if(!v) return toast('문서 종류를 입력하세요.','err');
  if(DOC_TYPES.includes(v)) return toast('이미 있는 종류입니다.','err');
  DOC_TYPES.push(v);
  try { await setDoc(doc(db,'approvalConfig','docTypes'), {list:DOC_TYPES}); toast('추가했습니다.','ok'); renderPos(); }
  catch(e){ toast('실패: '+e.message,'err'); DOC_TYPES.pop(); }
}
window.addDocType = addDocType;

async function delDocType(t){
  if(!confirm(`'${t}' 문서 종류를 삭제할까요?`)) return;
  DOC_TYPES = DOC_TYPES.filter(x=>x!==t);
  try { await setDoc(doc(db,'approvalConfig','docTypes'), {list:DOC_TYPES}); toast('삭제했습니다.'); renderPos(); }
  catch(e){ toast('실패: '+e.message,'err'); }
}
window.delDocType = delDocType;

async function addPosition(){  const v = $I('new-pos').value.trim();
  if(!v) return toast('직책 이름을 입력하세요.','err');
  if(POSITIONS.includes(v)) return toast('이미 있는 직책입니다.','err');
  POSITIONS.push(v);
  try {
    await setDoc(doc(db,'approvalConfig','positions'), {list:POSITIONS});
    toast('직책을 추가했습니다.','ok');
    renderPos();
  } catch(e){ toast('실패: '+e.message,'err'); POSITIONS.pop(); }
}
window.addPosition = addPosition;

async function delPosition(p){
  if(!confirm(`'${p}' 직책을 삭제할까요?`)) return;
  POSITIONS = POSITIONS.filter(x=>x!==p);
  try {
    await setDoc(doc(db,'approvalConfig','positions'), {list:POSITIONS});
    toast('삭제했습니다.');
    renderPos();
  } catch(e){ toast('실패: '+e.message,'err'); }
}
window.delPosition = delPosition;

async function setPosition(uid, pos){
  try {
    const s = STAFF.find(x=>x.uid===uid);
    const update = {position: pos};
    // 직책을 새로 지정하면 적용 기관 기본값 = 본인 소속 기관
    if(pos && (!s.positionOrgs || !s.positionOrgs.length)){
      update.positionOrgs = [s.org];
    }
    if(!pos) update.positionOrgs = []; // 미지정이면 비움
    await updateDoc(doc(db,'staff',uid), update);
    if(s){ s.position = pos; if(update.positionOrgs) s.positionOrgs = update.positionOrgs; }
    toast('직책을 지정했습니다.','ok');
    renderPos();
  } catch(e){ toast('실패: '+e.message,'err'); }
}
window.setPosition = setPosition;

// 직책 적용 기관 토글
async function setPosOrg(uid, org, on){
  const s = STAFF.find(x=>x.uid===uid); if(!s) return;
  let orgs = s.positionOrgs && s.positionOrgs.length ? [...s.positionOrgs] : [s.org];
  if(on){ if(!orgs.includes(org)) orgs.push(org); }
  else { orgs = orgs.filter(o=>o!==org); }
  try {
    await updateDoc(doc(db,'staff',uid), {positionOrgs:orgs});
    s.positionOrgs = orgs;
    toast('적용 기관을 변경했습니다.','ok');
  } catch(e){ toast('실패: '+e.message,'err'); }
}
window.setPosOrg = setPosOrg;
</script>
</body>
</html>
