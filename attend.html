<style>
:root {
  --gd:#1e2e5c; --gm:#2b3990; --gl:#5a70cc; --gp:#e8ecf8;
  --gold:#c9a84c; --goldd:#a8873a; --goldp:#fdf3d8;
  --iv:#f5f0e8; --ivd:#e8e0d0;
  --tx:#1a1a2e; --ts:#4a4a6a; --tl:#8888aa; --wh:#ffffff;
  --sh:0 2px 12px rgba(30,46,92,0.10); --r:12px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--iv);color:var(--tx);min-height:100vh;}

#gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#eef0f8 0%,#f5f0e8 60%,#fdf3d8 100%);padding:24px;text-align:center;}
.gbox{background:var(--wh);border-radius:24px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(30,46,92,0.12);}
.gtitle{font-size:22px;font-weight:800;color:var(--gd);margin-bottom:8px;}
.gsub{font-size:14px;color:var(--ts);line-height:1.6;margin-bottom:20px;}
.gbtn{display:inline-block;width:100%;padding:14px;background:linear-gradient(135deg,#2b3990,#1e2e5c);color:var(--wh);border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;}

#ms{display:none;flex-direction:column;min-height:100vh;}
.ah{background:linear-gradient(135deg,#1e2e5c,#12194a);color:var(--wh);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.ahl{display:flex;align-items:center;gap:12px;}
.ahi{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.aht{font-size:16px;font-weight:700;}
.ahr{text-align:right;}
#hn{font-size:15px;font-weight:600;}
#hi{font-size:11px;opacity:.7;margin-top:2px;}
.homebtn{background:rgba(255,255,255,0.15);color:var(--wh);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;margin-top:4px;text-decoration:none;display:inline-block;}

/* 하위 탭 */
.subtb{display:flex;gap:4px;background:var(--wh);padding:8px 16px;border-bottom:1px solid var(--ivd);overflow-x:auto;}
.subtbtn{padding:8px 14px;background:transparent;border:none;border-radius:8px;font-size:14px;font-weight:600;color:var(--ts);cursor:pointer;white-space:nowrap;}
.subtbtn.active{background:var(--gp);color:var(--gm);}

.tc{padding:20px 16px;max-width:960px;margin:0 auto;width:100%;}
.actitle{font-size:17px;font-weight:800;color:var(--gd);margin-bottom:6px;}
.adesc{font-size:13px;color:var(--ts);margin-bottom:14px;line-height:1.5;}
.acard{background:var(--wh);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px;}

.fgrp{display:flex;flex-direction:column;margin-bottom:12px;}
.fgrp label{font-size:12px;font-weight:700;color:var(--ts);margin-bottom:5px;}
.fgrp input,.fgrp select{height:40px;border:1.5px solid var(--ivd);border-radius:8px;padding:0 12px;font-size:14px;background:var(--iv);outline:none;width:100%;font-family:inherit;}

.bp{background:linear-gradient(135deg,#2b3990,#1e2e5c);color:var(--wh);border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.bs{background:var(--iv);color:var(--ts);border:1.5px solid var(--ivd);border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;}
.bm{background:var(--gp);color:var(--gm);border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}

/* 출결 항목 목록 */
.typelist{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
.typeitem{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--wh);border:1px solid var(--ivd);border-radius:10px;}
.typedot{width:20px;height:20px;border-radius:50%;flex-shrink:0;}
.typename{font-size:15px;font-weight:700;color:var(--gd);flex:1;}
.typebadge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;}
.empty{text-align:center;color:var(--tl);padding:30px;font-size:14px;}

.addrow{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-top:8px;}
.addrow .fgrp{margin-bottom:0;}

.mov{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.mbk{position:absolute;inset:0;background:rgba(20,25,60,0.5);}
.mbox{position:relative;background:var(--wh);border-radius:16px;padding:24px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.mtitle{font-size:18px;font-weight:800;color:var(--gd);margin-bottom:4px;}
.msub{font-size:13px;color:var(--ts);margin-bottom:16px;}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gd);color:var(--wh);padding:12px 24px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#dc2626;} .toast.ok{background:var(--gm);}
.ck-mode-btn{padding:9px 16px;border:1.5px solid var(--ivd);background:var(--wh);border-radius:9px;font-size:14px;font-weight:600;color:var(--ts);cursor:pointer;}
.ck-mode-btn.on{background:var(--gm);color:#fff;border-color:var(--gm);}
.mtab{border-collapse:collapse;font-size:12px;white-space:nowrap;}
.mtab th,.mtab td{border:1px solid var(--ivd);padding:0;text-align:center;}
.mtab .nm{position:sticky;left:0;background:var(--wh);z-index:2;text-align:left;padding:4px 8px;font-weight:600;min-width:80px;}
.mtab th.nm{z-index:3;background:var(--iv);}
.mtab .dcell{width:30px;height:30px;cursor:pointer;font-size:11px;font-weight:700;}
.mtab .dcell.blocked{background:#f0f0f0;color:#bbb;cursor:default;}
.mtab .dcell.blocked.allow{cursor:pointer;}
.mtab .dcell.drag-sel{outline:2px solid var(--gm);outline-offset:-2px;filter:brightness(0.92);}
.mtab .dcell.auto-present{font-weight:400;opacity:0.85;}
.mtab{user-select:none;}
.mtab .wkhd{background:#fafafa;color:#999;}
.mmenu{position:fixed;z-index:200;background:#fff;border:1px solid var(--ivd);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.2);padding:6px;min-width:130px;max-height:300px;overflow-y:auto;}
.mmenu button{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border:none;background:none;border-radius:6px;font-size:13px;cursor:pointer;text-align:left;}
.mmenu button:hover{background:var(--iv);}
.mmenu .sep{border-top:1px solid var(--ivd);margin:4px 0;font-size:11px;color:var(--tl);padding:4px 10px 2px;}
</style>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc, updateDoc, deleteDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCtgr79jKqkec6HwqkxYNxSubWAhfEkM7g",
  authDomain: "daniel-amatz.firebaseapp.com",
  projectId: "daniel-amatz",
  storageBucket: "daniel-amatz.firebasestorage.app",
  messagingSenderId: "455744290312",
  appId: "1:455744290312:web:3ce7e7d3e58f6f1d185bbd",
  measurementId: "G-E91V0S88T8"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $I = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
const ORGS = {jihyebit:'지혜빛', daniel:'다니엘 아마츠'};
const ROLES = {super:'슈퍼관리자', org_admin:'기관관리자', tab_admin:'부서장', teacher:'교사'};
let CU = null;
let TYPES = [];   // 출결 항목 캐시
let TERMS = [];   // 학기 일정 캐시
let HOLIDAYS = []; // 출근부 공휴일 (연동)
let WORKPERIODS = []; // 출근부 근무/방학 기간 (연동)
let CLASSES = [];  // 반 편성 캐시 (올해)

// ── 학년 정렬 (4세→7세→1학년→12학년). 어디서나 공통 사용 ──
function gradeRank(g){
  if(!g) return 999;
  const first = String(g).split(/[·,]/)[0].trim(); // 합반이면 첫 학년 기준
  const age = first.match(/(\d+)\s*세/);
  if(age) return Number(age[1]);            // 4~7세 → 4~7
  const grd = first.match(/(\d+)\s*학년/);
  if(grd) return 100 + Number(grd[1]);      // 1~12학년 → 101~112
  return 998;
}
// 반 배열을 학년순(같으면 이름순)으로 정렬
function sortClasses(arr){
  return [...arr].sort((a,b)=> gradeRank(a.grade)-gradeRank(b.grade) || (a.name||'').localeCompare(b.name||'','ko'));
}
// 학년 문자열 배열을 나이순으로 정렬
function sortGrades(arr){
  return [...arr].sort((a,b)=> gradeRank(a)-gradeRank(b));
}
let STUDENTS = {}; // 학생 캐시 (id -> data)
let curYear = new Date().getFullYear();

// 기본 출결 항목 (최초 1회 자동 생성용)
const DEFAULT_TYPES = [
  {name:'출석', color:'#16a34a', order:1, isPresent:true},
  {name:'결석', color:'#dc2626', order:2, isPresent:false},
  {name:'지각', color:'#f59e0b', order:3, isPresent:false},
  {name:'조퇴', color:'#d97706', order:4, isPresent:false},
  {name:'병결', color:'#7c3aed', order:5, isPresent:false},
  {name:'체험학습', color:'#0369a1', order:6, isPresent:false},
];

function toast(msg, type=''){
  const t = $I('toast'); t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(window.__tt); window.__tt = setTimeout(()=>t.className='toast', 2500);
}
// 공통 활동 로그
async function logActivity(action, category, target, detail){
  if(!CU) return;
  try {
    await addDoc(collection(db,'activityLogs'), {
      uid: CU.uid, name: CU.name||'', role: CU.role||'', org: CU.org||'',
      action, category, target: target||'', detail: detail||'',
      at: Timestamp.now()
    });
  } catch(e){}
}
function myOrgs(){
  if(!CU) return [];
  if(CU.role==='super') return ['jihyebit','daniel'];
  return CU.orgs && CU.orgs.length ? CU.orgs : [CU.org];
}
const isAdmin = () => CU && ['super','org_admin','tab_admin'].includes(CU.role);
const canSetup = () => CU && ['super','org_admin'].includes(CU.role);

onAuthStateChanged(auth, async (user) => {
  if(!user){
    $I('gate-msg').textContent = '로그인이 필요합니다. 메인 화면에서 먼저 로그인해주세요.';
    $I('gate-btn').style.display = 'inline-block';
    return;
  }
  try {
    const snap = await getDoc(doc(db,'staff',user.uid));
    if(!snap.exists()){ $I('gate-msg').textContent='교직원 정보를 찾을 수 없습니다.'; $I('gate-btn').style.display='inline-block'; return; }
    CU = { uid:user.uid, ...snap.data() };
    // 휴직/퇴직 차단
    const ac = CU.acStatus || 'active';
    if(ac==='leave'||ac==='quit'){ $I('gate-msg').textContent = ac==='quit'?'퇴직 처리된 계정입니다.':'휴직 중인 계정입니다.'; $I('gate-btn').style.display='inline-block'; return; }
    $I('gate').style.display='none'; $I('ms').style.display='flex';
    if(window.renderTopNav) renderTopNav('attend', CU.role);
    window.showLoading && window.showLoading('불러오는 중…');
    $I('hn').textContent = CU.name;
    $I('hi').textContent = `${ORGS[CU.org]||CU.org} · ${CU.dept||''} · ${ROLES[CU.role]||''}`;
    // 설정 탭은 기관관리자/슈퍼만
    if(canSetup()) $I('tb-set').style.display='';
    await loadTypes();
    await loadTerms();
    await loadHolidays();
    await loadClasses();
    await loadStudents();
    window.hideLoading && window.hideLoading();
    showTab('check');
  } catch(e){ $I('gate-msg').textContent='오류: '+e.message; $I('gate-btn').style.display='inline-block'; }
});

// ── 출결 항목 로드 (없으면 기본값 자동 생성) ──
async function loadTypes(){
  const snap = await getDocs(collection(db,'attendTypes'));
  TYPES = [];
  snap.forEach(d=>TYPES.push({id:d.id, ...d.data()}));
  // 최초 실행: 항목이 하나도 없으면 기본값 생성 (설정 권한자만)
  if(TYPES.length===0 && canSetup()){
    for(const t of DEFAULT_TYPES){
      await addDoc(collection(db,'attendTypes'), {...t, createdAt:Timestamp.now()});
    }
    const snap2 = await getDocs(collection(db,'attendTypes'));
    TYPES = [];
    snap2.forEach(d=>TYPES.push({id:d.id, ...d.data()}));
  }
  TYPES.sort((a,b)=>(a.order||0)-(b.order||0));
}

// ── 학기 일정 로드 ──
async function loadTerms(){
  const snap = await getDocs(collection(db,'terms'));
  const allowed = myOrgs();
  TERMS = [];
  snap.forEach(d=>{ const t={id:d.id, ...d.data()}; if(allowed.includes(t.org)) TERMS.push(t); });
  TERMS.sort((a,b)=> (b.year-a.year) || a.org.localeCompare(b.org) || (a.term-b.term));
}

// ── 출근부 휴일/기간 연동 로드 ──
async function loadHolidays(){
  const hSnap = await getDocs(collection(db,'holidays'));
  HOLIDAYS = []; hSnap.forEach(d=>HOLIDAYS.push(d.data()));
  const wSnap = await getDocs(collection(db,'workPeriods'));
  WORKPERIODS = []; wSnap.forEach(d=>WORKPERIODS.push(d.data()));
}

// ── 특정 날짜가 해당 기관에서 휴일/방학인지 판정 ──
// 반환: 휴일이면 사유 문자열, 아니면 null
function holidayReason(dateStr, org){
  // 공휴일 (출근부 holidays: org가 'all' 또는 해당 기관)
  const hol = HOLIDAYS.find(h => h.date===dateStr && (h.org==='all' || h.org===org));
  if(hol) return hol.name || '공휴일';
  // 방학기간 (출근부 workPeriods 중 type==='vacation')
  const vac = WORKPERIODS.find(w => w.type==='vacation' && w.org===org && dateStr>=w.s && dateStr<=w.e);
  if(vac) return vac.vac || vac.name || '방학';
  return null;
}

// ── 수업일 계산: 학기 기간 평일 − 휴일/방학 ──
// term: {year, org, term, start, end}
// 반환: 수업일 날짜 배열 (YYYY-MM-DD)
function calcSchoolDays(term){
  const days = [];
  if(!term.start || !term.end) return days;
  let d = new Date(term.start+'T00:00:00');
  const end = new Date(term.end+'T00:00:00');
  while(d <= end){
    const dow = d.getDay();
    const ds = fmtDate(d);
    // 평일(월~금)이고 휴일/방학이 아니면 수업일
    if(dow!==0 && dow!==6 && !holidayReason(ds, term.org)){
      days.push(ds);
    }
    d.setDate(d.getDate()+1);
  }
  return days;
}

function fmtDate(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
const TERM_NAMES = {1:'1학기', 2:'2학기'};
// 특정 날짜에 휴학 중인지
function isOnLeave(s, dateStr){
  if(!s || !s.leaves || !s.leaves.length) return false;
  return s.leaves.some(lv => lv.start && lv.end && dateStr>=lv.start && dateStr<=lv.end);
}
// 특정 날짜가 해당 기관의 등록된 학기 기간 안에 있는지
// 반환: 속하면 학기객체, 안 속하면 null, 그 해 학기 자체가 없으면 'none'
function termOfDate(dateStr, org){
  const year = Number(dateStr.slice(0,4));
  const orgTerms = TERMS.filter(t=>t.org===org && t.year===year);
  if(!orgTerms.length) return 'none';
  const hit = orgTerms.find(t=>t.start && t.end && dateStr>=t.start && dateStr<=t.end);
  return hit || null;
}

// 이 날짜가 '자동 출석' 대상인지 (학기 중 평일, 공휴일 아님)
function isAutoPresentDate(dateStr, org){
  const dow = new Date(dateStr+'T00:00:00').getDay();
  if(dow===0 || dow===6) return false;          // 주말 제외
  if(holidayReason(dateStr, org)) return false; // 공휴일 제외
  const term = termOfDate(dateStr, org);
  if(term==='none' || term===null) return false; // 학기 밖 제외
  return true;
}
// 출석 항목(isPresent:true) 찾기
function presentType(){ return TYPES.find(t=>t.isPresent) || TYPES.find(t=>t.name==='출석') || TYPES[0]; }

// 학생의 휴학 기간과 수업일 집합의 교집합 일수 (통계 분모 제외용)
function leaveDaysInSet(s, daySet){
  if(!s || !s.leaves || !s.leaves.length) return 0;
  let cnt = 0;
  daySet.forEach(d=>{ if(isOnLeave(s, d)) cnt++; });
  return cnt;
}

// ── 반·학생 로드 ──
async function loadClasses(){
  const snap = await getDocs(collection(db,'classes'));
  const allowed = myOrgs();
  CLASSES = [];
  snap.forEach(d=>{ const c={id:d.id, ...d.data()}; if(c.year===curYear && allowed.includes(c.org)) CLASSES.push(c); });
  CLASSES.sort((a,b)=> (a.org+a.dept+(a.grade||'')).localeCompare(b.org+b.dept+(b.grade||'')));
}
async function loadStudents(){
  const snap = await getDocs(collection(db,'students'));
  const allowed = myOrgs();
  STUDENTS = {};
  snap.forEach(d=>{ const s={id:d.id, ...d.data()}; if(allowed.includes(s.org)) STUDENTS[d.id]=s; });
}

// 이 반의 출결을 기록할 권한이 있는지 (담임/대리/부서장/관리자)
function canEditClass(c){
  if(!CU) return false;
  if(CU.role==='super' || CU.role==='org_admin') return myOrgs().includes(c.org);
  if(CU.role==='tab_admin'){
    // 부서장: 행정실은 다니엘 전체, 그 외는 본인 부서
    if(CU.dept==='행정실') return myOrgs().includes(c.org);
    return c.org===CU.org && c.dept===CU.dept;
  }
  // 교사: 담임이거나 대리로 지정된 반
  return c.teacherUid===CU.uid || (c.deputies||[]).includes(CU.uid);
}
// 이 반을 열람할 권한 (같은 기관이면 누구나)
function canViewClass(c){
  return myOrgs().includes(c.org);
}

}

async function loadMonthBody(){
  const body = $I('m-body'); if(!body) return;
  try {
  const c = CLASSES.find(x=>x.id===monthClassId);
  if(!c){ body.innerHTML='<div class="acard"><p class="empty">반을 선택하세요.</p></div>'; return; }
  const [y,m] = monthYM.split('-').map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();
  const grades = c.grades || {};
  const studs = (c.students||[]).map(sid=>STUDENTS[sid]).filter(Boolean)
    .filter(s=>(s.status||'active')==='active')
    .sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'));
  if(!studs.length){ body.innerHTML='<div class="acard"><p class="empty">이 반에 재학 중인 학생이 없습니다.</p></div>'; return; }
  monthData = {};
  const prefix = `${y}-${pad(m)}`;
  const snap = await getDocs(collection(db,'studentAttendance'));
  snap.forEach(d=>{
    const r=d.data();
    if(r.classId===monthClassId && (r.date||'').startsWith(prefix)){
      const day = Number(r.date.slice(8,10));
      if(!monthData[r.studentId]) monthData[r.studentId]={};
      monthData[r.studentId][day] = {id:d.id, typeId:r.typeId};
    }
  });
  const dayInfo = [];
  for(let dd=1; dd<=daysInMonth; dd++){
    const dateStr = `${y}-${pad(m)}-${pad(dd)}`;
    const dow = new Date(dateStr+'T00:00:00').getDay();
    const wknd = dow===0||dow===6;
    const hol = !!holidayReason(dateStr, c.org);
    const term = termOfDate(dateStr, c.org);
    const outOfTerm = (term==='none' || term===null);
    const blocked = wknd || hol || outOfTerm;
    const autoPresent = !blocked; // 학기 중 평일 = 자동 출석 대상
    dayInfo.push({dd, dateStr, dow, blocked, autoPresent});
  }
  const dnames=['일','월','화','수','목','금','토'];
  const headDays = dayInfo.map(di=>`<th class="${di.dow===0||di.dow===6?'wkhd':''}" style="padding:3px 2px">${di.dd}<br><span style="font-size:9px;font-weight:400">${dnames[di.dow]}</span></th>`).join('');
  const pType = presentType();
  const rows = studs.map(s=>{
    const cells = dayInfo.map(di=>{
      const rec = monthData[s.id] && monthData[s.id][di.dd];
      const t = rec ? TYPES.find(x=>x.id===rec.typeId) : null;
      const blockedCls = di.blocked ? (monthAllowBlocked?'blocked allow':'blocked') : '';
      const clickable = (!di.blocked || monthAllowBlocked) && canEditClass(c);
      let bg='', label='', autoCls='';
      if(t){ bg=`background:${t.color};color:#fff`; label=(t.name||'').slice(0,1); }
      else if(di.autoPresent && pType){ // 자동 출석: 연한 초록 흐리게
        bg=`background:${pType.color}22;color:${pType.color}`; label='출'; autoCls='auto-present';
      }
      return `<td class="dcell ${blockedCls} ${autoCls}" data-sid="${s.id}" data-day="${di.dd}" style="${bg}" ${clickable?`onmousedown="startDrag(event,'${s.id}',${di.dd})" onmouseenter="dragOver('${s.id}',${di.dd})"`:''} title="${di.dateStr}${t?' · '+t.name:di.autoPresent?' · 자동 출석':''}">${label}</td>`;
    }).join('');
    return `<tr><td class="nm" title="${esc(s.name)}">${esc(s.name)} <span style="color:${s.gender==='남'?'#2b6cb0':'#d53f8c'};font-size:10px">${s.gender||''}</span></td>${cells}</tr>`;
  }).join('');
  body.innerHTML = `
    <div class="acard" style="overflow-x:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
        <h3 class="actitle" style="margin:0">${c.name} · ${y}년 ${m}월 (${studs.length}명)</h3>
        <div style="display:flex;flex-wrap:wrap;gap:8px;font-size:11px">
          ${TYPES.map(t=>`<span style="display:inline-flex;align-items:center;gap:3px"><span style="width:11px;height:11px;border-radius:3px;background:${t.color};display:inline-block"></span>${t.name}</span>`).join('')}
        </div>
      </div>
      <table class="mtab"><thead><tr><th class="nm">학생</th>${headDays}</tr></thead><tbody>${rows}</tbody></table>
      <p style="font-size:12px;color:var(--tl);margin-top:10px">
        연한 초록 <b style="color:${pType?pType.color:'#16a34a'}">출</b> = 자동 출석 처리된 날입니다. 예외인 학생 칸만 클릭해 바꾸면 됩니다.<br>
        칸을 <b>클릭</b>하거나 <b>마우스로 여러 칸을 드래그</b>한 뒤 상태를 고르면 한 번에 입력됩니다. 회색 칸(주말·공휴일·학기외)은 위 토글을 켜면 입력할 수 있습니다.
      </p>
    </div>`;
  } catch(e){
    body.innerHTML = `<div class="acard"><div style="background:#fee2e2;color:#dc2626;border-radius:8px;padding:14px;font-size:13px">월별 표를 그리는 중 오류가 발생했습니다.<br>${esc(e.message)}</div></div>`;
    console.error('loadMonthBody 오류', e);
  }
}

// ── 드래그 일괄 선택 ──
let dragging = false;
let dragCells = [];   // [{sid, day}]

function startDrag(ev, sid, day){
  ev.preventDefault();
  closeMonthMenu();
  const c = CLASSES.find(x=>x.id===monthClassId);
  if(!c || !canEditClass(c)) return;
  dragging = true;
  dragCells = [];
  addDragCell(sid, day);
}
window.startDrag = startDrag;

function dragOver(sid, day){
  if(!dragging) return;
  addDragCell(sid, day);
}
window.dragOver = dragOver;

function addDragCell(sid, day){
  if(dragCells.some(c=>c.sid===sid && c.day===day)) return;
  dragCells.push({sid, day});
  const cell = document.querySelector(`.dcell[data-sid="${sid}"][data-day="${day}"]`);
  if(cell) cell.classList.add('drag-sel');
}

function clearDragSel(){
  document.querySelectorAll('.dcell.drag-sel').forEach(c=>c.classList.remove('drag-sel'));
}

// 마우스 놓으면: 1칸이면 단일 메뉴, 여러 칸이면 일괄 메뉴
document.addEventListener('mouseup', (e)=>{
  if(!dragging) return;
  dragging = false;
  if(dragCells.length===0){ return; }
  if(dragCells.length===1){
    const {sid, day} = dragCells[0];
    clearDragSel(); 
    openMonthMenu(e, sid, day);
    dragCells = [];
  } else {
    openBulkMenu(e);
  }
});

// 일괄 입력 메뉴
function openBulkMenu(ev){
  closeMonthMenu();
  const sorted = [...TYPES].sort((a,b)=>(a.order||0)-(b.order||0));
  const menu = document.createElement('div');
  menu.className='mmenu'; menu.id='month-menu';
  const cnt = dragCells.length;
  let html = `<div class="sep" style="color:var(--gm);font-weight:700">${cnt}칸 일괄 입력</div>`;
  html += sorted.map(t=>`<button onclick="applyBulk('${t.id}')"><span style="width:12px;height:12px;border-radius:3px;background:${t.color};display:inline-block"></span>${t.name}</button>`).join('');
  html += `<div class="sep"></div><button onclick="applyBulkClear()" style="color:#dc2626">✕ 삭제(미입력)</button>`;
  html += `<button onclick="cancelBulk()" style="color:var(--tl)">취소</button>`;
  menu.innerHTML = html;
  document.body.appendChild(menu);
  const x=Math.min((ev.clientX||200), window.innerWidth-170), yy=Math.min((ev.clientY||200), window.innerHeight-300);
  menu.style.left=x+'px'; menu.style.top=yy+'px';
}

async function applyBulk(typeId){
  closeMonthMenu();
  const cells = [...dragCells];
  clearDragSel(); dragCells=[];
  let ok=0;
  for(const {sid, day} of cells){
    try { await setMonthCell(sid, day, typeId, true); ok++; } catch(e){}
  }
  toast(`${ok}칸 입력 완료`,'ok');
}
window.applyBulk = applyBulk;

async function applyBulkClear(){
  closeMonthMenu();
  const cells = [...dragCells];
  clearDragSel(); dragCells=[];
  for(const {sid, day} of cells){
    try { await clearMonthCell(sid, day, true); } catch(e){}
  }
  toast('삭제 완료','ok');
}
window.applyBulkClear = applyBulkClear;

function cancelBulk(){ closeMonthMenu(); clearDragSel(); dragCells=[]; }
window.cancelBulk = cancelBulk;

function openMonthMenu(ev, sid, day){
  ev.stopPropagation();
  closeMonthMenu();
  const c = CLASSES.find(x=>x.id===monthClassId);
  if(!c || !canEditClass(c)) return toast('기록 권한이 없습니다.','err');
  const sorted = [...TYPES].sort((a,b)=>(a.order||0)-(b.order||0));
  const menu = document.createElement('div');
  menu.className='mmenu'; menu.id='month-menu';
  const cur = monthData[sid] && monthData[sid][day];
  let html = sorted.slice(0,5).map(t=>`<button onclick="setMonthCell('${sid}',${day},'${t.id}')"><span style="width:12px;height:12px;border-radius:3px;background:${t.color};display:inline-block"></span>${t.name}${cur&&cur.typeId===t.id?' ✓':''}</button>`).join('');
  if(sorted.length>5){
    html += `<div class="sep">기타</div>` + sorted.slice(5).map(t=>`<button onclick="setMonthCell('${sid}',${day},'${t.id}')"><span style="width:12px;height:12px;border-radius:3px;background:${t.color};display:inline-block"></span>${t.name}${cur&&cur.typeId===t.id?' ✓':''}</button>`).join('');
  }
  if(cur){ html += `<div class="sep"></div><button onclick="clearMonthCell('${sid}',${day})" style="color:#dc2626">✕ 삭제(미입력)</button>`; }
  menu.innerHTML = html;
  document.body.appendChild(menu);
  const x=Math.min(ev.clientX, window.innerWidth-160), yy=Math.min(ev.clientY, window.innerHeight-260);

}
window.openMonthMenu = openMonthMenu;
function closeMonthMenu(){ const m=$I('month-menu'); if(m) m.remove(); }
document.addEventListener('click', e=>{ if(!e.target.closest('.mmenu') && !e.target.closest('.dcell')) closeMonthMenu(); });

async function setMonthCell(sid, day, typeId, bulk){
  if(!bulk) closeMonthMenu();
  const c = CLASSES.find(x=>x.id===monthClassId); if(!c) return;
  const [y,m]=monthYM.split('-').map(Number);
  const dateStr=`${y}-${pad(m)}-${pad(day)}`;
  const s = STUDENTS[sid]; if(!s) return;
  const cur = monthData[sid] && monthData[sid][day];
  try {
    const data = {
      studentId:sid, studentName:s.name, classId:c.id, className:c.name,
      org:c.org, date:dateStr, typeId, memo:(cur&&cur.memo)||'',
      by:CU.name, byUid:CU.uid, updatedAt:Timestamp.now()
    };
    if(cur && cur.id){ await updateDoc(doc(db,'studentAttendance',cur.id), data); monthData[sid][day]={id:cur.id, typeId}; }
    else { data.createdAt=Timestamp.now(); const ref=await addDoc(collection(db,'studentAttendance'), data);
      if(!monthData[sid]) monthData[sid]={}; monthData[sid][day]={id:ref.id, typeId}; }
    updateMonthCellUI(sid, day, typeId);
  } catch(e){ toast('저장 실패: '+e.message,'err'); }
}
window.setMonthCell = setMonthCell;

async function clearMonthCell(sid, day, bulk){
  if(!bulk) closeMonthMenu();
  const cur = monthData[sid] && monthData[sid][day];
  if(!cur || !cur.id) return;
  try {
    await deleteDoc(doc(db,'studentAttendance',cur.id));
    delete monthData[sid][day];
    updateMonthCellUI(sid, day, null);
  } catch(e){ toast('삭제 실패: '+e.message,'err'); }
}
window.clearMonthCell = clearMonthCell;

function updateMonthCellUI(sid, day, typeId){
  const c = CLASSES.find(x=>x.id===monthClassId);
  const studs = (c.students||[]).map(s=>STUDENTS[s]).filter(Boolean).filter(s=>(s.status||'active')==='active').sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'));
  const idx = studs.findIndex(s=>s.id===sid);
  if(idx<0) return;
  const rows = $I('m-body').querySelectorAll('tbody tr');
  const row = rows[idx]; if(!row) return;
  const cell = row.querySelectorAll('td.dcell')[day-1]; if(!cell) return;
  const t = typeId ? TYPES.find(x=>x.id===typeId) : null;
  cell.classList.remove('auto-present');
  if(t){ cell.style.background=t.color; cell.style.color='#fff'; cell.textContent=(t.name||'').slice(0,1); }
  else {
    // 삭제됨 → 자동출석 대상이면 연한 초록 '출'로 복원
    const [y,m]=monthYM.split('-').map(Number);
    const dateStr=`${y}-${pad(m)}-${pad(day)}`;
    const pType = presentType();
    if(isAutoPresentDate(dateStr, c.org) && pType){
      cell.style.background=pType.color+'22'; cell.style.color=pType.color; cell.textContent='출';
      cell.classList.add('auto-present');
    } else { cell.style.background=''; cell.style.color=''; cell.textContent=''; }
  }
}
function fillCheckGradeFilter(){
  const el = $I('ck-grade'); if(!el) return;
  const c = CLASSES.find(x=>x.id===checkClassId);
  const gradeSet = new Set();
  if(c && c.grades) Object.values(c.grades).forEach(g=>{ if(g) gradeSet.add(g); });
  const arr = Array.from(gradeSet).sort();
  el.innerHTML = '<option value="">전체 학년</option>' + arr.map(g=>`<option value="${g}"${g===checkGradeFilter?' selected':''}>${g}</option>`).join('');
}
window.fillCheckGradeFilter = fillCheckGradeFilter;

// 반이 바뀌면 학년 필터를 초기화하고 다시 채움
function onCheckClassChange(){
  checkClassId = $I('ck-class').value;
  checkGradeFilter = '';
  fillCheckGradeFilter();
  loadCheckBody();

function onCheckChange(){

async function loadCheckBody(){
  const body = $I('ck-body'); if(!body) return;
  const c = CLASSES.find(x=>x.id===checkClassId);
  if(!c){ body.innerHTML=''; return; }
  const editable = canEditClass(c);
  const grades = c.grades || {};
  const allStuds = (c.students||[]).map(sid=>STUDENTS[sid]).filter(Boolean)
    .filter(s=>(s.status||'active')==='active')
    .filter(s=>!checkGradeFilter || (grades[s.id]||'')===checkGradeFilter)  // 학년 필터
    .sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  // 이 날짜에 휴학 중인 학생 분리
  const studs = allStuds.filter(s=>!isOnLeave(s, checkDate));
  const leaveStuds = allStuds.filter(s=>isOnLeave(s, checkDate));

  // 날짜가 휴일/방학인지 체크
  const holReason = holidayReason(checkDate, c.org);
  const dow = new Date(checkDate+'T00:00:00').getDay();
  const isWeekend = dow===0||dow===6;

  body.innerHTML = '<div class="acard"><p class="empty">불러오는 중...</p></div>';

  // 기존 기록 로드 (이 반·이 날짜)
  const snap = await getDocs(collection(db,'studentAttendance'));
  checkRecords = {};
  snap.forEach(d=>{ const r=d.data(); if(r.classId===checkClassId && r.date===checkDate) checkRecords[r.studentId]={id:d.id, typeId:r.typeId, memo:r.memo||''}; });

  // 기본 출석 타입 (isPresent=true 중 첫번째)
  const defType = TYPES.find(t=>t.isPresent) || TYPES[0];

  // 학기 기간 체크: 학기 밖이면 입력 차단
  const term = termOfDate(checkDate, c.org);
  if(term === 'none'){
    body.innerHTML = `<div class="acard"><div style="background:#fef3c7;color:#b45309;border-radius:8px;padding:14px;font-size:13px;line-height:1.6">📅 ${checkDate.slice(0,4)}년 ${ORGS[c.org]} 학기 일정이 등록되지 않았습니다.<br>설정 탭에서 학기(개학일~종업일)를 먼저 등록해야 출석을 기록할 수 있습니다.</div></div>`;
    return;
  }
  if(term === null){
    body.innerHTML = `<div class="acard"><div style="background:#fee2e2;color:#dc2626;border-radius:8px;padding:14px;font-size:13px;line-height:1.6">🚫 이 날짜(${checkDate})는 <b>학기 기간이 아닙니다.</b><br>출석은 등록된 학기(개학일~종업일) 안에서만 기록할 수 있습니다.<br><span style="color:var(--ts)">방학·학기 외 기간에는 출결을 입력하지 않습니다.</span></div></div>`;
    return;
  }

  let banner = '';
  if(holReason) banner = `<div style="background:#fee2e2;color:#dc2626;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px">📌 이 날짜는 <b>${holReason}</b> 입니다. (휴일/방학)</div>`;
  else if(isWeekend) banner = `<div style="background:#fef3c7;color:#b45309;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px">📌 이 날짜는 주말입니다.</div>`;

  if(!studs.length){
    body.innerHTML = `<div class="acard">${banner}<div class="empty">이 반에 배정된 재학생이 없습니다.</div></div>`;
    return;
  }

  const typeButtons = (sid, curType) => TYPES.map(t=>{
    const sel = (curType||defType?.id)===t.id;
    return `<button class="tbtn-att" onclick="setRec('${sid}','${t.id}')" data-sid="${sid}" data-tid="${t.id}"
      style="border:1.5px solid ${sel?t.color:'var(--ivd)'};background:${sel?t.color:'#fff'};color:${sel?'#fff':'var(--ts)'};padding:5px 12px;border-radius:8px;font-size:13px;font-weight:600;cursor:${editable?'pointer':'default'};${editable?'':'pointer-events:none;opacity:.7'}">${t.name}</button>`;
  }).join('');

  const rows = studs.map(s=>{
    const rec = checkRecords[s.id];
    const curType = rec?.typeId;
    const g = grades[s.id];
    const gradeTag = g ? `<span style="background:var(--gp);color:var(--gm);font-size:10px;font-weight:700;padding:1px 7px;border-radius:100px">${g}</span>` : '';
    return `<div id="row-${s.id}" style="padding:12px 0;border-bottom:1px solid var(--ivd);scroll-margin-top:70px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-weight:700;font-size:15px;color:var(--gd)">${s.name}</span>
        ${gradeTag}
        <span style="font-size:11px;color:var(--tl)">학번 ${s.studentNo||'-'}</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">${typeButtons(s.id, curType)}</div>
      <input type="text" id="memo-${s.id}" placeholder="메모 (선택)" value="${rec?.memo||''}" ${editable?'':'disabled'}
        style="width:100%;height:34px;border:1.5px solid var(--ivd);border-radius:6px;padding:0 10px;font-size:13px;background:${editable?'var(--iv)':'#f0f0f0'};outline:none">
    </div>`;
  }).join('');

  const leaveSection = leaveStuds.length ? `
    <div style="margin-top:16px;padding-top:12px;border-top:2px dashed var(--ivd)">
      <div style="font-size:13px;font-weight:700;color:var(--tl);margin-bottom:8px">휴학 중 (${leaveStuds.length}명) · 출결 제외</div>
      ${leaveStuds.map(s=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;opacity:.6">
        <span style="font-weight:600">${s.name}</span>
        <span class="typebadge" style="background:#fef3c7;color:#b45309">휴학 중</span>
      </div>`).join('')}
    </div>` : '';

  // 이 날짜가 자동 출석 대상인지 (학기 중 평일)
  const autoPresentToday = isAutoPresentDate(checkDate, c.org);
  const pType = presentType();
  // 정사각 박스 현황 그리드 (한눈에 전체 상태)
  const gridBoxes = studs.map(s=>{
    const rec = checkRecords[s.id];
    const t = rec && rec.typeId ? TYPES.find(x=>x.id===rec.typeId) : null;
    let color, tn, faint=false;
    if(t){ color=t.color; tn=t.name; }
    else if(autoPresentToday && pType){ color=pType.color; tn='출석(자동)'; faint=true; }
    else { color='#e5e7eb'; tn='미입력'; }
    return `<div id="box-${s.id}" onclick="scrollToStud('${s.id}')" title="${s.name} · ${tn}" style="aspect-ratio:1;background:${color};border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:4px;overflow:hidden;border:1.5px solid rgba(0,0,0,0.06);${faint?'opacity:.65':''}" data-name="${s.name}">
      <span style="font-size:12px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3);text-align:center;line-height:1.2">${s.name}</span>
      <span class="box-state" style="font-size:9px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3);margin-top:2px">${tn}</span>
    </div>`;
  }).join('');
  const gridSection = studs.length ? `
    <div class="acard">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <h3 class="actitle" style="margin:0;font-size:15px">🔲 한눈에 보기</h3>
        <span style="font-size:12px;color:var(--tl)">박스를 누르면 해당 학생으로 이동</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px">${gridBoxes}</div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;font-size:11px">
        ${TYPES.map(t=>`<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:3px;background:${t.color};display:inline-block"></span>${t.name}</span>`).join('')}
      </div>
    </div>` : '';

  body.innerHTML = `
    ${gridSection}
    <div class="acard">
      ${banner}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h3 class="actitle" style="margin:0">${c.name} · ${studs.length}명${leaveStuds.length?` <span style="font-size:12px;color:var(--tl);font-weight:400">(휴학 ${leaveStuds.length}명 제외)</span>`:''}</h3>
        ${editable?`<span style="font-size:12px;color:var(--gm)">✏️ 기록 가능</span>`:`<span style="font-size:12px;color:var(--tl)">👁 열람 전용</span>`}
      </div>
      ${rows}
      ${editable?`<button class="bp" style="margin-top:16px;width:100%" onclick="saveCheck()">저장</button>`:''}
      ${leaveSection}
    </div>`;

  // 초기 선택값 채우기 (기록 없으면 기본 출석)
  studs.forEach(s=>{ if(!checkRecords[s.id]) checkRecords[s.id]={typeId:defType?.id, memo:''}; });
}

function setRec(sid, tid){
  if(!checkRecords[sid]) checkRecords[sid]={};
  checkRecords[sid].typeId = tid;
  // 버튼 스타일 갱신
  document.querySelectorAll(`.tbtn-att[data-sid="${sid}"]`).forEach(b=>{
    const t = TYPES.find(x=>x.id===b.dataset.tid);
    const sel = b.dataset.tid===tid;
    b.style.background = sel?t.color:'#fff';
    b.style.color = sel?'#fff':'var(--ts)';
    b.style.borderColor = sel?t.color:'var(--ivd)';
  });
  // 정사각 박스 갱신
  const box = $I('box-'+sid);
  if(box){
    const t = TYPES.find(x=>x.id===tid);
    box.style.background = t?t.color:'#e5e7eb';
    const st = box.querySelector('.box-state');
    if(st) st.textContent = t?t.name:'미입력';
    box.title = `${box.dataset.name} · ${t?t.name:'미입력'}`;
  }
}

function scrollToStud(sid){
  const row = $I('row-'+sid);
  if(!row) return;
  row.scrollIntoView({behavior:'smooth', block:'center'});
  // 강조: 노란 배경 + 테두리 + 2번 깜박임
  row.style.transition = 'background .25s, box-shadow .25s';
  row.style.borderRadius = '10px';
  let on = false, cnt = 0;
  const blink = () => {
    on = !on;
    row.style.background = on ? '#fde68a' : 'transparent';
    row.style.boxShadow = on ? '0 0 0 2px var(--gold)' : 'none';
    cnt++;
    if(cnt < 6) setTimeout(blink, 280);
    else { row.style.background=''; row.style.boxShadow='none'; }
  };
  blink();
}
window.scrollToStud = scrollToStud;
window.setRec = setRec;

async function saveCheck(){
  const c = CLASSES.find(x=>x.id===checkClassId);
  if(!c || !canEditClass(c)) return toast('기록 권한이 없습니다.','err');
  const term = termOfDate(checkDate, c.org);
  if(term==='none') return toast('학기 일정이 등록되지 않았습니다.','err');
  if(term===null) return toast('학기 기간이 아닙니다. 출석을 기록할 수 없습니다.','err');
  const grades = c.grades || {};
  const studs = (c.students||[]).map(sid=>STUDENTS[sid]).filter(Boolean)
    .filter(s=>(s.status||'active')==='active')
    .filter(s=>!checkGradeFilter || (grades[s.id]||'')===checkGradeFilter)  // 화면에 보이는 학생만
    .filter(s=>!isOnLeave(s, checkDate));  // 휴학 중인 학생 제외
  toast('저장 중...');
  let cnt=0;
  try {
    for(const s of studs){
      const rec = checkRecords[s.id]; if(!rec||!rec.typeId) continue;
      const memo = ($I('memo-'+s.id)?.value||'').trim();
      const existing = rec.id;
      const data = {
        studentId: s.id, studentName: s.name, classId: c.id, className: c.name,
        org: c.org, date: checkDate, typeId: rec.typeId, memo,
        by: CU.name, byUid: CU.uid, updatedAt: Timestamp.now()
      };
      if(existing){
        // 변경 이력 누적
        await updateDoc(doc(db,'studentAttendance',existing), data);
      } else {
        data.createdAt = Timestamp.now();
        await addDoc(collection(db,'studentAttendance'), data);
      }
      cnt++;
    }
    logActivity('수정','출석부',`${c.name} ${checkDate} (${cnt}명)`);
    toast(`${cnt}명 출결이 저장되었습니다.`,'ok');
    // 결석·지각 알림 (담임·대리 + 부서장·관리자에게, 본인 제외)
    sendAbsenceAlert(c, checkDate, studs);
    loadCheckBody();
  } catch(e){ toast('저장 실패: '+e.message,'err'); }
}
window.saveCheck = saveCheck;

// 결석·지각 요약 알림
async function sendAbsenceAlert(c, dateStr, studs){
  try {
    // 결석/지각 등 '출석 아닌' 학생 모으기
    const abnormal = [];
    studs.forEach(s=>{
      const rec = checkRecords[s.id];
      if(!rec || !rec.typeId) return;
      const t = TYPES.find(x=>x.id===rec.typeId);
      if(t && !t.isPresent){ abnormal.push({name:s.name, type:t.name}); }
    });
    if(!abnormal.length) return; // 다 정상 출석이면 알림 없음

    // 알림 대상 uid 수집: 담임 + 대리 + 같은 기관 관리자(org_admin/super) + 같은 부서 부서장(tab_admin)
    const targets = new Set();
    if(c.teacherUid) targets.add(c.teacherUid);
    (c.deputies||[]).forEach(u=>targets.add(u));
    const snap = await getDocs(collection(db,'staff'));
    snap.forEach(d=>{
      const st = d.data();
      if((st.acStatus||'active')!=='active') return;
      const stOrgs = st.role==='super' ? ['jihyebit','daniel'] : (st.orgs&&st.orgs.length?st.orgs:[st.org]);
      // 슈퍼·기관관리자: 해당 기관이면
      if((st.role==='super'||st.role==='org_admin') && stOrgs.includes(c.org)) targets.add(d.id);
      // 부서장: 같은 기관+같은 부서
      if(st.role==='tab_admin' && stOrgs.includes(c.org) && (st.dept===c.dept || c.dept==='행정실')) targets.add(d.id);
    });
    targets.delete(CU.uid); // 방금 체크한 본인 제외
    const toUids = [...targets];
    if(!toUids.length) return;
    // 대상 이름
    const nameMap = {};
    snap.forEach(d=>{ nameMap[d.id]=d.data().name; });
    const toNames = toUids.map(u=>nameMap[u]||'');
    // 메시지 작성
    const summary = abnormal.map(a=>`${a.name}(${a.type})`).join(', ');
    const [y,m,dd] = dateStr.split('-');
    const subject = `[출결] ${c.name} ${Number(m)}/${Number(dd)} 결석·지각 ${abnormal.length}명`;
    const body = `${ORGS[c.org]||c.org} ${c.name}\n${dateStr} 출결 특이사항\n\n${summary}\n\n(기록: ${CU.name})`;
    await addDoc(collection(db,'messages'), {
      fromUid:CU.uid, fromName:CU.name,
      toUids, toNames,
      subject, body, readBy:[],
      createdAt:Timestamp.now()
    });
  } catch(e){ console.error('결석 알림 실패', e); }
}

let statTermSel = '1';   // '1' | '2' | 'year'
let statView = 'month'; // student | class | grade | dept | all | month
let statClassFilter = '';

// 반/학년 필터 옵션 채우기 (선택된 기관 기준)
function fillStatFilters(){
  const orgClasses = CLASSES.filter(c=>c.org===statOrg);
  const clsEl = $I('st-class');
  if(clsEl){
    clsEl.innerHTML = '<option value="">전체 반</option>' +
      sortClasses(orgClasses).map(c=>`<option value="${c.id}"${c.id===statClassFilter?' selected':''}>${c.grade?'['+c.grade+'] ':''}${c.name}</option>`).join('');
  }
  // 학년 목록 (반 grades에 등장하는 학년 + 반 grade)
  const gradeSet = new Set();
  orgClasses.forEach(c=>{ Object.values(c.grades||{}).forEach(g=>gradeSet.add(g)); });
  const gEl = $I('st-grade');
  if(gEl){
    const arr = sortGrades(Array.from(gradeSet));
    gEl.innerHTML = '<option value="">전체 학년</option>' +
      arr.map(g=>`<option value="${g}"${g===statGradeFilter?' selected':''}>${g}</option>`).join('');
  }
}
window.fillStatFilters = fillStatFilters;

function onStatChange(){
  const prevOrg = statOrg;
  statYear = Number($I('st-year').value);
  statOrg = $I('st-org').value;
  statTermSel = $I('st-term').value;
  statView = $I('st-view').value;
  statClassFilter = $I('st-class')?.value || '';
  statGradeFilter = $I('st-grade')?.value || '';
  // 기관이 바뀌면 반/학년 필터 초기화하고 옵션 다시 채움
  if(prevOrg !== statOrg){ statClassFilter=''; statGradeFilter=''; fillStatFilters(); }
  buildStat();
}
window.onStatChange = onStatChange;

// 선택된 학기들의 수업일 집합 + 라벨
function getStatTerms(){
  const sel = [];
  const want = statTermSel==='year' ? [1,2] : [Number(statTermSel)];
  for(const tn of want){
    const t = TERMS.find(x=>x.year===statYear && x.org===statOrg && x.term===tn);
    if(t) sel.push(t);
  }
  return sel;
}

let _statCache = null;
async function buildStat(){
  const body = $I('st-body'); if(!body) return;
  body.innerHTML = '<div class="acard"><p class="empty">집계 중...</p></div>';

  // 월별 달력 보기는 별도 흐름
  if(statView==='month'){ buildMonthlyCalendar(); return; }
  if(statView==='week'){ buildWeeklyStat(); return; }

  const terms = getStatTerms();
  if(!terms.length){
    body.innerHTML = `<div class="acard"><div class="empty">선택한 학기가 등록되지 않았습니다.<br>설정 탭에서 ${statYear}년 ${ORGS[statOrg]} 학기를 먼저 등록해주세요.</div></div>`;
    return;
  }

  // 수업일 집합
  let schoolDays = [];
  terms.forEach(t=>{ schoolDays = schoolDays.concat(calcSchoolDays(t)); });
  const schoolDaySet = new Set(schoolDays);
  const totalDays = schoolDaySet.size;
  const minDate = schoolDays.length ? schoolDays.reduce((a,b)=>a<b?a:b) : '';
  const maxDate = schoolDays.length ? schoolDays.reduce((a,b)=>a>b?a:b) : '';

  // 출결 기록 로드 (이 기관)
  const snap = await getDocs(collection(db,'studentAttendance'));
  const recs = [];
  snap.forEach(d=>{ const r=d.data(); if(r.org===statOrg && schoolDaySet.has(r.date)) recs.push(r); });

  // 출석 인정 타입 id 집합
  const presentIds = new Set(TYPES.filter(t=>t.isPresent).map(t=>t.id));
  const typeName = id => (TYPES.find(t=>t.id===id)?.name)||'기타';

  // 이 기관·올해 반들
  const orgClasses = CLASSES.filter(c=>c.org===statOrg);
  // 학생 → 반 매핑
  const studClass = {};
  orgClasses.forEach(c=>(c.students||[]).forEach(sid=>{ studClass[sid]=c; }));

  // 학생별 집계: {studentId: {name, className, grade, dept, counts, present, recorded, myTotal}}
  const byStud = {};
  // 대상 학생 = 이 기관 반에 배정된 재학생
  orgClasses.forEach(c=>{
    // 반 필터 적용
    if(statClassFilter && c.id!==statClassFilter) return;
    (c.students||[]).forEach(sid=>{
      const s = STUDENTS[sid]; if(!s || (s.status||'active')!=='active') return;
      const grade = (c.grades||{})[sid] || '';
      // 학년 필터 적용
      if(statGradeFilter && grade!==statGradeFilter) return;
      if(!byStud[sid]){
        // 개인 수업일수 = 전체 수업일 − 본인 휴학 기간에 걸린 수업일
        const leaveDays = leaveDaysInSet(s, schoolDaySet);
        byStud[sid]={name:s.name, studentNo:s.studentNo||'', className:c.name, grade:grade||'(학년미지정)', dept:c.dept||'', classId:c.id, counts:{}, present:0, recorded:0, myTotal: Math.max(0, totalDays - leaveDays), leaveDays};
      }
    });
  });
  // 기록 반영 (휴학 기간에 잘못 기록된 건 제외)
  recs.forEach(r=>{
    const b = byStud[r.studentId]; if(!b) return;
    const s = STUDENTS[r.studentId];
    if(isOnLeave(s, r.date)) return;  // 휴학 중 기록은 무시
    const tn = typeName(r.typeId);
    b.counts[tn] = (b.counts[tn]||0)+1;
    b.recorded++;
    if(presentIds.has(r.typeId)) b.present++;
  });
  // 기록 없는 날은 "출석"으로 간주 (개인 수업일 기준)
  Object.values(byStud).forEach(b=>{
    const autoPresent = b.myTotal - b.recorded;
    if(autoPresent>0){ b.present += autoPresent; b.counts['출석']=(b.counts['출석']||0)+autoPresent; }
  });

  _statCache = {byStud, totalDays, minDate, maxDate, terms};

  // 보기별 렌더
  if(statView==='student') renderStatStudent(byStud, totalDays, minDate, maxDate);
  else if(statView==='class') renderStatGroup(byStud, totalDays, 'className', '반');
  else if(statView==='grade') renderStatGroup(byStud, totalDays, 'grade', '학년');
  else if(statView==='dept') renderStatGroup(byStud, totalDays, 'dept', '부서');
  else renderStatAll(byStud, totalDays, minDate, maxDate);
}

function periodLabel(min,max){ return min&&max?`${min} ~ ${max}`:''; }

function renderStatStudent(byStud, totalDays, minDate, maxDate){
  const list = Object.values(byStud).sort((a,b)=>(a.className+a.name).localeCompare(b.className+b.name,'ko'));
  if(!list.length){ $I('st-body').innerHTML='<div class="acard"><p class="empty">대상 학생이 없습니다.</p></div>'; return; }
  // 등장하는 출결 항목들 (열 구성)
  const cols = TYPES.map(t=>t.name);
  const rows = list.map(b=>{
    const denom = b.myTotal!=null ? b.myTotal : totalDays;
    const rate = denom? Math.round(b.present/denom*100) : 0;
    const leaveNote = b.leaveDays>0 ? ` <span style="font-size:10px;color:#b45309">(휴학 ${b.leaveDays}일 제외)</span>` : '';
    return `<tr>
      <td style="padding:7px 8px;border-bottom:1px solid var(--ivd);font-weight:600">${b.name}${leaveNote}</td>
      <td style="padding:7px 8px;border-bottom:1px solid var(--ivd)">${b.className}</td>
      <td style="padding:7px 8px;border-bottom:1px solid var(--ivd)">${b.grade||'-'}</td>
      ${cols.map(c=>`<td style="padding:7px 8px;border-bottom:1px solid var(--ivd);text-align:center">${b.counts[c]||0}</td>`).join('')}
      <td style="padding:7px 8px;border-bottom:1px solid var(--ivd);text-align:center">${denom}</td>
      <td style="padding:7px 8px;border-bottom:1px solid var(--ivd);text-align:center;font-weight:700;color:${rate>=90?'#16a34a':rate>=70?'#b45309':'#dc2626'}">${rate}%</td>
    </tr>`;
  }).join('');
  $I('st-body').innerHTML = `
    <div class="acard">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <h3 class="actitle" style="margin:0">학생별 출석 (${list.length}명)</h3>
        <span style="font-size:12px;color:var(--ts)">수업일 ${totalDays}일 · ${periodLabel(minDate,maxDate)}</span>
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap">
          <thead><tr style="background:var(--iv)">
            <th style="padding:8px;text-align:left">이름</th><th style="padding:8px;text-align:left">반</th><th style="padding:8px;text-align:left">학년</th>
            ${cols.map(c=>`<th style="padding:8px;text-align:center">${c}</th>`).join('')}
            <th style="padding:8px;text-align:center">수업일</th>
            <th style="padding:8px;text-align:center">출석률</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function renderStatGroup(byStud, totalDays, key, label){
  // 그룹별 합산
  const groups = {};
  Object.values(byStud).forEach(b=>{
    const g = b[key]||'(미지정)';
    if(!groups[g]) groups[g]={count:0, present:0, possible:0, counts:{}};
    groups[g].count++;
    groups[g].present += b.present;
    groups[g].possible += (b.myTotal!=null ? b.myTotal : totalDays);
    Object.entries(b.counts).forEach(([k,v])=>groups[g].counts[k]=(groups[g].counts[k]||0)+v);
  });
  const cols = TYPES.map(t=>t.name);
  // 학년별/반별은 학년순, 그 외(부서 등)는 이름순
  const useGradeSort = (key==='grade' || key==='className');
  const sortFn = useGradeSort
    ? (a,b)=> gradeRank(a[0])-gradeRank(b[0]) || a[0].localeCompare(b[0],'ko')
    : (a,b)=> a[0].localeCompare(b[0],'ko');
  const rows = Object.entries(groups).sort(sortFn).map(([g,d])=>{
    const rate = d.possible? Math.round(d.present/d.possible*100):0;
    return `<tr>
      <td style="padding:7px 8px;border-bottom:1px solid var(--ivd);font-weight:600">${g}</td>
      <td style="padding:7px 8px;border-bottom:1px solid var(--ivd);text-align:center">${d.count}명</td>
      ${cols.map(c=>`<td style="padding:7px 8px;border-bottom:1px solid var(--ivd);text-align:center">${d.counts[c]||0}</td>`).join('')}
      <td style="padding:7px 8px;border-bottom:1px solid var(--ivd);text-align:center;font-weight:700;color:${rate>=90?'#16a34a':rate>=70?'#b45309':'#dc2626'}">${rate}%</td>
    </tr>`;
  }).join('');
  $I('st-body').innerHTML = `
    <div class="acard">
      <h3 class="actitle">${label}별 출석 · 수업일 ${totalDays}일</h3>
      <div style="overflow-x:auto;margin-top:10px">
        <table style="width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap">
          <thead><tr style="background:var(--iv)">
            <th style="padding:8px;text-align:left">${label}</th><th style="padding:8px;text-align:center">인원</th>
            ${cols.map(c=>`<th style="padding:8px;text-align:center">${c}</th>`).join('')}
            <th style="padding:8px;text-align:center">평균 출석률</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function renderStatAll(byStud, totalDays, minDate, maxDate){
  const list = Object.values(byStud);
  const totalStud = list.length;
  const totalPresent = list.reduce((s,b)=>s+b.present,0);
  const totalPossible = list.reduce((s,b)=>s+(b.myTotal!=null?b.myTotal:totalDays),0);
  const avgRate = totalPossible? Math.round(totalPresent/totalPossible*100):0;
  const allCounts = {};
  list.forEach(b=>Object.entries(b.counts).forEach(([k,v])=>allCounts[k]=(allCounts[k]||0)+v));
  const stat=(label,val,color)=>`<div style="flex:1;min-width:90px;background:var(--iv);border-radius:10px;padding:14px;text-align:center"><div style="font-size:22px;font-weight:800;color:${color||'var(--gm)'}">${val}</div><div style="font-size:11px;color:var(--ts);margin-top:2px">${label}</div></div>`;
  const typeRows = TYPES.map(t=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--ivd);font-size:13px"><span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${t.color};margin-right:6px"></span>${t.name}</span><span style="font-weight:700">${allCounts[t.name]||0}건</span></div>`).join('');
  $I('st-body').innerHTML = `
    <div class="acard">
      <h3 class="actitle">전체 출석 현황 · 수업일 ${totalDays}일</h3>
      <p class="adesc">${periodLabel(minDate,maxDate)}</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
        ${stat('대상 학생',totalStud+'명')}
        ${stat('수업일',totalDays+'일')}
        ${stat('평균 출석률',avgRate+'%',avgRate>=90?'#16a34a':'#b45309')}
      </div>
      <div style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:8px">항목별 합계</div>
      ${typeRows}
    </div>`;
}

function downloadStatExcel(){
  if(!_statCache){ toast('먼저 통계를 조회하세요.','err'); return; }
  const {byStud, totalDays, terms} = _statCache;
  const cols = TYPES.map(t=>t.name);
  const header = ['이름','학번','반','부서', ...cols, '수업일','출석률(%)'];
  const aoa = [header];
  Object.values(byStud).sort((a,b)=>(a.className+a.name).localeCompare(b.className+b.name,'ko')).forEach(b=>{
    const denom = b.myTotal!=null ? b.myTotal : totalDays;
    const rate = denom? Math.round(b.present/denom*100):0;
    aoa.push([b.name, b.studentNo, b.className, b.dept, ...cols.map(c=>b.counts[c]||0), denom, rate]);
  });
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = header.map(h=>({wch:Math.max(h.length,8)}));
  const wb = XLSX.utils.book_new();
  const termLabel = statTermSel==='year'?'연간':TERM_NAMES[Number(statTermSel)];
  XLSX.utils.book_append_sheet(wb, ws, '출석통계');
  XLSX.writeFile(wb, `출석통계_${statYear}_${ORGS[statOrg]}_${termLabel}.xlsx`);
  toast('엑셀을 다운로드했습니다.','ok');
}

let statWeekMonday = null; // 그 주 월요일 Date

function mondayOf(d){ const x=new Date(d); const day=x.getDay(); const diff=(day===0?-6:1-day); x.setDate(x.getDate()+diff); x.setHours(0,0,0,0); return x; }

async function buildWeeklyStat(){
  const body = $I('st-body'); if(!body) return;
  if(!statWeekMonday) statWeekMonday = mondayOf(new Date());
  const mon = new Date(statWeekMonday);
  const days = [];
  for(let i=0;i<7;i++){ const d=new Date(mon); d.setDate(mon.getDate()+i); days.push(d); }
  const dstr = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const weekStart = dstr(days[0]), weekEnd = dstr(days[6]);
  const dowName=['월','화','수','목','금','토','일'];

  const orgClasses = sortClasses(CLASSES.filter(c=>c.org===statOrg));
  // 이 주 출결 기록 로드
  const snap = await getDocs(collection(db,'studentAttendance'));
  const recs = [];
  snap.forEach(d0=>{ const r=d0.data(); if(r.org===statOrg && r.date>=weekStart && r.date<=weekEnd) recs.push(r); });
  const typeById={}; TYPES.forEach(t=>typeById[t.id]=t);

  // 반별 집계 (결석·지각 등 비출석만)
  const rows = orgClasses.map(c=>{
    const cRecs = recs.filter(r=>r.classId===c.id);
    const abn = cRecs.filter(r=>{ const t=typeById[r.typeId]; return t && !t.isPresent; });
    if(!abn.length) return `<tr><td style="padding:7px 10px;border-bottom:1px solid var(--ivd)">${c.grade?'['+c.grade+'] ':''}${c.name}</td><td colspan="2" style="padding:7px 10px;border-bottom:1px solid var(--ivd);color:var(--tl)">특이사항 없음</td></tr>`;
    // 유형별 카운트
    const byType={};
    abn.forEach(r=>{ const n=typeById[r.typeId]?.name||'기타'; byType[n]=(byType[n]||0)+1; });
    const typeSummary = Object.entries(byType).map(([n,cnt])=>`${n} ${cnt}`).join(', ');
    const detail = abn.sort((a,b)=>a.date.localeCompare(b.date)).map(r=>{
      const dt=new Date(r.date+'T00:00:00'); const t=typeById[r.typeId];
      return `<span style="display:inline-block;font-size:11px;background:${t?t.color:'#999'}22;color:${t?t.color:'#999'};padding:1px 7px;border-radius:100px;margin:1px">${r.studentName} ${Number(r.date.slice(5,7))}/${Number(r.date.slice(8,10))} ${t?t.name:''}</span>`;
    }).join(' ');
    return `<tr><td style="padding:7px 10px;border-bottom:1px solid var(--ivd);font-weight:600;white-space:nowrap">${c.grade?'['+c.grade+'] ':''}${c.name}</td>
      <td style="padding:7px 10px;border-bottom:1px solid var(--ivd);font-size:12px;font-weight:700;color:var(--gm);white-space:nowrap">${typeSummary}</td>
      <td style="padding:7px 10px;border-bottom:1px solid var(--ivd)">${detail}</td></tr>`;
  }).join('');

  // 전체 요약
  const allAbn = recs.filter(r=>{ const t=typeById[r.typeId]; return t && !t.isPresent; });
  const totalByType={};
  allAbn.forEach(r=>{ const n=typeById[r.typeId]?.name||'기타'; totalByType[n]=(totalByType[n]||0)+1; });
  const totalSummary = Object.entries(totalByType).map(([n,cnt])=>`${n} ${cnt}건`).join(' · ') || '특이사항 없음';

  body.innerHTML = `
    <div class="acard">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px">
        <div style="display:flex;gap:6px;align-items:center">
          <button class="bs" onclick="weekShift(-1)" style="padding:6px 12px">‹ 이전주</button>
          <span style="font-weight:700;font-size:14px">${weekStart} ~ ${weekEnd}</span>
          <button class="bs" onclick="weekShift(1)" style="padding:6px 12px">다음주 ›</button>
          <button class="bs" onclick="weekThis()" style="padding:6px 12px">이번주</button>
        </div>
      </div>
      <div style="background:var(--gp);border-radius:8px;padding:12px;margin-bottom:14px;font-size:14px">
        <b>${ORGS[statOrg]} 이번 주 요약:</b> ${totalSummary}
      </div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr style="background:var(--iv)"><th style="padding:8px 10px;text-align:left">반</th><th style="padding:8px 10px;text-align:left;white-space:nowrap">요약</th><th style="padding:8px 10px;text-align:left">상세</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="3" style="padding:20px;text-align:center;color:var(--tl)">편성된 반이 없습니다.</td></tr>'}</tbody>
      </table></div>
      <p style="font-size:12px;color:var(--tl);margin-top:10px">출석을 제외한 결석·지각·조퇴 등 특이사항만 표시합니다.</p>
    </div>`;
}
window.buildWeeklyStat = buildWeeklyStat;
function weekShift(n){ const d=new Date(statWeekMonday); d.setDate(d.getDate()+n*7); statWeekMonday=d; buildWeeklyStat(); }
window.weekShift = weekShift;
function weekThis(){ statWeekMonday = mondayOf(new Date()); buildWeeklyStat(); }
window.weekThis = weekThis;

window.buildMonthlyCalendar = buildMonthlyCalendar;

window.onMonthChange = onMonthChange;

async function loadMonthlyBody(){
  const body = $I('mc-body'); if(!body) return;
  const c = CLASSES.find(x=>x.id===statMonthClassId); if(!c) return;
  const studs = (c.students||[]).map(sid=>STUDENTS[sid]).filter(Boolean)
    .filter(s=>(s.status||'active')==='active')
    .sort((a,b)=>a.name.localeCompare(b.name,'ko'));

  // 그 달의 날짜들
  const y = statYear, m = statMonth;
  const lastDay = new Date(y, m, 0).getDate();
  const days = [];
  for(let d=1; d<=lastDay; d++){
    const ds = `${y}-${pad(m)}-${pad(d)}`;
    const dow = new Date(ds+'T00:00:00').getDay();
    const hol = holidayReason(ds, c.org);
    // 학기 기간 안인지 (학기 객체면 true, null/'none'이면 false)
    const tm = termOfDate(ds, c.org);
    const inTerm = (tm && tm!=='none');
    days.push({d, ds, dow, isWeekend:dow===0||dow===6, hol, inTerm});
  }

  // 출결 기록 로드 (이 반·이 달)
  const snap = await getDocs(collection(db,'studentAttendance'));
  const recMap = {};  // studentId -> {date -> typeId}
  const prefix = `${y}-${pad(m)}`;
  snap.forEach(doc0=>{ const r=doc0.data(); if(r.classId===statMonthClassId && (r.date||'').startsWith(prefix)){ (recMap[r.studentId]=recMap[r.studentId]||{})[r.date]=r.typeId; } });

  const typeById = {}; TYPES.forEach(t=>typeById[t.id]=t);
  const presentIds = new Set(TYPES.filter(t=>t.isPresent).map(t=>t.id));
  const defType = TYPES.find(t=>t.isPresent) || TYPES[0];

  // 수업일(학기 안 + 평일 + 휴일아님) 카운트
  const schoolDays = days.filter(x=>x.inTerm && !x.isWeekend && !x.hol);
  const totalSchool = schoolDays.length;

  if(!studs.length){
    body.innerHTML = `<div class="acard"><div class="empty">이 반에 배정된 재학생이 없습니다.</div></div>`;
    return;
  }

  const dowName = ['일','월','화','수','목','금','토'];

  // 헤더 (날짜)
  const headCells = days.map(x=>{
    const bg = !x.inTerm?'#e5e7eb':x.hol?'#fee2e2':x.isWeekend?'#f3f4f6':'transparent';
    const col = x.dow===0?'#dc2626':x.dow===6?'#2563eb':'var(--ts)';
    const ttl = !x.inTerm?(x.ds+' 학기 외'):(x.ds+(x.hol?' '+x.hol:''));
    return `<th style="padding:2px;min-width:22px;background:${bg};font-size:10px;color:${col};font-weight:600" title="${ttl}">${x.d}<br><span style="font-size:9px">${dowName[x.dow]}</span></th>`;
  }).join('');

  // 학생별 행
  const rows = studs.map(s=>{
    const rec = recMap[s.id] || {};
    let present=0;
    const cells = days.map(x=>{
      if(!x.inTerm) return `<td style="background:#e5e7eb;border:1px solid #eee"></td>`;
      if(x.isWeekend || x.hol) return `<td style="background:${x.hol?'#fee2e2':'#f3f4f6'};border:1px solid #eee"></td>`;
      // 기록 없으면 기본 출석
      const tid = rec[x.ds] || defType?.id;
      const t = typeById[tid];
      if(presentIds.has(tid)) present++;
      const isDefault = !rec[x.ds];
      const dot = t ? `<span title="${t.name}" style="display:inline-block;width:14px;height:14px;border-radius:3px;background:${t.color};opacity:${isDefault?0.25:1}"></span>` : '';
      return `<td style="border:1px solid #eee;text-align:center;padding:1px">${dot}</td>`;
    }).join('');
    const rate = totalSchool? Math.round(present/totalSchool*100):0;
    // 월간 합계 막대
    const bar = `<div style="display:flex;align-items:center;gap:4px"><div style="flex:1;background:#eee;border-radius:3px;height:10px;min-width:40px;overflow:hidden"><div style="width:${rate}%;height:100%;background:${rate>=90?'#16a34a':rate>=70?'#f59e0b':'#dc2626'}"></div></div><span style="font-size:11px;font-weight:700;color:${rate>=90?'#16a34a':rate>=70?'#b45309':'#dc2626'};white-space:nowrap">${present}/${totalSchool}</span></div>`;
    return `<tr>
      <td style="position:sticky;left:0;background:#fff;padding:4px 8px;font-size:13px;font-weight:600;white-space:nowrap;border-right:2px solid var(--ivd)">${s.name}${(c.grades&&c.grades[s.id])?`<span style="color:var(--gm);font-size:10px;font-weight:700;margin-left:4px">${c.grades[s.id]}</span>`:''}</td>
      ${cells}
      <td style="padding:4px 8px;min-width:90px">${bar}</td>
    </tr>`;
  }).join('');

  // 범례
  const legend = TYPES.map(t=>`<span style="display:inline-flex;align-items:center;gap:4px;margin-right:10px;font-size:12px"><span style="width:12px;height:12px;border-radius:3px;background:${t.color}"></span>${t.name}</span>`).join('');

  body.innerHTML = `
    <div class="acard">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <h3 class="actitle" style="margin:0">${c.name} · ${y}년 ${m}월</h3>
        <span style="font-size:12px;color:var(--ts)">수업일 ${totalSchool}일 · 학생 ${studs.length}명</span>
      </div>
      <div style="margin-bottom:10px">${legend}<span style="font-size:11px;color:var(--tl);margin-left:6px">(연한 색 = 자동 출석, 진한 색 = 직접 기록)</span></div>
      <div style="overflow-x:auto">
        <table style="border-collapse:collapse;font-size:12px">
          <thead><tr>
            <th style="position:sticky;left:0;background:var(--iv);padding:4px 8px;border-right:2px solid var(--ivd);font-size:12px">학생</th>
            ${headCells}
            <th style="padding:4px 8px;font-size:12px">월간 출석</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}
window.loadMonthlyBody = loadMonthlyBody;

// ── 설정: 출결 항목 관리 ──
function renderSet(){
  if(!canSetup()){ $I('c-set').innerHTML='<div class="acard"><p class="empty">설정 권한이 없습니다.</p></div>'; return; }
  const items = TYPES.map(t=>`
    <div class="typeitem">
      <span class="typedot" style="background:${t.color}"></span>
      <span class="typename">${t.name}</span>
      ${t.isPresent?'<span class="typebadge" style="background:#dcfce7;color:#16a34a">출석 인정</span>':'<span class="typebadge" style="background:#fee2e2;color:#dc2626">결석 처리</span>'}
      <button class="bm" onclick="openTypeForm('${t.id}')">수정</button>
      <button class="bm" style="background:#fee2e2;color:#dc2626" onclick="delType('${t.id}')">삭제</button>
    </div>`).join('');
  $I('c-set').innerHTML = `
    <div class="acard">
      <h3 class="actitle">⚙️ 출결 항목 설정</h3>
      <p class="adesc">출석 체크에 사용할 항목을 관리합니다. "출석 인정" 항목은 수업일수 출석으로 계산되고, 그 외는 결석으로 처리됩니다. 운영하며 자유롭게 추가·수정·삭제할 수 있습니다.</p>
      <button class="bp" onclick="openTypeForm()">＋ 항목 추가</button>
      <div class="typelist">${items || '<p class="empty">항목이 없습니다.</p>'}</div>
    </div>
    <div class="acard">
      <h3 class="actitle">📅 학기 일정 설정</h3>
      <p class="adesc">연도·기관·학기별로 개학일과 종업일을 입력합니다. 수업일수는 학기 기간의 평일에서 출근부에 등록된 방학·공휴일·임시휴교를 자동으로 뺀 값입니다. (휴일은 출근부에서 한 번만 등록하면 출석부에 자동 반영됩니다)</p>
      <button class="bp" onclick="openTermForm()">＋ 학기 추가</button>
      <div class="typelist">${termListHTML()}</div>
    </div>`;
}

// 학기 목록 HTML
function termListHTML(){
  if(!TERMS.length) return '<p class="empty">등록된 학기가 없습니다.</p>';
  return TERMS.map(t=>{
    const days = calcSchoolDays(t).length;
    return `<div class="typeitem" style="flex-wrap:wrap">
      <span class="typename" style="flex:0 0 auto">${t.year}년 · ${ORGS[t.org]||t.org} · ${TERM_NAMES[t.term]||t.term}</span>
      <span style="font-size:13px;color:var(--ts)">${t.start||'?'} ~ ${t.end||'?'}</span>
      <span class="typebadge" style="background:var(--gp);color:var(--gm)">수업일 ${days}일</span>
      <span style="flex:1"></span>
      <button class="bm" onclick="openTermForm('${t.id}')">수정</button>
      <button class="bm" style="background:#fee2e2;color:#dc2626" onclick="delTerm('${t.id}')">삭제</button>
    </div>`;
  }).join('');
}

// ── 출결 항목 추가/수정 폼 ──
function openTypeForm(editId){
  const t = editId ? TYPES.find(x=>x.id===editId) : null;
  $I('mwrap').innerHTML = `
    <div class="mov"><div class="mbk" onclick="closeMod()"></div>
    <div class="mbox">
      <div class="mtitle">${t?'항목 수정':'항목 추가'}</div>
      <div class="msub">출결 항목의 이름, 색상, 출석 인정 여부를 설정합니다.</div>
      <div class="fgrp"><label>항목 이름</label><input id="t-name" value="${t?.name||''}" placeholder="예: 공결, 외출"></div>
      <div class="fgrp"><label>색상</label>
        <input id="t-color" type="color" value="${t?.color||'#2b3990'}" style="height:44px;padding:4px">
      </div>
      <div class="fgrp"><label>출석 인정 여부</label>
        <select id="t-present">
          <option value="no"${t&&!t.isPresent?' selected':''}>결석 처리 (출석일수에서 제외)</option>
          <option value="yes"${t&&t.isPresent?' selected':''}>출석 인정 (출석일수에 포함)</option>
        </select>
      </div>
      <div class="mact">
        <button class="bs" onclick="closeMod()">취소</button>
        <button class="bp" onclick="saveType('${t?.id||''}')">저장</button>
      </div>
    </div></div>`;
}
window.openTypeForm = openTypeForm;
function closeMod(){ $I('mwrap').innerHTML=''; }
window.closeMod = closeMod;

async function saveType(editId){
  const name = $I('t-name').value.trim();
  const color = $I('t-color').value;
  const isPresent = $I('t-present').value==='yes';
  if(!name) return toast('항목 이름을 입력하세요.','err');
  try {
    if(editId){
      await updateDoc(doc(db,'attendTypes',editId), {name, color, isPresent});
      logActivity('수정','출석항목',`${name}`);
      toast('수정되었습니다.','ok');
    } else {
      const maxOrder = TYPES.length ? Math.max(...TYPES.map(t=>t.order||0)) : 0;
      await addDoc(collection(db,'attendTypes'), {name, color, isPresent, order:maxOrder+1, createdAt:Timestamp.now()});
      logActivity('입력','출석항목',`${name}`);
      toast('추가되었습니다.','ok');
    }
    closeMod();
    await loadTypes();
    renderSet();
  } catch(e){ toast('저장 실패: '+e.message,'err'); }
}
window.saveType = saveType;

async function delType(id){
  const t = TYPES.find(x=>x.id===id);
  if(!confirm(`"${t?.name}" 항목을 삭제할까요?\n이미 이 항목으로 기록된 출결이 있다면 통계에 영향이 있을 수 있습니다.`)) return;
  try {
    await deleteDoc(doc(db,'attendTypes',id));
    logActivity('삭제','출석항목',`${t?.name||''}`);
    toast('삭제되었습니다.');
    await loadTypes();
    renderSet();
  } catch(e){ toast('삭제 실패: '+e.message,'err'); }
}
window.delType = delType;

// ── 학기 일정 추가/수정 폼 ──
function orgOptionsHTML(sel){
  return myOrgs().map(o=>`<option value="${o}"${sel===o?' selected':''}>${ORGS[o]}</option>`).join('');
}
function openTermForm(editId){
  const t = editId ? TERMS.find(x=>x.id===editId) : null;
  const ty = new Date().getFullYear();
  const years = [];
  for(let y=ty+1; y>=ty-3; y--) years.push(y);
  $I('mwrap').innerHTML = `
    <div class="mov"><div class="mbk" onclick="closeMod()"></div>
    <div class="mbox">
      <div class="mtitle">${t?'학기 수정':'학기 추가'}</div>
      <div class="msub">연도, 기관, 학기를 정하고 개학일·종업일을 입력하세요.</div>
      <div class="fgrp"><label>연도</label>
        <select id="tm-year">${years.map(y=>`<option value="${y}"${t&&t.year===y?' selected':(!t&&y===ty?' selected':'')}>${y}년</option>`).join('')}</select></div>
      <div class="fgrp"><label>기관</label>
        <select id="tm-org">${orgOptionsHTML(t?.org)}</select></div>
      <div class="fgrp"><label>학기</label>
        <select id="tm-term">
          <option value="1"${t&&t.term===1?' selected':''}>1학기</option>
          <option value="2"${t&&t.term===2?' selected':''}>2학기</option>
        </select></div>
      <div class="fgrp"><label>개학일</label><input type="date" id="tm-start" value="${t?.start||''}"></div>
      <div class="fgrp"><label>종업일</label><input type="date" id="tm-end" value="${t?.end||''}"></div>
      <div class="mact">
        <button class="bs" onclick="closeMod()">취소</button>
        <button class="bp" onclick="saveTerm('${t?.id||''}')">저장</button>
      </div>
    </div></div>`;
}
window.openTermForm = openTermForm;

async function saveTerm(editId){
  const year = Number($I('tm-year').value);
  const org = $I('tm-org').value;
  const term = Number($I('tm-term').value);
  const start = $I('tm-start').value, end = $I('tm-end').value;
  if(!start || !end) return toast('개학일과 종업일을 입력하세요.','err');
  if(start > end) return toast('종업일이 개학일보다 빠릅니다.','err');
  const data = {year, org, term, start, end};
  try {
    if(editId){
      await updateDoc(doc(db,'terms',editId), data);
      logActivity('수정','학기일정',`${year} ${ORGS[org]} ${TERM_NAMES[term]}`);
      toast('수정되었습니다.','ok');
    } else {
      // 중복 체크 (같은 연도·기관·학기)
      if(TERMS.some(t=>t.year===year && t.org===org && t.term===term))
        return toast('이미 등록된 학기입니다. 수정해주세요.','err');
      data.createdAt = Timestamp.now();
      await addDoc(collection(db,'terms'), data);
      logActivity('입력','학기일정',`${year} ${ORGS[org]} ${TERM_NAMES[term]}`);
      toast('추가되었습니다.','ok');
    }
    closeMod();
    await loadTerms();
    renderSet();
  } catch(e){ toast('저장 실패: '+e.message,'err'); }
}
window.saveTerm = saveTerm;

async function delTerm(id){
  const t = TERMS.find(x=>x.id===id);
  if(!confirm(`${t?.year}년 ${ORGS[t?.org]} ${TERM_NAMES[t?.term]} 학기를 삭제할까요?`)) return;
  try {
    await deleteDoc(doc(db,'terms',id));
    logActivity('삭제','학기일정',`${t?.year} ${ORGS[t?.org]} ${TERM_NAMES[t?.term]}`);
    toast('삭제되었습니다.');
    await loadTerms();
    renderSet();
  } catch(e){ toast('삭제 실패: '+e.message,'err'); }
}
window.delTerm = delTerm;
</script>
</body>
</html>
