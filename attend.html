<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출석부 · 교사 선교사</title>
<meta name="theme-color" content="#1e2e5c">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="출석부">
<link rel="icon" type="image/png" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --gd:#1e2e5c; --gm:#2b3990; --gl:#5a70cc; --gp:#e8ecf8;
  --gold:#c9a84c; --goldd:#a8873a; --goldp:#fdf3d8;
  --iv:#f5f0e8; --ivd:#e8e0d0;
  --tx:#1a1a2e; --ts:#4a4a6a; --tl:#8888aa; --wh:#ffffff;
  --sh:0 2px 12px rgba(30,46,92,0.10); --r:12px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--iv);color:var(--tx);min-height:100vh;}

#gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#eef0f8 0%,#f5f0e8 60%,#fdf3d8 100%);padding:24px;text-align:center;}
.gbox{background:var(--wh);border-radius:24px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(30,46,92,0.12);}
.gtitle{font-size:22px;font-weight:800;color:var(--gd);margin-bottom:8px;}
.gsub{font-size:14px;color:var(--ts);line-height:1.6;margin-bottom:20px;}
.gbtn{display:inline-block;width:100%;padding:14px;background:linear-gradient(135deg,#2b3990,#1e2e5c);color:var(--wh);border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;}

#ms{display:none;flex-direction:column;min-height:100vh;}
.ah{background:linear-gradient(135deg,#1e2e5c,#12194a);color:var(--wh);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.ahl{display:flex;align-items:center;gap:12px;}
.ahi{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.aht{font-size:16px;font-weight:700;}
.ahr{text-align:right;}
#hn{font-size:15px;font-weight:600;}
#hi{font-size:11px;opacity:.7;margin-top:2px;}
.homebtn{background:rgba(255,255,255,0.15);color:var(--wh);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;margin-top:4px;text-decoration:none;display:inline-block;}

/* 하위 탭 */
.subtb{display:flex;gap:4px;background:var(--wh);padding:8px 16px;border-bottom:1px solid var(--ivd);overflow-x:auto;}
.subtbtn{padding:8px 14px;background:transparent;border:none;border-radius:8px;font-size:14px;font-weight:600;color:var(--ts);cursor:pointer;white-space:nowrap;}
.subtbtn.active{background:var(--gp);color:var(--gm);}

.tc{padding:20px 16px;max-width:960px;margin:0 auto;width:100%;}
.actitle{font-size:17px;font-weight:800;color:var(--gd);margin-bottom:6px;}
.adesc{font-size:13px;color:var(--ts);margin-bottom:14px;line-height:1.5;}
.acard{background:var(--wh);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px;}

.fgrp{display:flex;flex-direction:column;margin-bottom:12px;}
.fgrp label{font-size:12px;font-weight:700;color:var(--ts);margin-bottom:5px;}
.fgrp input,.fgrp select{height:40px;border:1.5px solid var(--ivd);border-radius:8px;padding:0 12px;font-size:14px;background:var(--iv);outline:none;width:100%;font-family:inherit;}

.bp{background:linear-gradient(135deg,#2b3990,#1e2e5c);color:var(--wh);border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.bs{background:var(--iv);color:var(--ts);border:1.5px solid var(--ivd);border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;}
.bm{background:var(--gp);color:var(--gm);border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}

/* 출결 항목 목록 */
.typelist{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
.typeitem{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--wh);border:1px solid var(--ivd);border-radius:10px;}
.typedot{width:20px;height:20px;border-radius:50%;flex-shrink:0;}
.typename{font-size:15px;font-weight:700;color:var(--gd);flex:1;}
.typebadge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;}
.empty{text-align:center;color:var(--tl);padding:30px;font-size:14px;}

.addrow{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-top:8px;}
.addrow .fgrp{margin-bottom:0;}

.mov{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.mbk{position:absolute;inset:0;background:rgba(20,25,60,0.5);}
.mbox{position:relative;background:var(--wh);border-radius:16px;padding:24px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.mtitle{font-size:18px;font-weight:800;color:var(--gd);margin-bottom:4px;}
.msub{font-size:13px;color:var(--ts);margin-bottom:16px;}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gd);color:var(--wh);padding:12px 24px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#dc2626;} .toast.ok{background:var(--gm);}
</style>
</head>
<body>

<div id="gate">
  <div class="gbox">
    <div class="gtitle">출석부</div>
    <div class="gsub" id="gate-msg">로그인 확인 중...</div>
    <a class="gbtn" id="gate-btn" href="index.html" style="display:none">로그인 화면으로</a>
  </div>
</div>

<div id="ms">
  <header class="ah">
    <div class="ahl">
      <div class="ahi">✅</div>
      <div class="aht">출석부</div>
    </div>
    <div class="ahr">
      <div id="hn"></div>
      <div id="hi"></div>
      <a class="homebtn" href="index.html">← 메인으로</a>
    </div>
  </header>
  <div class="subtb" id="subtb">
    <button class="subtbtn active" id="tb-check" onclick="showTab('check')">✅ 출석 체크</button>
    <button class="subtbtn" id="tb-stat" onclick="showTab('stat')">📊 통계</button>
    <button class="subtbtn" id="tb-set" onclick="showTab('set')" style="display:none">⚙️ 설정</button>
  </div>
  <div class="tc" id="c-check" style="display:none"></div>
  <div class="tc" id="c-stat" style="display:none"></div>
  <div class="tc" id="c-set" style="display:none"></div>
</div>

<div id="mwrap"></div>
<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc, updateDoc, deleteDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCtgr79jKqkec6HwqkxYNxSubWAhfEkM7g",
  authDomain: "daniel-amatz.firebaseapp.com",
  projectId: "daniel-amatz",
  storageBucket: "daniel-amatz.firebasestorage.app",
  messagingSenderId: "455744290312",
  appId: "1:455744290312:web:3ce7e7d3e58f6f1d185bbd",
  measurementId: "G-E91V0S88T8"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $I = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');
const ORGS = {jihyebit:'지혜빛', daniel:'다니엘 아마츠'};
const ROLES = {super:'슈퍼관리자', org_admin:'기관관리자', tab_admin:'부서장', teacher:'교사'};
let CU = null;
let TYPES = [];   // 출결 항목 캐시
let TERMS = [];   // 학기 일정 캐시
let HOLIDAYS = []; // 출근부 공휴일 (연동)
let WORKPERIODS = []; // 출근부 근무/방학 기간 (연동)
let CLASSES = [];  // 반 편성 캐시 (올해)
let STUDENTS = {}; // 학생 캐시 (id -> data)
let curYear = new Date().getFullYear();

// 기본 출결 항목 (최초 1회 자동 생성용)
const DEFAULT_TYPES = [
  {name:'출석', color:'#16a34a', order:1, isPresent:true},
  {name:'결석', color:'#dc2626', order:2, isPresent:false},
  {name:'지각', color:'#f59e0b', order:3, isPresent:false},
  {name:'조퇴', color:'#d97706', order:4, isPresent:false},
  {name:'병결', color:'#7c3aed', order:5, isPresent:false},
  {name:'체험학습', color:'#0369a1', order:6, isPresent:false},
];

function toast(msg, type=''){
  const t = $I('toast'); t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(window.__tt); window.__tt = setTimeout(()=>t.className='toast', 2500);
}
// 공통 활동 로그
async function logActivity(action, category, target, detail){
  if(!CU) return;
  try {
    await addDoc(collection(db,'activityLogs'), {
      uid: CU.uid, name: CU.name||'', role: CU.role||'', org: CU.org||'',
      action, category, target: target||'', detail: detail||'',
      at: Timestamp.now()
    });
  } catch(e){}
}
function myOrgs(){
  if(!CU) return [];
  if(CU.role==='super') return ['jihyebit','daniel'];
  return CU.orgs && CU.orgs.length ? CU.orgs : [CU.org];
}
const isAdmin = () => CU && ['super','org_admin','tab_admin'].includes(CU.role);
const canSetup = () => CU && ['super','org_admin'].includes(CU.role);

onAuthStateChanged(auth, async (user) => {
  if(!user){
    $I('gate-msg').textContent = '로그인이 필요합니다. 메인 화면에서 먼저 로그인해주세요.';
    $I('gate-btn').style.display = 'inline-block';
    return;
  }
  try {
    const snap = await getDoc(doc(db,'staff',user.uid));
    if(!snap.exists()){ $I('gate-msg').textContent='교직원 정보를 찾을 수 없습니다.'; $I('gate-btn').style.display='inline-block'; return; }
    CU = { uid:user.uid, ...snap.data() };
    // 휴직/퇴직 차단
    const ac = CU.acStatus || 'active';
    if(ac==='leave'||ac==='quit'){ $I('gate-msg').textContent = ac==='quit'?'퇴직 처리된 계정입니다.':'휴직 중인 계정입니다.'; $I('gate-btn').style.display='inline-block'; return; }
    $I('gate').style.display='none'; $I('ms').style.display='flex';
    $I('hn').textContent = CU.name;
    $I('hi').textContent = `${ORGS[CU.org]||CU.org} · ${CU.dept||''} · ${ROLES[CU.role]||''}`;
    // 설정 탭은 기관관리자/슈퍼만
    if(canSetup()) $I('tb-set').style.display='';
    await loadTypes();
    await loadTerms();
    await loadHolidays();
    await loadClasses();
    await loadStudents();
    showTab('check');
  } catch(e){ $I('gate-msg').textContent='오류: '+e.message; $I('gate-btn').style.display='inline-block'; }
});

// ── 출결 항목 로드 (없으면 기본값 자동 생성) ──
async function loadTypes(){
  const snap = await getDocs(collection(db,'attendTypes'));
  TYPES = [];
  snap.forEach(d=>TYPES.push({id:d.id, ...d.data()}));
  // 최초 실행: 항목이 하나도 없으면 기본값 생성 (설정 권한자만)
  if(TYPES.length===0 && canSetup()){
    for(const t of DEFAULT_TYPES){
      await addDoc(collection(db,'attendTypes'), {...t, createdAt:Timestamp.now()});
    }
    const snap2 = await getDocs(collection(db,'attendTypes'));
    TYPES = [];
    snap2.forEach(d=>TYPES.push({id:d.id, ...d.data()}));
  }
  TYPES.sort((a,b)=>(a.order||0)-(b.order||0));
}

// ── 학기 일정 로드 ──
async function loadTerms(){
  const snap = await getDocs(collection(db,'terms'));
  const allowed = myOrgs();
  TERMS = [];
  snap.forEach(d=>{ const t={id:d.id, ...d.data()}; if(allowed.includes(t.org)) TERMS.push(t); });
  TERMS.sort((a,b)=> (b.year-a.year) || a.org.localeCompare(b.org) || (a.term-b.term));
}

// ── 출근부 휴일/기간 연동 로드 ──
async function loadHolidays(){
  const hSnap = await getDocs(collection(db,'holidays'));
  HOLIDAYS = []; hSnap.forEach(d=>HOLIDAYS.push(d.data()));
  const wSnap = await getDocs(collection(db,'workPeriods'));
  WORKPERIODS = []; wSnap.forEach(d=>WORKPERIODS.push(d.data()));
}

// ── 특정 날짜가 해당 기관에서 휴일/방학인지 판정 ──
// 반환: 휴일이면 사유 문자열, 아니면 null
function holidayReason(dateStr, org){
  // 공휴일 (출근부 holidays: org가 'all' 또는 해당 기관)
  const hol = HOLIDAYS.find(h => h.date===dateStr && (h.org==='all' || h.org===org));
  if(hol) return hol.name || '공휴일';
  // 방학기간 (출근부 workPeriods 중 type==='vacation')
  const vac = WORKPERIODS.find(w => w.type==='vacation' && w.org===org && dateStr>=w.s && dateStr<=w.e);
  if(vac) return vac.vac || vac.name || '방학';
  return null;
}

// ── 수업일 계산: 학기 기간 평일 − 휴일/방학 ──
// term: {year, org, term, start, end}
// 반환: 수업일 날짜 배열 (YYYY-MM-DD)
function calcSchoolDays(term){
  const days = [];
  if(!term.start || !term.end) return days;
  let d = new Date(term.start+'T00:00:00');
  const end = new Date(term.end+'T00:00:00');
  while(d <= end){
    const dow = d.getDay();
    const ds = fmtDate(d);
    // 평일(월~금)이고 휴일/방학이 아니면 수업일
    if(dow!==0 && dow!==6 && !holidayReason(ds, term.org)){
      days.push(ds);
    }
    d.setDate(d.getDate()+1);
  }
  return days;
}

function fmtDate(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
const TERM_NAMES = {1:'1학기', 2:'2학기'};

// ── 반·학생 로드 ──
async function loadClasses(){
  const snap = await getDocs(collection(db,'classes'));
  const allowed = myOrgs();
  CLASSES = [];
  snap.forEach(d=>{ const c={id:d.id, ...d.data()}; if(c.year===curYear && allowed.includes(c.org)) CLASSES.push(c); });
  CLASSES.sort((a,b)=> (a.org+a.dept+(a.grade||'')).localeCompare(b.org+b.dept+(b.grade||'')));
}
async function loadStudents(){
  const snap = await getDocs(collection(db,'students'));
  const allowed = myOrgs();
  STUDENTS = {};
  snap.forEach(d=>{ const s={id:d.id, ...d.data()}; if(allowed.includes(s.org)) STUDENTS[d.id]=s; });
}

// 이 반의 출결을 기록할 권한이 있는지 (담임/대리/부서장/관리자)
function canEditClass(c){
  if(!CU) return false;
  if(CU.role==='super' || CU.role==='org_admin') return myOrgs().includes(c.org);
  if(CU.role==='tab_admin'){
    // 부서장: 행정실은 다니엘 전체, 그 외는 본인 부서
    if(CU.dept==='행정실') return myOrgs().includes(c.org);
    return c.org===CU.org && c.dept===CU.dept;
  }
  // 교사: 담임이거나 대리로 지정된 반
  return c.teacherUid===CU.uid || (c.deputies||[]).includes(CU.uid);
}
// 이 반을 열람할 권한 (같은 기관이면 누구나)
function canViewClass(c){
  return myOrgs().includes(c.org);
}

// ── 탭 전환 ──
function showTab(t){
  document.querySelectorAll('.subtbtn').forEach(b=>b.classList.remove('active'));
  $I('tb-'+t)?.classList.add('active');
  ['check','stat','set'].forEach(id=>{ const el=$I('c-'+id); if(el) el.style.display='none'; });
  $I('c-'+t).style.display='block';
  if(t==='check') renderCheck();
  if(t==='stat') renderStat();
  if(t==='set') renderSet();
}
window.showTab = showTab;

// ── 출석 체크 ──
let checkDate = fmtDate(new Date());  // 선택된 날짜
let checkClassId = '';                 // 선택된 반
let checkRecords = {};                 // {studentId: {typeId, memo}}

function renderCheck(){
  // 권한 있는 반(편집) + 열람 가능 반 구분
  const editable = CLASSES.filter(canEditClass);
  const viewable = CLASSES.filter(c=>canViewClass(c) && !canEditClass(c));
  const allSelectable = [...editable, ...viewable];

  if(!CLASSES.length){
    $I('c-check').innerHTML = `<div class="acard"><h3 class="actitle">✅ 출석 체크</h3>
      <div class="empty">${curYear}년에 편성된 반이 없습니다.<br>먼저 반 편성에서 반을 만들고 학생을 배정해주세요.</div></div>`;
    return;
  }
  if(!checkClassId && editable.length) checkClassId = editable[0].id;
  else if(!checkClassId && allSelectable.length) checkClassId = allSelectable[0].id;

  const optgroup = (label, arr) => arr.length
    ? `<optgroup label="${label}">${arr.map(c=>`<option value="${c.id}"${c.id===checkClassId?' selected':''}>${c.name} (${ORGS[c.org]||c.org}${c.dept&&c.dept!=='전체'?' '+c.dept:''})</option>`).join('')}</optgroup>` : '';

  $I('c-check').innerHTML = `
    <div class="acard">
      <h3 class="actitle">✅ 출석 체크</h3>
      <p class="adesc">날짜와 반을 선택하면 학생 명단이 나타납니다. 기본은 모두 출석이며, 변경이 필요한 학생만 바꾸고 저장하세요.</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
        <div class="fgrp" style="margin-bottom:0"><label>날짜</label>
          <input type="date" id="ck-date" value="${checkDate}" onchange="onCheckChange()"></div>
        <div class="fgrp" style="margin-bottom:0;flex:1;min-width:180px"><label>반</label>
          <select id="ck-class" onchange="onCheckChange()">
            ${optgroup('내가 기록하는 반', editable)}
            ${optgroup('열람 전용 (다른 반)', viewable)}
          </select></div>
      </div>
    </div>
    <div id="ck-body"></div>`;
  loadCheckBody();
}
window.renderCheck = renderCheck;

function onCheckChange(){
  checkDate = $I('ck-date').value;
  checkClassId = $I('ck-class').value;
  loadCheckBody();
}
window.onCheckChange = onCheckChange;

async function loadCheckBody(){
  const body = $I('ck-body'); if(!body) return;
  const c = CLASSES.find(x=>x.id===checkClassId);
  if(!c){ body.innerHTML=''; return; }
  const editable = canEditClass(c);
  const studs = (c.students||[]).map(sid=>STUDENTS[sid]).filter(Boolean)
    .filter(s=>(s.status||'active')==='active')
    .sort((a,b)=>a.name.localeCompare(b.name,'ko'));

  // 날짜가 휴일/방학인지 체크
  const holReason = holidayReason(checkDate, c.org);
  const dow = new Date(checkDate+'T00:00:00').getDay();
  const isWeekend = dow===0||dow===6;

  body.innerHTML = '<div class="acard"><p class="empty">불러오는 중...</p></div>';

  // 기존 기록 로드 (이 반·이 날짜)
  const snap = await getDocs(collection(db,'studentAttendance'));
  checkRecords = {};
  snap.forEach(d=>{ const r=d.data(); if(r.classId===checkClassId && r.date===checkDate) checkRecords[r.studentId]={id:d.id, typeId:r.typeId, memo:r.memo||''}; });

  // 기본 출석 타입 (isPresent=true 중 첫번째)
  const defType = TYPES.find(t=>t.isPresent) || TYPES[0];

  let banner = '';
  if(holReason) banner = `<div style="background:#fee2e2;color:#dc2626;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px">📌 이 날짜는 <b>${holReason}</b> 입니다. (휴일/방학)</div>`;
  else if(isWeekend) banner = `<div style="background:#fef3c7;color:#b45309;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px">📌 이 날짜는 주말입니다.</div>`;

  if(!studs.length){
    body.innerHTML = `<div class="acard">${banner}<div class="empty">이 반에 배정된 재학생이 없습니다.</div></div>`;
    return;
  }

  const typeButtons = (sid, curType) => TYPES.map(t=>{
    const sel = (curType||defType?.id)===t.id;
    return `<button class="tbtn-att" onclick="setRec('${sid}','${t.id}')" data-sid="${sid}" data-tid="${t.id}"
      style="border:1.5px solid ${sel?t.color:'var(--ivd)'};background:${sel?t.color:'#fff'};color:${sel?'#fff':'var(--ts)'};padding:5px 12px;border-radius:8px;font-size:13px;font-weight:600;cursor:${editable?'pointer':'default'};${editable?'':'pointer-events:none;opacity:.7'}">${t.name}</button>`;
  }).join('');

  const rows = studs.map(s=>{
    const rec = checkRecords[s.id];
    const curType = rec?.typeId;
    return `<div style="padding:12px 0;border-bottom:1px solid var(--ivd)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-weight:700;font-size:15px;color:var(--gd)">${s.name}</span>
        <span style="font-size:11px;color:var(--tl)">학번 ${s.studentNo||'-'}</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">${typeButtons(s.id, curType)}</div>
      <input type="text" id="memo-${s.id}" placeholder="메모 (선택)" value="${rec?.memo||''}" ${editable?'':'disabled'}
        style="width:100%;height:34px;border:1.5px solid var(--ivd);border-radius:6px;padding:0 10px;font-size:13px;background:${editable?'var(--iv)':'#f0f0f0'};outline:none">
    </div>`;
  }).join('');

  body.innerHTML = `
    <div class="acard">
      ${banner}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h3 class="actitle" style="margin:0">${c.name} · ${studs.length}명</h3>
        ${editable?`<span style="font-size:12px;color:var(--gm)">✏️ 기록 가능</span>`:`<span style="font-size:12px;color:var(--tl)">👁 열람 전용</span>`}
      </div>
      ${rows}
      ${editable?`<button class="bp" style="margin-top:16px;width:100%" onclick="saveCheck()">저장</button>`:''}
    </div>`;

  // 초기 선택값 채우기 (기록 없으면 기본 출석)
  studs.forEach(s=>{ if(!checkRecords[s.id]) checkRecords[s.id]={typeId:defType?.id, memo:''}; });
}

function setRec(sid, tid){
  if(!checkRecords[sid]) checkRecords[sid]={};
  checkRecords[sid].typeId = tid;
  // 버튼 스타일 갱신
  document.querySelectorAll(`.tbtn-att[data-sid="${sid}"]`).forEach(b=>{
    const t = TYPES.find(x=>x.id===b.dataset.tid);
    const sel = b.dataset.tid===tid;
    b.style.background = sel?t.color:'#fff';
    b.style.color = sel?'#fff':'var(--ts)';
    b.style.borderColor = sel?t.color:'var(--ivd)';
  });
}
window.setRec = setRec;

async function saveCheck(){
  const c = CLASSES.find(x=>x.id===checkClassId);
  if(!c || !canEditClass(c)) return toast('기록 권한이 없습니다.','err');
  const studs = (c.students||[]).map(sid=>STUDENTS[sid]).filter(Boolean).filter(s=>(s.status||'active')==='active');
  toast('저장 중...');
  let cnt=0;
  try {
    for(const s of studs){
      const rec = checkRecords[s.id]; if(!rec||!rec.typeId) continue;
      const memo = ($I('memo-'+s.id)?.value||'').trim();
      const existing = rec.id;
      const data = {
        studentId: s.id, studentName: s.name, classId: c.id, className: c.name,
        org: c.org, date: checkDate, typeId: rec.typeId, memo,
        by: CU.name, byUid: CU.uid, updatedAt: Timestamp.now()
      };
      if(existing){
        // 변경 이력 누적
        await updateDoc(doc(db,'studentAttendance',existing), data);
      } else {
        data.createdAt = Timestamp.now();
        await addDoc(collection(db,'studentAttendance'), data);
      }
      cnt++;
    }
    logActivity('수정','출석부',`${c.name} ${checkDate} (${cnt}명)`);
    toast(`${cnt}명 출결이 저장되었습니다.`,'ok');
    loadCheckBody();
  } catch(e){ toast('저장 실패: '+e.message,'err'); }
}
window.saveCheck = saveCheck;

let statTermSel = '1';   // '1' | '2' | 'year'

// 선택된 학기들의 수업일 집합 + 라벨
function getStatTerms(){
  const sel = [];
  const want = statTermSel==='year' ? [1,2] : [Number(statTermSel)];
  for(const tn of want){
    const t = TERMS.find(x=>x.year===statYear && x.org===statOrg && x.term===tn);
    if(t) sel.push(t);
  }
  return sel;
}

let _statCache = null;
async function buildStat(){
  const body = $I('st-body'); if(!body) return;
  body.innerHTML = '<div class="acard"><p class="empty">집계 중...</p></div>';

  const terms = getStatTerms();
  if(!terms.length){
    body.innerHTML = `<div class="acard"><div class="empty">선택한 학기가 등록되지 않았습니다.<br>설정 탭에서 ${statYear}년 ${ORGS[statOrg]} 학기를 먼저 등록해주세요.</div></div>`;
    return;
  }

  // 수업일 집합
  let schoolDays = [];
  terms.forEach(t=>{ schoolDays = schoolDays.concat(calcSchoolDays(t)); });
  const schoolDaySet = new Set(schoolDays);
  const totalDays = schoolDaySet.size;
  const minDate = schoolDays.length ? schoolDays.reduce((a,b)=>a<b?a:b) : '';
  const maxDate = schoolDays.length ? schoolDays.reduce((a,b)=>a>b?a:b) : '';

  // 출결 기록 로드 (이 기관)
  const snap = await getDocs(collection(db,'studentAttendance'));
  const recs = [];
  snap.forEach(d=>{ const r=d.data(); if(r.org===statOrg && schoolDaySet.has(r.date)) recs.push(r); });

  // 출석 인정 타입 id 집합
  const presentIds = new Set(TYPES.filter(t=>t.isPresent).map(t=>t.id));
  const typeName = id => (TYPES.find(t=>t.id===id)?.name)||'기타';

  // 이 기관·올해 반들
  const orgClasses = CLASSES.filter(c=>c.org===statOrg);
  // 학생 → 반 매핑
  const studClass = {};
  orgClasses.forEach(c=>(c.students||[]).forEach(sid=>{ studClass[sid]=c; }));

  // 학생별 집계: {studentId: {name, className, dept, counts:{typeName:n}, present:n, recorded:n}}
  const byStud = {};
  // 대상 학생 = 이 기관 반에 배정된 재학생
  orgClasses.forEach(c=>{
    (c.students||[]).forEach(sid=>{
      const s = STUDENTS[sid]; if(!s || (s.status||'active')!=='active') return;
      if(!byStud[sid]) byStud[sid]={name:s.name, studentNo:s.studentNo||'', className:c.name, dept:c.dept||'', classId:c.id, counts:{}, present:0, recorded:0};
    });
  });
  // 기록 반영
  recs.forEach(r=>{
    const b = byStud[r.studentId]; if(!b) return;
    const tn = typeName(r.typeId);
    b.counts[tn] = (b.counts[tn]||0)+1;
    b.recorded++;
    if(presentIds.has(r.typeId)) b.present++;
  });
  // 기록 없는 날은 "출석"으로 간주 (기본 자동 출석)
  Object.values(byStud).forEach(b=>{
    const autoPresent = totalDays - b.recorded;
    if(autoPresent>0){ b.present += autoPresent; b.counts['출석']=(b.counts['출석']||0)+autoPresent; }
  });

  _statCache = {byStud, totalDays, minDate, maxDate, terms};

  // 보기별 렌더
  if(statView==='student') renderStatStudent(byStud, totalDays, minDate, maxDate);
  else if(statView==='class') renderStatGroup(byStud, totalDays, 'className', '반');
  else if(statView==='dept') renderStatGroup(byStud, totalDays, 'dept', '부서');
  else renderStatAll(byStud, totalDays, minDate, maxDate);
}

function periodLabel(min,max){ return min&&max?`${min} ~ ${max}`:''; }

function renderStatStudent(byStud, totalDays, minDate, maxDate){
  const list = Object.values(byStud).sort((a,b)=>(a.className+a.name).localeCompare(b.className+b.name,'ko'));
  if(!list.length){ $I('st-body').innerHTML='<div class="acard"><p class="empty">대상 학생이 없습니다.</p></div>'; return; }
  // 등장하는 출결 항목들 (열 구성)
  const cols = TYPES.map(t=>t.name);
  const rows = list.map(b=>{
    const rate = totalDays? Math.round(b.present/totalDays*100) : 0;
    return `<tr>
      <td style="padding:7px 8px;border-bottom:1px solid var(--ivd);font-weight:600">${b.name}</td>
      <td style="padding:7px 8px;border-bottom:1px solid var(--ivd)">${b.className}</td>
      ${cols.map(c=>`<td style="padding:7px 8px;border-bottom:1px solid var(--ivd);text-align:center">${b.counts[c]||0}</td>`).join('')}
      <td style="padding:7px 8px;border-bottom:1px solid var(--ivd);text-align:center;font-weight:700;color:${rate>=90?'#16a34a':rate>=70?'#b45309':'#dc2626'}">${rate}%</td>
    </tr>`;
  }).join('');
  $I('st-body').innerHTML = `
    <div class="acard">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <h3 class="actitle" style="margin:0">학생별 출석 (${list.length}명)</h3>
        <span style="font-size:12px;color:var(--ts)">수업일 ${totalDays}일 · ${periodLabel(minDate,maxDate)}</span>
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap">
          <thead><tr style="background:var(--iv)">
            <th style="padding:8px;text-align:left">이름</th><th style="padding:8px;text-align:left">반</th>
            ${cols.map(c=>`<th style="padding:8px;text-align:center">${c}</th>`).join('')}
            <th style="padding:8px;text-align:center">출석률</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function renderStatGroup(byStud, totalDays, key, label){
  // 그룹별 합산
  const groups = {};
  Object.values(byStud).forEach(b=>{
    const g = b[key]||'(미지정)';
    if(!groups[g]) groups[g]={count:0, present:0, possible:0, counts:{}};
    groups[g].count++;
    groups[g].present += b.present;
    groups[g].possible += totalDays;
    Object.entries(b.counts).forEach(([k,v])=>groups[g].counts[k]=(groups[g].counts[k]||0)+v);
  });
  const cols = TYPES.map(t=>t.name);
  const rows = Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0],'ko')).map(([g,d])=>{
    const rate = d.possible? Math.round(d.present/d.possible*100):0;
    return `<tr>
      <td style="padding:7px 8px;border-bottom:1px solid var(--ivd);font-weight:600">${g}</td>
      <td style="padding:7px 8px;border-bottom:1px solid var(--ivd);text-align:center">${d.count}명</td>
      ${cols.map(c=>`<td style="padding:7px 8px;border-bottom:1px solid var(--ivd);text-align:center">${d.counts[c]||0}</td>`).join('')}
      <td style="padding:7px 8px;border-bottom:1px solid var(--ivd);text-align:center;font-weight:700;color:${rate>=90?'#16a34a':rate>=70?'#b45309':'#dc2626'}">${rate}%</td>
    </tr>`;
  }).join('');
  $I('st-body').innerHTML = `
    <div class="acard">
      <h3 class="actitle">${label}별 출석 · 수업일 ${totalDays}일</h3>
      <div style="overflow-x:auto;margin-top:10px">
        <table style="width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap">
          <thead><tr style="background:var(--iv)">
            <th style="padding:8px;text-align:left">${label}</th><th style="padding:8px;text-align:center">인원</th>
            ${cols.map(c=>`<th style="padding:8px;text-align:center">${c}</th>`).join('')}
            <th style="padding:8px;text-align:center">평균 출석률</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function renderStatAll(byStud, totalDays, minDate, maxDate){
  const list = Object.values(byStud);
  const totalStud = list.length;
  const totalPresent = list.reduce((s,b)=>s+b.present,0);
  const totalPossible = totalStud*totalDays;
  const avgRate = totalPossible? Math.round(totalPresent/totalPossible*100):0;
  const allCounts = {};
  list.forEach(b=>Object.entries(b.counts).forEach(([k,v])=>allCounts[k]=(allCounts[k]||0)+v));
  const stat=(label,val,color)=>`<div style="flex:1;min-width:90px;background:var(--iv);border-radius:10px;padding:14px;text-align:center"><div style="font-size:22px;font-weight:800;color:${color||'var(--gm)'}">${val}</div><div style="font-size:11px;color:var(--ts);margin-top:2px">${label}</div></div>`;
  const typeRows = TYPES.map(t=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--ivd);font-size:13px"><span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${t.color};margin-right:6px"></span>${t.name}</span><span style="font-weight:700">${allCounts[t.name]||0}건</span></div>`).join('');
  $I('st-body').innerHTML = `
    <div class="acard">
      <h3 class="actitle">전체 출석 현황 · 수업일 ${totalDays}일</h3>
      <p class="adesc">${periodLabel(minDate,maxDate)}</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
        ${stat('대상 학생',totalStud+'명')}
        ${stat('수업일',totalDays+'일')}
        ${stat('평균 출석률',avgRate+'%',avgRate>=90?'#16a34a':'#b45309')}
      </div>
      <div style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:8px">항목별 합계</div>
      ${typeRows}
    </div>`;
}

// 엑셀 다운로드 (현재 보기 기준)
function downloadStatExcel(){
  if(!_statCache){ toast('먼저 통계를 조회하세요.','err'); return; }
  const {byStud, totalDays, terms} = _statCache;
  const cols = TYPES.map(t=>t.name);
  const header = ['이름','학번','반','부서', ...cols, '수업일','출석률(%)'];
  const aoa = [header];
  Object.values(byStud).sort((a,b)=>(a.className+a.name).localeCompare(b.className+b.name,'ko')).forEach(b=>{
    const rate = totalDays? Math.round(b.present/totalDays*100):0;
    aoa.push([b.name, b.studentNo, b.className, b.dept, ...cols.map(c=>b.counts[c]||0), totalDays, rate]);
  });
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = header.map(h=>({wch:Math.max(h.length,8)}));
  const wb = XLSX.utils.book_new();
  const termLabel = statTermSel==='year'?'연간':TERM_NAMES[Number(statTermSel)];
  XLSX.utils.book_append_sheet(wb, ws, '출석통계');
  XLSX.writeFile(wb, `출석통계_${statYear}_${ORGS[statOrg]}_${termLabel}.xlsx`);
  toast('엑셀을 다운로드했습니다.','ok');
}
window.downloadStatExcel = downloadStatExcel;

      <p class="adesc">연도·기관·학기별로 개학일과 종업일을 입력합니다. 수업일수는 학기 기간의 평일에서 출근부에 등록된 방학·공휴일·임시휴교를 자동으로 뺀 값입니다. (휴일은 출근부에서 한 번만 등록하면 출석부에 자동 반영됩니다)</p>
      <button class="bp" onclick="openTermForm()">＋ 학기 추가</button>
      <div class="typelist">${termListHTML()}</div>
    </div>`;
}

// 학기 목록 HTML
function termListHTML(){
  if(!TERMS.length) return '<p class="empty">등록된 학기가 없습니다.</p>';
  return TERMS.map(t=>{
    const days = calcSchoolDays(t).length;
    return `<div class="typeitem" style="flex-wrap:wrap">
      <span class="typename" style="flex:0 0 auto">${t.year}년 · ${ORGS[t.org]||t.org} · ${TERM_NAMES[t.term]||t.term}</span>
      <span style="font-size:13px;color:var(--ts)">${t.start||'?'} ~ ${t.end||'?'}</span>
      <span class="typebadge" style="background:var(--gp);color:var(--gm)">수업일 ${days}일</span>
      <span style="flex:1"></span>
      <button class="bm" onclick="openTermForm('${t.id}')">수정</button>
      <button class="bm" style="background:#fee2e2;color:#dc2626" onclick="delTerm('${t.id}')">삭제</button>
    </div>`;
  }).join('');
}

// ── 출결 항목 추가/수정 폼 ──
function openTypeForm(editId){
  const t = editId ? TYPES.find(x=>x.id===editId) : null;
  $I('mwrap').innerHTML = `
    <div class="mov"><div class="mbk" onclick="closeMod()"></div>
    <div class="mbox">
      <div class="mtitle">${t?'항목 수정':'항목 추가'}</div>
      <div class="msub">출결 항목의 이름, 색상, 출석 인정 여부를 설정합니다.</div>
      <div class="fgrp"><label>항목 이름</label><input id="t-name" value="${t?.name||''}" placeholder="예: 공결, 외출"></div>
      <div class="fgrp"><label>색상</label>
        <input id="t-color" type="color" value="${t?.color||'#2b3990'}" style="height:44px;padding:4px">
      </div>
      <div class="fgrp"><label>출석 인정 여부</label>
        <select id="t-present">
          <option value="no"${t&&!t.isPresent?' selected':''}>결석 처리 (출석일수에서 제외)</option>
          <option value="yes"${t&&t.isPresent?' selected':''}>출석 인정 (출석일수에 포함)</option>
        </select>
      </div>
      <div class="mact">
        <button class="bs" onclick="closeMod()">취소</button>
        <button class="bp" onclick="saveType('${t?.id||''}')">저장</button>
      </div>
    </div></div>`;
}
window.openTypeForm = openTypeForm;
function closeMod(){ $I('mwrap').innerHTML=''; }
window.closeMod = closeMod;

async function saveType(editId){
  const name = $I('t-name').value.trim();
  const color = $I('t-color').value;
  const isPresent = $I('t-present').value==='yes';
  if(!name) return toast('항목 이름을 입력하세요.','err');
  try {
    if(editId){
      await updateDoc(doc(db,'attendTypes',editId), {name, color, isPresent});
      logActivity('수정','출석항목',`${name}`);
      toast('수정되었습니다.','ok');
    } else {
      const maxOrder = TYPES.length ? Math.max(...TYPES.map(t=>t.order||0)) : 0;
      await addDoc(collection(db,'attendTypes'), {name, color, isPresent, order:maxOrder+1, createdAt:Timestamp.now()});
      logActivity('입력','출석항목',`${name}`);
      toast('추가되었습니다.','ok');
    }
    closeMod();
    await loadTypes();
    renderSet();
  } catch(e){ toast('저장 실패: '+e.message,'err'); }
}
window.saveType = saveType;

async function delType(id){
  const t = TYPES.find(x=>x.id===id);
  if(!confirm(`"${t?.name}" 항목을 삭제할까요?\n이미 이 항목으로 기록된 출결이 있다면 통계에 영향이 있을 수 있습니다.`)) return;
  try {
    await deleteDoc(doc(db,'attendTypes',id));
    logActivity('삭제','출석항목',`${t?.name||''}`);
    toast('삭제되었습니다.');
    await loadTypes();
    renderSet();
  } catch(e){ toast('삭제 실패: '+e.message,'err'); }
}
window.delType = delType;

// ── 학기 일정 추가/수정 폼 ──
function orgOptionsHTML(sel){
  return myOrgs().map(o=>`<option value="${o}"${sel===o?' selected':''}>${ORGS[o]}</option>`).join('');
}
function openTermForm(editId){
  const t = editId ? TERMS.find(x=>x.id===editId) : null;
  const ty = new Date().getFullYear();
  const years = [];
  for(let y=ty+1; y>=ty-3; y--) years.push(y);
  $I('mwrap').innerHTML = `
    <div class="mov"><div class="mbk" onclick="closeMod()"></div>
    <div class="mbox">
      <div class="mtitle">${t?'학기 수정':'학기 추가'}</div>
      <div class="msub">연도, 기관, 학기를 정하고 개학일·종업일을 입력하세요.</div>
      <div class="fgrp"><label>연도</label>
        <select id="tm-year">${years.map(y=>`<option value="${y}"${t&&t.year===y?' selected':(!t&&y===ty?' selected':'')}>${y}년</option>`).join('')}</select></div>
      <div class="fgrp"><label>기관</label>
        <select id="tm-org">${orgOptionsHTML(t?.org)}</select></div>
      <div class="fgrp"><label>학기</label>
        <select id="tm-term">
          <option value="1"${t&&t.term===1?' selected':''}>1학기</option>
          <option value="2"${t&&t.term===2?' selected':''}>2학기</option>
        </select></div>
      <div class="fgrp"><label>개학일</label><input type="date" id="tm-start" value="${t?.start||''}"></div>
      <div class="fgrp"><label>종업일</label><input type="date" id="tm-end" value="${t?.end||''}"></div>
      <div class="mact">
        <button class="bs" onclick="closeMod()">취소</button>
        <button class="bp" onclick="saveTerm('${t?.id||''}')">저장</button>
      </div>
    </div></div>`;
}
window.openTermForm = openTermForm;

async function saveTerm(editId){
  const year = Number($I('tm-year').value);
  const org = $I('tm-org').value;
  const term = Number($I('tm-term').value);
  const start = $I('tm-start').value, end = $I('tm-end').value;
  if(!start || !end) return toast('개학일과 종업일을 입력하세요.','err');
  if(start > end) return toast('종업일이 개학일보다 빠릅니다.','err');
  const data = {year, org, term, start, end};
  try {
    if(editId){
      await updateDoc(doc(db,'terms',editId), data);
      logActivity('수정','학기일정',`${year} ${ORGS[org]} ${TERM_NAMES[term]}`);
      toast('수정되었습니다.','ok');
    } else {
      // 중복 체크 (같은 연도·기관·학기)
      if(TERMS.some(t=>t.year===year && t.org===org && t.term===term))
        return toast('이미 등록된 학기입니다. 수정해주세요.','err');
      data.createdAt = Timestamp.now();
      await addDoc(collection(db,'terms'), data);
      logActivity('입력','학기일정',`${year} ${ORGS[org]} ${TERM_NAMES[term]}`);
      toast('추가되었습니다.','ok');
    }
    closeMod();
    await loadTerms();
    renderSet();
  } catch(e){ toast('저장 실패: '+e.message,'err'); }
}
window.saveTerm = saveTerm;

async function delTerm(id){
  const t = TERMS.find(x=>x.id===id);
  if(!confirm(`${t?.year}년 ${ORGS[t?.org]} ${TERM_NAMES[t?.term]} 학기를 삭제할까요?`)) return;
  try {
    await deleteDoc(doc(db,'terms',id));
    logActivity('삭제','학기일정',`${t?.year} ${ORGS[t?.org]} ${TERM_NAMES[t?.term]}`);
    toast('삭제되었습니다.');
    await loadTerms();
    renderSet();
  } catch(e){ toast('삭제 실패: '+e.message,'err'); }
}
window.delTerm = delTerm;
</script>
</body>
</html>
