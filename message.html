<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쪽지함 · 교사 선교사</title>
<meta name="theme-color" content="#1E3932">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="stylesheet" href="theme.css">
<style>
:root {
  --gd:#1E3932; --gm:#00704A; --gl:#D4E9E2; --gp:#E8F3EF;
  --gold:#B08D3C; --goldd:#8A6410; --goldp:#F7EFD8;
  --iv:#F2F0EB; --ivd:#E3E1DA;
  --tx:#1F2320; --ts:#5A6560; --tl:#93A09A; --wh:#ffffff;
  --sh:0 2px 12px rgba(30,57,50,0.08); --r:12px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--iv);color:var(--tx);min-height:100vh;}

#gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#E8F3EF 0%,#F2F0EB 60%,#F7EFD8 100%);padding:24px;text-align:center;}
.gbox{background:var(--wh);border-radius:24px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(30,57,50,0.12);}
.gtitle{font-size:22px;font-weight:800;color:var(--gd);margin-bottom:8px;}
.gsub{font-size:14px;color:var(--ts);line-height:1.6;margin-bottom:20px;}
.gbtn{display:inline-block;width:100%;padding:14px;background:linear-gradient(135deg,#00704A,#1E3932);color:var(--wh);border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;}

#ms{display:none;flex-direction:column;width:100%;}
.ah{display:none;}
.pg-links{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.pg-link{padding:7px 14px;border-radius:8px;background:var(--wh);border:1px solid var(--ivd);color:var(--gm);font-size:13px;font-weight:600;text-decoration:none;}
.pg-link:hover{background:var(--gp);}
.ah{background:linear-gradient(135deg,#1E3932,#16302A);color:var(--wh);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.ahl{display:flex;align-items:center;gap:12px;}
.ahi{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.aht{font-size:16px;font-weight:700;}
.ahr{text-align:right;}
#hn{font-size:15px;font-weight:600;}
#hi{font-size:11px;opacity:.7;margin-top:2px;}
.homebtn{background:rgba(255,255,255,0.15);color:var(--wh);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;margin-top:4px;text-decoration:none;display:inline-block;}

.subtb{display:flex;gap:4px;background:var(--wh);padding:8px 16px;border-bottom:1px solid var(--ivd);overflow-x:auto;}
.subtbtn{padding:8px 14px;background:transparent;border:none;border-radius:8px;font-size:14px;font-weight:600;color:var(--ts);cursor:pointer;white-space:nowrap;}
.subtbtn.active{background:var(--gp);color:var(--gm);}
.badge{display:inline-block;min-width:18px;height:18px;line-height:18px;background:#dc2626;color:#fff;font-size:11px;font-weight:700;border-radius:100px;padding:0 5px;margin-left:4px;text-align:center;}

.tc{padding:0;max-width:860px;margin:0 auto;width:100%;}
.actitle{font-size:17px;font-weight:800;color:var(--gd);margin-bottom:6px;}
.adesc{font-size:13px;color:var(--ts);margin-bottom:14px;line-height:1.5;}
.acard{background:var(--wh);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px;}

.bp{background:linear-gradient(135deg,#00704A,#1E3932);color:var(--wh);border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.bs{background:var(--iv);color:var(--ts);border:1.5px solid var(--ivd);border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;}
.bm{background:var(--gp);color:var(--gm);border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}

.fgrp{display:flex;flex-direction:column;margin-bottom:12px;}
.fgrp label{font-size:12px;font-weight:700;color:var(--ts);margin-bottom:5px;}
.fgrp input:not([type="checkbox"]):not([type="radio"]),.fgrp select,.fgrp textarea{border:1.5px solid var(--ivd);border-radius:8px;padding:10px 12px;font-size:14px;background:var(--iv);outline:none;width:100%;font-family:inherit;}
.fgrp input[type="checkbox"]{cursor:pointer;flex-shrink:0;}

.msg-item{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--ivd);border-radius:10px;margin-bottom:8px;cursor:pointer;background:var(--wh);transition:background .15s;}
.msg-item:hover{background:var(--iv);}
.msg-item.unread{background:var(--info-bg);border-color:var(--gl);}
.msg-dot{width:8px;height:8px;border-radius:50%;background:#dc2626;flex-shrink:0;}
.msg-dot.read{background:transparent;}
.msg-body{flex:1;min-width:0;}
.msg-top{display:flex;justify-content:space-between;gap:8px;}
.msg-from{font-weight:700;font-size:14px;color:var(--gd);}
.msg-date{font-size:11px;color:var(--tl);white-space:nowrap;}
.msg-sub{font-size:13px;color:var(--ts);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
.empty{text-align:center;color:var(--tl);padding:36px;font-size:14px;}

.recip-box{display:flex;flex-wrap:wrap;gap:6px;max-height:180px;overflow-y:auto;padding:8px;border:1.5px solid var(--ivd);border-radius:8px;background:var(--iv);}
.recip-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border:1.5px solid var(--ivd);border-radius:8px;background:var(--wh);cursor:pointer;font-size:13px;}
.recip-chip.on{border-color:var(--gm);background:var(--gp);color:var(--gm);font-weight:600;}

.mov{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.mbk{position:absolute;inset:0;background:rgba(20,25,60,0.5);}
.mbox{position:relative;background:var(--wh);border-radius:16px;padding:24px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-height:90vh;overflow-y:auto;}
.mtitle{font-size:18px;font-weight:800;color:var(--gd);margin-bottom:4px;}
.msub{font-size:13px;color:var(--ts);margin-bottom:16px;line-height:1.5;}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.readbox{white-space:pre-wrap;font-size:14px;line-height:1.7;color:var(--tx);background:var(--iv);border-radius:8px;padding:14px;margin:12px 0;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gd);color:var(--wh);padding:12px 24px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#dc2626;} .toast.ok{background:var(--gm);}
.seg{display:flex;gap:6px;margin-bottom:12px;}
.segb{flex:1;padding:8px;border:1.5px solid var(--ivd);border-radius:8px;background:var(--wh);font-size:13px;font-weight:600;color:var(--ts);cursor:pointer;}
.segb.on{background:var(--gm);color:#fff;border-color:var(--gm);}
</style>
<link rel="stylesheet" href="ui.css">
<script src="loading.js"></script>
<script src="modal-close.js"></script>
<script src="menu.js"></script>
<script src="sidebar.js"></script>
<script type="module" src="badges.js"></script>
<script type="module" src="presence.js"></script>
</head>
<body>

<div id="gate">
  <div class="gbox">
    <div class="gtitle">쪽지함</div>
    <div class="gsub" id="gate-msg">로그인 확인 중...</div>
    <a class="gbtn" id="gate-btn" href="index.html" style="display:none">로그인 화면으로</a>
  </div>
</div>

<div id="ms">
  
  <div class="subtb" id="subtb">
    <button class="subtbtn active" id="tb-inbox" onclick="showTab('inbox')">📥 받은 쪽지<span id="inbox-badge" class="badge" style="display:none">0</span></button>
    <button class="subtbtn" id="tb-sent" onclick="showTab('sent')">📤 보낸 쪽지</button>
    <button class="subtbtn" id="tb-write" onclick="openCompose()">✏️ 새 쪽지</button>
  </div>
  <div class="tc" id="c-inbox" style="display:none"></div>
  <div class="tc" id="c-sent" style="display:none"></div>
</div>

<div id="mwrap"></div>
<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, addDoc, deleteDoc, query, where, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCtgr79jKqkec6HwqkxYNxSubWAhfEkM7g",
  authDomain: "daniel-amatz.firebaseapp.com",
  projectId: "daniel-amatz",
  storageBucket: "daniel-amatz.firebasestorage.app",
  messagingSenderId: "455744290312",
  appId: "1:455744290312:web:3ce7e7d3e58f6f1d185bbd",
  measurementId: "G-E91V0S88T8"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $I = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');
const ORGS = {jihyebit:'지혜빛', daniel:'다니엘 아마츠'};
let CU = null;
let STAFF = [];       // 전체 교직원 (수신자 선택용)
let MSGS = [];        // 내 쪽지 (받은+보낸)
let composeSel = new Set(); // 작성 중 선택된 수신자 uid

function toast(msg, type=''){
  const t = $I('toast'); t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(window.__tt); window.__tt = setTimeout(()=>t.className='toast', 2500);
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString()===now.toDateString();
  if(sameDay) return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function fmtFull(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

onAuthStateChanged(auth, async (user) => {
  if(!user){ $I('gate-msg').textContent='로그인이 필요합니다. 메인 화면에서 먼저 로그인해주세요.'; $I('gate-btn').style.display='inline-block'; return; }
  try {
    const snap = await getDoc(doc(db,'staff',user.uid));
    if(!snap.exists()){ $I('gate-msg').textContent='교직원 정보를 찾을 수 없습니다.'; $I('gate-btn').style.display='inline-block'; return; }
    CU = { uid:user.uid, ...snap.data() };
    const ac = CU.acStatus || 'active';
    if(ac==='leave'||ac==='quit'){ $I('gate-msg').textContent = ac==='quit'?'퇴직 처리된 계정입니다.':'휴직 중인 계정입니다.'; $I('gate-btn').style.display='inline-block'; return; }
    $I('gate').style.display='none'; $I('ms').style.display='flex';
    window.ORGS = ORGS;
  if(window.guardPage && !guardPage(CU, 'message')) return;
  renderShell('message', CU);
    window.showLoading && window.showLoading('쪽지를 불러오는 중…');
    try {
      await loadStaff();
      await loadMsgs();
    } finally {
      window.hideLoading && window.hideLoading();
    }
    showTab('inbox');
  } catch(e){
    window.hideLoading && window.hideLoading();
    $I('gate-msg').textContent='오류: '+e.message; $I('gate-btn').style.display='inline-block';
  }
});

async function loadStaff(){
  const snap = await getDocs(collection(db,'staff'));
  STAFF = [];
  snap.forEach(d=>{
    const s={uid:d.id, ...d.data()};
    if((s.acStatus||'active')!=='active') return; // 재직자만
    if(s.uid===CU.uid) return; // 본인 제외
    STAFF.push(s);
  });
  STAFF.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'));
}

async function loadMsgs(){
  // 전체를 읽지 않고 내 것만 조회 (받은 것 + 보낸 것)
  const col = collection(db,'messages');
  const [rcv, snt] = await Promise.all([
    getDocs(query(col, where('toUids','array-contains', CU.uid))),
    getDocs(query(col, where('fromUid','==', CU.uid)))
  ]);
  const map = {};
  rcv.forEach(d=>{ map[d.id] = {id:d.id, ...d.data()}; });
  snt.forEach(d=>{ map[d.id] = {id:d.id, ...d.data()}; });
  MSGS = Object.values(map);
  MSGS.sort((a,b)=>{
    const ta=a.createdAt?.toMillis?.()||0, tb=b.createdAt?.toMillis?.()||0;
    return tb-ta;
  });
  updateBadge();
}

function updateBadge(){
  const unread = MSGS.filter(m=>(m.toUids||[]).includes(CU.uid) && !(m.readBy||[]).includes(CU.uid)).length;
  const b = $I('inbox-badge');
  if(b){ if(unread>0){ b.textContent=unread; b.style.display=''; } else b.style.display='none'; }
}

function showTab(t){
  document.querySelectorAll('.subtbtn').forEach(b=>b.classList.remove('active'));
  $I('tb-'+t)?.classList.add('active');
  ['inbox','sent'].forEach(id=>{ const el=$I('c-'+id); if(el) el.style.display='none'; });
  $I('c-'+t).style.display='block';
  if(t==='inbox') renderInbox();
  if(t==='sent') renderSent();
}
window.showTab = showTab;

// ── 쪽지 분류 ──
// category 필드가 있으면 그것, 없으면(기존 쪽지) 제목으로 자동 판별
const MSG_CATS = {
  payreq:  { label:'경비 지급', icon:'💳', color:'#00704A', bg:'#E8F3EF' },
  expense: { label:'수행성 경비', icon:'💰', color:'#8A6410', bg:'#F7EFD8' },
  approval:{ label:'전자결재', icon:'🗂️', color:'#2563EB', bg:'#DBEAFE' },
  general: { label:'일반', icon:'✉️', color:'#5A6560', bg:'#F2F0EB' },
};
function msgCat(m){
  if(m.category && MSG_CATS[m.category]) return m.category;
  const s = m.subject || '';
  if(/\[경비 결재|\[경비 지급|\[지급 완료|\[반려\]/.test(s)) return 'payreq';
  if(/\[수행성|\[입금 완료\]/.test(s)) return 'expense';
  if(/\[결재 완료|\[결재 진행|\[결재 요청/.test(s)) return 'approval';
  return 'general';
}
let inboxFilter = 'all';
function setInboxFilter(f){ inboxFilter = f; renderInbox(); }
window.setInboxFilter = setInboxFilter;

function catBadge(c){
  const k = MSG_CATS[c] || MSG_CATS.general;
  return `<span class="msg-cat" style="background:${k.bg};color:${k.color}">${k.icon} ${k.label}</span>`;
}

function renderInbox(){
  const all = MSGS.filter(m=>(m.toUids||[]).includes(CU.uid));
  // 분류별 개수
  const counts = { all: all.length, payreq:0, expense:0, approval:0, general:0 };
  const unreadCounts = { all:0, payreq:0, expense:0, approval:0, general:0 };
  all.forEach(m=>{
    const c = msgCat(m);
    counts[c]++;
    if(!(m.readBy||[]).includes(CU.uid)){ unreadCounts[c]++; unreadCounts.all++; }
  });

  const list = inboxFilter==='all' ? all : all.filter(m=>msgCat(m)===inboxFilter);

  const chips = [['all','전체','📥'], ['payreq','경비 지급','💳'], ['expense','수행성 경비','💰'],
                 ['approval','전자결재','🗂️'], ['general','일반','✉️']]
    .map(([k,l,ic])=>{
      const c = counts[k]||0;
      const u = unreadCounts[k]||0;
      if(k!=='all' && c===0) return '';   // 없는 분류는 숨김
      return `<button class="mcx ${inboxFilter===k?'on':''}" onclick="setInboxFilter('${k}')">
        ${ic} ${l} <span class="mcx-n">${c}</span>${u>0?`<span class="mcx-u">${u}</span>`:''}
      </button>`;
    }).join('');

  const rows = list.map(m=>{
    const unread = !(m.readBy||[]).includes(CU.uid);
    const c = msgCat(m);
    return `<div class="msg-item ${unread?'unread':''}" onclick="openMsg('${m.id}')">
      <div class="msg-dot ${unread?'':'read'}"></div>
      <div class="msg-body">
        <div class="msg-top">
          <span class="msg-from">${esc(m.fromName)}</span>
          ${catBadge(c)}
          <span class="msg-date">${fmtTime(m.createdAt)}</span>
        </div>
        <div class="msg-sub">${esc(m.subject||'(제목 없음)')}</div>
      </div>
    </div>`;
  }).join('');

  $I('c-inbox').innerHTML = `
    <div class="acard">
      <h3 class="actitle">📥 받은 쪽지</h3>
      <p class="adesc">종류별로 나누어 볼 수 있습니다. 클릭하면 내용을 볼 수 있습니다.</p>
      <div class="mcx-bar">${chips}</div>
      <style>
        .mcx-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
        .mcx{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border:1.5px solid var(--ivd);border-radius:100px;background:var(--wh);font-size:12.5px;font-weight:600;color:var(--ts);cursor:pointer;font-family:inherit;}
        .mcx:hover{border-color:var(--gm);}
        .mcx.on{background:var(--gm);border-color:var(--gm);color:#fff;}
        .mcx-n{font-size:11px;opacity:.65;font-weight:600;}
        .mcx-u{background:#C0392B;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:100px;min-width:16px;text-align:center;line-height:1.3;}
        .msg-cat{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:100px;white-space:nowrap;}
        .msg-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
      </style>
      ${rows || `<div class="empty">${inboxFilter==='all'?'받은 쪽지가 없습니다.':'해당 분류의 쪽지가 없습니다.'}</div>`}
    </div>`;
}
window.renderInbox = renderInbox;

function renderSent(){
  const list = MSGS.filter(m=>m.fromUid===CU.uid);
  const rows = list.map(m=>{
    const names = (m.toNames||[]).join(', ');
    const readCnt = (m.readBy||[]).filter(u=>u!==CU.uid).length;
    const total = (m.toUids||[]).length;
    return `<div class="msg-item" onclick="openMsg('${m.id}')">
      <div class="msg-body">
        <div class="msg-top">
          <span class="msg-from">받는사람: ${esc(names)}</span>
          ${catBadge(msgCat(m))}
          <span class="msg-date">${fmtTime(m.createdAt)}</span>
        </div>
        <div class="msg-sub">${esc(m.subject||'(제목 없음)')} · 읽음 ${readCnt}/${total}</div>
      </div>
    </div>`;
  }).join('');
  $I('c-sent').innerHTML = `
    <div class="acard">
      <h3 class="actitle">📤 보낸 쪽지</h3>
      <p class="adesc">내가 보낸 쪽지입니다. 받는 사람이 읽었는지 확인할 수 있습니다.</p>
      ${rows || '<div class="empty">보낸 쪽지가 없습니다.</div>'}
    </div>`;
}
window.renderSent = renderSent;

async function openMsg(id){
  const m = MSGS.find(x=>x.id===id); if(!m) return;
  const isRecip = (m.toUids||[]).includes(CU.uid);
  // 받은 쪽지면 읽음 처리
  if(isRecip && !(m.readBy||[]).includes(CU.uid)){
    try {
      const newRead = [...(m.readBy||[]), CU.uid];
      await updateDoc(doc(db,'messages',id), {readBy:newRead});
      m.readBy = newRead;
      updateBadge();
    } catch(e){}
  }
  const names = (m.toNames||[]).join(', ');
  const canDelete = m.fromUid===CU.uid;
  $I('mwrap').innerHTML = `
    <div class="mov"><div class="mbk" onclick="closeMod()"></div>
    <div class="mbox">
      <div class="mtitle">${esc(m.subject||'(제목 없음)')}</div>
      <div class="msub">보낸사람: <b>${esc(m.fromName)}</b> · ${fmtFull(m.createdAt)}<br>받는사람: ${esc(names)}</div>
      <div class="readbox">${esc(m.body)}</div>
      <div class="mact">
        ${isRecip?`<button class="bs" onclick="replyMsg('${m.fromUid}','${esc(m.fromName).replace(/'/g,"")}','${esc(m.subject).replace(/'/g,"")}')">↩ 답장</button>`:''}
        ${canDelete?`<button class="bs" style="color:var(--danger)" onclick="delMsg('${id}')">삭제</button>`:''}
        <button class="bp" onclick="closeMod()">닫기</button>
      </div>
    </div></div>`;
  // 목록 갱신 (읽음 표시 반영)
  const active = document.querySelector('.subtbtn.active')?.id;
  if(active==='tb-inbox') renderInbox();
}
window.openMsg = openMsg;

function closeMod(){ $I('mwrap').innerHTML=''; }
window.closeMod = closeMod;

async function delMsg(id){
  if(!confirm('이 쪽지를 삭제할까요? (받는 사람의 쪽지함에서도 사라집니다)')) return;
  try {
    await deleteDoc(doc(db,'messages',id));
    toast('삭제되었습니다.');
    closeMod();
    await loadMsgs();
    renderSent();
  } catch(e){ toast('삭제 실패: '+e.message,'err'); }
}
window.delMsg = delMsg;

// ── 새 쪽지 작성 ──
let composeMode = 'person'; // person | dept
function openCompose(reTo, reToName, reSub){
  composeSel = new Set();
  if(reTo){ composeSel.add(reTo); }
  composeMode = 'person';
  $I('mwrap').innerHTML = `
    <div class="mov"><div class="mbk" onclick="closeMod()"></div>
    <div class="mbox">
      <div class="mtitle">새 쪽지</div>
      <div class="msub">받는 사람을 선택하고 내용을 입력하세요. 여러 명에게 한 번에 보낼 수 있습니다.</div>
      <div class="seg">
        <button class="segb on" id="seg-person" onclick="setComposeMode('person')">개인 선택</button>
        <button class="segb" id="seg-dept" onclick="setComposeMode('dept')">부서 단위</button>
      </div>
      <div class="fgrp"><label>받는 사람</label>
        <div class="recip-box" id="recip-box"></div>
        <div style="margin-top:6px;font-size:12px;color:var(--ts)" id="recip-count">선택: 0명</div>
      </div>
      <div class="fgrp"><label>제목</label><input type="text" id="cp-subject" value="${reSub?'Re: '+esc(reSub).replace(/"/g,'&quot;'):''}" placeholder="제목"></div>
      <div class="fgrp"><label>내용</label><textarea id="cp-body" rows="6" placeholder="내용을 입력하세요..."></textarea></div>
      <div class="mact">
        <button class="bs" onclick="closeMod()">취소</button>
        <button class="bp" onclick="sendMsg()">보내기</button>
      </div>
    </div></div>`;
  renderRecipBox();
}
window.openCompose = openCompose;

function setComposeMode(mode){
  composeMode = mode;
  $I('seg-person').classList.toggle('on', mode==='person');
  $I('seg-dept').classList.toggle('on', mode==='dept');
  renderRecipBox();
}
window.setComposeMode = setComposeMode;

function renderRecipBox(){
  const box = $I('recip-box'); if(!box) return;
  if(composeMode==='person'){
    box.innerHTML = STAFF.map(s=>{
      const on = composeSel.has(s.uid);
      return `<span class="recip-chip ${on?'on':''}" onclick="toggleRecip('${s.uid}')">${esc(s.name)} <span style="color:var(--tl);font-size:11px">${ORGS[s.org]||s.org}${s.dept&&s.dept!=='전체'?'·'+s.dept:''}</span></span>`;
    }).join('') || '<span style="color:var(--tl);font-size:13px">보낼 수 있는 교직원이 없습니다.</span>';
  } else {
    // 부서 단위: org+dept 조합으로 그룹
    const groups = {};
    STAFF.forEach(s=>{ const key=`${s.org}||${s.dept||'전체'}`; (groups[key]=groups[key]||[]).push(s); });
    box.innerHTML = Object.entries(groups).map(([key,members])=>{
      const [org,dept]=key.split('||');
      const uids = members.map(m=>m.uid);
      const allOn = uids.every(u=>composeSel.has(u));
      return `<span class="recip-chip ${allOn?'on':''}" onclick="toggleDept('${key}')">${ORGS[org]||org} ${dept!=='전체'?dept:''} <span style="color:var(--tl);font-size:11px">${members.length}명</span></span>`;
    }).join('') || '<span style="color:var(--tl);font-size:13px">부서가 없습니다.</span>';
  }
  updateRecipCount();
}

function toggleRecip(uid){
  if(composeSel.has(uid)) composeSel.delete(uid); else composeSel.add(uid);
  renderRecipBox();
}
window.toggleRecip = toggleRecip;

function toggleDept(key){
  const [org,dept]=key.split('||');
  const members = STAFF.filter(s=>s.org===org && (s.dept||'전체')===dept);
  const uids = members.map(m=>m.uid);
  const allOn = uids.every(u=>composeSel.has(u));
  if(allOn) uids.forEach(u=>composeSel.delete(u));
  else uids.forEach(u=>composeSel.add(u));
  renderRecipBox();
}
window.toggleDept = toggleDept;

function updateRecipCount(){
  const el = $I('recip-count'); if(el) el.textContent = `선택: ${composeSel.size}명`;
}

async function sendMsg(){
  const subject = $I('cp-subject').value.trim();
  const body = $I('cp-body').value.trim();
  if(composeSel.size===0) return toast('받는 사람을 선택하세요.','err');
  if(!body) return toast('내용을 입력하세요.','err');
  const toUids = Array.from(composeSel);
  const toNames = toUids.map(u=>STAFF.find(s=>s.uid===u)?.name||'?');
  try {
    await addDoc(collection(db,'messages'), {
      category:'general',
      fromUid:CU.uid, fromName:CU.name, fromOrg:CU.org||'',
      toUids, toNames, subject, body,
      readBy:[], createdAt:Timestamp.now()
    });
    toast(`${toUids.length}명에게 쪽지를 보냈습니다.`,'ok');
    closeMod();
    await loadMsgs();
    showTab('sent');
  } catch(e){ toast('전송 실패: '+e.message,'err'); }
}
window.sendMsg = sendMsg;

function replyMsg(toUid, toName, subject){
  closeMod();
  openCompose(toUid, toName, subject);
}
window.replyMsg = replyMsg;
</script>
</body>
</html>
