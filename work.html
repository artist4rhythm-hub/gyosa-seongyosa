<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>근무시간 · 교사 선교사</title>
<meta name="theme-color" content="#1e2e5c">
<link rel="icon" type="image/png" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --gd:#1e2e5c; --gm:#2b3990; --gl:#5a70cc; --gp:#e8ecf8;
  --gold:#c9a84c; --goldd:#a8873a; --goldp:#fdf3d8;
  --iv:#f5f0e8; --ivd:#e8e0d0;
  --tx:#1a1a2e; --ts:#4a4a6a; --tl:#8888aa; --wh:#ffffff;
  --sh:0 2px 12px rgba(30,46,92,0.10); --r:12px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--iv);color:var(--tx);min-height:100vh;}

#gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#eef0f8 0%,#f5f0e8 60%,#fdf3d8 100%);padding:24px;text-align:center;}
.gbox{background:var(--wh);border-radius:24px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(30,46,92,0.12);}
.gtitle{font-size:22px;font-weight:800;color:var(--gd);margin-bottom:8px;}
.gsub{font-size:14px;color:var(--ts);line-height:1.6;margin-bottom:20px;}
.gbtn{display:inline-block;width:100%;padding:14px;background:linear-gradient(135deg,#2b3990,#1e2e5c);color:var(--wh);border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;}

#ms{display:none;flex-direction:column;min-height:100vh;}
.ah{background:linear-gradient(135deg,#1e2e5c,#12194a);color:var(--wh);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.ahl{display:flex;align-items:center;gap:12px;}
.ahi{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.aht{font-size:16px;font-weight:700;}
.ahr{text-align:right;}
#hn{font-size:15px;font-weight:600;}
#hi{font-size:11px;opacity:.7;margin-top:2px;}
.homebtn{background:rgba(255,255,255,0.15);color:var(--wh);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;margin-top:4px;text-decoration:none;display:inline-block;}

.subtb{display:flex;gap:4px;background:var(--wh);padding:8px 16px;border-bottom:1px solid var(--ivd);overflow-x:auto;}
.subtbtn{padding:8px 14px;background:transparent;border:none;border-radius:8px;font-size:14px;font-weight:600;color:var(--ts);cursor:pointer;white-space:nowrap;}
.subtbtn.active{background:var(--gp);color:var(--gm);}

.tc{padding:20px 16px;max-width:1000px;margin:0 auto;width:100%;}
.actitle{font-size:17px;font-weight:800;color:var(--gd);margin-bottom:6px;}
.adesc{font-size:13px;color:var(--ts);margin-bottom:14px;line-height:1.5;}
.acard{background:var(--wh);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px;}

.bp{background:linear-gradient(135deg,#2b3990,#1e2e5c);color:var(--wh);border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.bs{background:var(--iv);color:var(--ts);border:1.5px solid var(--ivd);border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;}
.bm{background:var(--gp);color:var(--gm);border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}

.fgrp{display:flex;flex-direction:column;margin-bottom:12px;}
.fgrp label{font-size:12px;font-weight:700;color:var(--ts);margin-bottom:5px;}
.fgrp input,.fgrp select{height:40px;border:1.5px solid var(--ivd);border-radius:8px;padding:0 12px;font-size:14px;background:var(--iv);outline:none;width:100%;font-family:inherit;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:8px 10px;border-bottom:1px solid var(--ivd);text-align:left;white-space:nowrap;}
th{background:var(--iv);font-weight:700;font-size:12px;}
.empty{text-align:center;color:var(--tl);padding:30px;font-size:14px;}

.mov{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.mbk{position:absolute;inset:0;background:rgba(20,25,60,0.5);}
.mbox{position:relative;background:var(--wh);border-radius:16px;padding:24px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-height:90vh;overflow-y:auto;}
.mtitle{font-size:18px;font-weight:800;color:var(--gd);margin-bottom:4px;}
.msub{font-size:13px;color:var(--ts);margin-bottom:16px;line-height:1.5;}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gd);color:var(--wh);padding:12px 24px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#dc2626;} .toast.ok{background:var(--gm);}
.row2{display:flex;gap:10px;}
.row2 .fgrp{flex:1;}
</style>
</head>
<body>

<div id="gate">
  <div class="gbox">
    <div class="gtitle">근무시간</div>
    <div class="gsub" id="gate-msg">로그인 확인 중...</div>
    <a class="gbtn" id="gate-btn" href="index.html" style="display:none">로그인 화면으로</a>
  </div>
</div>

<div id="ms">
  <header class="ah">
    <div class="ahl">
      <div class="ahi">⏱️</div>
      <div class="aht">근무시간</div>
    </div>
    <div class="ahr">
      <div id="hn"></div>
      <div id="hi"></div>
      <a class="homebtn" href="index.html">← 메인으로</a>
    </div>
  </header>
  <div class="subtb" id="subtb">
    <button class="subtbtn active" id="tb-stat" onclick="showTab('stat')">📊 근무 통계</button>
    <button class="subtbtn" id="tb-exc" onclick="showTab('exc')" style="display:none">📝 예외 입력</button>
    <button class="subtbtn" id="tb-set" onclick="showTab('set')" style="display:none">⚙️ 근무시간 설정</button>
  </div>
  <div class="tc" id="c-stat" style="display:none"></div>
  <div class="tc" id="c-exc" style="display:none"></div>
  <div class="tc" id="c-set" style="display:none"></div>
</div>

<div id="mwrap"></div>
<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc, updateDoc, deleteDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCtgr79jKqkec6HwqkxYNxSubWAhfEkM7g",
  authDomain: "daniel-amatz.firebaseapp.com",
  projectId: "daniel-amatz",
  storageBucket: "daniel-amatz.firebasestorage.app",
  messagingSenderId: "455744290312",
  appId: "1:455744290312:web:3ce7e7d3e58f6f1d185bbd",
  measurementId: "G-E91V0S88T8"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $I = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');
const ORGS = {jihyebit:'지혜빛', daniel:'다니엘 아마츠'};
let CU = null;
let STAFF = [];       // 교직원 목록
let SETTINGS = {};    // uid -> 근무설정
let ATT = [];         // 출근부 기록 (정상출근 판정용)
let EXC = [];         // 날짜별 예외 (workExceptions)
let HOLIDAYS = [];    // 공휴일 (휴일근무 판정용)
let NIGHT_ON = false; // 야간(22~06시) 구분 사용 여부

// 정상출근으로 인정하는 항목 (근무시간 계산 대상)
const WORK_SUBS = ['정상출근','재택근무','출장'];

function toast(msg, type=''){
  const t = $I('toast'); t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(window.__tt); window.__tt = setTimeout(()=>t.className='toast', 2500);
}
async function logActivity(action, category, target){
  if(!CU) return;
  try { await addDoc(collection(db,'activityLogs'), {
    uid:CU.uid, name:CU.name||'', role:CU.role||'', org:CU.org||'',
    action, category, target:target||'', detail:'', at:Timestamp.now()
  }); } catch(e){}
}
function myOrgs(){
  if(!CU) return [];
  if(CU.role==='super') return ['jihyebit','daniel'];
  return CU.orgs && CU.orgs.length ? CU.orgs : [CU.org];
}
const isAdmin = () => CU && ['super','org_admin','tab_admin'].includes(CU.role);
const canManage = () => CU && ['super','org_admin','tab_admin'].includes(CU.role);

// 시:분 문자열("09:00") → 분
function toMin(t){ if(!t||!t.includes(':')) return null; const [h,m]=t.split(':').map(Number); return h*60+m; }
// 분 → "8시간 30분"
function fmtDur(min){ if(min==null) return '-'; const h=Math.floor(min/60), m=min%60; return `${h}시간${m?' '+m+'분':''}`; }
// 분 → 소수 시간(8.5)
function toHours(min){ return Math.round(min/60*100)/100; }

onAuthStateChanged(auth, async (user) => {
  if(!user){ $I('gate-msg').textContent='로그인이 필요합니다. 메인 화면에서 먼저 로그인해주세요.'; $I('gate-btn').style.display='inline-block'; return; }
  try {
    const snap = await getDoc(doc(db,'staff',user.uid));
    if(!snap.exists()){ $I('gate-msg').textContent='교직원 정보를 찾을 수 없습니다.'; $I('gate-btn').style.display='inline-block'; return; }
    CU = { uid:user.uid, ...snap.data() };
    const ac = CU.acStatus || 'active';
    if(ac==='leave'||ac==='quit'){ $I('gate-msg').textContent = ac==='quit'?'퇴직 처리된 계정입니다.':'휴직 중인 계정입니다.'; $I('gate-btn').style.display='inline-block'; return; }
    $I('gate').style.display='none'; $I('ms').style.display='flex';
    $I('hn').textContent = CU.name;
    $I('hi').textContent = `${ORGS[CU.org]||CU.org} · ${CU.dept||''}`;
    if(canManage()) $I('tb-set').style.display='';
    if(canManage()) $I('tb-exc').style.display='';
    await loadStaff();
    await loadSettings();
    await loadExc();
    await loadHolidays();
    await loadConfig();
    showTab('stat');
  } catch(e){ $I('gate-msg').textContent='오류: '+e.message; $I('gate-btn').style.display='inline-block'; }
});

async function loadStaff(){
  const snap = await getDocs(collection(db,'staff'));
  const allowed = myOrgs();
  STAFF = [];
  snap.forEach(d=>{
    const s={uid:d.id, ...d.data()};
    const so = s.orgs&&s.orgs.length?s.orgs:[s.org];
    if(CU.role==='super' || CU.role==='org_admin'){
      // 기관관리자·슈퍼: 자기 기관 전체
      if(so.some(o=>allowed.includes(o))) STAFF.push(s);
    } else if(CU.role==='tab_admin'){
      // 부서장: 행정실은 다니엘 전체, 그 외는 본인 부서. 본인은 항상 포함
      if(s.uid===CU.uid) STAFF.push(s);
      else if(CU.dept==='행정실'){ if(so.some(o=>allowed.includes(o))) STAFF.push(s); }
      else if(so.some(o=>allowed.includes(o)) && s.dept===CU.dept) STAFF.push(s);
    } else {
      // 교사: 본인만
      if(s.uid===CU.uid) STAFF.push(s);
    }
  });
  STAFF.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'));
}

async function loadSettings(){
  const snap = await getDocs(collection(db,'workSettings'));
  SETTINGS = {};
  snap.forEach(d=> SETTINGS[d.id] = d.data());
}

async function loadAtt(){
  const snap = await getDocs(collection(db,'attendance'));
  ATT = []; snap.forEach(d=>ATT.push(d.data()));
}
async function loadExc(){
  const snap = await getDocs(collection(db,'workExceptions'));
  const allowed = myOrgs();
  EXC = [];
  snap.forEach(d=>{ const e={id:d.id, ...d.data()};
    if(canManage()){ if(allowed.includes(e.org)) EXC.push(e); }
    else if(e.uid===CU.uid){ EXC.push(e); }
  });
}
async function loadHolidays(){
  const snap = await getDocs(collection(db,'holidays'));
  HOLIDAYS = []; snap.forEach(d=>HOLIDAYS.push(d.data()));
}
async function loadConfig(){
  try { const snap = await getDoc(doc(db,'workConfig','main'));
    if(snap.exists()) NIGHT_ON = !!snap.data().nightOn;
  } catch(e){}
}
// 날짜+기관이 공휴일인지
function isHoliday(dateStr, org){
  return HOLIDAYS.some(h=>h.date===dateStr && (h.org==='all'||h.org===org));
}
// 특정 uid+날짜의 예외 찾기
function findExc(uid, dateStr){
  return EXC.find(e=>e.uid===uid && e.date===dateStr) || null;
}

function showTab(t){
  document.querySelectorAll('.subtbtn').forEach(b=>b.classList.remove('active'));
  $I('tb-'+t)?.classList.add('active');
  ['stat','exc','set'].forEach(id=>{ const el=$I('c-'+id); if(el) el.style.display='none'; });
  $I('c-'+t).style.display='block';
  if(t==='stat') renderStat();
  if(t==='exc') renderExc();
  if(t==='set') renderSet();
}
window.showTab = showTab;

// ── 예외 입력 (조퇴·늦은출근·캠프·주말근무) ──
const EXC_TYPES = {
  late:   {label:'늦은 출근', desc:'그날 출근시간만 변경'},
  early:  {label:'조퇴',      desc:'그날 퇴근시간만 변경'},
  camp:   {label:'캠프/숙박', desc:'그날 총 근무시간 직접 입력'},
  weekend:{label:'주말/휴일 근무', desc:'휴일에 근무 (전체가 휴일근무)'},
};

function renderExc(){
  if(!canManage()){ $I('c-exc').innerHTML='<div class="acard"><p class="empty">입력 권한이 없습니다.</p></div>'; return; }
  // 최근 예외 목록 (날짜 내림차순)
  const list = [...EXC].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,100);
  const rows = list.map(e=>{
    const t = EXC_TYPES[e.type];
    let detail = '';
    if(e.type==='late') detail = `출근 ${e.start}`;
    else if(e.type==='early') detail = `퇴근 ${e.end}`;
    else if(e.type==='camp') detail = `${e.hours}시간`;
    else if(e.type==='weekend') detail = `${e.start}~${e.end}`;
    return `<tr>
      <td>${e.date}</td>
      <td style="font-weight:600">${e.name||''}</td>
      <td><span class="typebadge" style="background:var(--gp);color:var(--gm);font-size:11px;padding:2px 8px;border-radius:100px">${t?.label||e.type}</span></td>
      <td>${detail}</td>
      <td style="color:var(--ts);font-size:12px">${e.memo||''}</td>
      <td><button class="bm" style="background:#fee2e2;color:#dc2626" onclick="delExc('${e.id}')">삭제</button></td>
    </tr>`;
  }).join('');
  $I('c-exc').innerHTML = `
    <div class="acard">
      <h3 class="actitle">📝 예외 입력</h3>
      <p class="adesc">조퇴·늦은 출근·캠프(숙박)·주말근무 등 기본 근무시간과 다른 날을 입력합니다. 한 번에 여러 선생님을 골라 같은 날짜·내용으로 일괄 적용할 수 있습니다.</p>
      <button class="bp" onclick="openExcForm()">＋ 예외 추가</button>
    </div>
    <div class="acard">
      <h3 class="actitle" style="font-size:15px">최근 예외 내역</h3>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>날짜</th><th>이름</th><th>유형</th><th>내용</th><th>메모</th><th></th></tr></thead>
        <tbody>${rows || '<tr><td colspan="6" class="empty">등록된 예외가 없습니다.</td></tr>'}</tbody>
      </table></div>
    </div>`;
}
window.renderExc = renderExc;

function openExcForm(){
  const today = `${statYear}-${pad(statMonth)}-01`;
  const staffChecks = STAFF.map(s=>`<label style="display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border:1.5px solid var(--ivd);border-radius:8px;cursor:pointer;font-size:13px;margin:0 4px 4px 0">
    <input type="checkbox" class="exc-staff" value="${s.uid}" data-name="${s.name}" data-org="${s.org}" style="width:15px;height:15px"> ${s.name}</label>`).join('');
  $I('mwrap').innerHTML = `
    <div class="mov"><div class="mbk" onclick="closeMod()"></div>
    <div class="mbox">
      <div class="mtitle">예외 추가</div>
      <div class="msub">날짜와 유형을 정하고, 적용할 선생님을 선택하세요.</div>
      <div class="fgrp"><label>날짜</label><input type="date" id="exc-date" value="${today}"></div>
      <div class="fgrp"><label>유형</label>
        <select id="exc-type" onchange="updExcFields()">
          ${Object.entries(EXC_TYPES).map(([k,v])=>`<option value="${k}">${v.label} — ${v.desc}</option>`).join('')}
        </select></div>
      <div id="exc-fields"></div>
      <div class="fgrp"><label>메모 (선택)</label><input type="text" id="exc-memo" placeholder="예: 여름 비전트립 1일차"></div>
      <div class="fgrp"><label>적용 대상 선생님 (복수 선택)</label>
        <div style="display:flex;flex-wrap:wrap;max-height:160px;overflow-y:auto;padding:4px;border:1.5px solid var(--ivd);border-radius:8px;background:var(--iv)">${staffChecks}</div>
        <div style="margin-top:6px"><button type="button" class="bm" onclick="toggleAllExcStaff(true)">전체 선택</button> <button type="button" class="bm" onclick="toggleAllExcStaff(false)">전체 해제</button></div>
      </div>
      <div class="mact">
        <button class="bs" onclick="closeMod()">취소</button>
        <button class="bp" onclick="saveExc()">저장</button>
      </div>
    </div></div>`;
  updExcFields();
}
window.openExcForm = openExcForm;

function toggleAllExcStaff(on){
  document.querySelectorAll('.exc-staff').forEach(c=>c.checked=on);
}
window.toggleAllExcStaff = toggleAllExcStaff;

// 유형별 입력 칸
function updExcFields(){
  const type = $I('exc-type').value;
  const box = $I('exc-fields');
  if(type==='late') box.innerHTML = `<div class="fgrp"><label>변경된 출근 시간</label><input type="time" id="exc-start" value="10:00"></div>`;
  else if(type==='early') box.innerHTML = `<div class="fgrp"><label>변경된 퇴근 시간</label><input type="time" id="exc-end" value="15:10"></div>`;
  else if(type==='camp') box.innerHTML = `<div class="fgrp"><label>그날 총 근무시간 (시간 단위, 휴게 제외)</label><input type="number" id="exc-hours" value="14" min="0" max="24" step="0.5"></div><p style="font-size:12px;color:var(--tl);margin:-6px 0 12px">숙박 활동은 휴게를 빼지 않고 실제 인정 시간을 직접 입력하세요. (수면시간 제외 기준은 기관 규칙에 따름)</p>`;
  else if(type==='weekend') box.innerHTML = `<div class="row2"><div class="fgrp"><label>출근 시간</label><input type="time" id="exc-start" value="09:00"></div><div class="fgrp"><label>퇴근 시간</label><input type="time" id="exc-end" value="15:00"></div></div><p style="font-size:12px;color:var(--tl);margin:-6px 0 12px">주말·휴일 근무는 전체가 휴일근무로 집계됩니다.</p>`;
}
window.updExcFields = updExcFields;

async function saveExc(){
  const date = $I('exc-date').value;
  const type = $I('exc-type').value;
  const memo = $I('exc-memo').value.trim();
  if(!date) return toast('날짜를 선택하세요.','err');
  const targets = Array.from(document.querySelectorAll('.exc-staff:checked'));
  if(!targets.length) return toast('적용할 선생님을 선택하세요.','err');

  const base = {date, type, memo};
  if(type==='late'){ base.start=$I('exc-start').value; if(!base.start) return toast('출근 시간을 입력하세요.','err'); }
  else if(type==='early'){ base.end=$I('exc-end').value; if(!base.end) return toast('퇴근 시간을 입력하세요.','err'); }
  else if(type==='camp'){ base.hours=Number($I('exc-hours').value); if(!base.hours) return toast('근무시간을 입력하세요.','err'); }
  else if(type==='weekend'){ base.start=$I('exc-start').value; base.end=$I('exc-end').value; if(!base.start||!base.end) return toast('출근/퇴근 시간을 입력하세요.','err'); }

  toast('저장 중...');
  let cnt=0;
  try {
    for(const chk of targets){
      const uid = chk.value, name = chk.dataset.name, org = chk.dataset.org;
      // 같은 uid+날짜 기존 예외 있으면 덮어쓰기
      const existing = EXC.find(e=>e.uid===uid && e.date===date);
      const data = {...base, uid, name, org, by:CU.name, updatedAt:Timestamp.now()};
      if(existing){ await updateDoc(doc(db,'workExceptions',existing.id), data); }
      else { data.createdAt=Timestamp.now(); await addDoc(collection(db,'workExceptions'), data); }
      cnt++;
    }
    logActivity('입력','근무예외',`${date} ${EXC_TYPES[type]?.label} (${cnt}명)`);
    toast(`${cnt}명에게 적용되었습니다.`,'ok');
    closeMod();
    await loadExc();
    renderExc();
  } catch(e){ toast('저장 실패: '+e.message,'err'); }
}
window.saveExc = saveExc;

async function delExc(id){
  const e = EXC.find(x=>x.id===id);
  if(!confirm(`${e?.date} ${e?.name} 예외를 삭제할까요?`)) return;
  try {
    await deleteDoc(doc(db,'workExceptions',id));
    logActivity('삭제','근무예외',`${e?.date} ${e?.name}`);
    toast('삭제되었습니다.');
    await loadExc();
    renderExc();
  } catch(err){ toast('삭제 실패: '+err.message,'err'); }
}
window.delExc = delExc;

// 하루 기본 근무시간(분) 계산. fri=true면 금요일 퇴근 적용
function dailyBaseMin(st, fri){  if(!st) return null;
  const s = toMin(st.start), e = toMin((fri && st.friEnd) ? st.friEnd : st.end);
  if(s==null||e==null) return null;
  return Math.max(0, e - s - (st.breakMin||0));
}

// 출근~퇴근 사이 야간(22:00~06:00) 구간의 분 계산
// startMin, endMin: 분 단위 (당일 기준, end가 start보다 작으면 익일로 간주)
function nightMin(startMin, endMin){
  if(startMin==null||endMin==null) return 0;
  let e = endMin; if(e<=startMin) e += 24*60; // 자정 넘김
  let night = 0;
  // 22:00(1320)~익일 06:00(1800)  +  전날 야간이 당일 06시까지 이어지는 경우(−120~360)
  // 분 단위로 훑어서 야간대인지 체크 (간단·정확)
  for(let t=startMin; t<e; t++){
    const tod = ((t % (24*60)) + 24*60) % (24*60);
    if(tod>=22*60 || tod<6*60) night++;
  }
  return night;
}

async function saveSet(uid){
  const start = $I('ws-start').value, end = $I('ws-end').value;
  const friEnd = $I('ws-friend').value;
  const breakMin = Number($I('ws-break').value)||0;
  if(!start||!end) return toast('출근/퇴근 시간을 입력하세요.','err');
  if(toMin(end) <= toMin(start)) return toast('퇴근 시간이 출근 시간보다 빨라요.','err');
  try {
    const s = STAFF.find(x=>x.uid===uid);
    await setDoc(doc(db,'workSettings',uid), {
      start, end, friEnd, breakMin, name:s?.name||'', org:s?.org||'', updatedAt:Timestamp.now()
    });
    logActivity('수정','근무설정',`${s?.name} 근무시간 설정`);
    toast('저장되었습니다.','ok');
    closeMod();
    await loadSettings();
    renderSet();
  } catch(e){ toast('저장 실패: '+e.message,'err'); }
}
window.saveSet = saveSet;

// ── 근무 통계 (월별) ──
let statYear = new Date().getFullYear();
let statMonth = new Date().getMonth()+1;
let statRange = 'month'; // 'month' | 'year'

function renderStat(){
  const ty = new Date().getFullYear();
  const years = []; for(let y=ty+1;y>=ty-3;y--) years.push(y);
  const months = []; for(let m=1;m<=12;m++) months.push(m);
  $I('c-stat').innerHTML = `
    <div class="acard">
      <h3 class="actitle">📊 근무시간 통계</h3>
      <p class="adesc">출근부의 "정상출근(재택·출장 포함)" 기록과 예외 입력을 기준으로 근무시간을 계산합니다. ${canManage()?'':'본인 근무시간만 표시됩니다.'}</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
        <div class="fgrp" style="margin-bottom:0"><label>기간</label>
          <select id="st-range" onchange="onStatChange()">
            <option value="month"${statRange==='month'?' selected':''}>월별</option>
            <option value="year"${statRange==='year'?' selected':''}>연간</option>
          </select></div>
        <div class="fgrp" style="margin-bottom:0"><label>연도</label>
          <select id="st-year" onchange="onStatChange()">${years.map(y=>`<option value="${y}"${y===statYear?' selected':''}>${y}년</option>`).join('')}</select></div>
        <div class="fgrp" style="margin-bottom:0;${statRange==='year'?'display:none':''}" id="st-month-wrap"><label>월</label>
          <select id="st-month" onchange="onStatChange()">${months.map(m=>`<option value="${m}"${m===statMonth?' selected':''}>${m}월</option>`).join('')}</select></div>
        <button class="bs" onclick="downloadStatExcel()">⬇ 엑셀</button>
      </div>
    </div>
    <div id="st-body"><div class="acard"><p class="empty">불러오는 중...</p></div></div>`;
  buildStat();
}
window.renderStat = renderStat;

function onStatChange(){
  statRange = $I('st-range').value;
  statYear = Number($I('st-year').value);
  statMonth = Number($I('st-month').value);
  const mw = $I('st-month-wrap'); if(mw) mw.style.display = statRange==='year'?'none':'';
  buildStat();
}
window.onStatChange = onStatChange;

let _statRows = [];
async function buildStat(){
  const body = $I('st-body'); if(!body) return;
  if(!ATT.length) await loadAtt();

  const y = statYear, m = statMonth;
  const prefix = statRange==='year' ? `${y}-` : `${y}-${pad(m)}`;
  const targets = STAFF;
  const DAY_STD = 8*60; // 1일 8시간 = 초과 기준

  const rows = targets.map(s=>{
    const st = SETTINGS[s.uid];
    // 기간 내 정상출근일 (출근부 기준)
    const workDays = ATT.filter(r=> r.uid===s.uid && (r.date||'').startsWith(prefix) && WORK_SUBS.includes(r.sub));
    const workDates = new Set(workDays.map(r=>r.date));
    // 기간 내 예외도 날짜로 모음 (주말근무·캠프는 정상출근 기록이 없을 수 있으니 포함)
    const excInRange = EXC.filter(e=>e.uid===s.uid && (e.date||'').startsWith(prefix));
    excInRange.forEach(e=>{ if(e.type==='weekend'||e.type==='camp') workDates.add(e.date); });

    let baseMin=0, overMin=0, holMin=0, nightM=0, cnt=0;
    Array.from(workDates).forEach(date=>{
      const dow = new Date(date+'T00:00:00').getDay();
      const exc = findExc(s.uid, date);
      let dayMin = null;       // 그날 총 근무(분)
      let isHol = (dow===0||dow===6) || isHoliday(date, s.org);
      let sMin=null, eMin=null; // 출퇴근 시각(야간 계산용)

      if(exc){
        if(exc.type==='camp'){ dayMin = Math.round((exc.hours||0)*60); /* 직접입력은 야간 자동계산 제외 */ }
        else if(exc.type==='weekend'){ sMin=toMin(exc.start); eMin=toMin(exc.end); dayMin = Math.max(0, eMin-sMin); isHol = true; }
        else if(exc.type==='late'){ sMin=toMin(exc.start); eMin=toMin((dow===5&&st?.friEnd)?st.friEnd:st?.end); dayMin = (eMin!=null)?Math.max(0, eMin - sMin - (st?.breakMin||0)):null; }
        else if(exc.type==='early'){ sMin=toMin(st?.start); eMin=toMin(exc.end); dayMin = (sMin!=null)?Math.max(0, eMin - sMin - (st?.breakMin||0)):null; }
      } else {
        dayMin = dailyBaseMin(st, dow===5);
        if(st){ sMin=toMin(st.start); eMin=toMin((dow===5&&st.friEnd)?st.friEnd:st.end); }
      }
      if(dayMin==null) return;
      cnt++;
      if(isHol){
        holMin += dayMin;       // 휴일근무는 전체를 휴일로
      } else {
        baseMin += Math.min(dayMin, DAY_STD);
        if(dayMin>DAY_STD) overMin += dayMin - DAY_STD;
      }
      // 야간(설정 켜졌고, 출퇴근 시각이 있는 경우만)
      if(NIGHT_ON && sMin!=null && eMin!=null) nightM += nightMin(sMin, eMin);
    });
    const totalMin = baseMin+overMin+holMin;
    return {
      uid:s.uid, name:s.name, org:s.org, dept:s.dept||'',
      hasSetting:!!st, days:cnt,
      baseMin, overMin, holMin, nightMin:nightM, totalMin,
      totalHours:toHours(totalMin)
    };
  });
  _statRows = rows;

  const nightCol = NIGHT_ON;
  const trs = rows.map(r=>`<tr>
    <td style="font-weight:600">${r.name}</td>
    <td>${ORGS[r.org]||r.org}${r.dept&&r.dept!=='전체'?' · '+r.dept:''}</td>
    <td style="text-align:center">${r.days}일</td>
    <td style="text-align:center">${fmtDur(r.baseMin)}</td>
    <td style="text-align:center;color:${r.overMin?'#d97706':'var(--tl)'}">${r.overMin?fmtDur(r.overMin):'-'}</td>
    <td style="text-align:center;color:${r.holMin?'#dc2626':'var(--tl)'}">${r.holMin?fmtDur(r.holMin):'-'}</td>
    ${nightCol?`<td style="text-align:center;color:${r.nightMin?'#7c3aed':'var(--tl)'}">${r.nightMin?fmtDur(r.nightMin):'-'}</td>`:''}
    <td style="text-align:center;font-weight:700;color:var(--gm)">${fmtDur(r.totalMin)}</td>
    <td>${r.hasSetting?'':'<span style="color:#dc2626;font-size:11px">설정 필요</span>'}</td>
  </tr>`).join('');

  body.innerHTML = `
    <div class="acard">
      <h3 class="actitle" style="margin-bottom:12px">${y}년 ${statRange==='year'?'전체':m+'월'} 근무시간</h3>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>이름</th><th>소속</th><th>근무일</th><th>기본</th><th>초과</th><th>휴일</th>${nightCol?'<th>야간</th>':''}<th>합계</th><th></th></tr></thead>
        <tbody>${trs || `<tr><td colspan="${nightCol?9:8}" class="empty">데이터가 없습니다.</td></tr>`}</tbody>
      </table></div>
      <p style="font-size:12px;color:var(--tl);margin-top:10px">※ 기본=평일 1일 8시간 이내 / 초과=평일 8시간 초과분 / 휴일=주말·공휴일 근무${nightCol?' / 야간=22~06시 (합계에 별도 가산 아님, 참고용)':''}. 예외 입력이 자동 반영됩니다.</p>
    </div>`;
}

function downloadStatExcel(){
  if(!_statRows.length) return toast('데이터가 없습니다.','err');
  const hdr = ['이름','기관','부서','근무일','기본(시간)','초과(시간)','휴일(시간)'];
  if(NIGHT_ON) hdr.push('야간(시간)');
  hdr.push('합계(시간)');
  const aoa = [hdr];
  _statRows.forEach(r=>{
    const row = [r.name, ORGS[r.org]||r.org, r.dept, r.days, toHours(r.baseMin), toHours(r.overMin), toHours(r.holMin)];
    if(NIGHT_ON) row.push(toHours(r.nightMin));
    row.push(toHours(r.totalMin));
    aoa.push(row);
  });
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = hdr.map(()=>({wch:11}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '근무시간');
  XLSX.writeFile(wb, `근무시간_${statYear}${statRange==='year'?'_연간':'_'+pad(statMonth)}.xlsx`);
  toast('엑셀을 다운로드했습니다.','ok');
}
window.downloadStatExcel = downloadStatExcel;
