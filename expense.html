function renderAllSheet(){
  const box = $I('all-sheet-body');
  if(!box) return;
  const gradeNum = g => parseInt(String(g||'').replace(/[^0-9]/g,''),10)||99;
  const gradeLabel = g => { const n=parseInt(String(g||'').replace(/[^0-9]/g,''),10); return n?`${n}학년`:'학년 미지정'; };

  let list = EXPENSES.filter(e=>e.org===reportOrg && e.semester===reportSem);
  // 항목 정렬/그룹
  const groupKey = e => allSheetGroupBy==='teacher' ? (e.teacher||'담당 미지정')
                      : allSheetGroupBy==='subject' ? (e.subject||'과목 미지정') : null;
  if(allSheetGroupBy!=='none'){
    list = [...list].sort((a,b)=> (groupKey(a)||'').localeCompare(groupKey(b)||'','ko') || (a.date||'').localeCompare(b.date||''));
  } else {
    list = [...list].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  }
  const items = list;
  if(!items.length){ box.innerHTML='<p class="empty" style="padding:20px">신청 내역이 없습니다.</p>'; return; }

  const amtOf = (e, sid) => { const s=(e.students||[]).find(x=>x.id===sid); return s? (e.mode==='refund'? -(s.amt||0) : (s.amt||0)) : null; };

  // 전체 학생 (학년→반→이름)
  const stuMap = new Map();
  items.forEach(e=>(e.students||[]).forEach(s=>{ if(!stuMap.has(s.id)) stuMap.set(s.id,{id:s.id,name:s.name,grade:s.grade,className:s.className}); }));
  const allStudents = [...stuMap.values()].sort((a,b)=>gradeNum(a.grade)-gradeNum(b.grade)||(a.className||'').localeCompare(b.className||'','ko')||(a.name||'').localeCompare(b.name||'','ko'));

  // 학년별 그룹
  const byGrade = {};
  allStudents.forEach(s=>{ const k=gradeLabel(s.grade); (byGrade[k]=byGrade[k]||[]).push(s); });
  const gradeKeys = Object.keys(byGrade).sort((a,b)=>{
    const na=parseInt(a,10)||99, nb=parseInt(b,10)||99; return na-nb || a.localeCompare(b,'ko');
  });
  // 기본: 모든 학년 펼침 (처음 열 때)
  if(Object.keys(allSheetOpenGrades).length===0){ gradeKeys.forEach(k=>allSheetOpenGrades[k]=true); }

  const colCount = items.length;
  // 그룹 헤더 행 (선생님/과목)
  let groupHeaderRow = '';
  if(allSheetGroupBy!=='none'){
    const spans = [];
    let cur=null, cnt=0;
    items.forEach(e=>{ const g=groupKey(e); if(g===cur){cnt++;} else { if(cur!==null) spans.push({g:cur,c:cnt}); cur=g; cnt=1; } });
    if(cur!==null) spans.push({g:cur,c:cnt});
    groupHeaderRow = `<tr style="background:#1d4d3d;color:#fff">
      <th style="padding:6px 10px;text-align:center;position:sticky;left:0;background:#1d4d3d;z-index:3">${allSheetGroupBy==='teacher'?'선생님':'과목'}</th>
      ${spans.map(sp=>`<th colspan="${sp.c}" style="padding:6px 10px;text-align:center;border-left:2px solid rgba(255,255,255,.3);font-weight:800">${esc(sp.g)} <span style="font-size:10px;opacity:.8;font-weight:400">(${sp.c})</span></th>`).join('')}
      <th style="position:sticky;right:0;background:#1d4d3d"></th>
    </tr>`;
  }

  // 영수증 열람 행
  const receiptRow = `<tr style="background:#e9f0ec">
    <th style="padding:5px 10px;text-align:center;position:sticky;left:0;background:#e9f0ec;z-index:3;font-size:11px;color:#5a7267">🧾 영수증</th>
    ${items.map(e=>`<th style="padding:5px 6px;text-align:center;border-left:1px solid #e2e8e5">${e.receiptCount?`<button class="bm" style="padding:3px 8px;font-size:11px" onclick="openReceiptsOf('${e.id}','${esc((e.subject||'').replace(/'/g,"\\'"))}')">${e.receiptCount}장 보기</button>`:'<span style="font-size:10px;color:var(--tl)">없음</span>'}</th>`).join('')}
    <th style="position:sticky;right:0;background:#e9f0ec"></th>
  </tr>`;

  // 항목 헤더(과목/담당/신청일/세부/1인당)
  const headRows = `
    <tr style="background:#2d6a4f;color:#fff">
      <th style="padding:7px 10px;text-align:center;position:sticky;left:0;background:#2d6a4f;z-index:3;min-width:110px">과목</th>
      ${items.map(e=>`<th style="padding:7px 10px;text-align:center;min-width:116px;border-left:1px solid rgba(255,255,255,.15);font-weight:800"><span style="font-size:9px;opacity:.85">${expenseSeqNo(e.id)}</span><br>${esc(e.subject)}${e.mode==='refund'?' <span style="font-size:10px;font-weight:400">(반환)</span>':''}</th>`).join('')}
      <th style="padding:7px 10px;text-align:center;min-width:88px;border-left:2px solid rgba(255,255,255,.3);position:sticky;right:0;background:#1d4d3d">개인합계</th>
    </tr>
    <tr style="background:#f4f8f6;color:#5a7267">
      <th style="padding:4px 10px;text-align:center;position:sticky;left:0;background:#f4f8f6;z-index:3;font-size:11px;font-weight:600">담당</th>
      ${items.map(e=>`<th style="padding:4px 10px;text-align:center;border-left:1px solid #e2e8e5;font-weight:400;font-size:11px">${esc(e.teacher||'-')}</th>`).join('')}
      <th style="position:sticky;right:0;background:#f4f8f6"></th>
    </tr>
    <tr style="background:#f4f8f6;color:#5a7267">
      <th style="padding:4px 10px;text-align:center;position:sticky;left:0;background:#f4f8f6;z-index:3;font-size:11px;font-weight:600">신청일</th>
      ${items.map(e=>`<th style="padding:4px 10px;text-align:center;border-left:1px solid #e2e8e5;font-weight:400;font-size:10.5px">${esc(e.date||'-')}</th>`).join('')}
      <th style="position:sticky;right:0;background:#f4f8f6"></th>
    </tr>
    <tr style="background:#f4f8f6;color:#5a7267">
      <th style="padding:4px 10px;text-align:center;position:sticky;left:0;background:#f4f8f6;z-index:3;font-size:11px;font-weight:600">세부내용</th>
      ${items.map(e=>`<th style="padding:4px 10px;text-align:center;border-left:1px solid #e2e8e5;font-weight:400;font-size:10.5px">${esc(e.items||'')}${e.detail?`<div style="opacity:.75">${esc(e.detail)}</div>`:''}</th>`).join('')}
      <th style="position:sticky;right:0;background:#f4f8f6"></th>
    </tr>
    <tr style="background:#e9f0ec;color:#3a5a48">
      <th style="padding:5px 10px;text-align:center;position:sticky;left:0;background:#e9f0ec;z-index:3;font-size:11px;font-weight:700">이름 \\ 1인당</th>
      ${items.map(e=>`<th style="padding:5px 10px;text-align:center;border-left:1px solid #e2e8e5;font-weight:700;font-size:11.5px">${e.mode==='refund'?'↩️ ':''}₩${won(Math.abs(e.per|| ((e.students||[]).find(s=>true)?.amt) || 0))}${e.mode==='equal'?'/인':''}</th>`).join('')}
      <th style="position:sticky;right:0;background:#e9f0ec"></th>
    </tr>`;

  // 학년 그룹별 학생 행
  const bodyRows = gradeKeys.map(gk=>{
    const studs = byGrade[gk];
    const open = !!allSheetOpenGrades[gk];
    // 학년 소계
    const gradeItemTotals = items.map(e=> studs.reduce((t,s)=>t+(amtOf(e,s.id)||0),0));
    const gradeGrand = gradeItemTotals.reduce((a,b)=>a+b,0);
    const headerTr = `<tr style="background:#e4ede8;cursor:pointer" onclick="toggleGradeRow('${gk.replace(/'/g,"\\'")}')">
      <td style="padding:7px 10px;font-weight:800;color:#1b4332;position:sticky;left:0;background:#e4ede8;z-index:2;text-align:left">
        <span style="display:inline-block;transition:transform .2s;transform:rotate(${open?90:0}deg)">▶</span> ${esc(gk)} <span style="font-size:11px;color:var(--tl);font-weight:400">(${studs.length}명)</span>
      </td>
      ${gradeItemTotals.map(t=>`<td style="padding:7px 10px;text-align:center;border-left:1px solid #e2e8e5;font-size:11px;color:#5a7267">${t?'₩'+won(Math.abs(t)):''}</td>`).join('')}
      <td style="padding:7px 10px;text-align:center;font-weight:900;color:#8a6410;background:#f7efd8;border-left:2px solid #e2e8e5;position:sticky;right:0">₩${won(gradeGrand)}</td>
    </tr>`;
    if(!open) return headerTr;
    const studentTrs = studs.map((s,ri)=>{
      let sum=0;
      const rowbg = ri%2?'#fafbfc':'#fff';
      const cells = items.map(e=>{
        const a = amtOf(e,s.id);
        if(a===null) return `<td style="padding:6px 10px;text-align:center;color:#d0d8d3;border-left:1px solid #e2e8e5;background:${rowbg}">·</td>`;
        sum+=a; const isRef=a<0;
        return `<td style="padding:6px 10px;text-align:center;border-left:1px solid #e2e8e5;background:${isRef?'#eef6f3':rowbg}">
          <span style="font-size:11px;color:${isRef?'#4a7a68':'#6b8579'};font-weight:500">${isRef?'−':''}₩${won(Math.abs(a))}</span></td>`;
      }).join('');
      return `<tr>
        <td style="padding:6px 10px 6px 26px;font-weight:600;color:#1b4332;position:sticky;left:0;background:${rowbg};z-index:1;text-align:left">${esc(s.name)} <span style="font-size:10px;color:var(--tl);font-weight:400">${esc(s.className||'')}</span></td>
        ${cells}
        <td style="padding:6px 10px;text-align:center;font-weight:900;color:#8a6410;background:#f7efd8;border-left:2px solid #e2e8e5;position:sticky;right:0">₩${won(sum)}</td>
      </tr>`;
    }).join('');
    return headerTr + studentTrs;
  }).join('');

  // 전체 항목 합계
  const footTr = `<tr style="background:#eef4f1;color:#1b4332;font-weight:800">
    <td style="padding:8px 10px;position:sticky;left:0;background:#eef4f1;z-index:2;text-align:left">전체 합계</td>
    ${items.map(e=>{ const t=allStudents.reduce((tt,s)=>tt+(amtOf(e,s.id)||0),0); return `<td style="padding:8px 10px;text-align:center;border-left:1px solid #d5e2db;color:#2f5c48">₩${won(Math.abs(t))}</td>`; }).join('')}
    <td style="padding:8px 10px;text-align:center;border-left:2px solid #d5e2db;position:sticky;right:0;background:#f0e4c4;color:#8a6410;font-weight:900">₩${won(allStudents.reduce((tt,s)=>tt+items.reduce((x,e)=>x+(amtOf(e,s.id)||0),0),0))}</td>
  </tr>`;

  box.innerHTML = `<table style="border-collapse:collapse;font-size:12px;min-width:100%">
    <thead style="position:sticky;top:0;z-index:4">${groupHeaderRow}${headRows}${receiptRow}</thead>
    <tbody>${bodyRows}</tbody>
    <tfoot>${footTr}</tfoot>
  </table>`;
}

function viewStudentDetail(sid){
  const list = EXPENSES.filter(e=>e.org===reportOrg && e.semester===reportSem);

  list.forEach(e=>{
    const s = (e.students||[]).find(x=>x.id===sid);
    if(s) items.push({date:e.date, subject:e.subject, mode:e.mode, amt:s.amt||0});

  const stu = (list.flatMap(e=>e.students||[]).find(x=>x.id===sid))||{};
  items.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const charge = items.filter(i=>i.mode!=='refund').reduce((t,i)=>t+i.amt,0);
  const refund = items.filter(i=>i.mode==='refund').reduce((t,i)=>t+i.amt,0);

  const mv = document.createElement('div'); mv.className='mov'; mv.id='stu-detail-mod';
  mv.innerHTML = `<div class="mbk" onclick="document.getElementById('stu-detail-mod').remove()"></div>
    <div class="mbox">
      <div class="mtitle">${esc(stu.name||'')} <span style="font-size:13px;color:var(--tl);font-weight:400">${esc(stu.className||'')}${stu.grade?' · '+esc(stu.grade):''}</span></div>
      <div class="msub">${esc(semKor(reportSem))} · 참여 ${items.length}건</div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr style="background:var(--iv);text-align:left">
            <th style="padding:8px">날짜</th><th style="padding:8px">수업</th><th style="padding:8px;text-align:right">금액</th>
          </tr></thead>
          <tbody>
            ${items.map(i=>`<tr style="border-bottom:1px solid var(--ivd)">
              <td style="padding:8px;color:var(--ts)">${esc(i.date)}</td>
              <td style="padding:8px">${esc(i.subject)}${i.mode==='refund'?' <span style="color:#0d9488;font-size:11px">(반환)</span>':''}</td>
              <td style="padding:8px;text-align:right;color:${i.mode==='refund'?'#0d9488':'var(--gm)'};font-weight:700">${i.mode==='refund'?'−':''}₩${won(i.amt)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div style="margin-top:12px;padding:12px;background:var(--iv);border-radius:8px;font-size:13.5px;line-height:1.8">
        <div style="display:flex;justify-content:space-between"><span>청구 합계</span><b style="color:var(--gm)">₩${won(charge)}</b></div>
        <div style="display:flex;justify-content:space-between"><span>반환 합계</span><b style="color:#0d9488">₩${won(refund)}</b></div>
        <div style="display:flex;justify-content:space-between;border-top:1px solid var(--ivd);margin-top:6px;padding-top:6px"><span style="font-weight:700">순 청구액</span><b style="color:var(--goldd);font-size:15px">₩${won(charge-refund)}</b></div>
      </div>
      <div class="mact"><button class="bs" onclick="document.getElementById('stu-detail-mod').remove()">닫기</button></div>
    </div>`;

  const date = $I('dep-date')?.value || '';

// JSZip 동적 로드
function ensureJSZip(){
  return new Promise((resolve, reject)=>{
    if(window.JSZip) return resolve();
    let sc = document.getElementById('jszip-script');
    if(sc){
      const chk = setInterval(()=>{ if(window.JSZip){ clearInterval(chk); resolve(); } }, 100);
      setTimeout(()=>{ clearInterval(chk); if(!window.JSZip) reject(new Error('압축 모듈 로드 실패')); }, 8000);
      return;
    }
    sc = document.createElement('script');
    sc.id = 'jszip-script';
    sc.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    sc.onload = ()=> resolve();
    sc.onerror = ()=> reject(new Error('압축 모듈을 불러올 수 없습니다.'));
    document.head.appendChild(sc);
  });
}

// 신청 가능 기간 저장
async function saveWindow(){
  const after = parseInt($I('cfg-after')?.value||'8',10);
  const before = parseInt($I('cfg-before')?.value||'14',10);
  if(isNaN(after)||isNaN(before)||after<0||before<0){ toast('올바른 숫자를 입력하세요.','err'); return; }
  EXP_WINDOW = {afterDays:after, beforeDays:before};
  try {
    await setDoc(doc(db,'expenseConfig','window'), EXP_WINDOW);
    toast('신청 가능 기간을 저장했습니다.','ok');
  } catch(e){ toast('저장 실패: '+e.message,'err'); }
}
window.saveWindow = saveWindow;

// 기관별 경비 관리자 추가/삭제
async function addManager(org){
  const sel = $I('mgr-sel-'+org);
  const uid = sel?.value;
  if(!uid){ toast('추가할 선생님을 선택하세요.','err'); return; }
  const cur = EXP_MANAGERS[org] || [];
  if(cur.includes(uid)) return;
  EXP_MANAGERS[org] = [...cur, uid];
  try {
    await setDoc(doc(db,'expenseConfig','managers'), EXP_MANAGERS);
    toast('관리자를 추가했습니다.','ok');
    renderBackup();
  } catch(e){ toast('저장 실패: '+e.message,'err'); }
}
window.addManager = addManager;

async function removeManager(org, uid){
  const cur = EXP_MANAGERS[org] || [];
  EXP_MANAGERS[org] = cur.filter(u=>u!==uid);
  try {
    await setDoc(doc(db,'expenseConfig','managers'), EXP_MANAGERS);
    toast('관리자를 해제했습니다.');
    renderBackup();
  } catch(e){ toast('저장 실패: '+e.message,'err'); }
}
window.removeManager = removeManager;

async function backupYear(){
  const y = $I('bk-year')?.value;
  if(!y) return;
  const list = backupAll.filter(e=>(e.date||'').startsWith(y));
  if(!list.length){ toast('해당 연도 데이터가 없습니다.','err'); return; }
  window.showLoading && window.showLoading(`${y}년 백업 준비 중…`);
  try {
    await ensureJSZip();
    const zip = new window.JSZip();

    // 원본 JSON
    const jsonData = list.map(e=>({...e, createdAt: e.createdAt?.seconds || null}));
    zip.file(`expenses_${y}.json`, JSON.stringify(jsonData, null, 2));

    // 엑셀용 CSV (UTF-8 BOM)
    const rows = [['날짜','학기','기관','방식','담당선생님','수업과목','구매목록','세부내용','총액','1인당','학생수','학교수량','학교청구','은행','계좌','예금주','작성자','영수증장수','학생명단(이름:금액)']];
    list.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    list.forEach(e=>{
      rows.push([
        e.date, e.semester?semKor(e.semester):'', ORGS[e.org]||e.org,
        e.mode==='refund'?'개별반환':e.mode==='indiv'?'개별청구':'균등(1/N)',
        e.teacher||'', e.subject, e.items, e.detail||'',
        e.total, e.per??'', e.count, e.schoolQty||0, e.schoolTotal||0,
        e.bank||'', e.account||'', e.holder||'', e.createdByName||'',
        e.receiptCount||0,
        (e.students||[]).map(s=>`${s.name}:${s.amt??e.per??''}`).join('; ')
      ]);
    });
    const csv = '\ufeff' + rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
    zip.file(`수행성경비_${y}.csv`, csv);

    // 영수증 이미지
    let done = 0;
    for(const e of list){
      const rs = await getDocs(query(collection(db,'expenseReceipts'), where('expenseId','==',e.id)));
      const arr = []; rs.forEach(d=>arr.push(d.data()));
      arr.sort((a,b)=>(a.idx||0)-(b.idx||0));
      arr.forEach(r=>{
        const b64 = (r.dataUrl||'').split(',')[1];
        if(b64){
          const safe = (e.subject||'').replace(/[\\/:*?"<>|]/g,'').slice(0,20);
          zip.file(`영수증/${e.date}_${safe}_${e.id.slice(0,6)}_${r.idx||1}.jpg`, b64, {base64:true});
        }
      });
      done++;
      window.setLoadStep && window.setLoadStep(`영수증 수집 중… (${done}/${list.length})`, 10 + Math.round(done/list.length*70));
    }

    window.setLoadStep && window.setLoadStep('ZIP 파일 생성 중…', 88);
    const blob = await zip.generateAsync({type:'blob'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `수행성경비_백업_${y}.zip`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
    window.hideLoading && window.hideLoading();
    toast(`${y}년 백업 파일을 다운로드했습니다. 파일이 잘 열리는지 확인하세요!`,'ok');
  } catch(e){
    window.hideLoading && window.hideLoading();
    toast('백업 실패: '+(e.message||''),'err');
  }
}
window.backupYear = backupYear;

async function deleteYear(){
  const y = $I('bk-year')?.value;
  const typed = $I('bk-del-year')?.value.trim();
  if(!y) return;
  if(typed !== y){
    toast(`삭제하려면 입력칸에 연도(${y})를 똑같이 입력하세요.`,'err');
    $I('bk-del-year')?.focus();
    return;
  }
  const list = backupAll.filter(e=>(e.date||'').startsWith(y));
  if(!list.length){ toast('해당 연도 데이터가 없습니다.','err'); return; }
  if(!confirm(`⚠️ ${y}년 수행성 경비 ${list.length}건과 영수증을 모두 삭제합니다.\n\n백업 파일을 먼저 다운로드하고 열어서 확인하셨나요?\n삭제하면 복구할 수 없습니다.\n\n정말 삭제할까요?`)) return;
  window.showLoading && window.showLoading(`${y}년 데이터 삭제 중…`);
  let done = 0;
  try {
    for(const e of list){
      const rs = await getDocs(query(collection(db,'expenseReceipts'), where('expenseId','==',e.id)));
      const dels = []; rs.forEach(d=>dels.push(deleteDoc(doc(db,'expenseReceipts',d.id))));
      await Promise.all(dels);
      await deleteDoc(doc(db,'expenses',e.id));
      done++;
      window.setLoadStep && window.setLoadStep(`삭제 중… (${done}/${list.length})`, Math.round(done/list.length*95));
    }
    window.hideLoading && window.hideLoading();
    toast(`${y}년 데이터 ${done}건을 삭제했습니다.`,'ok');
    renderBackup();
  } catch(err){
    window.hideLoading && window.hideLoading();
    toast(`삭제 중 오류: ${err.message||''} (${done}건은 삭제됨)`,'err');
    renderBackup();
  }
}
window.deleteYear = deleteYear;
