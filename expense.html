<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수행성 경비 · 교사 선교사</title>
<meta name="theme-color" content="#1E3932">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="stylesheet" href="theme.css">
<style>
:root {
  --gd:#1E3932; --gm:#00704A; --gl:#D4E9E2; --gp:#E8F3EF;
  --gold:#B08D3C; --goldd:#8A6410; --goldp:#F7EFD8;
  --iv:#F2F0EB; --ivd:#E3E1DA;
  --tx:#1F2320; --ts:#5A6560; --tl:#93A09A; --wh:#ffffff;
  --sh:0 2px 12px rgba(30,57,50,0.08); --r:12px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--iv);color:var(--tx);min-height:100vh;}

#gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#E8F3EF 0%,#F2F0EB 60%,#F7EFD8 100%);padding:24px;text-align:center;}
.gbox{background:var(--wh);border-radius:24px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(30,57,50,0.12);}
.gtitle{font-size:22px;font-weight:800;color:var(--gd);margin-bottom:8px;}
.gsub{font-size:14px;color:var(--ts);line-height:1.6;margin-bottom:20px;}
.gbtn{display:inline-block;width:100%;padding:14px;background:linear-gradient(135deg,#00704A,#1E3932);color:var(--wh);border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;}

#ms{display:none;flex-direction:column;width:100%;}
.ah{display:none;}
.pg-links{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.pg-link{padding:7px 14px;border-radius:8px;background:var(--wh);border:1px solid var(--ivd);color:var(--gm);font-size:13px;font-weight:600;text-decoration:none;}
.pg-link:hover{background:var(--gp);}
.ah{background:linear-gradient(135deg,#1E3932,#16302A);color:var(--wh);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.ahl{display:flex;align-items:center;gap:12px;}
.ahi{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.aht{font-size:16px;font-weight:700;}
.ahr{text-align:right;}
#hn{font-size:15px;font-weight:600;}
#hi{font-size:11px;opacity:.7;margin-top:2px;}
.homebtn{background:rgba(255,255,255,0.15);color:var(--wh);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;margin-top:4px;text-decoration:none;display:inline-block;}

.tc{padding:0;max-width:1100px;margin:0 auto;width:100%;}
.actitle{font-size:17px;font-weight:800;color:var(--gd);margin-bottom:6px;}
.adesc{font-size:13px;color:var(--ts);margin-bottom:14px;line-height:1.5;}
.acard{background:var(--wh);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px;}

.bp{background:linear-gradient(135deg,#00704A,#1E3932);color:var(--wh);border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.bs{background:var(--iv);color:var(--ts);border:1.5px solid var(--ivd);border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;}
.bm{background:var(--gp);color:var(--gm);border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}

.subtabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.subtbtn{padding:9px 18px;border-radius:100px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid var(--ivd);background:var(--wh);color:var(--ts);}
.subtbtn.on{background:var(--gm);color:var(--wh);border-color:var(--gm);}

.fgrp{display:flex;flex-direction:column;margin-bottom:12px;}
.fgrp label{font-size:12px;font-weight:700;color:var(--ts);margin-bottom:5px;}
.fgrp input,.fgrp select,.fgrp textarea{border:1.5px solid var(--ivd);border-radius:8px;padding:10px 12px;font-size:14px;background:var(--iv);outline:none;width:100%;font-family:inherit;}
.fgrp input{height:40px;padding:0 12px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:560px){.frow{grid-template-columns:1fr;}}

.empty{text-align:center;color:var(--tl);padding:30px;font-size:14px;}

/* 반 아코디언 */
.gr-card{border:1px solid var(--ivd);border-radius:12px;margin-bottom:8px;overflow:hidden;background:var(--wh);}
.gr-head{display:flex;align-items:center;gap:10px;padding:13px 15px;cursor:pointer;background:var(--iv);transition:background .12s;}
.gr-head:hover{background:var(--gp);}
.gr-arrow{font-size:12px;color:var(--tl);transition:transform .25s ease;}
.gr-card.open .gr-arrow{transform:rotate(180deg);}
.gr-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.gr-body-inner{padding:8px 12px 12px;}

/* 학생 체크 행 */
.stu-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--ivd);border-radius:9px;margin-bottom:6px;cursor:pointer;background:var(--wh);}
.stu-row:hover{border-color:var(--gm);background:var(--gp);}
.stu-row.checked{border-color:var(--gm);background:var(--gp);}
.stu-row.leave{opacity:.55;cursor:not-allowed;background:var(--iv);}
.stu-row.quit{background:var(--iv);border-style:dashed;}
.stu-row.quit .stu-name{color:var(--gray-tx);}
.stu-quit-divider{display:flex;align-items:center;gap:8px;margin:10px 0 7px;font-size:11.5px;font-weight:700;color:#9ca3af;}
.stu-quit-divider::before,.stu-quit-divider::after{content:'';flex:1;height:1px;background:#e2e0da;}
.stu-row input[type=checkbox]{width:17px;height:17px;accent-color:var(--gm);flex-shrink:0;cursor:pointer;}
.stu-row.leave input[type=checkbox]{cursor:not-allowed;}
.stu-name{font-size:14px;font-weight:700;color:var(--gd);}
.stu-meta{font-size:11.5px;color:var(--tl);}

/* 합계 바 */
.sumbar{position:sticky;bottom:12px;background:linear-gradient(135deg,#00704A,#1E3932);color:#fff;border-radius:12px;padding:13px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 6px 20px rgba(30,57,50,.35);margin-top:14px;}
.sumbar .si{font-size:13px;opacity:.85;}
.sumbar .sv{font-size:16px;font-weight:800;}

.mov{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
.mbk{position:absolute;inset:0;background:rgba(20,25,60,0.5);}
.mbox{position:relative;background:var(--wh);border-radius:16px;padding:24px;width:100%;max-width:640px;box-shadow:0 20px 60px rgba(0,0,0,0.3);margin:auto;}
.mtitle{font-size:18px;font-weight:800;color:var(--gd);margin-bottom:4px;}
.msub{font-size:13px;color:var(--ts);margin-bottom:16px;line-height:1.5;}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap;}

.clist{display:flex;flex-direction:column;gap:10px;}
.citem{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--wh);border:1px solid var(--ivd);border-radius:10px;flex-wrap:wrap;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gd);color:var(--wh);padding:12px 24px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#dc2626;} .toast.ok{background:var(--gm);}

/* 취합 표 공통 정돈 (화면용) */
.rp-tbl{border-collapse:collapse;font-size:12.5px;width:100%;}
.rp-tbl th,.rp-tbl td{border:1px solid var(--ivd);padding:8px 6px;text-align:center;vertical-align:middle;}
.rp-tbl thead th{background:var(--iv);font-weight:800;color:var(--gd);}
.rp-tbl tbody tr:nth-child(even){background:var(--iv);}
.rp-tbl .nm-cell{font-weight:700;color:var(--gd);}
.rp-tbl .sub-cell{color:var(--ts);font-size:11.5px;}
.rp-tbl tfoot td,.rp-tbl tfoot th{background:var(--iv);font-weight:800;}
/* 상세 매트릭스 표 (학년별·전체) */
.mx-tbl{border-collapse:collapse;font-size:12px;table-layout:fixed;font-variant-numeric:tabular-nums;}
.mx-tbl th,.mx-tbl td{border:1px solid #e2e8e5;padding:7px 6px;text-align:center;vertical-align:middle;word-break:break-word;overflow-wrap:break-word;}
.mx-tbl .mx-name{position:sticky;left:0;z-index:2;background:#2d6a4f;color:#fff;min-width:96px;width:96px;}
.mx-tbl .mx-item{min-width:118px;width:118px;}
.mx-tbl .mx-tot{position:sticky;right:0;z-index:2;min-width:116px;width:116px;}
.mx-tbl thead .mx-h{background:#2d6a4f;color:#fff;font-weight:800;border-color:#2d6a4f;}
.mx-tbl thead .mx-h2{background:var(--gp);color:#5a7267;font-weight:400;font-size:11px;}
.mx-tbl thead .mx-h3{background:var(--gp);color:#3a5a48;font-weight:700;}
.mx-tbl thead .mx-h.mx-tot{background:#8a6410;color:#fff;border-color:#7a5808;border-left:2.5px solid #7a5808;border-right:2.5px solid #7a5808;border-top:2.5px solid #7a5808;font-size:12px;letter-spacing:.5px;}
/* 회계식 금액 셀: ₩ 왼쪽 · 숫자 우측 · 좌우 여백 */
.mx-tbl td.mx-chg,.mx-tbl td.mx-ref,.mx-tbl td.mx-totcell,.mx-tbl tfoot td{padding:6px 0;}
.mx-tbl .mxacc{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:0 9px;white-space:nowrap;line-height:1.3;}
.mx-tbl .mxacc .s{flex:none;opacity:.7;font-weight:600;}
.mx-tbl .mxacc .n{flex:1;text-align:right;}
.mx-tbl td.mx-chg{color:#5a7568;font-weight:500;}
.mx-tbl td.mx-ref{background:#EBF4EF;color:#4a7a68;font-weight:500;}
.mx-tbl td.mx-empty{color:#d0d8d3;}
.mx-tbl .mx-namecell{font-weight:700;color:#1b4332;position:sticky;left:0;z-index:1;background:var(--wh);}
.mx-tbl tbody tr:nth-child(even) .mx-namecell{background:var(--iv);}
.mx-tbl tbody tr:nth-child(even) td{background:var(--iv);}
.mx-tbl tbody tr:nth-child(even) td.mx-ref{background:#EBF4EF;}
/* 개인합계 열 — 학부모 핵심. 크게·진하게·골드 아웃라인 */
.mx-tbl .mx-totcell{font-weight:900;color:#7a5808;background:#FBF3DC;position:sticky;right:0;z-index:1;font-size:13px;border-left:2.5px solid #7a5808;border-right:2.5px solid #7a5808;}
.mx-tbl .mx-totcell .mxacc{padding:0 11px;}
.mx-tbl .mx-totcell .mxacc .s{opacity:.85;}
.mx-tbl .mx-totcell .mxacc.neg .s,.mx-tbl .mx-totcell .mxacc.neg .n{color:#2d6a4f;}
.mx-tbl tbody tr:nth-child(even) td.mx-totcell{background:#F6EDCE;}
.mx-tbl tbody tr:last-child .mx-totcell{border-bottom:2.5px solid #7a5808;}
/* 항목합계 행 — 개인합계 열과 같은 골드 라인 */
.mx-tbl tfoot td,.mx-tbl tfoot .mx-namecell{background:#F5EFDD;font-weight:700;color:#8a6410;border-top:2.5px solid #7a5808;border-bottom:2.5px solid #7a5808;}
.mx-tbl tfoot .mx-namecell{background:#F0E4C4;font-weight:800;color:#7a5808;border-left:2.5px solid #7a5808;}
.mx-tbl tfoot .mx-totcell{background:#E7D3A0;color:#6a4d08;font-weight:900;font-size:13px;border:2.5px solid #7a5808;}

/* 영수증 크롭 편집기 */
#cropOverlay{position:fixed;inset:0;z-index:4000;display:none;flex-direction:column;background:rgba(15,18,40,0.92);padding:14px;}
#cropOverlay.show{display:flex;}
.crop-top{display:flex;align-items:center;justify-content:space-between;color:#fff;margin-bottom:10px;flex-shrink:0;}
.crop-top .ct-title{font-size:15px;font-weight:700;}
.crop-top .ct-count{font-size:12px;opacity:.7;}
.crop-stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0;}
.crop-canvas-wrap{position:relative;touch-action:none;}
#cropCanvas{max-width:100%;max-height:100%;display:block;border-radius:8px;background:#000;}
.crop-box{position:absolute;border:2px solid #fff;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);cursor:move;}
.crop-handle{position:absolute;width:22px;height:22px;background:rgba(255,255,255,0.95);border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4);}
.crop-handle.tl{top:-11px;left:-11px;cursor:nwse-resize;}
.crop-handle.tr{top:-11px;right:-11px;cursor:nesw-resize;}
.crop-handle.bl{bottom:-11px;left:-11px;cursor:nesw-resize;}
.crop-handle.br{bottom:-11px;right:-11px;cursor:nwse-resize;}
.crop-tools{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0;flex-shrink:0;}
.crop-btn{background:rgba(255,255,255,0.15);color:#fff;border:1.5px solid rgba(255,255,255,0.3);border-radius:8px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
.crop-btn:hover{background:rgba(255,255,255,0.25);}
.crop-btn.primary{background:#00704A;border-color:#00704A;}
.crop-btn.primary:hover{background:#008558;}
.crop-btn.ghost{background:transparent;}
.crop-actions{display:flex;gap:8px;justify-content:space-between;flex-shrink:0;}
</style>

  <div class="gbox">

</div>

<div id="ms">
  
  <div class="tc">
    <div class="subtabs">
      <button class="subtbtn on" id="tb-new" onclick="showTab('new')">➕ 경비 신청</button>
      <button class="subtbtn" id="tb-list" onclick="showTab('list')">📋 신청 내역</button>
      <button class="subtbtn" id="tb-report" onclick="showTab('report')">📊 취합</button>
      <button class="subtbtn" id="tb-backup" onclick="showTab('backup')" style="display:none">💾 백업·정리</button>

<div id="cropOverlay">

  </div>
  <div class="crop-stage">

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, addDoc, deleteDoc, query, where, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCtgr79jKqkec6HwqkxYNxSubWAhfEkM7g",
  authDomain: "daniel-amatz.firebaseapp.com",
  projectId: "daniel-amatz",
  storageBucket: "daniel-amatz.firebasestorage.app",
  messagingSenderId: "455744290312",
  appId: "1:455744290312:web:3ce7e7d3e58f6f1d185bbd",
  measurementId: "G-E91V0S88T8"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $I = id => document.getElementById(id);
const ORGS = {jihyebit:'지혜빛', daniel:'다니엘 아마츠'};
const pad = n => String(n).padStart(2,'0');
const won = n => (n==null||isNaN(n))?'-':Number(n).toLocaleString('ko-KR');
let CU = null;
let STUDENTS = [];

// 학년도(3월~익년 2월) 계산 — 자퇴생은 자퇴한 학년도까지만 청구 목록에 표시
function schoolYearOf(d){
  const t = (d instanceof Date) ? d : new Date(d);
  if(isNaN(t)) return 0;
  return t.getMonth() >= 2 ? t.getFullYear() : t.getFullYear() - 1;
}
// 자퇴/퇴원(quit) 학생을 목록에 보여줄지: 자퇴일이 이번 학년도이거나, 자퇴일 미입력이면 표시(청구 누락 방지)
function showQuitStu(s){
  if((s.status||'active') !== 'quit') return false;
  if(!s.quitDate) return true;
  return schoolYearOf(s.quitDate) >= schoolYearOf(new Date());
}
function quitBadge(s){
  if(!s.quitDate) return '자퇴';
  const t = new Date(s.quitDate);
  return isNaN(t) ? '자퇴' : `자퇴 ${t.getMonth()+1}/${t.getDate()}`;
}
let CLASSES = [];
let TERMS = [];              // 학기 일정 (attend와 동일 구조)
let EXP_WINDOW = { afterDays: 8, beforeDays: 14 };  // 입력 가능 기간 여유(슈퍼 조정)
let EXPENSES = [];
let listOrg = '';
let curTab = 'new';

function toast(msg, type=''){
  const t = $I('toast'); t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(window.__tt); window.__tt = setTimeout(()=>t.className='toast', 2500);
}
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
const isAdmin = () => CU && ['super','org_admin','tab_admin'].includes(CU.role);
// 이 기관의 경비 관리자인가 (슈퍼 포함)
function isExpManager(org){
  if(!CU) return false;
  if(CU.role==='super') return true;
  const mgrs = EXP_MANAGERS[org] || [];
  return mgrs.includes(CU.uid);
}
// 어느 기관이든 경비 관리자거나 슈퍼인가
function isAnyExpManager(){
  if(!CU) return false;
  if(CU.role==='super') return true;
  return myOrgs().some(o=>(EXP_MANAGERS[o]||[]).includes(CU.uid));
}
const myOrgs = () => CU.role==='super' ? ['jihyebit','daniel'] : (CU.orgs&&CU.orgs.length?CU.orgs:[CU.org]);
function todayYMD(){ const n=new Date(); return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`; }
// 반편성(class.html)과 동일하게 '올해 반'만 사용 — 연도 불일치로 자퇴생이 사라지던 문제 해결
function thisYearClasses(org){
  const y = new Date().getFullYear();
  return CLASSES.filter(c => c.org===org && (c.year || y) === y);
}

function studentGrade(sid){
  // 반(studentClass)과 같은 우선순위로 학년을 읽는다 — 반과 학년이 서로 다른 반에서 오는 혼선 방지
  const primary = studentClass(sid);
  if(primary && primary.grades && primary.grades[sid]) return primary.grades[sid];
  // 소속 반에 학년 기록이 없을 때만 다른 반 기록을 참조 (올해 반 우선)
  const y = new Date().getFullYear();
  const sorted = [...CLASSES].sort((a,b)=>((b.year||y)===y?1:0)-((a.year||y)===y?1:0));
  for(const c of sorted){
    if(c===primary) continue;
    if((c.students||[]).includes(sid) && c.grades && c.grades[sid]) return c.grades[sid];
  }
  return '';
}
// 특정 날짜에 휴학 중인지 (students.html의 leaves 배열과 동일 기준)
function isOnLeaveOn(s, dateStr){
  if(!s.leaves || !s.leaves.length) return false;
  return s.leaves.some(lv => lv.start && dateStr>=lv.start && (!lv.end || dateStr<=lv.end));
}
// 특정 날짜에 이미 자퇴했는지
function isQuitBy(s, dateStr){
  if((s.status||'active')!=='quit') return false;
  if(!s.quitDate) return false;          // 자퇴일 미입력이면 판단 보류(표시)
  return dateStr >= s.quitDate;
}
// 특정 날짜 기준 '청구 대상 재학생'인지 — 휴학/자퇴/졸업 제외
function isEnrolledOn(s, dateStr){
  const st = s.status||'active';
  if(st==='grad' || st==='egrad') return false;      // 졸업생 제외
  if(isQuitBy(s, dateStr)) return false;             // 그 날짜에 이미 자퇴
  if(isOnLeaveOn(s, dateStr)) return false;          // 그 날짜에 휴학 중
  return true;
}
function studentClass(sid){
  const y = new Date().getFullYear();
  return CLASSES.find(c=>(c.year||y)===y && (c.students||[]).includes(sid))
      || CLASSES.find(c=>(c.students||[]).includes(sid));
}
// 취합·엑셀·상세표 공통: 저장된 신청기록(s)의 학년/반을 현재 학생관리 기준으로 갱신
// (자퇴생 등도 학생관리에 반 배정이 있으면 그 학년으로 잡히도록)
function resolveGrade(s){
  return studentGrade(s.id) || s.grade || '';
}
function resolveClassName(s){
  const c = studentClass(s.id);
  return (c && c.name) || s.className || '';
}
// 1인당 금액: 총액÷인원 → 10원 단위 올림
function perAmount(total, n){
  if(!total || !n) return 0;
  return Math.ceil(total / n / 10) * 10;
}
// 반환용: 1인당 10원 단위 내림 (덜 반환 · 차액은 학교로)
function perRefund(total, n){
  if(!total || !n) return 0;
  return Math.floor(total / n / 10) * 10;
}

// ── 학기 관련 헬퍼 ──
const TERM_NAMES = {1:'1학기', 2:'2학기'};
function orgTerms(org){
  return TERMS.filter(t=>t.org===org && t.start && t.end)
    .sort((a,b)=> (a.year-b.year) || (a.term-b.term));
}
// 특정 날짜가 속한 학기 (없으면 null)
function termOfDate(dateStr, org){
  return orgTerms(org).find(t=>dateStr>=t.start && dateStr<=t.end) || null;
}
// 학기 키: "2026-1"
function termKey(t){ return t ? `${t.year}-${t.term}` : ''; }
function termLabel(t){ return t ? `${t.year}년 ${TERM_NAMES[t.term]||t.term+'학기'}` : ''; }
// "2026-1" → "2026년 1학기"
function semKor(key){ if(!key) return ''; const [y,t]=String(key).split('-'); return `${y}년 ${TERM_NAMES[t]||t+'학기'}`; }
// 날짜에 N일 더하기
function addDays(dateStr, n){
  const d = new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+n);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
// 오늘 기준 '입력 가능한 학기' 판정
// 1) 오늘이 어떤 학기 기간(+afterDays 여유) 안이면 그 학기
// 2) 아니면, 다음 학기 시작 -beforeDays 안이면 다음 학기 (방학 중 다음 학기 입력)
// 반환: {term, editable:true} | {term:가장가까운, editable:false} | null(학기없음)
function currentInputTerm(org){
  const today = todayYMD();
  const list = orgTerms(org);
  if(!list.length) return null;
  // 진행 중 학기 (+afterDays 여유까지 입력 허용)
  for(const t of list){
    if(today >= t.start && today <= addDays(t.end, EXP_WINDOW.afterDays)){
      return {term:t, editable:true};
    }
  }
  // 다음 학기 (시작 -beforeDays 부터 입력 허용)
  const upcoming = list.filter(t=>t.start > today).sort((a,b)=>a.start.localeCompare(b.start));
  if(upcoming.length){
    const nxt = upcoming[0];
    if(today >= addDays(nxt.start, -EXP_WINDOW.beforeDays)){
      return {term:nxt, editable:true};
    }
    return {term:nxt, editable:false}; // 아직 입력 기간 아님
  }
  // 지난 학기만 있음
  const last = list[list.length-1];
  return {term:last, editable:false};
}

// ── 영수증: 자동 압축 (긴 변 1000px, 700KB 초과 시 추가 압축) ──
function compressImage(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        // 영수증 글자 보존: QHD(2560px)·고품질 우선, 용량 초과 시
        // 품질은 0.65까지만 낮추고(글자 보호) 그다음은 해상도를 한 단계씩 낮춤
        const SIZES = [2560, 2048, 1920, 1600];
        const CAP = 700*1024;
        let data = '';
        for(const MAX of SIZES){
          let w = img.width, h = img.height;
          if(Math.max(w,h) > MAX){ const r = MAX/Math.max(w,h); w = Math.round(w*r); h = Math.round(h*r); }
          const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
          cv.getContext('2d').drawImage(img, 0, 0, w, h);
          let q = 0.85;
          data = cv.toDataURL('image/jpeg', q);
          while(data.length > CAP && q > 0.65){ q -= 0.07; data = cv.toDataURL('image/jpeg', q); }
          if(data.length <= CAP) break;
        }
        // 극단적 초과 대비 최후 안전망
        if(data.length > CAP){
          const cv = document.createElement('canvas');
          const r = 1600/Math.max(img.width, img.height, 1600);
          cv.width = Math.round(img.width*Math.min(r,1)); cv.height = Math.round(img.height*Math.min(r,1));
          cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
          let q = 0.6;
          data = cv.toDataURL('image/jpeg', q);
          while(data.length > CAP && q > 0.4){ q -= 0.07; data = cv.toDataURL('image/jpeg', q); }
        }
        resolve(data);
      };
      img.onerror = () => reject(new Error('이미지를 읽을 수 없습니다.'));
      img.src = ev.target.result;
    };
    reader.onerror = () => reject(new Error('파일을 읽을 수 없습니다.'));
    reader.readAsDataURL(file);
  });
}

async function onReceiptPick(e){
  const files = Array.from(e.target.files || []);
  if(!files.length) return;
  if(existingReceipts.length + receipts.length + files.length > 10){
    toast(`영수증은 최대 10장까지입니다. (현재 ${existingReceipts.length + receipts.length}장)`,'err');
    e.target.value = '';
    return;
  }
  e.target.value = '';
  // 파일을 이미지로 읽어서 크롭 큐에 넣기
  cropQueue = [];
  for(const f of files){
    try {
      const dataUrl = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(new Error('read fail')); r.readAsDataURL(f); });
      cropQueue.push(dataUrl);
    } catch(err){}
  }
  cropIndex = 0;
  startCropForCurrent();
}

// ── 크롭 편집기 ──
function startCropForCurrent(){
  if(cropIndex >= cropQueue.length){
    // 모두 끝 → 렌더
    hideCrop();
    renderReceipts();
    return;
  }
  cropRotation = 0;
  const img = new Image();
  img.onload = () => {
    try {
      cropImg = img;
      showCrop();               // 먼저 오버레이를 보이게 (stage 크기 확보)
      requestAnimationFrame(()=>{ try { drawCropCanvas(); } catch(err){ console.error('crop draw', err); toast('편집 화면 오류: '+(err.message||''),'err'); } });
    } catch(err){ console.error(err); toast('편집 오류: '+(err.message||''),'err'); }
  };
  img.onerror = () => { toast('이미지 형식을 열 수 없어요. HEIC 사진은 JPG로 올려주세요.','err'); cropIndex++; startCropForCurrent(); };
  try { img.src = cropQueue[cropIndex]; }
  catch(err){ toast('이미지를 불러올 수 없습니다.','err'); cropIndex++; startCropForCurrent(); }
}

function showCrop(){
  const ov = $I('cropOverlay'); if(ov) ov.classList.add('show');

}

// 회전 반영해서 캔버스에 그림, 박스 초기화
function drawCropCanvas(){
  const canvas = $I('cropCanvas'); if(!canvas || !cropImg) return;
  // 회전 후 원본 크기
  let iw = cropImg.naturalWidth, ih = cropImg.naturalHeight;
  const rot = cropRotation % 360;
  const swap = (rot===90 || rot===270);
  const srcW = swap ? ih : iw, srcH = swap ? iw : ih;
  // 화면에 맞춰 스케일 (스테이지 크기 기준, 0이면 window 기준 fallback)
  const stage = document.querySelector('.crop-stage');
  let stageW = stage?.clientWidth || 0;
  let stageH = stage?.clientHeight || 0;
  if(stageW < 40) stageW = Math.min(window.innerWidth - 28, 900);
  if(stageH < 40) stageH = Math.max(240, window.innerHeight - 220);
  const maxW = Math.max(120, stageW - 8);
  const maxH = Math.max(120, stageH - 8);
  let scale = Math.min(maxW/srcW, maxH/srcH, 1);
  if(!isFinite(scale) || scale<=0) scale = Math.min(600/srcW, 400/srcH) || 0.5;
  const cw = Math.round(srcW*scale), ch = Math.round(srcH*scale);
  canvas.width = cw; canvas.height = ch;
  cropCanvasSize = {w:cw, h:ch};
  const ctx = canvas.getContext('2d');
  ctx.save();
  ctx.clearRect(0,0,cw,ch);
  ctx.translate(cw/2, ch/2);
  ctx.rotate(rot*Math.PI/180);
  // 회전 기준 원본을 중앙에 그림
  const dw = iw*scale, dh = ih*scale;
  ctx.drawImage(cropImg, -dw/2, -dh/2, dw, dh);
  ctx.restore();
  // 박스 전체로 초기화
  cropBox = {x:0, y:0, w:cw, h:ch};
  layoutCropBox();
}

function layoutCropBox(){
  const wrap = $I('crop-wrap'), box = $I('crop-box'), canvas = $I('cropCanvas');
  if(!wrap || !box || !canvas) return;
  // wrap을 캔버스 크기에 맞춤
  wrap.style.width = canvas.width+'px';
  wrap.style.height = canvas.height+'px';
  box.style.left = cropBox.x+'px';
  box.style.top = cropBox.y+'px';
  box.style.width = cropBox.w+'px';
  box.style.height = cropBox.h+'px';
}

function cropRotate(){ cropRotation = (cropRotation+90)%360; drawCropCanvas(); }

function cropReset(){ cropBox = {x:0,y:0,w:cropCanvasSize.w,h:cropCanvasSize.h}; layoutCropBox(); }
window.cropReset = cropReset;

// 자동 여백 제거: 밝은 배경 감지해서 내용 경계 찾기
function cropAuto(){
  const canvas = $I('cropCanvas'); if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const {width:w, height:h} = canvas;
  let data;
  try { data = ctx.getImageData(0,0,w,h).data; } catch(e){ toast('자동 감지를 사용할 수 없습니다.','err'); return; }
  // 밝기 임계값: 밝으면 배경으로 간주
  const TH = 218;
  const isContent = (x,y)=>{
    const i=(y*w+x)*4;
    const bright = 0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
    return bright < TH;
  };
  let minX=w, minY=h, maxX=0, maxY=0, found=false;
  const step = Math.max(1, Math.floor(Math.min(w,h)/300)); // 성능
  for(let y=0;y<h;y+=step){
    for(let x=0;x<w;x+=step){
      if(isContent(x,y)){ found=true; if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y; }
    }
  }
  if(!found){ toast('내용을 감지하지 못했어요. 수동으로 조정해주세요.','err'); return; }
  // 약간의 여백(패딩) 남기기
  const pad = Math.round(Math.min(w,h)*0.015);
  minX=Math.max(0,minX-pad); minY=Math.max(0,minY-pad);
  maxX=Math.min(w,maxX+pad); maxY=Math.min(h,maxY+pad);
  cropBox = {x:minX, y:minY, w:maxX-minX, h:maxY-minY};
  layoutCropBox();
  toast('여백을 자동으로 감지했어요. 필요하면 조정하세요.','ok');
}
window.cropAuto = cropAuto;

// 크롭 적용 → 압축 후 receipts에 추가
async function cropApply(){
  const canvas = $I('cropCanvas'); if(!canvas){ cropSkip(); return; }
  // 박스 영역을 잘라서 새 캔버스에
  const sx = Math.max(0, Math.round(cropBox.x));
  const sy = Math.max(0, Math.round(cropBox.y));
  const sw = Math.min(canvas.width-sx, Math.round(cropBox.w));
  const sh = Math.min(canvas.height-sy, Math.round(cropBox.h));
  if(sw<=4 || sh<=4){ toast('선택 영역이 너무 작아요.','err'); return; }
  const out = document.createElement('canvas'); out.width=sw; out.height=sh;
  out.getContext('2d').drawImage(canvas, sx, sy, sw, sh, 0, 0, sw, sh);
  // 압축 (최대 1000px, 700KB 이하)
  const data = compressCanvas(out);
  receipts.push(data);
  cropIndex++;
  startCropForCurrent();
  if(cropIndex >= cropQueue.length) hideCrop();
}
window.cropApply = cropApply;

function cropSkip(){
  // 크롭 없이 원본 압축
  if(cropImg){
    const c = document.createElement('canvas');
    let iw=cropImg.naturalWidth, ih=cropImg.naturalHeight;
    const MAX=2560; let scale=Math.min(MAX/Math.max(iw,ih),1);   // 크롭 원본을 고해상도로 유지 (글자 보존)
    c.width=Math.round(iw*scale); c.height=Math.round(ih*scale);
    c.getContext('2d').drawImage(cropImg,0,0,c.width,c.height);
    receipts.push(compressCanvas(c));
  }
  cropIndex++;
  startCropForCurrent();
  if(cropIndex >= cropQueue.length) hideCrop();
}
window.cropSkip = cropSkip;

// 캔버스 → JPEG dataURL (700KB 이하)
function compressCanvas(cv){
  // 크롭 결과도 글자 보존: 품질 0.65까지만 낮추고, 그다음 해상도 단계 하향
  const SIZES = [2560, 2048, 1920, 1600];
  const CAP = 700*1024;
  let data = '';
  for(const MAX of SIZES){
    let src = cv;
    if(Math.max(cv.width, cv.height) > MAX){
      const r = MAX/Math.max(cv.width, cv.height);
      const c2 = document.createElement('canvas');
      c2.width = Math.round(cv.width*r); c2.height = Math.round(cv.height*r);
      c2.getContext('2d').drawImage(cv,0,0,c2.width,c2.height);
      src = c2;
    }
    let q = 0.85;
    data = src.toDataURL('image/jpeg', q);
    while(data.length > CAP && q > 0.65){ q -= 0.07; data = src.toDataURL('image/jpeg', q); }
    if(data.length <= CAP) return data;
  }
  return data;
}

// ── 크롭 박스 드래그/리사이즈 ──
(function initCropDrag(){
  let mode=null, start=null, orig=null, handle=null;
  function pt(e){ const t=e.touches?e.touches[0]:e; return {x:t.clientX, y:t.clientY}; }
  function onDown(e){
    const box=$I('crop-box'); if(!box) return;
    const h = e.target.getAttribute && e.target.getAttribute('data-h');
    if(h){ mode='resize'; handle=h; }
    else if(e.target===box){ mode='move'; }
    else return;
    start = pt(e); orig = {...cropBox};
    e.preventDefault();
  }
  function onMove(e){
    if(!mode) return;
    const p = pt(e); const dx=p.x-start.x, dy=p.y-start.y;
    const CW=cropCanvasSize.w, CH=cropCanvasSize.h;
    let b={...orig};
    if(mode==='move'){
      b.x=Math.max(0,Math.min(CW-b.w, orig.x+dx));
      b.y=Math.max(0,Math.min(CH-b.h, orig.y+dy));
    } else {
      if(handle.includes('l')){ const nx=Math.max(0,Math.min(orig.x+orig.w-20, orig.x+dx)); b.w=orig.w+(orig.x-nx); b.x=nx; }
      if(handle.includes('r')){ b.w=Math.max(20,Math.min(CW-orig.x, orig.w+dx)); }
      if(handle.includes('t')){ const ny=Math.max(0,Math.min(orig.y+orig.h-20, orig.y+dy)); b.h=orig.h+(orig.y-ny); b.y=ny; }
      if(handle.includes('b')){ b.h=Math.max(20,Math.min(CH-orig.y, orig.h+dy)); }
    }
    cropBox=b; layoutCropBox();
    e.preventDefault();
  }
  function onUp(){ mode=null; }
  document.addEventListener('mousedown', e=>{ if($I('cropOverlay')?.classList.contains('show')) onDown(e); });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchstart', e=>{ if($I('cropOverlay')?.classList.contains('show')) onDown(e); }, {passive:false});
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend', onUp);
})();

  const palette = ['#0891b2','#7c3aed','#db2777','#d97706','#059669','#2563eb','#dc2626','#4f46e5','#0d9488','#c026d3'];
  let html = '';
  const groups = classes.map(c=>({key:c.id, name:c.name||'(이름없음)', gradeLabel:c.__gi.label, ids:(c.students||[])}));
  if(noClass.length) groups.push({key:'__noclass', name:'반 미지정', gradeLabel:'', ids:noClass.map(s=>s.id)});

  groups.forEach((grp,gi)=>{
    // 이 반 학생들 (자퇴생은 이번 학년도까지 별도 분류로 포함)

      if(card){ const body=card.querySelector('.gr-body'); const inner=card.querySelector('.gr-body-inner'); if(body&&inner) body.style.maxHeight='none'; }
    }
  });
}

  const willOpen = !openCls[key];
  openCls[key] = willOpen;
  const card = document.querySelector(`.gr-card[data-cls="${cssEsc(key)}"]`);

function toggleStu(sid){
  if(expMode === 'group'){
    // 그룹 균등: 활성 그룹으로 배정 / 같은 그룹이면 해제 / 다른 그룹이면 이동
    const cur = groupOf(sid);
    if(cur === activeGroup){
      expGroups[cur].ids = expGroups[cur].ids.filter(x=>x!==sid);
      checkedIds.delete(sid);
    } else {
      if(cur !== null) expGroups[cur].ids = expGroups[cur].ids.filter(x=>x!==sid);
      expGroups[activeGroup].ids.push(sid);
      checkedIds.add(sid);
    }
    renderGroupBar();
    renderClassChecks();
    refreshSum();
    return;
  }
  if(checkedIds.has(sid)) checkedIds.delete(sid);
  else checkedIds.add(sid);
  // 행 UI 갱신
  const row = document.querySelector(`.stu-row[data-sid="${sid}"]`);
  if(row){
    const cb = row.querySelector('input[type=checkbox]');
    const on = checkedIds.has(sid);
    if(cb) cb.checked = on;
    row.classList.toggle('checked', on);
    const ai = row.querySelector('.amt-in');
    if(ai) ai.style.display = ((expMode==='indiv'||expMode==='refund') && on) ? '' : 'none';
  }
  refreshClsCounts();
  refreshSum();
}
window.toggleStu = toggleStu;

function clsAll(key, on){
  // 그 반의 '신청 날짜 기준 재학생' 전체 선택/해제 (휴학/자퇴 제외)
  const reqDate = $I('ex-date')?.value || todayYMD();
  let ids = [];
  if(key==='__noclass'){
    const inClassIds = new Set(); thisYearClasses(expOrg).forEach(c=>(c.students||[]).forEach(id=>inClassIds.add(id)));
    ids = STUDENTS.filter(s=>s.org===expOrg && isEnrolledOn(s, reqDate) && !inClassIds.has(s.id)).map(s=>s.id);
  } else {
    const c = CLASSES.find(x=>x.id===key);
    ids = (c?.students||[]).filter(id=>{
      const s = STUDENTS.find(x=>x.id===id);
      return s && isEnrolledOn(s, reqDate);
    });
  }
  if(expMode === 'group'){
    ids.forEach(id=>{
      const cur = groupOf(id);
      if(on){
        if(cur !== null && cur !== activeGroup) expGroups[cur].ids = expGroups[cur].ids.filter(x=>x!==id);
        if(cur !== activeGroup) expGroups[activeGroup].ids.push(id);
        checkedIds.add(id);
      } else {
        if(cur !== null) expGroups[cur].ids = expGroups[cur].ids.filter(x=>x!==id);
        checkedIds.delete(id);
      }
    });
    renderGroupBar();
  } else {
    ids.forEach(id=>{ if(on) checkedIds.add(id); else checkedIds.delete(id); });
  }
  renderClassChecks();
  refreshSum();
}
window.clsAll = clsAll;

function refreshSum(){
  const n = checkedIds.size;
  // 그룹 균등: 그룹별 합산
  if(expMode==='group'){
    let sum = 0; const parts = [];
    expGroups.forEach((g,i)=>{
      if(!g.ids.length) return;
      const per = g.total>0 ? perAmount(g.total, g.ids.length) : 0;
      sum += per * g.ids.length;
      parts.push(`${GRP_STYLE[i].l} ${g.ids.length}명${per?`×₩${won(per)}`:''}`);
    });
    $I('sum-count').textContent = n ? `${n}명 (${parts.join(' · ')})` : '-';
    $I('sum-per').textContent = '그룹별';
    $I('sum-total').textContent = sum ? '₩'+won(sum) : '-';
    const sg = $I('sum-school'); if(sg) sg.textContent = '-';
    return;
  }
  // 균등 반환: 총액 ÷ (학생수+선생님수), 1인당 내림, 차액은 학교로
  if(expMode==='refundeq'){
    const sq = parseInt($I('ex-schoolqty')?.value||'0',10) || 0;
    const total = parseInt($I('ex-total')?.value||'0',10) || 0;
    const divisor = n + sq;
    const per = perRefund(total, divisor);
    const stuSum = per * n;
    const teacherSum = total - stuSum;   // 선생님(학교) 반환 = 나머지 전부
    $I('sum-count').textContent = n+'명' + (sq?` + 선생님 ${sq}`:'');
    $I('sum-per').textContent = (divisor&&total) ? '₩'+won(per)+' (내림)' : '-';
    $I('sum-total').textContent = (n&&total&&divisor) ? '↩️ ₩'+won(stuSum) : '-';
    const se = $I('sum-school');
    if(se) se.textContent = (total&&divisor) ? '₩'+won(teacherSum) : '-';
    return;
  }
  // 개별 모드: 개별 금액 합산
  if(expMode!=='equal'){
    let sum = 0;
    checkedIds.forEach(id=>{ const a=indivAmts[id]; if(a>0) sum+=a; });
    $I('sum-count').textContent = n+'명';
    $I('sum-per').textContent = '개별';
    $I('sum-total').textContent = n ? (expMode==='refund'?'↩️ ':'')+'₩'+won(sum) : '-';
    const se0 = $I('sum-school'); if(se0) se0.textContent = '-';
    return;
  }
  const sq = parseInt($I('ex-schoolqty')?.value||'0',10) || 0;
  const total = parseInt($I('ex-total')?.value||'0',10) || 0;
  const divisor = n + sq;
  const per = perAmount(total, divisor);
  $I('sum-count').textContent = n+'명' + (sq?` + 학교 ${sq}`:'');
  $I('sum-per').textContent = (divisor&&total) ? '₩'+won(per) : '-';
  $I('sum-total').textContent = (n&&total&&divisor) ? '₩'+won(per*n) : '-';
  const se = $I('sum-school');
  if(se) se.textContent = (sq&&total&&divisor) ? '₩'+won(per*sq) : '-';
}

  window.showLoading && window.showLoading('영수증 정리 중…');
  let delCnt = 0;
  try {
    for(let i=0;i<list.length;i++){
      window.setLoadStep && window.setLoadStep(`정리 중… (${i+1}/${list.length})`, Math.round((i+1)/list.length*100));
      const e = list[i];
      try {
        const snap = await getDocs(query(collection(db,'expenseReceipts'), where('expenseId','==',e.id)));
        for(const d of snap.docs){ await deleteDoc(doc(db,'expenseReceipts',d.id)); delCnt++; }
        await updateDoc(doc(db,'expenses',e.id), { receiptsCleared: true, receiptsClearedAt: Timestamp.now() });
      } catch(e2){}
    }
    window.hideLoading && window.hideLoading();
    toast(`정리 완료 — 영수증 ${delCnt}장 삭제 (내역은 보존)`,'ok');
    if(window.logActivity) logActivity('삭제','영수증 아카이브 정리', `${ORGS[org]||org} ${year}학년도`, `영수증 ${delCnt}장`);

    toast('정리 실패: '+(e.message||''),'err');
  }
}

  const uids = [...new Set(toUids)].filter(Boolean);
  if(!uids.length) return;
  const toNames = uids.map(u=>STAFF.find(s=>s.uid===u)?.name||'?');
  try {
    await addDoc(collection(db,'messages'), {
      
      category: category || 'expense',
      fromUid: CU.uid, fromName: CU.name||'', fromOrg: CU.org||'',
      toUids: uids, toNames, subject, body,
      readBy: [], createdAt: Timestamp.now()
    });
  } catch(e){ console.error('쪽지 발송 실패', e); }
}

    '말씀 암송 선포 책자',

          관리자가 확인하기 쉽고 정산이 투명해집니다. 아래에서 해당하는 사유를 선택해 주세요.
        </p>
        <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:16px">
          ${reasons.map((r,i)=>`
            <label style="display:flex;align-items:center;gap:9px;padding:11px 13px;border:1.5px solid var(--ivd);border-radius:10px;cursor:pointer;font-size:14px">
              <input type="radio" name="rcpt-reason" value="${esc(r)}" ${i===0?'checked':''} style="width:16px;height:16px">

function closeNoReceiptGuide(){ const h=$I('noRcptHolder'); if(h) h.remove(); }
window.closeNoReceiptGuide = closeNoReceiptGuide;
function confirmNoReceipt(){
  const sel = document.querySelector('input[name="rcpt-reason"]:checked');
  receiptExemptReason = sel ? sel.value : '영수증 없음';
  receiptExempt = true;
  closeNoReceiptGuide();
  submitExpense();  // 다시 제출 (이번엔 receiptExempt=true라 통과)
}
window.confirmNoReceipt = confirmNoReceipt;

// ── 신청 확인 카드 모달 (Promise) ──
// info: {title, date, semester, teacher, subject, amountLabel, amount, rows:[{k,v}], note}
function confirmCard(info){
  return new Promise(resolve=>{
    const rows = (info.rows||[]).map(r=>`
      <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--iv);font-size:13.5px">
        <span style="color:var(--tl)">${esc(r.k)}</span>
        <span style="color:var(--ink);font-weight:600;text-align:right">${r.v}</span>
      </div>`).join('');
    const html = `
      <div class="modal-back" style="position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:9000;padding:20px">
        <div style="background:var(--wh);border-radius:18px;max-width:400px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.3)">
          <div style="font-size:18px;font-weight:800;color:var(--gd);margin-bottom:4px">${esc(info.title||'신청 확인')}</div>
          <div style="font-size:12.5px;color:var(--tl);margin-bottom:16px">아래 내용으로 신청합니다. 확인해 주세요.</div>

          <div style="background:linear-gradient(135deg,var(--gp),var(--iv));border-radius:14px;padding:18px 16px;text-align:center;margin-bottom:16px">
            <div style="font-size:12px;color:var(--gm);font-weight:700;margin-bottom:2px">${esc(info.amountLabel||'청구 금액')}</div>
            <div style="font-size:30px;font-weight:800;color:var(--gm);letter-spacing:.5px">₩${info.amount}</div>
            ${info.amountSub?`<div style="font-size:12px;color:var(--ts);margin-top:4px">${info.amountSub}</div>`:''}
          </div>

          <div style="margin-bottom:18px">
            ${info.date?`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--iv);font-size:13.5px"><span style="color:var(--tl)">신청 날짜</span><span style="color:var(--ink);font-weight:600">${esc(info.date)}</span></div>`:''}
            ${info.subject?`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--iv);font-size:13.5px"><span style="color:var(--tl)">수업 과목</span><span style="color:var(--ink);font-weight:600">${esc(info.subject)}</span></div>`:''}
            ${info.teacher?`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--iv);font-size:13.5px"><span style="color:var(--tl)">담당 선생님</span><span style="color:var(--ink);font-weight:600">${esc(info.teacher)}</span></div>`:''}
            ${rows}
            ${info.note?`<div style="margin-top:12px;padding:10px 12px;background:var(--warn-bg);color:var(--warn);border-radius:9px;font-size:12.5px;line-height:1.5">${info.note}</div>`:''}
          </div>

          <div style="display:flex;gap:8px">
            <button class="bs" id="cc-cancel" style="flex:1">취소</button>
            <button class="bp" id="cc-ok" style="flex:1.4">신청하기</button>
          </div>
        </div>
      </div>`;
    const holder = document.createElement('div');
    holder.innerHTML = html;
    document.body.appendChild(holder);
    const done = (v)=>{ holder.remove(); resolve(v); };
    holder.querySelector('#cc-cancel').onclick = ()=>done(false);
    holder.querySelector('#cc-ok').onclick = ()=>done(true);
    holder.querySelector('.modal-back').onclick = (e)=>{ if(e.target.classList.contains('modal-back')) done(false); };
  });
}

async function submitExpense(){
  const date = $I('ex-date')?.value || '';
  const semester = $I('ex-semester')?.value || '';
  if(isLocked(expOrg, semester)){ toast(`🔒 잠긴 학기입니다 (${semKor(semester)}). 이 학기에는 신청·수정할 수 없습니다. 수퍼관리자가 취합에서 잠금을 해제해야 합니다.`,'err'); return; }
  const teacher = $I('ex-teacher')?.value.trim() || '';
  const subject = $I('ex-subject')?.value.trim() || '';
  const items = $I('ex-items')?.value.trim() || '';
  const detail = $I('ex-detail')?.value.trim() || '';
  const total = parseInt($I('ex-total')?.value||'0',10) || 0;
  const bank = $I('ex-bank')?.value.trim() || '';
  const holder = $I('ex-holder')?.value.trim() || '';
  const account = $I('ex-account')?.value.trim() || '';
  const schoolNote = $I('ex-school')?.value.trim() || '';
  const teacherRefund = (expMode==='refund') ? (parseInt($I('ex-teacher-refund')?.value||'0',10) || 0) : 0;
  const teacherRefundNote = (expMode==='refund') ? ($I('ex-teacher-refund-note')?.value.trim() || '') : '';
  const ids = Array.from(checkedIds);

  if(!date){ toast('신청 날짜를 입력하세요.','err'); return; }
  if(!semester){ toast('학기가 없습니다. 출석부 설정에서 학기를 먼저 등록하세요.','err'); return; }
  if(!teacher){ toast('선생님(담당)을 입력하세요.','err'); $I('ex-teacher')?.focus(); return; }
  if(!subject){ toast('수업 과목을 입력하세요.','err'); $I('ex-subject')?.focus(); return; }
  if(!items){ toast('구매 목록을 입력하세요.','err'); $I('ex-items')?.focus(); return; }
  if(!ids.length){ toast('참여 학생을 1명 이상 체크하세요.','err'); return; }
  const hasReceipt = (existingReceipts.length + receipts.length) >= 1;
  if(!hasReceipt && !receiptExempt){
    // 영수증 없이 진행하려 할 때: 안내 모달 표시 후 확인받기
    showNoReceiptGuide();
    return;
  }

  let record;
  if(expMode==='equal'){
    // ── 균등 청구 (1/N) ──
    if(!total || total<=0){ toast('청구 금액을 입력하세요.','err'); $I('ex-total')?.focus(); return; }
    const sq = parseInt($I('ex-schoolqty')?.value||'0',10) || 0;
    const divisor = ids.length + sq;
    const per = perAmount(total, divisor);
    const students = ids.map(id=>{
      const s = STUDENTS.find(x=>x.id===id);
      return {id, name:s?.name||'', grade:studentGrade(id)||'', classId:studentClass(id)?.id||'', className:studentClass(id)?.name||'', amt:per};
    });
    if(!await confirmCard({
      title:'균등 청구 (1/N)',
      amountLabel:'총 청구 금액', amount:won(total),
      amountSub:`${divisor}명 ÷ = 1인당 ₩${won(per)}`,
      date, subject, teacher,
      rows:[
        {k:'참여 학생', v:`${ids.length}명`},
        ...(sq?[{k:'학교 청구분', v:`${sq}명`}]:[]),
        {k:'1인당 금액', v:`₩${won(per)} <span style="color:var(--tl);font-size:11px">(10원 올림)</span>`},
        {k:'학생 청구 합계', v:`₩${won(per*ids.length)}`},
        ...(sq?[{k:'학교 청구분 합계', v:`₩${won(per*sq)}`}]:[])
      ],
      note: (receiptExempt && (existingReceipts.length+receipts.length)<1) ? `🧾 영수증 없음 · 사유: ${esc(receiptExemptReason)}` : ''
    })) return;
    record = {
      org: expOrg, mode:'equal', date, semester, teacher, subject, items, detail,
      total, per, count: ids.length,
      schoolQty: sq, schoolTotal: per*sq,
      students, bank, holder, account, schoolNote,
      createdByUid: CU.uid, createdByName: CU.name||'',
      createdAt: Timestamp.now()
    };
  } else if(expMode==='refundeq'){
    // ── 균등 반환 (총액 ÷ [학생+선생님], 1인당 내림, 차액은 학교로) ──
    if(!total || total<=0){ toast('총 반환 금액을 입력하세요.','err'); $I('ex-total')?.focus(); return; }
    const sq = parseInt($I('ex-schoolqty')?.value||'0',10) || 0;
    const divisor = ids.length + sq;
    if(!divisor){ toast('반환 대상(학생 또는 선생님)을 선택하세요.','err'); return; }
    const per = perRefund(total, divisor);
    const stuSum = per * ids.length;
    const teacherSum = total - stuSum;   // 학생에게 안 간 나머지 = 학교로
    const students = ids.map(id=>{
      const s = STUDENTS.find(x=>x.id===id);
      return {id, name:s?.name||'', grade:studentGrade(id)||'', classId:studentClass(id)?.id||'', className:studentClass(id)?.name||'', amt:per};
    });
    if(!await confirmCard({
      title:'균등 반환 ⚖️',
      amountLabel:'총 반환 금액', amount:won(total),
      amountSub:`${divisor}명 ÷ = 1인당 ₩${won(per)} (내림)`,
      date, subject, teacher,
      rows:[
        {k:'반환 학생', v:`${ids.length}명`},
        ...(sq?[{k:'선생님(학교 반환분)', v:`${sq}명`}]:[]),
        {k:'1인당 반환', v:`₩${won(per)} <span style="color:var(--tl);font-size:11px">(10원 내림)</span>`},
        {k:'학생 반환 합계', v:`₩${won(stuSum)}`},
        {k:'선생님 반환금 (차액 포함)', v:`<b style="color:var(--info)">₩${won(teacherSum)}</b>`},
        {k:'총 반환 확인', v:`₩${won(stuSum)} + ₩${won(teacherSum)} = <b>₩${won(total)}</b>`}
      ],
      note: (receiptExempt && (existingReceipts.length+receipts.length)<1) ? `🧾 영수증 없음 · 사유: ${esc(receiptExemptReason)}` : ''
    })) return;
    record = {
      org: expOrg, mode:'refund', date, semester, teacher, subject, items, detail,
      total: stuSum, per, count: ids.length,
      schoolQty: 0, schoolTotal: 0,
      refundEqual: true, refundTotal: total, refundTeacherQty: sq,
      teacherRefund: teacherSum, teacherRefundNote: sq?`균등 반환 ${sq}명분 + 단수 차액`:'단수 차액',
      students, bank, holder, account, schoolNote,
      createdByUid: CU.uid, createdByName: CU.name||'',
      createdAt: Timestamp.now()
    };
  } else if(expMode==='group'){
    const used = expGroups.map((g,i)=>({...g, i})).filter(g=>g.ids.length>0);
    if(!used.length){ toast('그룹에 학생을 배정하세요.','err'); return; }
    const noAmt = used.filter(g=>!(g.total>0));
    if(noAmt.length){ toast(`${noAmt.map(g=>GRP_STYLE[g.i].l+'그룹').join(', ')}의 청구 금액을 입력하세요.`,'err'); return; }
    const students = [];
    let grandTotal = 0;
    const gsum = [];
    used.forEach(g=>{
      const per = perAmount(g.total, g.ids.length);
      grandTotal += per * g.ids.length;
      gsum.push(`· ${GRP_STYLE[g.i].l}그룹: ₩${won(g.total)} ÷ ${g.ids.length}명 = 1인당 ₩${won(per)}`);
      g.ids.forEach(id=>{
        const s = STUDENTS.find(x=>x.id===id);
        students.push({id, name:s?.name||'', grade:studentGrade(id)||'', classId:studentClass(id)?.id||'', className:studentClass(id)?.name||'', amt:per, grp:GRP_STYLE[g.i].l});
      });
    });
    if(!await confirmCard({
      title:'그룹 균등 청구',
      amountLabel:'총 청구 금액', amount:won(grandTotal),
      date, subject, teacher,
      rows: used.map(g=>({k:`${GRP_STYLE[g.i].l}그룹 (${g.ids.length}명)`, v:`₩${won(perAmount(g.total,g.ids.length))} <span style="color:var(--tl);font-size:11px">/인</span>`}))
        .concat([{k:'학생 청구 합계', v:`₩${won(grandTotal)}`}]),
      note: (receiptExempt && (existingReceipts.length+receipts.length)<1) ? `🧾 영수증 없음 · 사유: ${esc(receiptExemptReason)}` : ''
    })) return;
    record = {
      org: expOrg, mode:'group', date, semester, teacher, subject, items, detail,
      total: grandTotal, count: students.length,
      groups: used.map(g=>({label:GRP_STYLE[g.i].l, total:g.total, count:g.ids.length, per:perAmount(g.total,g.ids.length)})),
      students, bank, holder, account, schoolNote,
      createdByUid: CU.uid, createdByName: CU.name||'',
      createdAt: Timestamp.now()
    };
  } else {
    // ── 개별 청구 / 개별 반환 ──
    const bad = [];
    ids.forEach(id=>{
      const a = indivAmts[id];
      if(!(a>0)){ const s=STUDENTS.find(x=>x.id===id); bad.push(s?.name||''); }
    });
    if(bad.length){
      toast(`금액이 비어 있는 학생: ${bad.slice(0,5).join(', ')}${bad.length>5?` 외 ${bad.length-5}명`:''}`,'err');
      return;
    }
    const sum = ids.reduce((t,id)=>t+indivAmts[id], 0);
    const students = ids.map(id=>{
      const s = STUDENTS.find(x=>x.id===id);
      return {id, name:s?.name||'', grade:studentGrade(id)||'', classId:studentClass(id)?.id||'', className:studentClass(id)?.name||'', amt:indivAmts[id]};
    });
    const modeName = expMode==='refund' ? '개별 반환' : '개별 청구';
    if(!await confirmCard({
      title:`${modeName} ${expMode==='refund'?'↩️':'✏️'}`,
      amountLabel: expMode==='refund'?'총 반환 금액':'총 청구 금액', amount:won(sum),
      date, subject, teacher,
      rows:[
        {k:'대상 인원', v:`${ids.length}명`},
        {k:expMode==='refund'?'학생 반환 합계':'청구 합계', v:`₩${won(sum)}`},
        ...(expMode==='refund'&&teacherRefund?[{k:'선생님 반환금', v:`₩${won(teacherRefund)}${teacherRefundNote?` (${esc(teacherRefundNote)})`:''}`}]:[]),
        {k:'', v:'<span style="color:var(--tl);font-size:11px">학생별 금액은 신청 내역 상세에서 확인</span>'}
      ],
      note: (receiptExempt && (existingReceipts.length+receipts.length)<1) ? `🧾 영수증 없음 · 사유: ${esc(receiptExemptReason)}` : ''
    })) return;
    record = {
      org: expOrg, mode: expMode, date, semester, teacher, subject, items, detail,
      total: sum, per: null, count: ids.length,
      schoolQty: 0, schoolTotal: 0,
      teacherRefund, teacherRefundNote,
      students, bank, holder, account, schoolNote,
      createdByUid: CU.uid, createdByName: CU.name||'',
      createdAt: Timestamp.now()
    };
  }

  // 영수증 면제(무첨부) 정보 기록
  if(record){
    record.receiptExempt = !!(receiptExempt && (existingReceipts.length + receipts.length) < 1);
    record.receiptExemptReason = record.receiptExempt ? (receiptExemptReason||'영수증 없음') : '';
  }

  try {
    window.showLoading && window.showLoading(editingId?'수정 내용을 저장하는 중…':'신청서를 저장하는 중…');
    if(editingId){
      // ── 수정 저장 ──
      const upd = {...record};
      delete upd.createdByUid; delete upd.createdByName; delete upd.createdAt; delete upd.org;
      upd.receiptCount = existingReceipts.length + receipts.length;
      upd.updatedAt = Timestamp.now();
      upd.updatedByName = CU.name||'';
      await updateDoc(doc(db,'expenses',editingId), upd);
      // 삭제한 기존 영수증 제거
      for(const rid of removedReceiptIds){
        try { await deleteDoc(doc(db,'expenseReceipts',rid)); } catch(e4){}
      }
      // 새 영수증 추가
      let baseIdx = existingReceipts.reduce((m,r)=>Math.max(m, r.idx||0), 0);
      for(let i=0;i<receipts.length;i++){
        window.setLoadStep && window.setLoadStep(`영수증 업로드 중… (${i+1}/${receipts.length})`, 40 + Math.round((i+1)/Math.max(1,receipts.length)*50));
        await addDoc(collection(db,'expenseReceipts'), {
          expenseId: editingId, org: expOrg, date, subject,
          idx: ++baseIdx, dataUrl: receipts[i],
          createdByUid: CU.uid, createdByName: CU.name||'',
          createdAt: Timestamp.now()
        });
      }
    } else {
      // ── 새 신청 ──
      record.receiptCount = receipts.length;
      const ref = await addDoc(collection(db,'expenses'), record);
      for(let i=0;i<receipts.length;i++){
        window.setLoadStep && window.setLoadStep(`영수증 업로드 중… (${i+1}/${receipts.length})`, 30 + Math.round((i+1)/receipts.length*60));
        await addDoc(collection(db,'expenseReceipts'), {
          expenseId: ref.id,
          org: expOrg, date, subject,
          idx: i+1,
          dataUrl: receipts[i],
          createdByUid: CU.uid, createdByName: CU.name||'',
          createdAt: Timestamp.now()
        });
      }
      // 경비 관리자에게 알림 쪽지
      const modeName = record.mode==='refund'?'개별 반환':record.mode==='indiv'?'개별 청구':'균등 청구';
      const amtLine = record.mode==='refund'?`반환 합계 ₩${won(record.total)}`:`청구 합계 ₩${won(record.total)}`;
      await sendMsg(
        expManagerUids(expOrg),
        `[수행성 경비 신청] ${teacher} · ${subject}`,

function viewExpense(id){
  const e = EXPENSES.find(x=>x.id===id); if(!e) return;

  const charged = new Map();
  (e.students||[]).forEach(st=>charged.set(st.id, st));
  const indivMode = (e.mode==='indiv'||e.mode==='refund'||e.mode==='group');
  const giFn = c => {
    const gs = new Set();
    (c.students||[]).forEach(sid=>{ const g=(c.grades||{})[sid]; if(g) gs.add(g); });
    const arr = [...gs].sort((a,b)=>(parseInt(a,10)||99)-(parseInt(b,10)||99));
    return { label: arr.length ? arr.map(g=>String(g).replace('학년','')).join('·')+'학년' : '', min: arr.length ? (parseInt(arr[0],10)||99) : 999 };
  };
  const orgClasses = thisYearClasses(e.org)
    .map(c=>({...c, __gi: giFn(c)}))
    .sort((a,b)=> a.__gi.min - b.__gi.min || (a.name||'').localeCompare(b.name||'','ko'));
  const seen = new Set();
  let rosterHTML = orgClasses.map(c=>{
    const studs = (c.students||[]).map(sid=>STUDENTS.find(s=>s.id===sid)).filter(s=>s && ((s.status||'active')!=='quit' || showQuitStu(s)));
    if(!studs.length) return '';
    studs.sort((a,b)=>{
      const ga = parseInt(studentGrade(a.id),10)||99, gb = parseInt(studentGrade(b.id),10)||99;
      return ga-gb || (a.name||'').localeCompare(b.name||'','ko');
    });
    const chk = studs.filter(s=>charged.has(s.id)).length;
    return `<div style="margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:var(--gm);margin-bottom:5px">${esc(c.name||'')}${c.__gi.label?` <span style="color:var(--tl);font-weight:400">· ${esc(c.__gi.label)}</span>`:''} <span style="color:var(--tl);font-weight:400">— 체크 ${chk}/${studs.length}명</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${studs.map(s=>{
          seen.add(s.id);
          const st = charged.get(s.id);
          const isLeave = (s.status||'active')==='leave';
          if(st) return `<span style="background:var(--gp);color:var(--gm);border:1px solid var(--gl);border-radius:7px;padding:3px 9px;font-size:12.5px;font-weight:700">✓ ${esc(s.name)}${indivMode&&st.amt!=null?` <b style="color:${e.mode==='refund'?'#0d9488':'var(--gm)'}">₩${won(st.amt)}</b>`:''}</span>`;

        }).join('')}
      </div>
    </div>`;
  }).join('');
  // 현재 반편성에 없는 청구 학생 (반 변경·퇴원 등)
  const extra = (e.students||[]).filter(st=>!seen.has(st.id));
  if(extra.length){
    rosterHTML += `<div style="margin-bottom:8px">
      <div style="font-size:13px;font-weight:700;color:var(--tl);margin-bottom:5px">현재 명단 외 (반 변경·퇴원 등)</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">${extra.map(st=>`<span style="background:var(--gp);color:var(--gm);border-radius:7px;padding:3px 9px;font-size:12.5px;font-weight:700">✓ ${esc(st.name)}${indivMode&&st.amt!=null?` ₩${won(st.amt)}`:''}</span>`).join('')}</div>
    </div>`;
  }
  const clsHTML = rosterHTML;

  const mv = document.createElement('div'); mv.className='mov'; mv.id='exview-mod';
  mv.innerHTML = `<div class="mbk" onclick="document.getElementById('exview-mod').remove()"></div>
    <div class="mbox">
      <div class="mtitle">${esc(e.subject)}</div>
      <div class="msub">${esc(e.date)} · ${e.semester?esc(semKor(e.semester))+' · ':''}${esc(e.teacher||e.createdByName||'')} · ${ORGS[e.org]||e.org}</div>
      <div style="background:var(--iv);border-radius:10px;padding:14px 16px;font-size:13.5px;line-height:2">
        <div><b>구매 목록</b> : ${esc(e.items||'-')}</div>
        ${e.detail?`<div><b>세부 내용</b> : ${esc(e.detail)}</div>`:''}
        ${e.mode==='indiv'||e.mode==='refund'
          ? `<div><b>방식</b> : ${e.mode==='refund'?'↩️ 개별 반환':'✏️ 개별 청구'}</div><div><b>합계</b> : <span style="color:${e.mode==='refund'?'#0d9488':'var(--gm)'};font-weight:700">₩${won(e.total)}</span> (${e.count}명, 학생별 금액은 아래 명단 참조)</div>`
          : `<div><b>청구 금액</b> : ₩${won(e.total)}</div><div><b>1인당 청구</b> : ₩${won(e.per)} × ${e.count}명 = ₩${won(e.per*e.count)}</div>`}
        ${e.bank||e.account?`<div><b>정산 계좌</b> : ${esc(e.bank||'')} ${esc(e.account||'')} (${esc(e.holder||'')})</div>`:''}
        ${(e.schoolQty||e.schoolNote)?`<div><b>학교 청구분</b> : ${e.schoolQty?`${e.schoolQty}개분 ₩${won(e.schoolTotal!=null?e.schoolTotal:(e.per||0)*(e.schoolQty||0))}`:''}${e.schoolNote?` ${e.schoolQty?'— ':''}${esc(e.schoolNote)}`:''}</div>`:''}
        ${e.teacherRefund?`<div><b>선생님 반환금</b> : <span style="color:var(--info);font-weight:700">−₩${won(e.teacherRefund)}</span> (학교 청구분에서 감산)${e.teacherRefundNote?` — ${esc(e.teacherRefundNote)}`:''}</div>`:''}
      </div>
      <div style="font-size:14px;font-weight:800;color:var(--gd);margin:14px 0 8px">청구 체크 현황 (${e.count}명 체크) <span style="font-size:12px;color:var(--tl);font-weight:400">— ✓ 파란색이 청구 대상, 회색은 미청구</span></div>
      ${clsHTML}
      <div style="font-size:14px;font-weight:800;color:var(--gd);margin:14px 0 8px">🧾 영수증 ${e.receiptCount?`(${e.receiptCount}장)`:''}</div>
      <div id="rc-list" style="display:flex;gap:8px;flex-wrap:wrap"><span style="font-size:13px;color:var(--tl)">불러오는 중…</span></div>
      <div class="mact">
        <button class="bs" onclick="document.getElementById('exview-mod').remove()">닫기</button>
      </div>
    </div>`;
  $I('mwrap').appendChild(mv);
  loadReceipts(e.id);
}

// 영수증 불러오기 (상세보기)
async function loadReceipts(expenseId){
  const box = $I('rc-list');
  if(!box) return;
  try {
    const snap = await getDocs(query(collection(db,'expenseReceipts'), where('expenseId','==',expenseId)));
    const arr = [];
    snap.forEach(d=>arr.push({id:d.id, ...d.data()}));
    arr.sort((a,b)=>(a.idx||0)-(b.idx||0));

    box.innerHTML = arr.map(r=>`

      </div>`).join('');

  if(isLocked(e.org, e.semester)){ toast(`🔒 잠긴 학기입니다 (${semKor(e.semester)}). 잠금을 해제한 뒤 삭제하세요.`,'err'); return; }
  if(!confirm(`"${e.subject}" (${e.date}) 신청을 휴지통으로 옮길까요?\n휴지통에서 언제든 되돌릴 수 있습니다.`)) return;

// ── 영구 삭제 (경비 관리자·슈퍼만) ──
async function purgeExpense(id){
  const e = EXPENSES.find(x=>x.id===id); if(!e) return;
  if(!(CU.role==='super' || isExpManager(e.org))){ toast('권한이 없습니다.','err'); return; }
  if(isLocked(e.org, e.semester)){ toast(`🔒 잠긴 학기입니다 (${semKor(e.semester)}). 잠금을 해제한 뒤 삭제하세요.`,'err'); return; }
  if(!confirm('영구 삭제하면 되돌릴 수 없습니다.\n영수증까지 모두 지웁니다. 진행할까요?')) return;
  window.showLoading && window.showLoading('삭제하는 중…');
  try {
    try {
      const snap = await getDocs(query(collection(db,'expenseReceipts'), where('expenseId','==',id)));
      const dels = [];
      snap.forEach(d=>dels.push(deleteDoc(doc(db,'expenseReceipts',d.id))));
      await Promise.all(dels);
    } catch(e3){}
    await deleteDoc(doc(db,'expenses',id));
    window.hideLoading && window.hideLoading();
    toast('영구 삭제했습니다.','ok');
    renderList();
  } catch(e2){ window.hideLoading && window.hideLoading(); toast('삭제 실패: '+e2.message,'err'); }
}
window.purgeExpense = purgeExpense;

// 날짜시각 포맷 (Timestamp → "2026-07-07 14:30")
function fmtDateTime(ts){
  try {
    const d = ts?.toDate ? ts.toDate() : (ts?.seconds ? new Date(ts.seconds*1000) : new Date(ts));
    if(isNaN(d.getTime())) return '';
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  } catch(e){ return ''; }
}

// 입금 확인 체크/취소 (경비 관리자·슈퍼만)
async function togglePaid(id, paid){
  const e = EXPENSES.find(x=>x.id===id); if(!e) return;
  if(!isExpManager(e.org)){ toast('경비 관리자만 입금 확인을 할 수 있습니다.','err'); return; }
  if(isLocked(e.org, e.semester)){ toast(`🔒 잠긴 학기입니다 (${semKor(e.semester)}). 입금 상태를 바꾸려면 잠금을 해제하세요.`,'err'); return; }
  if(paid && !confirm(`"${e.subject}" (${e.teacher||e.createdByName}) 건을 입금 완료로 표시할까요?\n신청한 선생님께 입금 안내 쪽지가 발송됩니다.`)) return;

    window.showLoading && window.showLoading(paid?'입금 확인 처리 중…':'취소 처리 중…');
    const upd = paid
      ? { paid:true, paidAt:Timestamp.now(), paidByUid:CU.uid, paidByName:CU.name||'' }
      : { paid:false, paidAt:null, paidByUid:null, paidByName:null };
    await updateDoc(doc(db,'expenses',id), upd);

    // 입금 완료 시 신청자에게 쪽지

        [e.createdByUid],
        `[입금 완료] ${e.subject} 수행성 경비`,
        `${ORGS[e.org]||e.org} · ${e.semester?semKor(e.semester):''}\n과목: ${e.subject}\n${e.mode==='refund'?'반환':'청구'} 합계: ₩${won(e.total)}\n\n신청하신 수행성 경비가 입금 처리되었습니다.\n입금 확인: ${CU.name||''} · ${fmtDateTime(upd.paidAt)}`

    renderList();

}

// ══════════ 🔒 학기 잠금 (수퍼 전용) ══════════
async function toggleSemLock(){
  if(CU.role!=='super'){ toast('수퍼관리자만 잠금을 설정할 수 있습니다.','err'); return; }
  const org = reportOrg, sem = reportSem;
  if(!sem){ toast('학기를 선택하세요.','err'); return; }
  const key = lockKey(org, sem);
  const currentlyLocked = isLocked(org, sem);
  const orgName = ORGS[org]||org, semName = semKor(sem);
  if(currentlyLocked){
    if(!confirm(`🔓 잠금 해제\n\n${orgName} · ${semName}\n\n잠금을 해제하면 이 학기의 경비를 다시 수정·삭제할 수 있습니다.\n계속할까요?`)) return;
  } else {
    if(!confirm(`🔒 학기 잠금\n\n${orgName} · ${semName}\n\n이 학기의 모든 수행성 경비가 잠깁니다.\n· 수정·삭제·입금 취소가 막힙니다\n· 오류 방지를 위해 지난 학기 마감 시 사용하세요\n· 언제든 수퍼관리자가 해제할 수 있습니다\n\n잠글까요?`)) return;
  }
  window.showLoading && window.showLoading(currentlyLocked?'잠금 해제 중…':'잠그는 중…');
  try {
    if(currentlyLocked){
      await deleteDoc(doc(db,'expenseLocks',key));
      delete LOCKS[key];
      toast(`🔓 ${semName} 잠금이 해제되었습니다.`,'ok');
      if(window.logActivity) logActivity('잠금해제','수행성 경비', `${orgName} ${semName}`, '');
    } else {
      await setDoc(doc(db,'expenseLocks',key), {
        org, semester:sem, locked:true,
        lockedByUid:CU.uid, lockedByName:CU.name||'', lockedAt:Timestamp.now()
      });
      LOCKS[key] = {lockedBy:CU.name||'', lockedAt:Timestamp.now()};
      toast(`🔒 ${semName} 경비가 잠겼습니다.`,'ok');
      if(window.logActivity) logActivity('잠금','수행성 경비', `${orgName} ${semName}`, '');
    }
    renderReport();
  } catch(e){
    toast('처리 실패: '+(e.message||''),'err');
  } finally { window.hideLoading && window.hideLoading(); }
}

function toggleRepCls(k){
  openRepCls[k] = !openRepCls[k];
  const card = document.querySelector(`.gr-card[data-rcls="${k.replace(/"/g,'\\"')}"]`);
  if(!card) return;
  const body = card.querySelector('.gr-body');
  const inner = card.querySelector('.gr-body-inner');
  if(openRepCls[k]){
    card.classList.add('open');
    body.style.maxHeight = inner.scrollHeight + 'px';
    setTimeout(()=>{ if(openRepCls[k]) body.style.maxHeight='none'; }, 320);
  } else {
    body.style.maxHeight = inner.scrollHeight + 'px';
    requestAnimationFrame(()=>{ body.style.maxHeight='0px'; card.classList.remove('open'); });
  }
}

  const stuMap = new Map();
  const items = [];
  list.forEach(e=>{
    const members = (e.students||[]).filter(s=>gradeLabel(resolveGrade(s))===gradeKey);
    if(!members.length) return;
    items.push(e);
    members.forEach(s=>{ if(!stuMap.has(s.id)) stuMap.set(s.id, {id:s.id, name:s.name, grade:resolveGrade(s), className:resolveClassName(s)}); });

function loadH2C(){ if(window.html2canvas||document.getElementById('h2c-script'))return; const sc=document.createElement('script'); sc.id='h2c-script'; sc.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'; document.head.appendChild(sc); }
loadH2C();
function ensureJsPDF(){
  return new Promise((resolve,reject)=>{
    if(window.jspdf&&window.jspdf.jsPDF) return resolve();
    let sc=document.getElementById('jspdf-script');
    if(sc){ const chk=setInterval(()=>{ if(window.jspdf&&window.jspdf.jsPDF){clearInterval(chk);resolve();} },100); setTimeout(()=>{clearInterval(chk); if(!(window.jspdf&&window.jspdf.jsPDF))reject(new Error('PDF 모듈 로드 실패'));},8000); return; }
    sc=document.createElement('script'); sc.id='jspdf-script'; sc.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    sc.onload=()=>resolve(); sc.onerror=()=>reject(new Error('PDF 모듈을 불러올 수 없습니다.')); document.head.appendChild(sc);
  });

function ensureH2C(){
  return new Promise((resolve,reject)=>{

// 안내장 HTML 생성 (인쇄용, 세로/가로 레이아웃)
function buildSheetHTML(landscape, opts){
  opts = opts || {};
  const s = lastSheet; if(!s) return '';
  const { gradeKey, classNames, semKor:sem, orgName, students, amtOf } = s;
  const allItems = s.items;
  const items = opts.itemsSubset || allItems;
  const showTotal = opts.showTotal !== false;
  // 제목 부제: 학년 + 반 이름 (반 하나면 "2학년 로이반", 여러 개면 "2학년 (로이반·이레반)")
  const cls = classNames||[];
  const gradeTitle = cls.length===1 ? `${gradeKey} ${cls[0]}` : cls.length>1 ? `${gradeKey} (${cls.join('·')})` : gradeKey;
  const won2 = n => (n||0).toLocaleString('ko-KR');
  const perLine = (e)=> e.mode==='refund'?`↩️ ${accMoney(Math.abs(e.per|| ((e.students||[]).find(x=>true)?.amt) || 0), false)}`:`${accMoney(e.per|| ((e.students||[]).find(x=>true)?.amt) || 0, false)}${e.mode==='equal'?'<span style="opacity:.6;font-size:8.5px">/인</span>':''}`;
  const cell = (e,sid)=>{ const a=amtOf(e,sid); if(a===null) return '<td class="x">·</td>'; const isRef=a<0; return `<td class="${isRef?'ref':'chg'}">${accMoney(Math.abs(a), isRef)}</td>`; };

  // 칸 폭 계산: 이름칸 + 항목N칸 + 합계칸
  const nameW = landscape ? 60 : 52;
  const totW = showTotal ? (landscape ? 104 : 84) : 0;
  const pad = landscape ? 30 : 26;
  // 문서 최대 내부폭 (A5세로 559-2*26=507, A4가로 1123-2*30=1063)
  const maxInner = landscape ? 1063 : 507;
  // 항목칸 폭: 남는 폭을 항목수로 나눔 (최소값 보장)
  const availForItems = maxInner - nameW - totW;
  let itemColW = Math.floor(availForItems / items.length);
  const minItemW = landscape ? 72 : 64;
  itemColW = Math.max(minItemW, itemColW);
  // 실제 표 폭
  const tableW = nameW + itemColW*items.length + totW;
  // 문서 내부폭: fullWidth(이미지)면 표 실폭 그대로 → 잘림 없음
  const innerW = opts.fullWidth ? tableW : Math.min(tableW, maxInner);
  const docW = innerW + pad*2;

  const colgroup = `<colgroup>
    <col style="width:${nameW}px">
    ${items.map(()=>`<col style="width:${itemColW}px">`).join('')}
    ${showTotal?`<col style="width:${totW}px">`:''}
  </colgroup>`;

  // 헤더: 항목 정보를 행별로 분리 (라벨 행 + 항목 값)
  const headRows2 = `
    <tr class="h-subj"><th class="nm hd">이름</th>${items.map(e=>`<th class="ic subj"><span style="font-size:8.5px;opacity:.85;font-weight:600">${expenseSeqNo(e.id)}</span><br>${esc(e.subject)}${e.mode==='refund'?'<br>(반환)':''}</th>`).join('')}${showTotal?`<th class="tot hd">개인 합계<br><span style="font-size:8.5px;font-weight:600;opacity:.9">낼 금액 · (−)환급</span></th>`:''}</tr>
    <tr class="h-sub"><td class="rl">담당</td>${items.map(e=>`<td class="ic2">${esc(e.teacher||'-')}</td>`).join('')}${showTotal?`<td class="rl2"></td>`:''}</tr>
    <tr class="h-sub"><td class="rl">신청일</td>${items.map(e=>`<td class="ic2">${esc(e.date||'-')}</td>`).join('')}${showTotal?`<td class="rl2"></td>`:''}</tr>
    <tr class="h-sub"><td class="rl">세부내용</td>${items.map(e=>`<td class="ic2 det">${esc(e.items||'')}${e.detail?'<br>'+esc(e.detail):''}</td>`).join('')}${showTotal?`<td class="rl2"></td>`:''}</tr>
    <tr class="h-per"><td class="rl">1인당</td>${items.map(e=>`<td class="ic2 per">${perLine(e)}</td>`).join('')}${showTotal?`<td class="rl2"></td>`:''}</tr>`;

  const bodyRows = students.map(st=>{
    // 개인 합계는 항상 전체 항목 기준 (페이지 분할과 무관하게 동일)
    let sum=0;
    allItems.forEach(e=>{ const a=amtOf(e,st.id); if(a!==null) sum+=a; });
    const tds = items.map(e=> cell(e,st.id)).join('');
    return `<tr><th class="nm">${esc(st.name)}<span class="cls">${esc(st.className||'')}</span></th>${tds}${showTotal?`<td class="tot">${accMoney(sum, sum<0)}</td>`:''}</tr>`;
  }).join('');
  const footTds = items.map(e=>{ const t=students.reduce((tt,st)=>tt+(amtOf(e,st.id)||0),0); return `<td class="ft">${accMoney(Math.abs(t), false)}</td>`; }).join('');
  const grand = students.reduce((tt,st)=>tt+allItems.reduce((x,e)=>x+(amtOf(e,st.id)||0),0),0);

  const table = `<table class="sheet-tbl">
    ${colgroup}
    <thead>${headRows2}</thead>
    <tbody>${bodyRows}</tbody>
    <tfoot><tr><th class="nm">항목합계</th>${footTds}${showTotal?`<td class="tot">${accMoney(grand, grand<0)}</td>`:''}</tr></tfoot>
  </table>`;

  const pageTag = (opts.pageCnt&&opts.pageCnt>1)?` · ${opts.pageNo}/${opts.pageCnt}쪽 (항목 나눔)`:'';
  return `<div class="sheet-doc ${landscape?'land':'port'}" style="width:${docW}px;padding:${pad}px">
    <div class="sheet-head">
      <div class="sh-title">${esc(orgName)} 수행성 경비 안내</div>
      <div class="sh-sub">${esc(sem)} · ${esc(gradeTitle)}${pageTag}</div>
    </div>
    ${table}
    <div class="sheet-foot">※ 금액이 적힌 칸이 청구 항목이며, 반환은 (−)로 표시됩니다.${showTotal?' 개인 합계는 전체 항목 기준입니다.':''} 문의는 담당 선생님께 해주세요.</div>
  </div>`;
}

async function printSheet(mode){
  if(!lastSheet){ toast('출력할 표가 없습니다.','err'); return; }
  const allItems = lastSheet.items;
  // 항목이 많으면 강제 가로 + 항목 나눔 (페이지당 11개)
  const PER_PAGE = 11;
  const needChunk = allItems.length > PER_PAGE;
  // auto: 항목 수 기준 (5개 이하 세로 A5, 초과 가로 A4)
  let landscape;
  if(needChunk) landscape = true;
  else if(mode==='a5') landscape=false;
  else if(mode==='a4') landscape=true;
  else landscape = allItems.length > 5;
  window.showLoading && window.showLoading('안내장을 만드는 중…');
  try {
    await ensureH2C();
    await ensureJsPDF();
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({orientation: landscape?'landscape':'portrait', unit:'mm', format:'a4'});
    const pw = pdf.internal.pageSize.getWidth();
    const ph = pdf.internal.pageSize.getHeight();
    const margin = 8;
    const iw = pw - margin*2;

    const chunks = [];
    for(let i=0;i<allItems.length;i+=PER_PAGE) chunks.push(allItems.slice(i,i+PER_PAGE));
    let firstPage = true;

    for(let c=0;c<chunks.length;c++){
      if(chunks.length>1) window.setLoadStep && window.setLoadStep(`안내장 만드는 중… (${c+1}/${chunks.length})`, Math.round((c+1)/chunks.length*90));
      // 임시 렌더 컨테이너
      const holder = document.createElement('div');
      holder.style.cssText = 'position:fixed;left:-99999px;top:0;';
      holder.innerHTML = `<style>${SHEET_CSS}</style>` + buildSheetHTML(landscape, {
        itemsSubset: chunks[c],
        pageNo: c+1, pageCnt: chunks.length,
        showTotal: c === chunks.length-1
      });
      document.body.appendChild(holder);
      const node = holder.querySelector('.sheet-doc');
      const canvas = await window.html2canvas(node, {scale:2, backgroundColor:'#ffffff', useCORS:true});
      document.body.removeChild(holder);
      const ih = canvas.height * iw / canvas.width;
      const img = canvas.toDataURL('image/jpeg', 0.92);
      if(ih <= ph - margin*2){
        if(!firstPage) pdf.addPage();
        pdf.addImage(img, 'JPEG', margin, margin, iw, ih);
        firstPage = false;
      } else {
        // 길면 여러 페이지 분할
        let remaining = canvas.height, pos = 0;
        const pageCanvasH = Math.floor(canvas.width * (ph - margin*2) / iw);
        while(remaining > 0){
          const slice = document.createElement('canvas');
          slice.width = canvas.width; slice.height = Math.min(pageCanvasH, remaining);
          slice.getContext('2d').drawImage(canvas, 0, pos, canvas.width, slice.height, 0, 0, canvas.width, slice.height);
          const sliceImg = slice.toDataURL('image/jpeg', 0.92);
          const sliceH = slice.height * iw / canvas.width;
          if(!firstPage) pdf.addPage();
          pdf.addImage(sliceImg, 'JPEG', margin, margin, iw, sliceH);
          firstPage = false;
          remaining -= slice.height; pos += slice.height;
        }
      }
    }
    pdf.save(`수행성경비_${lastSheet.gradeKey}_${lastSheet.semKor}.pdf`);
    window.hideLoading && window.hideLoading();
    toast(chunks.length>1?`PDF를 저장했습니다. (항목이 많아 ${chunks.length}묶음으로 나눴어요)`:'PDF를 저장했습니다.','ok');
  } catch(e){ window.hideLoading && window.hideLoading(); toast('출력 실패: '+(e.message||''),'err'); }
}
window.printSheet = printSheet;

// ── 캔버스 이미지 저장 (모바일: 공유 시트 / PC: 다운로드) ──
async function saveCanvasImage(canvas, filename){
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)
    || (navigator.maxTouchPoints > 1 && /Macintosh/.test(navigator.userAgent));
  if(isMobile && navigator.canShare){
    try {
      const blob = await new Promise(r=>canvas.toBlob(r,'image/png'));
      const file = new File([blob], filename, {type:'image/png'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file]});
        return true;
      }
    } catch(e){
      if(e.name==='AbortError') return false;   // 공유 취소
    }
  }
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  return true;
}

// ── 전 학년 청구 상세표 일괄 이미지 저장 ──
// 각 학년별로 시트를 구성해 순차적으로 PNG 다운로드
function buildClassSheetData(gradeKey){
  const list = EXPENSES.filter(e=>!e.deleted && e.org===reportOrg && e.semester===reportSem)
    .sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const gradeNum = g => parseInt(String(g||'').replace(/[^0-9]/g,''),10)||99;
  const gradeLabel = g => { const n=parseInt(String(g||'').replace(/[^0-9]/g,''),10); return n?`${n}학년`:'학년 미지정'; };
  const stuMap = new Map();
  const items = [];
  list.forEach(e=>{
    const members = (e.students||[]).filter(s=>gradeLabel(resolveGrade(s))===gradeKey);
    if(!members.length) return;
    items.push(e);
    members.forEach(s=>{ if(!stuMap.has(s.id)) stuMap.set(s.id, {id:s.id, name:s.name, grade:resolveGrade(s), className:resolveClassName(s)}); });
  });
  const students = [...stuMap.values()].sort((a,b)=>gradeNum(a.grade)-gradeNum(b.grade)||(a.name||'').localeCompare(b.name||'','ko'));
  const amtOf = (e, sid) => { const s=(e.students||[]).find(x=>x.id===sid); return s? (e.mode==='refund'? -(s.amt||0) : (s.amt||0)) : null; };
  const classNames = [...new Set(students.map(s=>s.className).filter(Boolean))];
  return { gradeKey, classNames, semKor: semKor(reportSem), orgName: ORGS[reportOrg]||reportOrg, items, students, amtOf };
}

// 현재 학기의 모든 학년 키 (학년순)
function allGradeKeys(){
  const list = EXPENSES.filter(e=>!e.deleted && e.org===reportOrg && e.semester===reportSem);
  const gradeLabel = g => { const n=parseInt(String(g||'').replace(/[^0-9]/g,''),10); return n?`${n}학년`:'학년 미지정'; };
  const set = new Set();
  list.forEach(e=>(e.students||[]).forEach(s=>set.add(gradeLabel(resolveGrade(s)))));
  return [...set].sort((a,b)=>{ const na=parseInt(a,10)||99, nb=parseInt(b,10)||99; return na-nb || a.localeCompare(b,'ko'); });
}

  window.showLoading && window.showLoading('전 학년 이미지를 만드는 중…');
  const savedLast = lastSheet;   // 원래 상태 보존
  let done = 0, failed = [];
  try {
    await ensureH2C();
    for(let i=0;i<grades.length;i++){
      const gk = grades[i];
      window.setLoadStep && window.setLoadStep(`${gk} 이미지 만드는 중… (${i+1}/${grades.length})`, Math.round((i+1)/grades.length*100));
      try {
        const data = buildClassSheetData(gk);
        if(!data.items.length || !data.students.length){ continue; }
        lastSheet = data;   // buildSheetHTML이 lastSheet를 참조
        const landscape = data.items.length > 5;
        const holder = document.createElement('div');
        holder.style.cssText = 'position:fixed;left:-99999px;top:0;';
        holder.innerHTML = `<style>${SHEET_CSS}</style>` + buildSheetHTML(landscape, { fullWidth:true });
        document.body.appendChild(holder);
        const node = holder.querySelector('.sheet-doc');
        const canvas = await window.html2canvas(node, {scale:2, backgroundColor:'#ffffff', useCORS:true});
        document.body.removeChild(holder);
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = `수행성경비_${gk}_${semKor(reportSem)}.png`;
        document.body.appendChild(a); a.click(); a.remove();
        done++;
        await new Promise(r=>setTimeout(r, 350));   // 연속 다운로드 사이 텀
      } catch(err){ failed.push(gk); }
    }
    if(window.logActivity) logActivity('다운로드','전 학년 상세표 일괄', `${ORGS[reportOrg]||reportOrg} ${semKor(reportSem)}`, `${done}개 학년`);
  } catch(e){
    toast('일괄 저장 실패: '+(e.message||''),'err');
  } finally {
    lastSheet = savedLast;   // 원래 상태 복원
    window.hideLoading && window.hideLoading();
  }
  if(done){
    toast(failed.length ? `${done}개 학년 저장 완료 · ${failed.length}개 실패(${failed.join(', ')})` : `전 학년 ${done}장 저장 완료!`, failed.length?'err':'ok');
  } else {
    toast('저장된 이미지가 없습니다.','err');
  }
}
