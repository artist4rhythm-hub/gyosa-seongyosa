<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수행성 경비 · 교사 선교사</title>
<meta name="theme-color" content="#1e2e5c">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
:root {
  --gd:#1e2e5c; --gm:#2b3990; --gl:#5a70cc; --gp:#e8ecf8;
  --gold:#c9a84c; --goldd:#a8873a; --goldp:#fdf3d8;
  --iv:#f5f0e8; --ivd:#e8e0d0;
  --tx:#1a1a2e; --ts:#4a4a6a; --tl:#8888aa; --wh:#ffffff;
  --sh:0 2px 12px rgba(30,46,92,0.10); --r:12px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--iv);color:var(--tx);min-height:100vh;}

#gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#eef0f8 0%,#f5f0e8 60%,#fdf3d8 100%);padding:24px;text-align:center;}
.gbox{background:var(--wh);border-radius:24px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(30,46,92,0.12);}
.gtitle{font-size:22px;font-weight:800;color:var(--gd);margin-bottom:8px;}
.gsub{font-size:14px;color:var(--ts);line-height:1.6;margin-bottom:20px;}
.gbtn{display:inline-block;width:100%;padding:14px;background:linear-gradient(135deg,#2b3990,#1e2e5c);color:var(--wh);border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;}

#ms{display:none;flex-direction:column;min-height:100vh;}
.ah{background:linear-gradient(135deg,#1e2e5c,#12194a);color:var(--wh);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.ahl{display:flex;align-items:center;gap:12px;}
.ahi{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.aht{font-size:16px;font-weight:700;}
.ahr{text-align:right;}
#hn{font-size:15px;font-weight:600;}
#hi{font-size:11px;opacity:.7;margin-top:2px;}
.homebtn{background:rgba(255,255,255,0.15);color:var(--wh);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;margin-top:4px;text-decoration:none;display:inline-block;}

.tc{padding:20px 16px;max-width:1100px;margin:0 auto;width:100%;}
.actitle{font-size:17px;font-weight:800;color:var(--gd);margin-bottom:6px;}
.adesc{font-size:13px;color:var(--ts);margin-bottom:14px;line-height:1.5;}
.acard{background:var(--wh);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px;}

.bp{background:linear-gradient(135deg,#2b3990,#1e2e5c);color:var(--wh);border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.bs{background:var(--iv);color:var(--ts);border:1.5px solid var(--ivd);border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;}
.bm{background:var(--gp);color:var(--gm);border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}

.subtabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.subtbtn{padding:9px 18px;border-radius:100px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid var(--ivd);background:var(--wh);color:var(--ts);}
.subtbtn.on{background:var(--gm);color:var(--wh);border-color:var(--gm);}

.fgrp{display:flex;flex-direction:column;margin-bottom:12px;}
.fgrp label{font-size:12px;font-weight:700;color:var(--ts);margin-bottom:5px;}
.fgrp input,.fgrp select,.fgrp textarea{border:1.5px solid var(--ivd);border-radius:8px;padding:10px 12px;font-size:14px;background:var(--iv);outline:none;width:100%;font-family:inherit;}
.fgrp input{height:40px;padding:0 12px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:560px){.frow{grid-template-columns:1fr;}}

.empty{text-align:center;color:var(--tl);padding:30px;font-size:14px;}

/* 반 아코디언 */
.gr-card{border:1px solid var(--ivd);border-radius:12px;margin-bottom:8px;overflow:hidden;background:var(--wh);}
.gr-head{display:flex;align-items:center;gap:10px;padding:13px 15px;cursor:pointer;background:#fafbfc;transition:background .12s;}
.gr-head:hover{background:var(--gp);}
.gr-arrow{font-size:12px;color:var(--tl);transition:transform .25s ease;}
.gr-card.open .gr-arrow{transform:rotate(180deg);}
.gr-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.gr-body-inner{padding:8px 12px 12px;}

/* 학생 체크 행 */
.stu-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--ivd);border-radius:9px;margin-bottom:6px;cursor:pointer;background:var(--wh);}
.stu-row:hover{border-color:var(--gm);background:var(--gp);}
.stu-row.checked{border-color:var(--gm);background:var(--gp);}
.stu-row.leave{opacity:.55;cursor:not-allowed;background:#f6f6f8;}
.stu-row input[type=checkbox]{width:17px;height:17px;accent-color:var(--gm);flex-shrink:0;cursor:pointer;}
.stu-row.leave input[type=checkbox]{cursor:not-allowed;}
.stu-name{font-size:14px;font-weight:700;color:var(--gd);}
.stu-meta{font-size:11.5px;color:var(--tl);}

/* 합계 바 */
.sumbar{position:sticky;bottom:12px;background:linear-gradient(135deg,#2b3990,#1e2e5c);color:#fff;border-radius:12px;padding:13px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 6px 20px rgba(30,46,92,.35);margin-top:14px;}
.sumbar .si{font-size:13px;opacity:.85;}
.sumbar .sv{font-size:16px;font-weight:800;}

.mov{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
.mbk{position:absolute;inset:0;background:rgba(20,25,60,0.5);}
.mbox{position:relative;background:var(--wh);border-radius:16px;padding:24px;width:100%;max-width:640px;box-shadow:0 20px 60px rgba(0,0,0,0.3);margin:auto;}
.mtitle{font-size:18px;font-weight:800;color:var(--gd);margin-bottom:4px;}
.msub{font-size:13px;color:var(--ts);margin-bottom:16px;line-height:1.5;}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap;}

.clist{display:flex;flex-direction:column;gap:10px;}
.citem{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--wh);border:1px solid var(--ivd);border-radius:10px;flex-wrap:wrap;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gd);color:var(--wh);padding:12px 24px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#dc2626;} .toast.ok{background:var(--gm);}
</style>
<script src="loading.js"></script>
<script src="topnav.js"></script>
</head>
<body>

<div id="gate">
  <div class="gbox">
    <div class="gtitle">수행성 경비</div>
    <div class="gsub" id="gate-msg">로그인 확인 중...</div>
    <a class="gbtn" id="gate-btn" href="index.html" style="display:none">로그인 화면으로</a>
  </div>
</div>

<div id="ms">
  <header class="ah">
    <div class="ahl" onclick="location.href='index.html#home'" style="cursor:pointer">
      <div class="ahi">💰</div>
      <div class="aht">수행성 경비</div>
    </div>
    <div class="ahr">
      <div id="hn"></div>
      <div id="hi"></div>
      <a class="homebtn" href="index.html">← 메인으로</a>
    </div>
  </header>
  <div class="tc">
    <div class="subtabs">
      <button class="subtbtn on" id="tb-new" onclick="showTab('new')">➕ 경비 신청</button>
      <button class="subtbtn" id="tb-list" onclick="showTab('list')">📋 신청 내역</button>
    </div>
    <div id="tab-new"></div>
    <div id="tab-list" style="display:none"></div>
  </div>
</div>

<div id="mwrap"></div>
<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, addDoc, deleteDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCtgr79jKqkec6HwqkxYNxSubWAhfEkM7g",
  authDomain: "daniel-amatz.firebaseapp.com",
  projectId: "daniel-amatz",
  storageBucket: "daniel-amatz.firebasestorage.app",
  messagingSenderId: "455744290312",
  appId: "1:455744290312:web:3ce7e7d3e58f6f1d185bbd",
  measurementId: "G-E91V0S88T8"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $I = id => document.getElementById(id);
const ORGS = {jihyebit:'지혜빛', daniel:'다니엘 아마츠'};
const pad = n => String(n).padStart(2,'0');
const won = n => (n==null||isNaN(n))?'-':Number(n).toLocaleString('ko-KR');
let CU = null;
let STUDENTS = [];
let CLASSES = [];
let EXPENSES = [];
let listOrg = '';
let curTab = 'new';

function toast(msg, type=''){
  const t = $I('toast'); t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(window.__tt); window.__tt = setTimeout(()=>t.className='toast', 2500);
}
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
const isAdmin = () => CU && ['super','org_admin','tab_admin'].includes(CU.role);
const myOrgs = () => CU.role==='super' ? ['jihyebit','daniel'] : (CU.orgs&&CU.orgs.length?CU.orgs:[CU.org]);
function todayYMD(){ const n=new Date(); return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`; }
function studentGrade(sid){
  for(const c of CLASSES){
    if((c.students||[]).includes(sid) && c.grades && c.grades[sid]) return c.grades[sid];
  }
  return '';
}
function studentClass(sid){ return CLASSES.find(c=>(c.students||[]).includes(sid)); }
// 1인당 금액: 총액÷인원 → 10원 단위 올림
function perAmount(total, n){
  if(!total || !n) return 0;
  return Math.ceil(total / n / 10) * 10;
}

// ── 로그인 ──
onAuthStateChanged(auth, async (user) => {
  if(!user){
    $I('gate-msg').textContent = '로그인이 필요합니다.';
    $I('gate-btn').style.display = 'inline-block';
    return;
  }
  try {
    const snap = await getDoc(doc(db,'staff',user.uid));
    if(!snap.exists()){ $I('gate-msg').textContent='등록되지 않은 계정입니다.'; return; }
    CU = { uid:user.uid, ...snap.data() };
    if((CU.acStatus||'active')!=='active'){ $I('gate-msg').textContent='비활성화된 계정입니다.'; return; }
  } catch(e){ $I('gate-msg').textContent='오류: '+e.message; return; }

  $I('gate').style.display='none';
  $I('ms').style.display='flex';
  $I('hn').textContent = CU.name||'';
  $I('hi').textContent = `${ORGS[CU.org]||CU.org} · ${CU.role==='super'?'슈퍼관리자':CU.role==='org_admin'?'기관관리자':CU.role==='tab_admin'?'부서장':'교사'}`;
  if(window.renderTopNav) renderTopNav('expense', CU.role);

  await loadData();
  renderNew();
});

async function loadData(){
  window.showLoading && window.showLoading('학생·반 정보를 불러오는 중…');
  try {
    window.setLoadStep && window.setLoadStep('학생 명단 불러오는 중…', 35);
    const ss = await getDocs(collection(db,'students'));
    STUDENTS = []; ss.forEach(d=>STUDENTS.push({id:d.id, ...d.data()}));
    window.setLoadStep && window.setLoadStep('반 편성 불러오는 중…', 75);
    const cs = await getDocs(collection(db,'classes'));
    CLASSES = []; cs.forEach(d=>CLASSES.push({id:d.id, ...d.data()}));
  } catch(e){ toast('데이터 로드 실패: '+e.message,'err'); }
  finally { window.hideLoading && window.hideLoading(); }
}

function showTab(t){
  curTab = t;
  $I('tb-new').classList.toggle('on', t==='new');
  $I('tb-list').classList.toggle('on', t==='list');
  $I('tab-new').style.display = t==='new'?'':'none';
  $I('tab-list').style.display = t==='list'?'':'none';
  if(t==='new') renderNew();
  if(t==='list') renderList();
}
window.showTab = showTab;

// ══════════ 경비 신청 ══════════
let expOrg = '';
let checkedIds = new Set();
let openCls = {};

function renderNew(){
  const box = $I('tab-new');
  const orgs = myOrgs();
  if(!expOrg || !orgs.includes(expOrg)) expOrg = orgs[0];
  const orgTabs = orgs.length>1 ? `
    <div style="display:flex;gap:8px;margin-bottom:14px">
      ${orgs.map(o=>`<button class="subtbtn ${o===expOrg?'on':''}" onclick="setExpOrg('${o}')" style="padding:8px 18px">${ORGS[o]||o}</button>`).join('')}
    </div>` : '';

  box.innerHTML = `
    <div class="acard">
      <h3 class="actitle">➕ 수행성 경비 신청 (${ORGS[expOrg]||expOrg})</h3>
      <p class="adesc">수업에서 지출한 경비를 학생별로 청구합니다. <b>참여한 학생만 체크</b>하세요. 결석·미참석 학생은 체크하지 않으면 청구되지 않습니다. 1인당 금액은 <b>청구금액 ÷ 인원 (10원 단위 올림)</b>으로 자동 계산됩니다.</p>
      ${orgTabs}
      <div class="frow">
        <div class="fgrp"><label>신청 날짜 *</label><input type="date" id="ex-date" value="${todayYMD()}"></div>
        <div class="fgrp"><label>선생님</label><input type="text" id="ex-teacher" value="${esc(CU.name||'')}" readonly style="background:#eee"></div>
      </div>
      <div class="frow">
        <div class="fgrp"><label>수업 과목 *</label><input type="text" id="ex-subject" placeholder="예: 창작탐구"></div>
        <div class="fgrp"><label>청구 금액 (원) *</label><input type="number" id="ex-total" placeholder="예: 46650" min="0" inputmode="numeric"></div>
      </div>
      <div class="fgrp"><label>구매 목록 *</label><input type="text" id="ex-items" placeholder="예: 전통모빌 만들기 키트"></div>
      <div class="fgrp"><label>세부 내용 (선택)</label><input type="text" id="ex-detail" placeholder="예: 크라프트 A4노트 외"></div>
      <div class="frow">
        <div class="fgrp"><label>은행 이름</label><input type="text" id="ex-bank" value="${esc(CU.bankName||'')}" placeholder="예: 신한"></div>
        <div class="fgrp"><label>예금주</label><input type="text" id="ex-holder" value="${esc(CU.bankHolder||CU.name||'')}"></div>
      </div>
      <div class="fgrp"><label>계좌번호 <span style="color:var(--tl);font-weight:400">(한 번 입력하면 다음부터 자동으로 채워집니다)</span></label><input type="text" id="ex-account" value="${esc(CU.bankAccount||'')}" placeholder="숫자만 입력"></div>
      <div class="frow">
        <div class="fgrp"><label>학교 청구분 수량 (교사 사용분·학교 보관분)</label><input type="number" id="ex-schoolqty" value="0" min="0" inputmode="numeric"></div>
        <div class="fgrp"><label>학교 청구분 메모 (선택)</label><input type="text" id="ex-school" placeholder="예: 교사 시연용 1개, 잔여 2개 학교 보관"></div>
      </div>

      <div style="font-size:14px;font-weight:800;color:var(--gd);margin:18px 0 8px">참여 학생 체크 <span style="font-size:12px;color:var(--tl);font-weight:400">(반을 눌러 펼치고, 참여한 학생만 체크)</span></div>
      <div id="ex-classes"></div>

      <div class="sumbar">
        <span><span class="si">선택 인원</span> <span class="sv" id="sum-count">0명</span></span>
        <span><span class="si">1인당 청구</span> <span class="sv" id="sum-per">-</span></span>
        <span><span class="si">학생 청구 합계</span> <span class="sv" id="sum-total">-</span></span>
        <span><span class="si">학교 청구</span> <span class="sv" id="sum-school">-</span></span>
        <button class="bp" style="margin-left:auto;background:#fff;color:var(--gd)" onclick="submitExpense()">✅ 신청하기</button>
      </div>
    </div>`;
  renderClassChecks();
  $I('ex-total').oninput = refreshSum;
  $I('ex-schoolqty').oninput = refreshSum;
  refreshSum();
}
window.renderNew = renderNew;
function setExpOrg(o){ expOrg = o; checkedIds = new Set(); openCls = {}; renderNew(); }
window.setExpOrg = setExpOrg;

function renderClassChecks(){
  const wrap = $I('ex-classes');
  if(!wrap) return;
  // 반의 학년 정보 (※ 모든 정렬은 학년순)
  const gradeInfo = c => {
    const gs = new Set();
    (c.students||[]).forEach(id=>{ const g=(c.grades||{})[id]; if(g) gs.add(g); });
    const arr = [...gs].sort((a,b)=>(parseInt(a,10)||99)-(parseInt(b,10)||99));
    return { label: arr.length ? arr.map(g=>String(g).replace('학년','')).join('·')+'학년' : '', min: arr.length ? (parseInt(arr[0],10)||99) : 999 };
  };
  const classes = CLASSES.filter(c=>c.org===expOrg)
    .map(c=>({...c, __gi: gradeInfo(c)}))
    .sort((a,b)=> a.__gi.min - b.__gi.min || (a.name||'').localeCompare(b.name||'','ko'));
  // 반 없는 학생
  const inClassIds = new Set(); classes.forEach(c=>(c.students||[]).forEach(id=>inClassIds.add(id)));
  const noClass = STUDENTS.filter(s=>s.org===expOrg && (s.status||'active')!=='quit' && !inClassIds.has(s.id));

  const palette = ['#0891b2','#7c3aed','#db2777','#d97706','#059669','#2563eb','#dc2626','#4f46e5','#0d9488','#c026d3'];
  let html = '';
  const groups = classes.map(c=>({key:c.id, name:c.name||'(이름없음)', gradeLabel:c.__gi.label, ids:(c.students||[])}));
  if(noClass.length) groups.push({key:'__noclass', name:'반 미지정', gradeLabel:'', ids:noClass.map(s=>s.id)});

  groups.forEach((grp,gi)=>{
    // 이 반 학생들 (퇴원 제외)
    const studs = grp.ids.map(id=>STUDENTS.find(s=>s.id===id)).filter(s=>s && (s.status||'active')!=='quit');
    if(!studs.length) return;
    studs.sort((a,b)=>{
      const ga = parseInt(studentGrade(a.id),10)||99, gb = parseInt(studentGrade(b.id),10)||99;
      return ga-gb || (a.name||'').localeCompare(b.name||'','ko');
    });
    const accent = palette[gi % palette.length];
    const open = !!openCls[grp.key];
    const selCount = studs.filter(s=>checkedIds.has(s.id)).length;
    html += `<div class="gr-card ${open?'open':''}" data-cls="${esc(grp.key)}">
      <div class="gr-head" onclick="toggleCls('${esc(grp.key)}')">
        <span style="width:10px;height:10px;border-radius:50%;background:${accent};flex-shrink:0"></span>
        <span style="flex:1;font-size:15px;font-weight:700;color:var(--gd)">${esc(grp.name)}${grp.gradeLabel?` <span style="font-size:12px;color:var(--tl);font-weight:400">· ${esc(grp.gradeLabel)}</span>`:''}</span>
        <span style="font-size:12px;color:${selCount?'var(--gm)':'var(--tl)'};font-weight:${selCount?'700':'400'}" id="cls-sel-${esc(grp.key)}">${selCount?selCount+'명 선택':''}</span>
        <span style="font-size:12px;color:var(--tl)">${studs.length}명</span>
        <span class="gr-arrow">▼</span>
      </div>
      <div class="gr-body">
        <div class="gr-body-inner">
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <button class="bm" onclick="clsAll('${esc(grp.key)}',true)">전체 선택</button>
            <button class="bm" onclick="clsAll('${esc(grp.key)}',false)">전체 해제</button>
          </div>
          ${studs.map(s=>{
            const g = studentGrade(s.id);
            const isLeave = (s.status||'active')==='leave';
            const checked = checkedIds.has(s.id);
            return `<div class="stu-row ${isLeave?'leave':''} ${checked?'checked':''}" data-sid="${s.id}" onclick="${isLeave?'':`toggleStu('${s.id}')`}">
              <input type="checkbox" ${checked?'checked':''} ${isLeave?'disabled':''} onclick="event.stopPropagation();${isLeave?'':`toggleStu('${s.id}')`}">
              <div style="flex:1">
                <span class="stu-name">${esc(s.name)}</span>
                ${isLeave?'<span style="font-size:12px;color:#b45309;font-weight:700"> (휴학)</span>':''}
                <span class="stu-meta"> ${s.gender||''}${g?' · '+g:''}</span>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  });
  wrap.innerHTML = html || '<p class="empty">해당 기관에 학생이 없습니다.</p>';
  // 열린 반 높이 복원
  groups.forEach(grp=>{
    if(openCls[grp.key]){
      const card = wrap.querySelector(`.gr-card[data-cls="${cssEsc(grp.key)}"]`);
      if(card){ const body=card.querySelector('.gr-body'); const inner=card.querySelector('.gr-body-inner'); if(body&&inner) body.style.maxHeight='none'; }
    }
  });
}
function cssEsc(s){ return String(s).replace(/"/g,'\\"'); }

function toggleCls(key){
  const willOpen = !openCls[key];
  openCls[key] = willOpen;
  const card = document.querySelector(`.gr-card[data-cls="${cssEsc(key)}"]`);
  if(!card){ renderClassChecks(); return; }
  const body = card.querySelector('.gr-body');
  const inner = card.querySelector('.gr-body-inner');
  if(willOpen){
    card.classList.add('open');
    body.style.maxHeight = inner.scrollHeight + 'px';
    setTimeout(()=>{ if(openCls[key]) body.style.maxHeight='none'; }, 320);
  } else {
    body.style.maxHeight = inner.scrollHeight + 'px';
    requestAnimationFrame(()=>{ body.style.maxHeight='0px'; card.classList.remove('open'); });
  }
}
window.toggleCls = toggleCls;

function toggleStu(sid){
  if(checkedIds.has(sid)) checkedIds.delete(sid);
  else checkedIds.add(sid);
  // 행 UI 갱신
  const row = document.querySelector(`.stu-row[data-sid="${sid}"]`);
  if(row){
    const cb = row.querySelector('input[type=checkbox]');
    const on = checkedIds.has(sid);
    if(cb) cb.checked = on;
    row.classList.toggle('checked', on);
  }
  refreshClsCounts();
  refreshSum();
}
window.toggleStu = toggleStu;

function clsAll(key, on){
  // 그 반의 활성 학생 전체 선택/해제
  let ids = [];
  if(key==='__noclass'){
    const inClassIds = new Set(); CLASSES.filter(c=>c.org===expOrg).forEach(c=>(c.students||[]).forEach(id=>inClassIds.add(id)));
    ids = STUDENTS.filter(s=>s.org===expOrg && (s.status||'active')==='active' && !inClassIds.has(s.id)).map(s=>s.id);
  } else {
    const c = CLASSES.find(x=>x.id===key);
    ids = (c?.students||[]).filter(id=>{
      const s = STUDENTS.find(x=>x.id===id);
      return s && (s.status||'active')==='active';
    });
  }
  ids.forEach(id=>{ if(on) checkedIds.add(id); else checkedIds.delete(id); });
  renderClassChecks();
  refreshSum();
}
window.clsAll = clsAll;

function refreshClsCounts(){
  // 반 헤더의 선택 수 갱신
  document.querySelectorAll('.gr-card').forEach(card=>{
    const key = card.getAttribute('data-cls');
    const rows = card.querySelectorAll('.stu-row');
    let cnt = 0;
    rows.forEach(r=>{ if(checkedIds.has(r.getAttribute('data-sid'))) cnt++; });
    const el = card.querySelector(`[id^="cls-sel-"]`);
    if(el){ el.textContent = cnt?cnt+'명 선택':''; el.style.color = cnt?'var(--gm)':'var(--tl)'; el.style.fontWeight = cnt?'700':'400'; }
  });
}

function refreshSum(){
  const n = checkedIds.size;
  const sq = parseInt($I('ex-schoolqty')?.value||'0',10) || 0;
  const total = parseInt($I('ex-total')?.value||'0',10) || 0;
  const divisor = n + sq;
  const per = perAmount(total, divisor);
  $I('sum-count').textContent = n+'명' + (sq?` + 학교 ${sq}`:'');
  $I('sum-per').textContent = (divisor&&total) ? '₩'+won(per) : '-';
  $I('sum-total').textContent = (n&&total&&divisor) ? '₩'+won(per*n) : '-';
  const se = $I('sum-school');
  if(se) se.textContent = (sq&&total&&divisor) ? '₩'+won(per*sq) : '-';
}

async function submitExpense(){
  const date = $I('ex-date')?.value || '';
  const subject = $I('ex-subject')?.value.trim() || '';
  const items = $I('ex-items')?.value.trim() || '';
  const detail = $I('ex-detail')?.value.trim() || '';
  const total = parseInt($I('ex-total')?.value||'0',10) || 0;
  const bank = $I('ex-bank')?.value.trim() || '';
  const holder = $I('ex-holder')?.value.trim() || '';
  const account = $I('ex-account')?.value.trim() || '';
  const schoolNote = $I('ex-school')?.value.trim() || '';
  const ids = Array.from(checkedIds);

  if(!date){ toast('신청 날짜를 입력하세요.','err'); return; }
  if(!subject){ toast('수업 과목을 입력하세요.','err'); $I('ex-subject')?.focus(); return; }
  if(!items){ toast('구매 목록을 입력하세요.','err'); $I('ex-items')?.focus(); return; }
  if(!total || total<=0){ toast('청구 금액을 입력하세요.','err'); $I('ex-total')?.focus(); return; }
  if(!ids.length){ toast('참여 학생을 1명 이상 체크하세요.','err'); return; }

  const sq = parseInt($I('ex-schoolqty')?.value||'0',10) || 0;
  const divisor = ids.length + sq;
  const per = perAmount(total, divisor);
  const students = ids.map(id=>{
    const s = STUDENTS.find(x=>x.id===id);
    return {id, name:s?.name||'', grade:studentGrade(id)||'', classId:studentClass(id)?.id||'', className:studentClass(id)?.name||''};
  });

  if(!confirm(`청구금액 ₩${won(total)} ÷ ${divisor} (학생 ${ids.length}명${sq?` + 학교 ${sq}`:''}) = 1인당 ₩${won(per)} (10원 올림)\n\n· 학생 청구 합계: ₩${won(per*ids.length)}${sq?`\n· 학교 청구분: ₩${won(per*sq)}`:''}\n\n신청할까요?`)) return;

  try {
    await addDoc(collection(db,'expenses'), {
      org: expOrg, date, subject, items, detail,
      total, per, count: ids.length,
      schoolQty: sq, schoolTotal: per*sq,
      students,
      bank, holder, account, schoolNote,
      createdByUid: CU.uid, createdByName: CU.name||'',
      createdAt: Timestamp.now()
    });
    // 계좌 정보를 내 계정에 저장 (다음 신청 시 자동 입력)
    if(bank!==(CU.bankName||'') || account!==(CU.bankAccount||'') || holder!==(CU.bankHolder||'')){
      try {
        await updateDoc(doc(db,'staff',CU.uid), {bankName:bank, bankAccount:account, bankHolder:holder});
        Object.assign(CU, {bankName:bank, bankAccount:account, bankHolder:holder});
      } catch(e2){}
    }
    toast('경비 신청이 완료되었습니다.','ok');
    checkedIds = new Set();
    showTab('list');
  } catch(e){ toast('신청 실패: '+e.message,'err'); }
}
window.submitExpense = submitExpense;

// ══════════ 신청 내역 ══════════
async function renderList(){
  const box = $I('tab-list');
  box.innerHTML = '<div class="acard"><p class="empty">불러오는 중...</p></div>';
  window.showLoading && window.showLoading('신청 내역을 불러오는 중…');
  try {
    window.setLoadStep && window.setLoadStep('경비 내역 불러오는 중…', 55);
    const snap = await getDocs(collection(db,'expenses'));
    EXPENSES = []; snap.forEach(d=>EXPENSES.push({id:d.id, ...d.data()}));
    const orgs = myOrgs();
    EXPENSES = EXPENSES.filter(e=>orgs.includes(e.org));
    EXPENSES.sort((a,b)=> (b.date||'').localeCompare(a.date||'') || (b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  } catch(e){
    window.hideLoading && window.hideLoading();
    box.innerHTML = `<div class="acard"><p class="empty">불러올 수 없습니다: ${esc(e.message)}</p></div>`;
    return;
  } finally { window.hideLoading && window.hideLoading(); }

  const orgs2 = myOrgs();
  if(!listOrg || !orgs2.includes(listOrg)) listOrg = orgs2[0];
  const shown = EXPENSES.filter(e=>e.org===listOrg);
  const orgTabs = orgs2.length>1 ? `
    <div style="display:flex;gap:8px;margin-bottom:14px">
      ${orgs2.map(o=>`<button class="subtbtn ${o===listOrg?'on':''}" onclick="setListOrg('${o}')" style="padding:8px 18px">${ORGS[o]||o}</button>`).join('')}
    </div>` : '';

  box.innerHTML = `
    <div class="acard">
      <h3 class="actitle">📋 신청 내역 (${ORGS[listOrg]||listOrg})</h3>
      <p class="adesc">날짜순으로 정리된 수행성 경비 신청 내역입니다. 같은 기관 선생님과 관리자가 열람할 수 있습니다.</p>
      ${orgTabs}
      <div class="clist">
        ${shown.length ? shown.map(e=>`
          <div class="citem">
            <div style="flex:1;min-width:200px">
              <div style="font-size:15px;font-weight:700;color:var(--gd)">${esc(e.subject)} <span style="font-size:12px;color:var(--tl);font-weight:400">· ${esc(e.items||'')}</span></div>
              <div style="font-size:12px;color:var(--tl);margin-top:3px">
                ${esc(e.date)} · ${ORGS[e.org]||e.org} · ${esc(e.createdByName||'')} ·
                <b style="color:var(--gm)">₩${won(e.total)}</b> ÷ ${e.count}명 = <b style="color:var(--gm)">₩${won(e.per)}/인</b>
              </div>
            </div>
            <button class="bm" onclick="viewExpense('${e.id}')">상세보기</button>
            ${(CU.role==='super' || e.createdByUid===CU.uid) ? `<button class="bm" style="background:#fee2e2;color:#dc2626" onclick="delExpense('${e.id}')">삭제</button>` : ''}
          </div>`).join('') : '<p class="empty">아직 신청 내역이 없습니다.</p>'}
      </div>
    </div>`;
}
window.renderList = renderList;
function setListOrg(o){ listOrg = o; renderList(); }
window.setListOrg = setListOrg;

function viewExpense(id){
  const e = EXPENSES.find(x=>x.id===id); if(!e) return;
  // 반별로 그룹
  const byCls = {};
  (e.students||[]).forEach(st=>{
    const k = st.className || '반 미지정';
    (byCls[k] = byCls[k] || []).push(st);
  });
  const clsHTML = Object.keys(byCls).sort((a,b)=>a.localeCompare(b,'ko')).map(k=>`
    <div style="margin-bottom:10px">
      <div style="font-size:13px;font-weight:700;color:var(--gm);margin-bottom:4px">${esc(k)} <span style="color:var(--tl);font-weight:400">(${byCls[k].length}명)</span></div>
      <div style="font-size:13.5px;color:var(--tx);line-height:1.8">${byCls[k].map(st=>esc(st.name)+(st.grade?` <span style="font-size:11px;color:var(--tl)">${esc(st.grade)}</span>`:'')).join(', ')}</div>
    </div>`).join('');

  const mv = document.createElement('div'); mv.className='mov'; mv.id='exview-mod';
  mv.innerHTML = `<div class="mbk" onclick="document.getElementById('exview-mod').remove()"></div>
    <div class="mbox">
      <div class="mtitle">${esc(e.subject)}</div>
      <div class="msub">${esc(e.date)} · ${esc(e.createdByName||'')} · ${ORGS[e.org]||e.org}</div>
      <div style="background:var(--iv);border-radius:10px;padding:14px 16px;font-size:13.5px;line-height:2">
        <div><b>구매 목록</b> : ${esc(e.items||'-')}</div>
        ${e.detail?`<div><b>세부 내용</b> : ${esc(e.detail)}</div>`:''}
        <div><b>청구 금액</b> : ₩${won(e.total)}</div>
        <div><b>1인당 청구</b> : ₩${won(e.per)} × ${e.count}명 = ₩${won(e.per*e.count)}</div>
        ${e.bank||e.account?`<div><b>정산 계좌</b> : ${esc(e.bank||'')} ${esc(e.account||'')} (${esc(e.holder||'')})</div>`:''}
        ${(e.schoolQty||e.schoolNote)?`<div><b>학교 청구분</b> : ${e.schoolQty?`${e.schoolQty}개분 ₩${won(e.schoolTotal!=null?e.schoolTotal:(e.per||0)*(e.schoolQty||0))}`:''}${e.schoolNote?` ${e.schoolQty?'— ':''}${esc(e.schoolNote)}`:''}</div>`:''}
      </div>
      <div style="font-size:14px;font-weight:800;color:var(--gd);margin:14px 0 8px">청구 대상 학생 (${e.count}명)</div>
      ${clsHTML}
      <div class="mact">
        <button class="bs" onclick="document.getElementById('exview-mod').remove()">닫기</button>
      </div>
    </div>`;
  $I('mwrap').appendChild(mv);
}
window.viewExpense = viewExpense;

async function delExpense(id){
  const e = EXPENSES.find(x=>x.id===id); if(!e) return;
  if(!(CU.role==='super' || e.createdByUid===CU.uid)){ toast('삭제 권한이 없습니다.','err'); return; }
  if(!confirm(`"${e.subject}" (${e.date}) 신청을 삭제할까요?\n청구 대상 ${e.count}명의 기록이 함께 삭제됩니다.`)) return;
  try {
    await deleteDoc(doc(db,'expenses',id));
    toast('삭제했습니다.');
    renderList();
  } catch(e2){ toast('삭제 실패: '+e2.message,'err'); }
}
window.delExpense = delExpense;
</script>
