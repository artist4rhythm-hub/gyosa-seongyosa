// SheetJS 동적 로드
function ensureXLSX(){
  return new Promise((resolve,reject)=>{
    if(window.XLSX) return resolve();
    let sc=document.getElementById('xlsx-script');
    if(sc){ const chk=setInterval(()=>{ if(window.XLSX){clearInterval(chk);resolve();} },100); setTimeout(()=>{clearInterval(chk); if(!window.XLSX)reject(new Error('엑셀 모듈 로드 실패'));},8000); return; }
    sc=document.createElement('script'); sc.id='xlsx-script'; sc.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    sc.onload=()=>resolve(); sc.onerror=()=>reject(new Error('엑셀 모듈을 불러올 수 없습니다.')); document.head.appendChild(sc);
  });
}

// 취합을 엑셀로 (학생별 합산 시트 + 항목 매트릭스 시트)
async function excelReport(){
  const list = EXPENSES.filter(e=>!e.deleted && e.org===reportOrg && e.semester===reportSem)
    .sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  if(!list.length){ toast('내보낼 데이터가 없습니다.','err'); return; }
  window.showLoading && window.showLoading('엑셀 파일을 만드는 중…');
  try {
    await ensureXLSX();
    const gradeNum = g => parseInt(String(g||'').replace(/[^0-9]/g,''),10)||99;
    const amtOf = (e, sid) => { const s=(e.students||[]).find(x=>x.id===sid); return s? (e.mode==='refund'? -(s.amt||0) : (s.amt||0)) : null; };

    // 전체 학생 (학년→반→이름)
    const stuMap = new Map();
    list.forEach(e=>(e.students||[]).forEach(s=>{ if(!stuMap.has(s.id)) stuMap.set(s.id,{id:s.id,name:s.name,grade:resolveGrade(s),className:resolveClassName(s)}); }));
    const students = [...stuMap.values()].sort((a,b)=>gradeNum(a.grade)-gradeNum(b.grade)||(a.className||'').localeCompare(b.className||'','ko')||(a.name||'').localeCompare(b.name||'','ko'));

    const wb = window.XLSX.utils.book_new();

    // ── 시트1: 학생별 합산 ──
    const rows1 = [['학년','반','이름','참여건수','청구','반환','순청구액']];
    students.forEach(s=>{
      let charge=0, refund=0, cnt=0;
      list.forEach(e=>{ const a=amtOf(e,s.id); if(a!==null){ cnt++; if(a<0) refund+=-a; else charge+=a; } });
      rows1.push([s.grade||'', s.className||'', s.name||'', cnt, charge, refund, charge-refund]);
    });
    // 합계행
    const tc=students.reduce((t,s)=>t+list.reduce((x,e)=>{const a=amtOf(e,s.id);return x+(a>0?a:0);},0),0);
    const tr=students.reduce((t,s)=>t+list.reduce((x,e)=>{const a=amtOf(e,s.id);return x+(a<0?-a:0);},0),0);
    rows1.push(['','','합계','',tc,tr,tc-tr]);
    const ws1 = window.XLSX.utils.aoa_to_sheet(rows1);
    ws1['!cols'] = [{wch:8},{wch:12},{wch:10},{wch:8},{wch:13},{wch:13},{wch:14}];
    // 청구·반환·순청구액(4,5,6열) 회계 서식
    const money1 = '₩#,##0;[Red]₩-#,##0';
    const range1 = window.XLSX.utils.decode_range(ws1['!ref']);
    for(let R=1; R<=range1.e.r; R++){
      for(let C=4; C<=6; C++){
        const ref = window.XLSX.utils.encode_cell({r:R,c:C});
        if(ws1[ref] && typeof ws1[ref].v==='number') ws1[ref].z = money1;
      }
    }
    window.XLSX.utils.book_append_sheet(wb, ws1, '학생별 합산');

    // ── 시트2: 항목 매트릭스 (학생 × 항목) ──
    const header = ['학년','반','이름', ...list.map(e=>`${e.subject}(${e.date})${e.mode==='refund'?'[반환]':''}`), '개인합계'];
    const rows2 = [
      ['','','담당', ...list.map(e=>e.teacher||''), ''],
      ['','','1인당', ...list.map(e=>e.mode==='refund'?-(e.per||0):(e.per||0)), ''],
      header
    ];
    students.forEach(s=>{
      let sum=0;
      const cells = list.map(e=>{ const a=amtOf(e,s.id); if(a!==null) sum+=a; return a===null?'':a; });
      rows2.push([s.grade||'', s.className||'', s.name||'', ...cells, sum]);
    });
    // 항목합계
    const footCells = list.map(e=>students.reduce((t,s)=>t+(amtOf(e,s.id)||0),0));
    const grand = footCells.reduce((a,b)=>a+b,0);
    rows2.push(['','','항목합계', ...footCells, grand]);
    const ws2 = window.XLSX.utils.aoa_to_sheet(rows2);
    ws2['!cols'] = [{wch:8},{wch:12},{wch:10}, ...list.map(()=>({wch:15})), {wch:15}];
    // 회계 숫자서식: ₩ 왼쪽, 음수는 −. 금액 셀 전체에 적용
    const money = '₩#,##0;[Red]₩-#,##0';
    const totCol = 3 + list.length;   // 개인합계 열 인덱스(0-base)
    const range2 = window.XLSX.utils.decode_range(ws2['!ref']);
    for(let R=1; R<=range2.e.r; R++){
      for(let C=3; C<=totCol; C++){
        const ref = window.XLSX.utils.encode_cell({r:R,c:C});
        const cell = ws2[ref];
        if(cell && typeof cell.v==='number'){ cell.z = money; }
      }
    }
    // 1인당 행(2번째 데이터 행)도 회계서식
    for(let C=3; C<3+list.length; C++){
      const ref = window.XLSX.utils.encode_cell({r:1,c:C});
      if(ws2[ref] && typeof ws2[ref].v==='number') ws2[ref].z = money;
    }
    window.XLSX.utils.book_append_sheet(wb, ws2, '항목별 상세');

    // ── 시트3: 신청 목록 ──
    const rows3 = [['날짜','학기','담당','과목','구매목록','세부','방식','총액','1인당','인원','학교청구분','선생님반환금','입금상태','입금확인일','입금담당']];
    list.forEach(e=>{
      rows3.push([
        e.date, e.semester?semKor(e.semester):'', e.teacher||'', e.subject, e.items, e.detail||'',
        e.mode==='refund'?'개별반환':e.mode==='indiv'?'개별청구':'균등(1/N)',
        e.total, e.per??'', e.count, e.schoolTotal||0, e.teacherRefund||0,
        e.paid?'입금완료':'입금대기', e.paid&&e.paidAt?fmtDateTime(e.paidAt):'', e.paidByName||''
      ]);
    });
    // 학교 정산 합계행
    const schoolSum = list.reduce((t,e)=>t+(e.schoolTotal||0),0);
    const trSum = list.reduce((t,e)=>t+(e.teacherRefund||0),0);
    rows3.push(['','','','','','','합계','','','', schoolSum, trSum, '','','']);
    rows3.push(['','','','','','','학교 최종 청구 (학교청구분−선생님반환금)','','','', schoolSum - trSum, '','','','']);
    const ws3 = window.XLSX.utils.aoa_to_sheet(rows3);
    ws3['!cols'] = [{wch:11},{wch:12},{wch:8},{wch:12},{wch:16},{wch:12},{wch:14},{wch:11},{wch:9},{wch:6},{wch:11},{wch:12},{wch:9},{wch:16},{wch:8}];
    window.XLSX.utils.book_append_sheet(wb, ws3, '신청 목록');

    const gradeKeys = [...new Set(students.map(s=>{const n=gradeNum(s.grade);return n<99?n+'학년':'';}).filter(Boolean))];
    window.XLSX.writeFile(wb, `수행성경비_취합_${ORGS[reportOrg]||reportOrg}_${semKor(reportSem)}.xlsx`);
    window.hideLoading && window.hideLoading();
    toast('엑셀 파일을 저장했습니다.','ok');
  } catch(e){ window.hideLoading && window.hideLoading(); toast('엑셀 생성 실패: '+(e.message||''),'err'); }
}

// 신청 건 고유번호: 기관·학기 내 날짜순 순번 (#001, #002…)
function expenseSeqMap(){
  const list = EXPENSES.filter(e=>!e.deleted && e.org===reportOrg && e.semester===reportSem)
    .sort((a,b)=>(a.date||'').localeCompare(b.date||'') || (a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
  const map = {};
  list.forEach((e,i)=>{ map[e.id] = 'R'+String(i+1).padStart(3,'0'); });
  return { list, map };
}
// 상세표에서 쓸: 신청건 번호 조회
function expenseSeqNo(id){ return expenseSeqMap().map[id] || ''; }

// 영수증 취합 HTML 생성 (신청 건별 카드 + 영수증, 가로/세로/짧은세로 자동 배치)
let _rcCollectCache = null;
async function buildReceiptCollectionHTML(withReceipts){
  const { map } = expenseSeqMap();
  // 각 신청의 영수증 로드
  const blocks = [];
  for(const e of withReceipts){
    const snap = await getDocs(query(collection(db,'expenseReceipts'), where('expenseId','==',e.id)));
    const arr=[]; snap.forEach(d=>arr.push({id:d.id,...d.data()}));
    arr.sort((a,b)=>(a.idx||0)-(b.idx||0));
    blocks.push({ exp:e, seq:map[e.id], receipts:arr });
  }
  _rcCollectCache = blocks;

  // 각 영수증의 가로세로 판단 (이미지 로드)
  const classify = (dataUrl) => new Promise(res=>{
    const img=new Image();
    img.onload=()=>{ const r=img.naturalWidth/img.naturalHeight;
      let type; if(r>1.15) type='wide'; else if(r<0.72) type='tall'; else type='short';
      res(type);
    };
    img.onerror=()=>res('short');
    img.src=dataUrl;
  });

  let cardsHTML = '';
  for(const b of blocks){
    const e = b.exp;
    const modeName = e.mode==='refund'?'반환':e.mode==='indiv'?'개별청구':'균등';
    const amtStr = `₩${(e.total||0).toLocaleString('ko-KR')}`;
    // 영수증 셀
    let cells = '';
    for(let i=0;i<b.receipts.length;i++){
      const rc=b.receipts[i];
      const type = await classify(rc.dataUrl);
      const rno = `${b.seq}-${i+1}`;
      const cls = type==='wide'?'rc-cell wide':type==='tall'?'rc-cell tall':'rc-cell short';
      cells += `<div class="${cls}">
        <div class="rc-no">${rno}</div>
        <img src="${rc.dataUrl}">
      </div>`;
    }
    cardsHTML += `<div class="rc-card">
      <div class="rc-chd">
        <span class="rc-seq">${b.seq}</span>
        <span class="rc-subj">${esc(e.subject)}</span>
        <span class="rc-meta">${esc(e.teacher||'')} · ${esc(e.date||'')} · ${modeName} <b>${amtStr}</b> · 영수증 ${b.receipts.length}장</span>
      </div>
      <div class="rc-grid">${cells}</div>
    </div>`;
  }

  return `<div class="rc-doc">
    <div class="rc-head">
      <div class="rc-title">${esc(ORGS[reportOrg]||reportOrg)} 수행성 경비 영수증 취합</div>
      <div class="rc-sub">${esc(semKor(reportSem))} · 신청 ${blocks.length}건 · 날짜순 · 추출일 ${todayYMD()}</div>
    </div>
    ${cardsHTML}
    <div class="rc-foot">※ 번호(R###)는 신청 건, R###-N은 개별 영수증입니다. 상세표의 번호와 대조하여 확인하세요.</div>
  </div>`;
}

async function printReceiptCollection(){
  if(!_rcCollectCache){ toast('먼저 미리보기를 불러오세요.','err'); return; }
  window.showLoading && window.showLoading('영수증 취합 PDF를 만드는 중…');
  try {
    await ensureH2C(); await ensureJsPDF();
    const holder=document.createElement('div'); holder.style.cssText='position:fixed;left:-99999px;top:0;';
    const { list } = expenseSeqMap();
    const withReceipts = list.filter(e=>e.receiptCount>0);
    holder.innerHTML = `<style>${RCCOL_CSS}</style>` + await buildReceiptCollectionHTML(withReceipts);
    document.body.appendChild(holder);
    const node=holder.querySelector('.rc-doc');
    await Promise.all([...node.querySelectorAll('img')].map(im=> im.complete?Promise.resolve():new Promise(r=>{im.onload=r;im.onerror=r;})));
    const canvas=await window.html2canvas(node,{scale:2,backgroundColor:'#ffffff',useCORS:true});

    const { jsPDF }=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight(), margin=6;
    const iw=pw-margin*2;
    const scale = canvas.width / node.offsetWidth;    // DOM px → canvas px 비율
    const pageH = Math.floor(canvas.width*(ph-margin*2)/iw);   // 한 페이지 canvas 높이

    // 카드(및 헤더)의 경계 위치를 canvas 좌표로 수집 → 이 지점에서만 페이지를 끊음
    const docTop = node.getBoundingClientRect().top;
    const breakEls = [...node.querySelectorAll('.rc-card')];
    // 각 카드의 시작 y (canvas 좌표)
    const cardTops = breakEls.map(el => Math.round((el.getBoundingClientRect().top - docTop) * scale));

    document.body.removeChild(holder);

    // 페이지 경계 계산: pos부터 pageH를 넘지 않는 선에서, 카드 경계에 맞춰 자름
    const slices = [];
    let pos = 0;
    const total = canvas.height;
    while(pos < total){
      let end = pos + pageH;
      if(end >= total){ end = total; }
      else {
        // pos~end 사이에 걸치는 카드 경계 중, end보다 작은 마지막 경계로 end를 당김
        // (카드가 페이지 중간에서 시작해 넘어가면, 그 카드 시작에서 끊어 다음 페이지로)
        const candidates = cardTops.filter(t => t > pos + 10 && t < end);
        if(candidates.length){
          const cut = Math.max(...candidates);
          // 너무 짧게 잘리는 것 방지 (페이지의 15% 이상은 채우게)
          if(cut - pos > pageH*0.15) end = cut;
        }
      }
      slices.push({ y:pos, h:end-pos });
      pos = end;
    }

    slices.forEach((sl,i)=>{
      const c=document.createElement('canvas'); c.width=canvas.width; c.height=sl.h;
      c.getContext('2d').drawImage(canvas,0,sl.y,canvas.width,sl.h,0,0,canvas.width,sl.h);
      const sh=sl.h*iw/canvas.width;
      if(i>0) pdf.addPage();
      pdf.addImage(c.toDataURL('image/jpeg',0.9),'JPEG',margin,margin,iw,sh);
    });
    pdf.save(`영수증취합_${semKor(reportSem)}.pdf`);
    window.hideLoading && window.hideLoading(); toast('PDF를 저장했습니다.','ok');
  } catch(e){ window.hideLoading && window.hideLoading(); toast('출력 실패: '+(e.message||''),'err'); }
}

// 전체 상세표 출력용 데이터 준비 (모든 학생 × 모든 항목, 학년 구분)
function buildAllSheetData(){
  const gradeNum = g => parseInt(String(g||'').replace(/[^0-9]/g,''),10)||99;
  const gradeLabel = g => { const n=parseInt(String(g||'').replace(/[^0-9]/g,''),10); return n?`${n}학년`:'학년 미지정'; };
  let list = EXPENSES.filter(e=>!e.deleted && e.org===reportOrg && e.semester===reportSem);
  const groupKey = e => allSheetGroupBy==='teacher' ? (e.teacher||'담당 미지정') : allSheetGroupBy==='subject' ? (e.subject||'과목 미지정') : null;
  if(allSheetGroupBy!=='none') list=[...list].sort((a,b)=>(groupKey(a)||'').localeCompare(groupKey(b)||'','ko')||(a.date||'').localeCompare(b.date||''));
  else list=[...list].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const amtOf = (e, sid) => { const s=(e.students||[]).find(x=>x.id===sid); return s? (e.mode==='refund'? -(s.amt||0) : (s.amt||0)) : null; };
  const stuMap = new Map();
  list.forEach(e=>(e.students||[]).forEach(s=>{ if(!stuMap.has(s.id)) stuMap.set(s.id,{id:s.id,name:s.name,grade:resolveGrade(s),className:resolveClassName(s)}); }));
  const students = [...stuMap.values()].sort((a,b)=>gradeNum(a.grade)-gradeNum(b.grade)||(a.className||'').localeCompare(b.className||'','ko')||(a.name||'').localeCompare(b.name||'','ko'));
  return { items:list, students, amtOf, gradeLabel };
}

// 전체 상세표 → 인쇄용 HTML (안내장 스타일, 학년 구분선)
// opts: { itemsSubset: 항목 부분(PDF 페이지용), pageNo, pageCnt, showTotal: 개인합계 표시 여부, fullWidth: 실제 표 폭 사용(이미지용) }
function buildAllSheetHTML(opts){
  opts = opts || {};
  const data = buildAllSheetData();
  const allItems = data.items, students = data.students, amtOf = data.amtOf, gradeLabel = data.gradeLabel;
  const items = opts.itemsSubset || allItems;
  const showTotal = opts.showTotal !== false;   // 기본: 표시
  if(!items.length || !students.length) return '';
  const won2 = n => (n||0).toLocaleString('ko-KR');
  const perLine = (e)=> e.mode==='refund'?`↩️ ${accMoney(Math.abs(e.per|| ((e.students||[]).find(x=>true)?.amt) || 0), false)}`:`${accMoney(e.per||0, false)}${e.mode==='equal'?'<span style="opacity:.6;font-size:8.5px">/인</span>':''}`;
  const gradeW=56, nameW=64, totW=showTotal?104:0, pad=30, maxInner=1063;
  const availForItems = maxInner - gradeW - nameW - totW;
  let itemColW = Math.max(64, Math.floor(availForItems / items.length));
  const tableW = gradeW + nameW + itemColW*items.length + totW;
  // fullWidth(이미지): 표 실폭 그대로 → 잘림 없음 / PDF 페이지: maxInner 이하로만 사용
  const innerW = opts.fullWidth ? tableW : Math.min(tableW, maxInner);
  const docW = innerW + pad*2;
  const colgroup = `<colgroup><col style="width:${gradeW}px"><col style="width:${nameW}px">${items.map(()=>`<col style="width:${itemColW}px">`).join('')}${showTotal?`<col style="width:${totW}px">`:''}</colgroup>`;
  const headRows = `
    <tr><th class="nm hd">학년·반</th><th class="nm hd">이름</th>${items.map(e=>`<th class="ic subj"><span style="font-size:8.5px;opacity:.85;font-weight:600">${expenseSeqNo(e.id)}</span><br>${esc(e.subject)}${e.mode==='refund'?'<br>(반환)':''}</th>`).join('')}${showTotal?`<th class="tot hd">개인 합계<br><span style="font-size:8.5px;font-weight:600;opacity:.9">낼 금액 · (−)환급</span></th>`:''}</tr>
    <tr><td class="rl" colspan="2">담당</td>${items.map(e=>`<td class="ic2">${esc(e.teacher||'-')}</td>`).join('')}${showTotal?`<td class="rl2"></td>`:''}</tr>
    <tr><td class="rl" colspan="2">신청일</td>${items.map(e=>`<td class="ic2">${esc(e.date||'-')}</td>`).join('')}${showTotal?`<td class="rl2"></td>`:''}</tr>
    <tr><td class="rl" colspan="2">세부내용</td>${items.map(e=>`<td class="ic2 det">${esc(e.items||'')}${e.detail?'<br>'+esc(e.detail):''}</td>`).join('')}${showTotal?`<td class="rl2"></td>`:''}</tr>
    <tr><td class="rl" colspan="2">1인당</td>${items.map(e=>`<td class="ic2 per">${perLine(e)}</td>`).join('')}${showTotal?`<td class="rl2"></td>`:''}</tr>`;

  // 학년·반 그룹핑: 같은 (학년+반)은 rowspan으로 병합
  const grpKey = st => `${gradeLabel(st.grade)}||${st.className||'-'}`;
  const grpLabel = st => `${gradeLabel(st.grade)}<br><span style="font-size:9px;font-weight:400;opacity:.8">${esc(st.className||'')}</span>`;
  // 각 그룹의 학생 수 계산
  const groupCount = {};
  students.forEach(st=>{ const k=grpKey(st); groupCount[k]=(groupCount[k]||0)+1; });
  let prevKey = null;
  const bodyRows = students.map(st=>{
    // 개인 합계는 항상 "전체 항목" 기준 (페이지가 나뉘어도 합계는 동일)
    let sum=0;
    allItems.forEach(e=>{ const a=amtOf(e,st.id); if(a!==null) sum+=a; });
    const tds = items.map(e=>{ const a=amtOf(e,st.id); if(a===null) return '<td class="x">·</td>'; const isRef=a<0; return `<td class="${isRef?'ref':'chg'}">${accMoney(Math.abs(a), isRef)}</td>`; }).join('');
    const k = grpKey(st);
    let grpCell = '';
    if(k !== prevKey){ prevKey = k; grpCell = `<td class="grpcell" rowspan="${groupCount[k]}">${grpLabel(st)}</td>`; }
    return `<tr>${grpCell}<td class="nm">${esc(st.name)}</td>${tds}${showTotal?`<td class="tot">${accMoney(sum, sum<0)}</td>`:''}</tr>`;
  }).join('');
  const footTds = items.map(e=>{ const t=students.reduce((tt,st)=>tt+(amtOf(e,st.id)||0),0); return `<td class="ft">${accMoney(Math.abs(t), false)}</td>`; }).join('');
  const grand = students.reduce((tt,st)=>tt+allItems.reduce((x,e)=>x+(amtOf(e,st.id)||0),0),0);
  const pageTag = (opts.pageCnt&&opts.pageCnt>1)?` · ${opts.pageNo}/${opts.pageCnt}쪽 (항목 나눔)`:'';
  return `<div class="sheet-doc land" style="width:${docW}px;padding:${pad}px">
    <div class="sheet-head"><div class="sh-title">${esc(ORGS[reportOrg]||reportOrg)} 수행성 경비 전체 취합</div><div class="sh-sub">${esc(semKor(reportSem))} · 전체 학년 · 학생 ${students.length}명 · 항목 ${allItems.length}개${pageTag}</div></div>
    <table class="sheet-tbl">${colgroup}<thead>${headRows}</thead><tbody>${bodyRows}</tbody>
    <tfoot><tr><th class="nm" colspan="2">항목합계</th>${footTds}${showTotal?`<td class="tot">${accMoney(grand, grand<0)}</td>`:''}</tr></tfoot></table>
    <div class="sheet-foot">※ 금액이 적힌 칸이 청구, 반환은 (−)로 표시됩니다.${showTotal?' 개인 합계는 전체 항목 기준입니다.':''}</div>
  </div>`;
}

async function printAllSheet(){
  const { items, students } = buildAllSheetData();
  if(!items.length){ toast('출력할 데이터가 없습니다.','err'); return; }
  window.showLoading && window.showLoading('전체 상세표 PDF를 만드는 중…');
  try {
    await ensureH2C(); await ensureJsPDF();
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({orientation:'landscape', unit:'mm', format:'a4'});
    const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight(), margin=8;
    const iw=pw-margin*2;

    // 항목이 많으면 열 나눔: 페이지당 최대 11개 (A4 가로에서 읽을 수 있는 한계)
    const PER_PAGE = 11;
    const chunks = [];
    for(let i=0;i<items.length;i+=PER_PAGE) chunks.push(items.slice(i,i+PER_PAGE));
    let firstPage = true;

    for(let c=0;c<chunks.length;c++){
      window.setLoadStep && window.setLoadStep(`표 만드는 중… (${c+1}/${chunks.length})`, Math.round((c+1)/chunks.length*90));
      const holder = document.createElement('div');
      holder.style.cssText='position:fixed;left:-99999px;top:0;';
      holder.innerHTML = `<style>${SHEET_CSS}${ALLSHEET_CSS}</style>` + buildAllSheetHTML({
        itemsSubset: chunks[c],
        pageNo: c+1, pageCnt: chunks.length,
        showTotal: c === chunks.length-1   // 개인 합계는 마지막 묶음에만
      });
      document.body.appendChild(holder);
      const node = holder.querySelector('.sheet-doc');
      const canvas = await window.html2canvas(node, {scale:2, backgroundColor:'#ffffff', useCORS:true});
      document.body.removeChild(holder);
      const ih=canvas.height*iw/canvas.width;
      const img=canvas.toDataURL('image/jpeg',0.92);
      if(ih<=ph-margin*2){
        if(!firstPage) pdf.addPage();
        pdf.addImage(img,'JPEG',margin,margin,iw,ih);
        firstPage=false;
      } else {
        // 세로로도 길면 페이지 내 세로 분할
        let remaining=canvas.height, pos=0; const pageH=Math.floor(canvas.width*(ph-margin*2)/iw);
        while(remaining>0){ const sl=document.createElement('canvas'); sl.width=canvas.width; sl.height=Math.min(pageH,remaining);
          sl.getContext('2d').drawImage(canvas,0,pos,canvas.width,sl.height,0,0,canvas.width,sl.height);
          const sh=sl.height*iw/canvas.width;
          if(!firstPage) pdf.addPage();
          pdf.addImage(sl.toDataURL('image/jpeg',0.92),'JPEG',margin,margin,iw,sh);
          firstPage=false;
          remaining-=sl.height; pos+=sl.height; }
      }
    }
    pdf.save(`수행성경비_전체취합_${semKor(reportSem)}.pdf`);
    window.hideLoading && window.hideLoading();
    toast(chunks.length>1?`PDF를 저장했습니다. (항목이 많아 ${chunks.length}묶음으로 나눴어요)`:'PDF를 저장했습니다.','ok');
  } catch(e){ window.hideLoading && window.hideLoading(); toast('출력 실패: '+(e.message||''),'err'); }
}
window.printAllSheet = printAllSheet;

function renderAllSheet(){
  const box = $I('all-sheet-body');
  if(!box) return;
  const gradeNum = g => parseInt(String(g||'').replace(/[^0-9]/g,''),10)||99;
  const gradeLabel = g => { const n=parseInt(String(g||'').replace(/[^0-9]/g,''),10); return n?`${n}학년`:'학년 미지정'; };

  let list = EXPENSES.filter(e=>!e.deleted && e.org===reportOrg && e.semester===reportSem);
  // 항목 정렬/그룹
  const groupKey = e => allSheetGroupBy==='teacher' ? (e.teacher||'담당 미지정')
                      : allSheetGroupBy==='subject' ? (e.subject||'과목 미지정') : null;
  if(allSheetGroupBy!=='none'){
    list = [...list].sort((a,b)=> (groupKey(a)||'').localeCompare(groupKey(b)||'','ko') || (a.date||'').localeCompare(b.date||''));
  } else {
    list = [...list].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  }
  const items = list;
  if(!items.length){ box.innerHTML='<p class="empty" style="padding:20px">신청 내역이 없습니다.</p>'; return; }

  const amtOf = (e, sid) => { const s=(e.students||[]).find(x=>x.id===sid); return s? (e.mode==='refund'? -(s.amt||0) : (s.amt||0)) : null; };

  // 전체 학생 (학년→반→이름)
  const stuMap = new Map();
  items.forEach(e=>(e.students||[]).forEach(s=>{ if(!stuMap.has(s.id)) stuMap.set(s.id,{id:s.id,name:s.name,grade:resolveGrade(s),className:resolveClassName(s)}); }));
  const allStudents = [...stuMap.values()].sort((a,b)=>gradeNum(a.grade)-gradeNum(b.grade)||(a.className||'').localeCompare(b.className||'','ko')||(a.name||'').localeCompare(b.name||'','ko'));

  const byGrade = {};
  allStudents.forEach(s=>{ const k=gradeLabel(s.grade); (byGrade[k]=byGrade[k]||[]).push(s); });

  // 기본: 모든 학년 펼침 (처음 열 때)

// JSZip 동적 로드
function ensureJSZip(){
  return new Promise((resolve, reject)=>{
    if(window.JSZip) return resolve();
    let sc = document.getElementById('jszip-script');
    if(sc){
      const chk = setInterval(()=>{ if(window.JSZip){ clearInterval(chk); resolve(); } }, 100);
      setTimeout(()=>{ clearInterval(chk); if(!window.JSZip) reject(new Error('압축 모듈 로드 실패')); }, 8000);
      return;
    }
    sc = document.createElement('script');
    sc.id = 'jszip-script';
    sc.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    sc.onload = ()=> resolve();
    sc.onerror = ()=> reject(new Error('압축 모듈을 불러올 수 없습니다.'));
    document.head.appendChild(sc);
  });
}

          <button class="bs" style="background:var(--danger-bg);color:var(--danger);border-color:var(--danger-bg)" onclick="deleteYear()">🗑️ 해당 연도 데이터 삭제</button>
        </div>
      </div>` : '<p class="empty">아직 백업할 데이터가 없습니다.</p>'}
    </div>`;
}
window.renderBackup = renderBackup;

// 신청 가능 기간 저장
async function saveWindow(){
  const after = parseInt($I('cfg-after')?.value||'8',10);
  const before = parseInt($I('cfg-before')?.value||'14',10);
  if(isNaN(after)||isNaN(before)||after<0||before<0){ toast('올바른 숫자를 입력하세요.','err'); return; }
  EXP_WINDOW = {afterDays:after, beforeDays:before};
  try {
    await setDoc(doc(db,'expenseConfig','window'), EXP_WINDOW);
    toast('신청 가능 기간을 저장했습니다.','ok');
  } catch(e){ toast('저장 실패: '+e.message,'err'); }
}
window.saveWindow = saveWindow;

// 기관별 경비 관리자 추가/삭제
async function addManager(org){
  const sel = $I('mgr-sel-'+org);
  const uid = sel?.value;
  if(!uid){ toast('추가할 선생님을 선택하세요.','err'); return; }
  const cur = EXP_MANAGERS[org] || [];
  if(cur.includes(uid)) return;
  EXP_MANAGERS[org] = [...cur, uid];
  try {
    await setDoc(doc(db,'expenseConfig','managers'), EXP_MANAGERS);
    toast('관리자를 추가했습니다.','ok');
    renderBackup();
  } catch(e){ toast('저장 실패: '+e.message,'err'); }
}
window.addManager = addManager;

async function removeManager(org, uid){
  const cur = EXP_MANAGERS[org] || [];
  EXP_MANAGERS[org] = cur.filter(u=>u!==uid);
  try {
    await setDoc(doc(db,'expenseConfig','managers'), EXP_MANAGERS);
    toast('관리자를 해제했습니다.');
    renderBackup();
  } catch(e){ toast('저장 실패: '+e.message,'err'); }
}
window.removeManager = removeManager;

async function backupYear(){
  const y = $I('bk-year')?.value;
  if(!y) return;
  const list = backupAll.filter(e=>(e.date||'').startsWith(y));
  if(!list.length){ toast('해당 연도 데이터가 없습니다.','err'); return; }
  window.showLoading && window.showLoading(`${y}년 백업 준비 중…`);
  try {
    await ensureJSZip();
    const zip = new window.JSZip();

    // 원본 JSON
    const jsonData = list.map(e=>({...e, createdAt: e.createdAt?.seconds || null}));
    zip.file(`expenses_${y}.json`, JSON.stringify(jsonData, null, 2));

    // 엑셀용 CSV (UTF-8 BOM)
    const rows = [['날짜','학기','기관','방식','담당선생님','수업과목','구매목록','세부내용','총액','1인당','학생수','학교수량','학교청구','은행','계좌','예금주','작성자','영수증장수','학생명단(이름:금액)']];
    list.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    list.forEach(e=>{
      rows.push([
        e.date, e.semester?semKor(e.semester):'', ORGS[e.org]||e.org,
        e.mode==='refund'?'개별반환':e.mode==='indiv'?'개별청구':'균등(1/N)',
        e.teacher||'', e.subject, e.items, e.detail||'',
        e.total, e.per??'', e.count, e.schoolQty||0, e.schoolTotal||0,
        e.bank||'', e.account||'', e.holder||'', e.createdByName||'',
        e.receiptCount||0,
        (e.students||[]).map(s=>`${s.name}:${s.amt??e.per??''}`).join('; ')
      ]);
    });
    const csv = '\ufeff' + rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
    zip.file(`수행성경비_${y}.csv`, csv);

    // 영수증 이미지
    let done = 0;
    for(const e of list){
      const rs = await getDocs(query(collection(db,'expenseReceipts'), where('expenseId','==',e.id)));
      const arr = []; rs.forEach(d=>arr.push(d.data()));
      arr.sort((a,b)=>(a.idx||0)-(b.idx||0));
      arr.forEach(r=>{
        const b64 = (r.dataUrl||'').split(',')[1];
        if(b64){
          const safe = (e.subject||'').replace(/[\\/:*?"<>|]/g,'').slice(0,20);
          zip.file(`영수증/${e.date}_${safe}_${e.id.slice(0,6)}_${r.idx||1}.jpg`, b64, {base64:true});
        }
      });
      done++;
      window.setLoadStep && window.setLoadStep(`영수증 수집 중… (${done}/${list.length})`, 10 + Math.round(done/list.length*70));
    }

    window.setLoadStep && window.setLoadStep('ZIP 파일 생성 중…', 88);
    const blob = await zip.generateAsync({type:'blob'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `수행성경비_백업_${y}.zip`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
    window.hideLoading && window.hideLoading();
    toast(`${y}년 백업 파일을 다운로드했습니다. 파일이 잘 열리는지 확인하세요!`,'ok');
  } catch(e){
    window.hideLoading && window.hideLoading();
    toast('백업 실패: '+(e.message||''),'err');
  }
}
window.backupYear = backupYear;

async function deleteYear(){
  const y = $I('bk-year')?.value;
  const typed = $I('bk-del-year')?.value.trim();
  if(!y) return;
  if(typed !== y){
    toast(`삭제하려면 입력칸에 연도(${y})를 똑같이 입력하세요.`,'err');
    $I('bk-del-year')?.focus();
    return;
  }
  const list = backupAll.filter(e=>(e.date||'').startsWith(y));
  if(!list.length){ toast('해당 연도 데이터가 없습니다.','err'); return; }
  if(!confirm(`⚠️ ${y}년 수행성 경비 ${list.length}건과 영수증을 모두 삭제합니다.\n\n백업 파일을 먼저 다운로드하고 열어서 확인하셨나요?\n삭제하면 복구할 수 없습니다.\n\n정말 삭제할까요?`)) return;
  window.showLoading && window.showLoading(`${y}년 데이터 삭제 중…`);
  let done = 0;
  try {
    for(const e of list){
      const rs = await getDocs(query(collection(db,'expenseReceipts'), where('expenseId','==',e.id)));
      const dels = []; rs.forEach(d=>dels.push(deleteDoc(doc(db,'expenseReceipts',d.id))));
      await Promise.all(dels);
      await deleteDoc(doc(db,'expenses',e.id));
      done++;
      window.setLoadStep && window.setLoadStep(`삭제 중… (${done}/${list.length})`, Math.round(done/list.length*95));
    }
    window.hideLoading && window.hideLoading();
    toast(`${y}년 데이터 ${done}건을 삭제했습니다.`,'ok');
    renderBackup();
  } catch(err){
    window.hideLoading && window.hideLoading();
    toast(`삭제 중 오류: ${err.message||''} (${done}건은 삭제됨)`,'err');
    renderBackup();
  }
}
window.deleteYear = deleteYear;
</script>

</html>
