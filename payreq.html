<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경비 지급 요청서 · 교사 선교사</title>
<meta name="theme-color" content="#1E3932">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="stylesheet" href="theme.css">
<style>
:root {
  --gd:#1E3932; --gm:#00704A; --gl:#D4E9E2; --gp:#E8F3EF;
  --gold:#B08D3C; --goldd:#8A6410; --goldp:#F7EFD8;
  --iv:#F2F0EB; --ivd:#E3E1DA;
  --tx:#1F2320; --ts:#5A6560; --tl:#93A09A; --wh:#ffffff;
  --sh:0 2px 12px rgba(30,57,50,0.08); --r:12px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--iv);color:var(--tx);min-height:100vh;}

#gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#E8F3EF 0%,#F2F0EB 60%,#F7EFD8 100%);padding:24px;text-align:center;}
.gbox{background:var(--wh);border-radius:24px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(30,57,50,0.12);}
.gtitle{font-size:22px;font-weight:800;color:var(--gd);margin-bottom:8px;}
.gsub{font-size:14px;color:var(--ts);line-height:1.6;margin-bottom:20px;}
.gbtn{display:inline-block;width:100%;padding:14px;background:linear-gradient(135deg,#00704A,#1E3932);color:var(--wh);border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;}

#ms{display:none;flex-direction:column;width:100%;}
.ah{display:none;}
.tc{padding:0;max-width:1100px;margin:0 auto;width:100%;}
.subtabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.ahl{display:flex;align-items:center;gap:12px;}
.ahi{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.aht{font-size:16px;font-weight:700;}
.ahr{text-align:right;}
#hn{font-size:15px;font-weight:600;}
#hi{font-size:11px;opacity:.7;margin-top:2px;}
.homebtn{background:rgba(255,255,255,0.15);color:var(--wh);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;margin-top:4px;text-decoration:none;display:inline-block;}

.actitle{font-size:17px;font-weight:800;color:var(--gd);margin-bottom:6px;}
.adesc{font-size:13px;color:var(--ts);margin-bottom:14px;line-height:1.5;}
.acard{background:var(--wh);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px;}

.bp{background:linear-gradient(135deg,#00704A,#1E3932);color:var(--wh);border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.bs{background:var(--iv);color:var(--ts);border:1.5px solid var(--ivd);border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;}
.bm{background:var(--gp);color:var(--gm);border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}

.subtabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.subtbtn{padding:9px 18px;border-radius:100px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid var(--ivd);background:var(--wh);color:var(--ts);}
.subtbtn.on{background:var(--gm);color:var(--wh);border-color:var(--gm);}

.fgrp{display:flex;flex-direction:column;margin-bottom:12px;}
.fgrp label{font-size:12px;font-weight:700;color:var(--ts);margin-bottom:5px;}
.fgrp input,.fgrp select,.fgrp textarea{border:1.5px solid var(--ivd);border-radius:8px;padding:10px 12px;font-size:14px;background:var(--iv);outline:none;width:100%;font-family:inherit;}
.fgrp input{height:40px;padding:0 12px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:560px){.frow{grid-template-columns:1fr;}}

.empty{text-align:center;color:var(--tl);padding:30px;font-size:14px;}

/* 반 아코디언 */
.gr-card{border:1px solid var(--ivd);border-radius:12px;margin-bottom:8px;overflow:hidden;background:var(--wh);}
.gr-head{display:flex;align-items:center;gap:10px;padding:13px 15px;cursor:pointer;background:#fafbfc;transition:background .12s;}
.gr-head:hover{background:var(--gp);}
.gr-arrow{font-size:12px;color:var(--tl);transition:transform .25s ease;}
.gr-card.open .gr-arrow{transform:rotate(180deg);}
.gr-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.gr-body-inner{padding:8px 12px 12px;}

/* 학생 체크 행 */
.stu-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--ivd);border-radius:9px;margin-bottom:6px;cursor:pointer;background:var(--wh);}
.stu-row:hover{border-color:var(--gm);background:var(--gp);}
.stu-row.checked{border-color:var(--gm);background:var(--gp);}
.stu-row.leave{opacity:.55;cursor:not-allowed;background:#f6f6f8;}
.stu-row input[type=checkbox]{width:17px;height:17px;accent-color:var(--gm);flex-shrink:0;cursor:pointer;}
.stu-row.leave input[type=checkbox]{cursor:not-allowed;}
.stu-name{font-size:14px;font-weight:700;color:var(--gd);}
.stu-meta{font-size:11.5px;color:var(--tl);}

/* 합계 바 */
.sumbar{position:sticky;bottom:12px;background:linear-gradient(135deg,#00704A,#1E3932);color:#fff;border-radius:12px;padding:13px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 6px 20px rgba(30,57,50,.35);margin-top:14px;}
.sumbar .si{font-size:13px;opacity:.85;}
.sumbar .sv{font-size:16px;font-weight:800;}

.mov{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
.mbk{position:absolute;inset:0;background:rgba(20,25,60,0.5);}
.mbox{position:relative;background:var(--wh);border-radius:16px;padding:24px;width:100%;max-width:640px;box-shadow:0 20px 60px rgba(0,0,0,0.3);margin:auto;}
.mtitle{font-size:18px;font-weight:800;color:var(--gd);margin-bottom:4px;}
.msub{font-size:13px;color:var(--ts);margin-bottom:16px;line-height:1.5;}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap;}

.clist{display:flex;flex-direction:column;gap:10px;}
.citem{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--wh);border:1px solid var(--ivd);border-radius:10px;flex-wrap:wrap;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gd);color:var(--wh);padding:12px 24px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#dc2626;} .toast.ok{background:var(--gm);}

/* 취합 표 공통 정돈 (화면용) */
.rp-tbl{border-collapse:collapse;font-size:12.5px;width:100%;}
.rp-tbl th,.rp-tbl td{border:1px solid var(--ivd);padding:8px 6px;text-align:center;vertical-align:middle;}
.rp-tbl thead th{background:var(--iv);font-weight:800;color:var(--gd);}
.rp-tbl tbody tr:nth-child(even){background:#fafbfc;}
.rp-tbl .nm-cell{font-weight:700;color:var(--gd);}
.rp-tbl .sub-cell{color:var(--ts);font-size:11.5px;}
.rp-tbl tfoot td,.rp-tbl tfoot th{background:var(--iv);font-weight:800;}
/* 상세 매트릭스 표 (학년별·전체) */
.mx-tbl{border-collapse:collapse;font-size:12px;table-layout:fixed;}
.mx-tbl th,.mx-tbl td{border:1px solid #e2e8e5;padding:7px 6px;text-align:center;vertical-align:middle;word-break:break-word;overflow-wrap:break-word;}
.mx-tbl .mx-name{position:sticky;left:0;z-index:2;background:#2d6a4f;color:#fff;min-width:96px;width:96px;}
.mx-tbl .mx-item{min-width:118px;width:118px;}
.mx-tbl .mx-tot{position:sticky;right:0;z-index:2;min-width:92px;width:92px;}
.mx-tbl thead .mx-h{background:#2d6a4f;color:#fff;font-weight:800;border-color:#2d6a4f;}
.mx-tbl thead .mx-h2{background:#f4f8f6;color:#5a7267;font-weight:400;font-size:11px;}
.mx-tbl thead .mx-h3{background:#e9f0ec;color:#3a5a48;font-weight:700;}
.mx-tbl thead .mx-h.mx-tot{background:#1d4d3d;border-color:#1d4d3d;}
.mx-tbl td.mx-chg{color:#6b8579;font-weight:500;}
.mx-tbl td.mx-ref{background:#eef6f3;color:#4a7a68;font-weight:500;}
.mx-tbl td.mx-empty{color:#d0d8d3;}
.mx-tbl .mx-namecell{font-weight:700;color:#1b4332;position:sticky;left:0;z-index:1;background:#fff;}
.mx-tbl tbody tr:nth-child(even) .mx-namecell{background:#fafbfc;}
.mx-tbl tbody tr:nth-child(even) td{background:#fafbfc;}
.mx-tbl tbody tr:nth-child(even) td.mx-ref{background:#eaf4f1;}
.mx-tbl .mx-totcell{font-weight:900;color:#8a6410;background:#f7efd8;position:sticky;right:0;z-index:1;}
.mx-tbl tbody tr:nth-child(even) td.mx-totcell{background:#f4ead0;}
.mx-tbl tfoot td,.mx-tbl tfoot .mx-namecell{background:#eef4f1;font-weight:800;color:#2f5c48;}
.mx-tbl tfoot .mx-totcell{background:#f0e4c4;color:#8a6410;}

/* 영수증 크롭 편집기 */
#cropOverlay{position:fixed;inset:0;z-index:4000;display:none;flex-direction:column;background:rgba(15,18,40,0.92);padding:14px;}
#cropOverlay.show{display:flex;}
.crop-top{display:flex;align-items:center;justify-content:space-between;color:#fff;margin-bottom:10px;flex-shrink:0;}
.crop-top .ct-title{font-size:15px;font-weight:700;}
.crop-top .ct-count{font-size:12px;opacity:.7;}
.crop-stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0;}
.crop-canvas-wrap{position:relative;touch-action:none;}
#cropCanvas{max-width:100%;max-height:100%;display:block;border-radius:8px;background:#000;}
.crop-box{position:absolute;border:2px solid #fff;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);cursor:move;}
.crop-handle{position:absolute;width:22px;height:22px;background:rgba(255,255,255,0.95);border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4);}
.crop-handle.tl{top:-11px;left:-11px;cursor:nwse-resize;}
.crop-handle.tr{top:-11px;right:-11px;cursor:nesw-resize;}
.crop-handle.bl{bottom:-11px;left:-11px;cursor:nesw-resize;}
.crop-handle.br{bottom:-11px;right:-11px;cursor:nwse-resize;}
.crop-tools{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0;flex-shrink:0;}
.crop-btn{background:rgba(255,255,255,0.15);color:#fff;border:1.5px solid rgba(255,255,255,0.3);border-radius:8px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
.crop-btn:hover{background:rgba(255,255,255,0.25);}
.crop-btn.primary{background:#00704A;border-color:#00704A;}
.crop-btn.primary:hover{background:#008558;}
.crop-btn.ghost{background:transparent;}
.crop-actions{display:flex;gap:8px;justify-content:space-between;flex-shrink:0;}

/* 경비 지급 요청서 폼 */
.pr-modebtn{flex:1;padding:12px;border:2px solid var(--ivd);border-radius:10px;background:#fff;font-size:15px;font-weight:700;color:var(--ts);cursor:pointer;}
.pr-modebtn.on{background:var(--gd);border-color:var(--gd);color:#fff;}
.pr-form{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.pr-fld{display:flex;flex-direction:column;gap:5px;}
.pr-fld.pr-full{grid-column:1 / -1;}
.pr-fld label{font-size:12.5px;font-weight:700;color:var(--gd);}
.pr-fld input,.pr-fld select{padding:9px 11px;border:1px solid var(--ivd);border-radius:8px;font-size:14px;background:#fff;}
.pr-row{display:flex;gap:10px;align-items:flex-start;padding:12px;border:1px solid var(--ivd);border-radius:10px;margin-bottom:10px;background:#fff;}
.pr-rnum{width:26px;height:26px;flex:none;background:var(--gp);color:var(--gm);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;margin-top:2px;}
.pr-rbody{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;}
.pr-rline{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.pr-row select,.pr-row input{padding:8px 10px;border:1px solid var(--ivd);border-radius:7px;font-size:13.5px;background:#fff;}
.pr-cat{min-width:130px;}
.pr-name{flex:1;min-width:120px;}
.pr-qty{width:70px;}.pr-price{width:110px;}
.pr-note{flex:1;min-width:120px;}
.pr-sub{font-weight:800;color:var(--goldd);min-width:90px;text-align:right;font-size:14px;}
.pr-special{font-size:10.5px;background:#fee2e2;color:#dc2626;padding:2px 8px;border-radius:100px;font-weight:700;align-self:center;}
.pr-rdel{width:26px;height:26px;flex:none;border:none;background:#fee2e2;color:#dc2626;border-radius:7px;cursor:pointer;font-weight:700;}
.pr-rcline{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding-top:6px;border-top:1px dashed var(--ivd);}
.pr-rcadd{padding:6px 12px;border:1.5px dashed var(--gm);background:var(--gp);color:var(--gm);border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer;}
.pr-rcs{display:flex;gap:6px;flex-wrap:wrap;}
.pr-rc{position:relative;width:52px;height:52px;border-radius:6px;overflow:hidden;border:1px solid var(--ivd);}
.pr-rc img{width:100%;height:100%;object-fit:cover;cursor:pointer;}
.pr-rcx{position:absolute;top:1px;right:1px;width:16px;height:16px;border:none;background:rgba(220,38,38,.9);color:#fff;border-radius:50%;font-size:11px;line-height:1;cursor:pointer;padding:0;}
@media(max-width:640px){.pr-form{grid-template-columns:1fr;}}
.pr-badge{font-size:11px;padding:2px 9px;border-radius:100px;font-weight:700;margin-left:4px;}
.pr-badge.wait{background:#fef3c7;color:#b45309;}
.pr-badge.sub{background:#D4E9E2;color:#006241;}
.pr-badge.paid{background:#dcfce7;color:#16a34a;}
.pr-badge.rej{background:#fee2e2;color:#dc2626;}
.pr-badge.inc{background:#E8F3EF;color:#00704A;}
.pr-vtbl{width:100%;border-collapse:collapse;font-size:12.5px;}
.pr-vtbl th,.pr-vtbl td{border:1px solid var(--ivd);padding:6px 8px;}
.pr-vtbl thead th{background:var(--gd);color:#fff;font-weight:700;}
.pr-vtbl tfoot td{background:var(--iv);}
</style>
<script src="loading.js"></script>
<script src="modal-close.js"></script>
<script src="menu.js"></script>
<script src="sidebar.js"></script>
<script type="module" src="badges.js"></script>
<script type="module" src="presence.js"></script>
</head>
<body>

<div id="gate">
  <div class="gbox">
    <div class="gtitle">경비 지급 요청서</div>
    <div class="gsub" id="gate-msg">로그인 확인 중...</div>
    <a class="gbtn" id="gate-btn" href="index.html" style="display:none">로그인 화면으로</a>
  </div>
</div>

<div id="ms">
  <div class="tc">
    <div class="subtabs">
      <button class="subtbtn on" id="tb-new" onclick="showTab('new')">➕ 지급 요청</button>
      <button class="subtbtn" id="tb-list" onclick="showTab('list')">📋 내 신청내역</button>
      <button class="subtbtn" id="tb-approve" onclick="showTab('approve')" style="display:none">✅ 결재함</button>
      <button class="subtbtn" id="tb-report" onclick="showTab('report')" style="display:none">📊 취합</button>
      <button class="subtbtn" id="tb-backup" onclick="showTab('backup')" style="display:none">⚙️ 설정·백업</button>
    </div>
    <div id="tab-new"></div>
    <div id="tab-list" style="display:none"></div>
    <div id="tab-approve" style="display:none"></div>
    <div id="tab-report" style="display:none"></div>
    <div id="tab-backup" style="display:none"></div>
  </div>
</div>

<div id="mwrap"></div>
<div id="toast" class="toast"></div>

<div id="cropOverlay">
  <div class="crop-top">
    <span class="ct-title">🧾 영수증 편집</span>
    <span class="ct-count" id="crop-count"></span>
  </div>
  <div class="crop-stage">
    <div class="crop-canvas-wrap" id="crop-wrap">
      <canvas id="cropCanvas"></canvas>
      <div class="crop-box" id="crop-box">
        <div class="crop-handle tl" data-h="tl"></div>
        <div class="crop-handle tr" data-h="tr"></div>
        <div class="crop-handle bl" data-h="bl"></div>
        <div class="crop-handle br" data-h="br"></div>
      </div>
    </div>
  </div>
  <div class="crop-tools">
    <button class="crop-btn" onclick="cropRotate()">↻ 회전</button>
    <button class="crop-btn" onclick="cropAuto()">✨ 자동 여백 제거</button>
    <button class="crop-btn ghost" onclick="cropReset()">↺ 전체선택</button>
  </div>
  <div class="crop-actions">
    <button class="crop-btn ghost" onclick="cropSkip()">크롭 없이 사용</button>
    <button class="crop-btn primary" onclick="cropApply()">✓ 적용</button>
  </div>
</div>

<script type="module">

  { major:'선생님 항목', items:['활동지원비','운동지원비','회의비','훈련지원비','연구지원비','회식비'] },

      EXP_MANAGERS = mgr.exists() ? (mgr.data()||{}) : {};
    } catch(e3){ EXP_MANAGERS = {}; }
    // 계정과목 (payConfig/categories) — 없으면 기본값
    try {
      const c = await getDoc(doc(db,'payConfig','categories'));
      if(c.exists()){ const d=c.data()||{};

      if(me && me.payBank){ prBank = { bank:me.payBank.bank||'', holder:me.payBank.holder||'', account:me.payBank.account||'' }; }
    } catch(e5){}
    // 결재 직책은 전자결재와 공유 (staff.position) — 별도 설정 불필요
    // 회계(경비지급) 관리자
    try {

      PAY_MANAGERS = pm.exists() ? { list: (pm.data().list)||[] } : { list: [] };

  finally { window.hideLoading && window.hideLoading(); }
}

// ── 학기 관련 헬퍼 ──
const TERM_NAMES = {1:'1학기', 2:'2학기'};
function orgTerms(org){
  return TERMS.filter(t=>t.org===org && t.start && t.end)
    .sort((a,b)=> (a.year-b.year) || (a.term-b.term));
}
// 특정 날짜가 속한 학기 (없으면 null)
function termOfDate(dateStr, org){
  return orgTerms(org).find(t=>dateStr>=t.start && dateStr<=t.end) || null;
}
// 학기 키: "2026-1"
function termKey(t){ return t ? `${t.year}-${t.term}` : ''; }
function termLabel(t){ return t ? `${t.year}년 ${TERM_NAMES[t.term]||t.term+'학기'}` : ''; }
// "2026-1" → "2026년 1학기"
function semKor(key){ if(!key) return ''; const [y,t]=String(key).split('-'); return `${y}년 ${TERM_NAMES[t]||t+'학기'}`; }
// 날짜에 N일 더하기
function addDays(dateStr, n){
  const d = new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+n);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
// 오늘 기준 '입력 가능한 학기' 판정
// 1) 오늘이 어떤 학기 기간(+afterDays 여유) 안이면 그 학기
// 2) 아니면, 다음 학기 시작 -beforeDays 안이면 다음 학기 (방학 중 다음 학기 입력)
// 반환: {term, editable:true} | {term:가장가까운, editable:false} | null(학기없음)
function currentInputTerm(org){
  const today = todayYMD();
  const list = orgTerms(org);
  if(!list.length) return null;
  // 진행 중 학기 (+afterDays 여유까지 입력 허용)
  for(const t of list){
    if(today >= t.start && today <= addDays(t.end, EXP_WINDOW.afterDays)){
      return {term:t, editable:true};
    }
  }
  // 다음 학기 (시작 -beforeDays 부터 입력 허용)
  const upcoming = list.filter(t=>t.start > today).sort((a,b)=>a.start.localeCompare(b.start));
  if(upcoming.length){
    const nxt = upcoming[0];
    if(today >= addDays(nxt.start, -EXP_WINDOW.beforeDays)){
      return {term:nxt, editable:true};
    }
    return {term:nxt, editable:false}; // 아직 입력 기간 아님
  }
  // 지난 학기만 있음
  const last = list[list.length-1];
  return {term:last, editable:false};
}

// ══════════ 결재 라인 (전자결재의 직책 체계 공유: staff.position) ══════════
// 직책: 교사 / 초등부장 / 중고등부장 / 행정실장 / 교감 / 교장 / 원장
// 기관별 부서 목록 (행정실은 다니엘 아마츠 전용)
const PR_ORG_DEPTS = {
  daniel:   ['초등부','중등부','고등부','행정실'],
  jihyebit: ['유아부'],
};
function PR_DEPTS(org){ return PR_ORG_DEPTS[org] || ['초등부','중등부','고등부','행정실']; }
// 부서 → 부서장 직책 (전자결재와 동일)
const PR_DEPT_TO_POS = {'초등부':'초등부장','중등부':'중고등부장','고등부':'중고등부장','중고등부':'중고등부장','행정실':'행정실장','유아부':'원장','지혜빛':'원장'};

function staffName(uid){ const s=STAFF.find(x=>x.uid===uid); return s?s.name:''; }
// 특정 직책을 가진 사람 찾기 (해당 기관 기준)
function findByPosition(pos, org){
  const cands = STAFF.filter(s=>s.position===pos);
  if(!cands.length) return null;
  // 기관이 맞는 사람 우선 (positionOrgs 있으면 그것 기준)
  const inOrg = cands.find(s=>{
    const orgs = (s.positionOrgs && s.positionOrgs.length) ? s.positionOrgs : [s.org];
    return orgs.includes(org);
  });
  return inOrg || cands[0];
}
// 내 직책
function myPosition(){ const me=STAFF.find(s=>s.uid===CU.uid); return (me&&me.position)||'교사'; }

// 총액·신청자직책 → 결재 단계 생성
function buildApprovalChain(total, applicantUid, dept, org){
  const me = STAFF.find(s=>s.uid===applicantUid);
  const myPos = (me&&me.position) || '교사';
  const chain=[];
  const addStep=(label,pos)=>{
    const p=findByPosition(pos, org);
    if(p) chain.push({ role:label, position:pos, uid:p.uid, name:p.name, status:'pending', at:null });
  };

  if(total < 50000) return { chain:[], needApproval:false };   // 5만 미만: 결재 없음
  const under20 = total < 200000;

  // 교장: 승인 불필요
  if(myPos==='교장') return { chain:[], needApproval:false };
  // 교감: 5~20만 바로 상신 / 20만↑ 교장
  if(myPos==='교감'){
    if(under20) return { chain:[], needApproval:false };
    addStep('교장','교장');
    return { chain, needApproval:chain.length>0 };
  }
  // 부서장·원장: 교감 전결 (20만↑이면 교감→교장)
  const isHead = ['초등부장','중고등부장','행정실장','원장'].includes(myPos);
  if(isHead){
    addStep('교감','교감');
    if(!under20) addStep('교장','교장');
    return { chain, needApproval:chain.length>0 };
  }
  // 일반 교사: 부서장 (20만↑이면 부서장→교감→교장)
  const headPos = PR_DEPT_TO_POS[dept] || '';
  if(headPos) addStep('부서장', headPos);
  if(!under20){ addStep('교감','교감'); addStep('교장','교장'); }
  return { chain, needApproval:chain.length>0 };
}


async function submitPayReq(){
  saveVisibleRows();
  const date=$I('pr-date')?.value, name=$I('pr-name')?.value?.trim(), dept=$I('pr-dept')?.value||'', purpose=$I('pr-purpose')?.value?.trim()||'';
  if(!name){ toast('신청자명을 입력하세요.','err'); return; }
  const rows = prRows.filter(r=> (r.name||'').trim() || Number(r.price)>0 );
  if(!rows.length){ toast('항목을 하나 이상 입력하세요.','err'); return; }
  if(prMode==='expense'){
    for(const r of rows){ if(!r.cat_major){ toast('각 항목의 대분류를 선택하세요.','err'); return; } }
    if(!dept){ toast('소속 부서를 선택하세요.','err'); return; }
  }
  const total = rows.reduce((s,r)=>s+(Number(r.qty)||0)*(Number(r.price)||0),0);
  if(prMode==='expense'){
    prBank = { bank:$I('pr-bank')?.value?.trim()||'', holder:$I('pr-holder')?.value?.trim()||'', account:$I('pr-account')?.value?.trim()||'' };
  }

  // 결재 라인 (지출만)
  let chain=[], needApproval=false, status='';
  if(prMode==='expense'){
    const r=buildApprovalChain(total, CU.uid, dept, prOrg);
    chain=r.chain; needApproval=r.needApproval;
    status = needApproval ? 'approving' : 'submitted';  // 승인중 / 상신완료(회계 대기)
  } else {
    status = 'income';  // 수입은 결재 없음
  }

  window.showLoading && window.showLoading('저장하는 중…');
  try {
    // 항목에서 영수증 분리 (payReceipts에 별도 저장)
    const rowsForSave = rows.map((r,idx)=>({
      idx, cat_major:r.cat_major||'', cat_item:r.cat_item||'', name:r.name||'',
      qty:Number(r.qty)||0, price:Number(r.price)||0, sub:(Number(r.qty)||0)*(Number(r.price)||0),
      note:r.note||'', receiptCount:(r.receipts||[]).length
    }));

    const isEdit = !!prEditId;
    const record = {
      mode:prMode, org:prOrg, date, applicantName:name, dept, purpose,
      rows:rowsForSave, total,
      bank: prMode==='expense'?prBank:null,
      chain, chainIndex:0, status,
      paid:false, deleted:false
    };

    let reqId;
    if(isEdit){
      // 수정: 기존 문서 갱신 (작성자·작성시각은 유지)
      reqId = prEditId;
      await updateDoc(doc(db,'payRequests',reqId), {
        ...record,
        updatedAt: Timestamp.now(), updatedByName: CU.name||''
      });
      // 기존 영수증 제거 후 다시 저장
      const oldRc = await getDocs(query(collection(db,'payReceipts'), where('requestId','==',reqId)));
      for(const d of oldRc.docs){ await deleteDoc(doc(db,'payReceipts',d.id)); }
      await addLog('요청서 수정', `${name} · ₩${won(total)}`);
    } else {
      const ref = await addDoc(collection(db,'payRequests'), {
        ...record,
        createdByUid:CU.uid, createdByName:CU.name||name, createdAt:Timestamp.now()
      });
      reqId = ref.id;
    }

    // 영수증 저장 (항목별)
    let saved=0, totalRc=rows.reduce((s,r)=>s+(r.receipts||[]).length,0);
    for(let i=0;i<rows.length;i++){
      const rcs=rows[i].receipts||[];
      for(let j=0;j<rcs.length;j++){
        saved++; window.setLoadStep && window.setLoadStep(`영수증 업로드 중… (${saved}/${totalRc})`, 30+Math.round(saved/Math.max(1,totalRc)*60));
        await addDoc(collection(db,'payReceipts'), {
          requestId:reqId, rowIdx:i, idx:j+1, dataUrl:rcs[j],
          org:prOrg, date, createdByUid:CU.uid, createdAt:Timestamp.now()
        });
      }
    }

    // 본인 계좌 저장 (다음 자동)
    if(prMode==='expense' && (prBank.bank||prBank.account)){
      try { await setDoc(doc(db,'staff',CU.uid), { payBank:prBank }, {merge:true}); } catch(e){}
    }

    // 쪽지: 결재 필요하면 첫 결재자에게, 아니면 회계 담당자에게
    if(prMode==='expense' && !isEdit){
      if(needApproval && chain[0]){
        await sendMsg([chain[0].uid], `[경비 결재 요청] ${name} · ₩${won(total)}`,
          `${ORGS[prOrg]||prOrg} · ${dept}\n용도: ${purpose}\n금액: ₩${won(total)}\n\n결재함에서 승인/반려해주세요.`);
      } else {
        await sendMsg(payManagerUids(), `[경비 지급 상신] ${name} · ₩${won(total)}`,
          `${ORGS[prOrg]||prOrg} · ${dept}\n용도: ${purpose}\n금액: ₩${won(total)}\n\n(5만원 미만, 결재 없이 상신)`);
      }
    }

    window.hideLoading && window.hideLoading();
    toast(isEdit ? '요청서를 수정했습니다.' : (needApproval?'결재 요청을 상신했습니다.':'지급 요청을 상신했습니다.'),'ok');
    // 폼 초기화
    prRows=[newPrRow()]; prReceiptTargetRow=null; prEditId=null; prPending=null;
    await loadPayRequests();
    showTab('list');
  } catch(e){ window.hideLoading && window.hideLoading(); toast('저장 실패: '+(e.message||''),'err'); }
}

      <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-size:16px;font-weight:800;color:var(--gd)">${esc(r.purpose||'(용도 미기재)')}</div>
          <div style="font-size:12.5px;color:var(--tl);margin-top:3px">
            ${esc(r.applicantName||r.createdByName||'')} · ${esc(r.dept||'')} · ${ORGS[r.org]||r.org} · ${esc(r.date||'')}
          </div>
        </div>
        <div style="font-size:19px;font-weight:900;color:var(--goldd)">₩${won(r.total)}</div>
      </div>
      <div style="overflow-x:auto;margin-top:10px"><table class="pr-vtbl">
        <thead><tr><th>번호</th><th>계정과목</th><th>품목</th><th>수량</th><th>단가</th><th>소계</th><th>영수증</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      ${r.bank?`<div style="margin-top:8px;font-size:12.5px;color:var(--ts)">💳 ${esc(r.bank.bank||'')} ${esc(r.bank.account||'')} (${esc(r.bank.holder||'')})</div>`:''}
      <div style="margin-top:8px;font-size:12.5px;color:var(--ts)">결재선: ${chainLine}</div>

// 승인
async function approvePayReq(id){
  const r=PAY_REQUESTS.find(x=>x.id===id); if(!r) return;
  const idx=r.chainIndex;
  const step=r.chain?.[idx];
  if(!step || step.uid!==CU.uid){ toast('결재 권한이 없습니다.','err'); return; }
  if(!confirm(`₩${won(r.total)} 요청을 승인할까요?`)) return;
  window.showLoading && window.showLoading('승인 처리 중…');
  try {
    const chain=[...r.chain];
    chain[idx]={...chain[idx], status:'approved', at:Timestamp.now()};
    const isLast = idx >= chain.length-1;
    const upd = { chain, chainIndex: isLast?idx:idx+1, status: isLast?'submitted':'approving' };
    await updateDoc(doc(db,'payRequests',id), upd);
    // 쪽지
    if(isLast){
      await sendMsg(payManagerUids(), `[경비 지급 상신] ${r.applicantName} · ₩${won(r.total)}`,
        `${ORGS[r.org]||r.org} · ${r.dept||''}\n용도: ${r.purpose||''}\n금액: ₩${won(r.total)}\n\n모든 결재가 완료되어 상신되었습니다.`);
      await sendMsg([r.createdByUid], `[결재 완료] 지급 요청이 상신되었습니다`,
        `용도: ${r.purpose||''}\n금액: ₩${won(r.total)}\n\n모든 결재가 완료되어 회계 담당자에게 상신되었습니다.`);
    } else {
      const next=chain[idx+1];
      await sendMsg([next.uid], `[경비 결재 요청] ${r.applicantName} · ₩${won(r.total)}`,
        `${ORGS[r.org]||r.org} · ${r.dept||''}\n용도: ${r.purpose||''}\n금액: ₩${won(r.total)}\n\n결재함에서 승인/반려해주세요.`);
      await sendMsg([r.createdByUid], `[결재 진행] ${step.name} 승인 완료`,
        `용도: ${r.purpose||''}\n금액: ₩${won(r.total)}\n\n다음 결재자(${next.name})에게 넘어갔습니다.`);
    }
    window.hideLoading && window.hideLoading();
    toast(isLast?'승인 완료 — 회계에 상신되었습니다.':'승인했습니다. 다음 결재자에게 넘어갔습니다.','ok');
    await renderApprove();

// ── 영수증: 자동 압축 (긴 변 1000px, 700KB 초과 시 추가 압축) ──
function compressImage(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        // 영수증 글자 보존: QHD(2560px)·고품질 우선, 용량 초과 시
        // 품질은 0.65까지만 낮추고(글자 보호) 그다음은 해상도를 한 단계씩 낮춤
        const SIZES = [2560, 2048, 1920, 1600];
        const CAP = 700*1024;
        let data = '';
        for(const MAX of SIZES){
          let w = img.width, h = img.height;
          if(Math.max(w,h) > MAX){ const r = MAX/Math.max(w,h); w = Math.round(w*r); h = Math.round(h*r); }
          const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
          cv.getContext('2d').drawImage(img, 0, 0, w, h);
          let q = 0.85;
          data = cv.toDataURL('image/jpeg', q);
          while(data.length > CAP && q > 0.65){ q -= 0.07; data = cv.toDataURL('image/jpeg', q); }
          if(data.length <= CAP) break;
        }
        // 극단적 초과 대비 최후 안전망
        if(data.length > CAP){
          const cv = document.createElement('canvas');
          const r = 1600/Math.max(img.width, img.height, 1600);
          cv.width = Math.round(img.width*Math.min(r,1)); cv.height = Math.round(img.height*Math.min(r,1));
          cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
          let q = 0.6;
          data = cv.toDataURL('image/jpeg', q);
          while(data.length > CAP && q > 0.4){ q -= 0.07; data = cv.toDataURL('image/jpeg', q); }
        }
        resolve(data);
      };
      img.onerror = () => reject(new Error('이미지를 읽을 수 없습니다.'));
      img.src = ev.target.result;
    };
    reader.onerror = () => reject(new Error('파일을 읽을 수 없습니다.'));
    reader.readAsDataURL(file);
  });
}

async function onReceiptPick(e){
  const files = Array.from(e.target.files || []);
  if(!files.length) return;

    e.target.value = '';
    return;
  }
  e.target.value = '';
  // 파일을 이미지로 읽어서 크롭 큐에 넣기
  cropQueue = [];
  for(const f of files){
    try {
      const dataUrl = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(new Error('read fail')); r.readAsDataURL(f); });
      cropQueue.push(dataUrl);

}

// ── 크롭 편집기 ──
function startCropForCurrent(){

    } catch(err){ console.error(err); toast('편집 오류: '+(err.message||''),'err'); }

function showCrop(){

// 회전 반영해서 캔버스에 그림, 박스 초기화
function drawCropCanvas(){
  const canvas = $I('cropCanvas'); if(!canvas || !cropImg) return;
  // 회전 후 원본 크기
  let iw = cropImg.naturalWidth, ih = cropImg.naturalHeight;
  const rot = cropRotation % 360;
  const swap = (rot===90 || rot===270);
  const srcW = swap ? ih : iw, srcH = swap ? iw : ih;
  // 화면에 맞춰 스케일 (스테이지 크기 기준, 0이면 window 기준 fallback)
  const stage = document.querySelector('.crop-stage');
  let stageW = stage?.clientWidth || 0;
  let stageH = stage?.clientHeight || 0;
  if(stageW < 40) stageW = Math.min(window.innerWidth - 28, 900);
  if(stageH < 40) stageH = Math.max(240, window.innerHeight - 220);
  const maxW = Math.max(120, stageW - 8);
  const maxH = Math.max(120, stageH - 8);
  let scale = Math.min(maxW/srcW, maxH/srcH, 1);
  if(!isFinite(scale) || scale<=0) scale = Math.min(600/srcW, 400/srcH) || 0.5;
  const cw = Math.round(srcW*scale), ch = Math.round(srcH*scale);
  canvas.width = cw; canvas.height = ch;
  cropCanvasSize = {w:cw, h:ch};
  const ctx = canvas.getContext('2d');
  ctx.save();
  ctx.clearRect(0,0,cw,ch);
  ctx.translate(cw/2, ch/2);
  ctx.rotate(rot*Math.PI/180);
  // 회전 기준 원본을 중앙에 그림
  const dw = iw*scale, dh = ih*scale;
  ctx.drawImage(cropImg, -dw/2, -dh/2, dw, dh);
  ctx.restore();
  // 박스 전체로 초기화
  cropBox = {x:0, y:0, w:cw, h:ch};
  layoutCropBox();
}

function layoutCropBox(){
  const wrap = $I('crop-wrap'), box = $I('crop-box'), canvas = $I('cropCanvas');
  if(!wrap || !box || !canvas) return;
  // wrap을 캔버스 크기에 맞춤
  wrap.style.width = canvas.width+'px';
  wrap.style.height = canvas.height+'px';
  box.style.left = cropBox.x+'px';
  box.style.top = cropBox.y+'px';
  box.style.width = cropBox.w+'px';
  box.style.height = cropBox.h+'px';
}

function cropRotate(){ cropRotation = (cropRotation+90)%360; drawCropCanvas(); }
window.cropRotate = cropRotate;

function cropReset(){ cropBox = {x:0,y:0,w:cropCanvasSize.w,h:cropCanvasSize.h}; layoutCropBox(); }
window.cropReset = cropReset;

// 자동 여백 제거: 밝은 배경 감지해서 내용 경계 찾기
function cropAuto(){
  const canvas = $I('cropCanvas'); if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const {width:w, height:h} = canvas;
  let data;
  try { data = ctx.getImageData(0,0,w,h).data; } catch(e){ toast('자동 감지를 사용할 수 없습니다.','err'); return; }
  // 밝기 임계값: 밝으면 배경으로 간주
  const TH = 218;
  const isContent = (x,y)=>{
    const i=(y*w+x)*4;
    const bright = 0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
    return bright < TH;
  };
  let minX=w, minY=h, maxX=0, maxY=0, found=false;
  const step = Math.max(1, Math.floor(Math.min(w,h)/300)); // 성능
  for(let y=0;y<h;y+=step){
    for(let x=0;x<w;x+=step){
      if(isContent(x,y)){ found=true; if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y; }
    }
  }
  if(!found){ toast('내용을 감지하지 못했어요. 수동으로 조정해주세요.','err'); return; }
  // 약간의 여백(패딩) 남기기
  const pad = Math.round(Math.min(w,h)*0.015);
  minX=Math.max(0,minX-pad); minY=Math.max(0,minY-pad);
  maxX=Math.min(w,maxX+pad); maxY=Math.min(h,maxY+pad);
  cropBox = {x:minX, y:minY, w:maxX-minX, h:maxY-minY};
  layoutCropBox();
  toast('여백을 자동으로 감지했어요. 필요하면 조정하세요.','ok');
}
window.cropAuto = cropAuto;

// 크롭 적용 → 압축 후 receipts에 추가
async function cropApply(){
  const canvas = $I('cropCanvas'); if(!canvas){ cropSkip(); return; }
  // 박스 영역을 잘라서 새 캔버스에
  const sx = Math.max(0, Math.round(cropBox.x));
  const sy = Math.max(0, Math.round(cropBox.y));
  const sw = Math.min(canvas.width-sx, Math.round(cropBox.w));
  const sh = Math.min(canvas.height-sy, Math.round(cropBox.h));
  if(sw<=4 || sh<=4){ toast('선택 영역이 너무 작아요.','err'); return; }
  const out = document.createElement('canvas'); out.width=sw; out.height=sh;
  out.getContext('2d').drawImage(canvas, sx, sy, sw, sh, 0, 0, sw, sh);
  // 압축 (최대 1000px, 700KB 이하)
  const data = compressCanvas(out);
  pushCroppedReceipt(data);
  cropIndex++;
  startCropForCurrent();
  if(cropIndex >= cropQueue.length) hideCrop();
}
window.cropApply = cropApply;

// 크롭 결과를 대상(행 또는 기본 receipts)에 저장
function pushCroppedReceipt(data){
  if(prReceiptTargetRow!==null && prRows[prReceiptTargetRow]){
    if(!prRows[prReceiptTargetRow].receipts) prRows[prReceiptTargetRow].receipts=[];
    prRows[prReceiptTargetRow].receipts.push(data);
  } else {
    receipts.push(data);
  }
}

function cropSkip(){
  // 크롭 없이 원본 압축
  if(cropImg){
    const c = document.createElement('canvas');
    let iw=cropImg.naturalWidth, ih=cropImg.naturalHeight;
    const MAX=2560; let scale=Math.min(MAX/Math.max(iw,ih),1);   // 크롭 원본을 고해상도로 유지 (글자 보존)
    c.width=Math.round(iw*scale); c.height=Math.round(ih*scale);
    c.getContext('2d').drawImage(cropImg,0,0,c.width,c.height);
    pushCroppedReceipt(compressCanvas(c));
  }
  cropIndex++;
  startCropForCurrent();
  if(cropIndex >= cropQueue.length) hideCrop();
}
window.cropSkip = cropSkip;

// 캔버스 → JPEG dataURL (700KB 이하)
function compressCanvas(cv){
  // 크롭 결과도 글자 보존: 품질 0.65까지만 낮추고, 그다음 해상도 단계 하향
  const SIZES = [2560, 2048, 1920, 1600];
  const CAP = 700*1024;
  let data = '';
  for(const MAX of SIZES){
    let src = cv;
    if(Math.max(cv.width, cv.height) > MAX){
      const r = MAX/Math.max(cv.width, cv.height);
      const c2 = document.createElement('canvas');
      c2.width = Math.round(cv.width*r); c2.height = Math.round(cv.height*r);
      c2.getContext('2d').drawImage(cv,0,0,c2.width,c2.height);
      src = c2;
    }
    let q = 0.85;
    data = src.toDataURL('image/jpeg', q);
    while(data.length > CAP && q > 0.65){ q -= 0.07; data = src.toDataURL('image/jpeg', q); }
    if(data.length <= CAP) return data;
  }
  return data;
}

// ── 크롭 박스 드래그/리사이즈 ──
(function initCropDrag(){
  let mode=null, start=null, orig=null, handle=null;
  function pt(e){ const t=e.touches?e.touches[0]:e; return {x:t.clientX, y:t.clientY}; }
  function onDown(e){
    const box=$I('crop-box'); if(!box) return;
    const h = e.target.getAttribute && e.target.getAttribute('data-h');
    if(h){ mode='resize'; handle=h; }
    else if(e.target===box){ mode='move'; }
    else return;
    start = pt(e); orig = {...cropBox};
    e.preventDefault();
  }
  function onMove(e){
    if(!mode) return;
    const p = pt(e); const dx=p.x-start.x, dy=p.y-start.y;
    const CW=cropCanvasSize.w, CH=cropCanvasSize.h;
    let b={...orig};
    if(mode==='move'){
      b.x=Math.max(0,Math.min(CW-b.w, orig.x+dx));
      b.y=Math.max(0,Math.min(CH-b.h, orig.y+dy));
    } else {
      if(handle.includes('l')){ const nx=Math.max(0,Math.min(orig.x+orig.w-20, orig.x+dx)); b.w=orig.w+(orig.x-nx); b.x=nx; }
      if(handle.includes('r')){ b.w=Math.max(20,Math.min(CW-orig.x, orig.w+dx)); }
      if(handle.includes('t')){ const ny=Math.max(0,Math.min(orig.y+orig.h-20, orig.y+dy)); b.h=orig.h+(orig.y-ny); b.y=ny; }
      if(handle.includes('b')){ b.h=Math.max(20,Math.min(CH-orig.y, orig.h+dy)); }
    }
    cropBox=b; layoutCropBox();
    e.preventDefault();
  }
  function onUp(){ mode=null; }
  document.addEventListener('mousedown', e=>{ if($I('cropOverlay')?.classList.contains('show')) onDown(e); });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchstart', e=>{ if($I('cropOverlay')?.classList.contains('show')) onDown(e); }, {passive:false});
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend', onUp);
})();

    </div>`).join('')
    + receipts.map((d,i)=>`
    <div style="position:relative;width:76px;height:76px;border:1px solid var(--ivd);border-radius:8px;overflow:hidden">
      <img src="${d}" style="width:100%;height:100%;object-fit:cover;cursor:pointer" onclick="viewReceiptBig(${i})">

async function editExpense(id){
  const e = EXPENSES.find(x=>x.id===id); if(!e) return;
  if(!isExpManager(e.org)){ toast('경비 관리자와 슈퍼관리자만 수정할 수 있습니다.','err'); return; }
  editingId = id;
  editingSemester = e.semester || '';
  expOrg = e.org;
  expMode = e.mode || 'equal';
  checkedIds = new Set((e.students||[]).map(s=>s.id));
  indivAmts = {};
  if(expMode!=='equal') (e.students||[]).forEach(s=>{ if(s.amt!=null) indivAmts[s.id]=s.amt; });
  receipts = []; removedReceiptIds = new Set(); existingReceipts = [];
  openCls = {};
  showTab('new');
  // 필드 채우기
  if($I('ex-date')) $I('ex-date').value = e.date || todayYMD();
  if($I('ex-semester') && e.semester) $I('ex-semester').value = e.semester;
  if($I('ex-teacher')) $I('ex-teacher').value = e.teacher || e.createdByName || '';
  if($I('ex-subject')) $I('ex-subject').value = e.subject||'';
  if($I('ex-items')) $I('ex-items').value = e.items||'';
  if($I('ex-detail')) $I('ex-detail').value = e.detail||'';
  if($I('ex-total')) $I('ex-total').value = (e.mode==='equal'||!e.mode) ? (e.total||'') : '';
  if($I('ex-schoolqty')) $I('ex-schoolqty').value = e.schoolQty||0;
  if($I('ex-school')) $I('ex-school').value = e.schoolNote||'';
  if($I('ex-bank')) $I('ex-bank').value = e.bank||'';
  if($I('ex-holder')) $I('ex-holder').value = e.holder||'';
  if($I('ex-account')) $I('ex-account').value = e.account||'';
  refreshSum();
  // 기존 영수증 로드
  try {
    const rs = await getDocs(query(collection(db,'expenseReceipts'), where('expenseId','==',id)));
    const arr = []; rs.forEach(d=>arr.push({id:d.id, ...d.data()}));
    arr.sort((a,b)=>(a.idx||0)-(b.idx||0));
    existingReceipts = arr.map(r=>({id:r.id, dataUrl:r.dataUrl, idx:r.idx||0}));
    renderReceipts();

function renderClassChecks(){
  const wrap = $I('ex-classes');
  if(!wrap) return;
  // 반의 학년 정보 (※ 모든 정렬은 학년순)
  const gradeInfo = c => {
    const gs = new Set();
    (c.students||[]).forEach(id=>{ const g=(c.grades||{})[id]; if(g) gs.add(g); });
    const arr = [...gs].sort((a,b)=>(parseInt(a,10)||99)-(parseInt(b,10)||99));
    return { label: arr.length ? arr.map(g=>String(g).replace('학년','')).join('·')+'학년' : '', min: arr.length ? (parseInt(arr[0],10)||99) : 999 };
  };
  const classes = CLASSES.filter(c=>c.org===expOrg)
    .map(c=>({...c, __gi: gradeInfo(c)}))
    .sort((a,b)=> a.__gi.min - b.__gi.min || (a.name||'').localeCompare(b.name||'','ko'));
  // 반 없는 학생
  const inClassIds = new Set(); classes.forEach(c=>(c.students||[]).forEach(id=>inClassIds.add(id)));
  const noClass = STUDENTS.filter(s=>s.org===expOrg && (s.status||'active')!=='quit' && !inClassIds.has(s.id));

  const palette = ['#0891b2','#7c3aed','#db2777','#d97706','#059669','#2563eb','#dc2626','#4f46e5','#0d9488','#c026d3'];
  let html = '';
  const groups = classes.map(c=>({key:c.id, name:c.name||'(이름없음)', gradeLabel:c.__gi.label, ids:(c.students||[])}));
  if(noClass.length) groups.push({key:'__noclass', name:'반 미지정', gradeLabel:'', ids:noClass.map(s=>s.id)});

  groups.forEach((grp,gi)=>{
    // 이 반 학생들 (퇴원 제외)
    const studs = grp.ids.map(id=>STUDENTS.find(s=>s.id===id)).filter(s=>s && (s.status||'active')!=='quit');
    if(!studs.length) return;
    studs.sort((a,b)=>{
      const ga = parseInt(studentGrade(a.id),10)||99, gb = parseInt(studentGrade(b.id),10)||99;
      return ga-gb || (a.name||'').localeCompare(b.name||'','ko');
    });
    const accent = palette[gi % palette.length];
    const open = !!openCls[grp.key];
    const selCount = studs.filter(s=>checkedIds.has(s.id)).length;
    html += `<div class="gr-card ${open?'open':''}" data-cls="${esc(grp.key)}">
      <div class="gr-head" onclick="toggleCls('${esc(grp.key)}')">
        <span style="width:10px;height:10px;border-radius:50%;background:${accent};flex-shrink:0"></span>
        <span style="flex:1;font-size:15px;font-weight:700;color:var(--gd)">${esc(grp.name)}${grp.gradeLabel?` <span style="font-size:12px;color:var(--tl);font-weight:400">· ${esc(grp.gradeLabel)}</span>`:''}</span>
        <span style="font-size:12px;color:${selCount?'var(--gm)':'var(--tl)'};font-weight:${selCount?'700':'400'}" id="cls-sel-${esc(grp.key)}">${selCount?selCount+'명 선택':''}</span>
        <span style="font-size:12px;color:var(--tl)">${studs.length}명</span>
        <span class="gr-arrow">▼</span>
      </div>
      <div class="gr-body">
        <div class="gr-body-inner">
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <button class="bm" onclick="clsAll('${esc(grp.key)}',true)">전체 선택</button>
            <button class="bm" onclick="clsAll('${esc(grp.key)}',false)">전체 해제</button>
          </div>
          ${studs.map(s=>{
            const g = studentGrade(s.id);
            const isLeave = (s.status||'active')==='leave';
            const checked = checkedIds.has(s.id);
            const showAmt = expMode!=='equal' && checked && !isLeave;
            return `<div class="stu-row ${isLeave?'leave':''} ${checked?'checked':''}" data-sid="${s.id}" onclick="${isLeave?'':`toggleStu('${s.id}')`}">
              <input type="checkbox" ${checked?'checked':''} ${isLeave?'disabled':''} onclick="event.stopPropagation();${isLeave?'':`toggleStu('${s.id}')`}">
              <div style="flex:1">
                <span class="stu-name">${esc(s.name)}</span>
                ${isLeave?'<span style="font-size:12px;color:#b45309;font-weight:700"> (휴학)</span>':''}
                <span class="stu-meta"> ${s.gender||''}${g?' · '+g:''}</span>
              </div>
              <input type="number" class="amt-in" data-amt="${s.id}" value="${indivAmts[s.id]!=null?indivAmts[s.id]:''}" placeholder="금액" inputmode="numeric"
                onclick="event.stopPropagation()" oninput="setAmt('${s.id}', this.value)"
                style="width:104px;height:34px;border:1.5px solid var(--ivd);border-radius:8px;padding:0 10px;background:#fff;font-family:inherit;display:${showAmt?'':'none'}">
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  });
  wrap.innerHTML = html || '<p class="empty">해당 기관에 학생이 없습니다.</p>';
  // 열린 반 높이 복원
  groups.forEach(grp=>{
    if(openCls[grp.key]){
      const card = wrap.querySelector(`.gr-card[data-cls="${cssEsc(grp.key)}"]`);
      if(card){ const body=card.querySelector('.gr-body'); const inner=card.querySelector('.gr-body-inner'); if(body&&inner) body.style.maxHeight='none'; }
    }
  });
}
function cssEsc(s){ return String(s).replace(/"/g,'\\"'); }

function toggleCls(key){
  const willOpen = !openCls[key];
  openCls[key] = willOpen;
  const card = document.querySelector(`.gr-card[data-cls="${cssEsc(key)}"]`);
  if(!card){ renderClassChecks(); return; }
  const body = card.querySelector('.gr-body');
  const inner = card.querySelector('.gr-body-inner');
  if(willOpen){
    card.classList.add('open');
    body.style.maxHeight = inner.scrollHeight + 'px';
    setTimeout(()=>{ if(openCls[key]) body.style.maxHeight='none'; }, 320);
  } else {
    body.style.maxHeight = inner.scrollHeight + 'px';
    requestAnimationFrame(()=>{ body.style.maxHeight='0px'; card.classList.remove('open'); });
  }
}
window.toggleCls = toggleCls;

function toggleStu(sid){
  if(checkedIds.has(sid)) checkedIds.delete(sid);
  else checkedIds.add(sid);
  // 행 UI 갱신
  const row = document.querySelector(`.stu-row[data-sid="${sid}"]`);
  if(row){
    const cb = row.querySelector('input[type=checkbox]');
    const on = checkedIds.has(sid);
    if(cb) cb.checked = on;
    row.classList.toggle('checked', on);
    const ai = row.querySelector('.amt-in');
    if(ai) ai.style.display = (expMode!=='equal' && on) ? '' : 'none';
  }
  refreshClsCounts();
  refreshSum();
}
window.toggleStu = toggleStu;

function clsAll(key, on){
  // 그 반의 활성 학생 전체 선택/해제
  let ids = [];
  if(key==='__noclass'){
    const inClassIds = new Set(); CLASSES.filter(c=>c.org===expOrg).forEach(c=>(c.students||[]).forEach(id=>inClassIds.add(id)));
    ids = STUDENTS.filter(s=>s.org===expOrg && (s.status||'active')==='active' && !inClassIds.has(s.id)).map(s=>s.id);
  } else {
    const c = CLASSES.find(x=>x.id===key);
    ids = (c?.students||[]).filter(id=>{
      const s = STUDENTS.find(x=>x.id===id);
      return s && (s.status||'active')==='active';
    });
  }
  ids.forEach(id=>{ if(on) checkedIds.add(id); else checkedIds.delete(id); });
  renderClassChecks();
  refreshSum();
}
window.clsAll = clsAll;

function refreshClsCounts(){
  // 반 헤더의 선택 수 갱신
  document.querySelectorAll('.gr-card').forEach(card=>{
    const key = card.getAttribute('data-cls');
    const rows = card.querySelectorAll('.stu-row');
    let cnt = 0;
    rows.forEach(r=>{ if(checkedIds.has(r.getAttribute('data-sid'))) cnt++; });
    const el = card.querySelector(`[id^="cls-sel-"]`);
    if(el){ el.textContent = cnt?cnt+'명 선택':''; el.style.color = cnt?'var(--gm)':'var(--tl)'; el.style.fontWeight = cnt?'700':'400'; }
  });
}

function refreshSum(){
  const n = checkedIds.size;
  // 개별 모드: 개별 금액 합산
  if(expMode!=='equal'){
    let sum = 0;
    checkedIds.forEach(id=>{ const a=indivAmts[id]; if(a>0) sum+=a; });
    $I('sum-count').textContent = n+'명';
    $I('sum-per').textContent = '개별';
    $I('sum-total').textContent = n ? (expMode==='refund'?'↩️ ':'')+'₩'+won(sum) : '-';
    const se0 = $I('sum-school'); if(se0) se0.textContent = '-';
    return;
  }
  const sq = parseInt($I('ex-schoolqty')?.value||'0',10) || 0;
  const total = parseInt($I('ex-total')?.value||'0',10) || 0;
  const divisor = n + sq;
  const per = perAmount(total, divisor);
  $I('sum-count').textContent = n+'명' + (sq?` + 학교 ${sq}`:'');
  $I('sum-per').textContent = (divisor&&total) ? '₩'+won(per) : '-';
  $I('sum-total').textContent = (n&&total&&divisor) ? '₩'+won(per*n) : '-';
  const se = $I('sum-school');
  if(se) se.textContent = (sq&&total&&divisor) ? '₩'+won(per*sq) : '-';
}

// 기관의 경비 관리자 uid 목록 (없으면 슈퍼관리자들)
function expManagerUids(org){
  const mgrs = (EXP_MANAGERS[org]||[]).filter(uid=>STAFF.some(s=>s.uid===uid));
  if(mgrs.length) return mgrs;
  // 미지정 → 슈퍼관리자 전원
  return STAFF.filter(s=>s.role==='super').map(s=>s.uid);
}
async function sendMsg(toUids, subject, body, category){
  const uids = [...new Set(toUids)].filter(Boolean);
  if(!uids.length) return;
  const toNames = uids.map(u=>STAFF.find(s=>s.uid===u)?.name||'?');
  try {
    await addDoc(collection(db,'messages'), {
      category: category || 'payreq',
      fromUid: CU.uid, fromName: CU.name||'', fromOrg: CU.org||'',
      toUids: uids, toNames, subject, body,
      readBy: [], createdAt: Timestamp.now()
    });
  } catch(e){ console.error('쪽지 발송 실패', e); }
}

async function submitExpense(){
  const date = $I('ex-date')?.value || '';
  const semester = $I('ex-semester')?.value || '';
  const teacher = $I('ex-teacher')?.value.trim() || '';
  const subject = $I('ex-subject')?.value.trim() || '';
  const items = $I('ex-items')?.value.trim() || '';
  const detail = $I('ex-detail')?.value.trim() || '';
  const total = parseInt($I('ex-total')?.value||'0',10) || 0;
  const bank = $I('ex-bank')?.value.trim() || '';
  const holder = $I('ex-holder')?.value.trim() || '';
  const account = $I('ex-account')?.value.trim() || '';
  const schoolNote = $I('ex-school')?.value.trim() || '';
  const ids = Array.from(checkedIds);

  if(!date){ toast('신청 날짜를 입력하세요.','err'); return; }
  if(!semester){ toast('학기가 없습니다. 출석부 설정에서 학기를 먼저 등록하세요.','err'); return; }
  if(!teacher){ toast('선생님(담당)을 입력하세요.','err'); $I('ex-teacher')?.focus(); return; }
  if(!subject){ toast('수업 과목을 입력하세요.','err'); $I('ex-subject')?.focus(); return; }
  if(!items){ toast('구매 목록을 입력하세요.','err'); $I('ex-items')?.focus(); return; }
  if(!ids.length){ toast('참여 학생을 1명 이상 체크하세요.','err'); return; }
  if(existingReceipts.length + receipts.length < 1){ toast('영수증을 1장 이상 첨부하세요.','err'); return; }

  let record;
  if(expMode==='equal'){
    // ── 균등 청구 (1/N) ──
    if(!total || total<=0){ toast('청구 금액을 입력하세요.','err'); $I('ex-total')?.focus(); return; }
    const sq = parseInt($I('ex-schoolqty')?.value||'0',10) || 0;
    const divisor = ids.length + sq;
    const per = perAmount(total, divisor);
    const students = ids.map(id=>{
      const s = STUDENTS.find(x=>x.id===id);
      return {id, name:s?.name||'', grade:studentGrade(id)||'', classId:studentClass(id)?.id||'', className:studentClass(id)?.name||'', amt:per};
    });
    if(!confirm(`청구금액 ₩${won(total)} ÷ ${divisor} (학생 ${ids.length}명${sq?` + 학교 ${sq}`:''}) = 1인당 ₩${won(per)} (10원 올림)\n\n· 학생 청구 합계: ₩${won(per*ids.length)}${sq?`\n· 학교 청구분: ₩${won(per*sq)}`:''}\n\n신청할까요?`)) return;
    record = {
      org: expOrg, mode:'equal', date, semester, teacher, subject, items, detail,
      total, per, count: ids.length,
      schoolQty: sq, schoolTotal: per*sq,
      students, bank, holder, account, schoolNote,
      createdByUid: CU.uid, createdByName: CU.name||'',
      createdAt: Timestamp.now()
    };
  } else {
    // ── 개별 청구 / 개별 반환 ──
    const bad = [];
    ids.forEach(id=>{
      const a = indivAmts[id];
      if(!(a>0)){ const s=STUDENTS.find(x=>x.id===id); bad.push(s?.name||''); }
    });
    if(bad.length){
      toast(`금액이 비어 있는 학생: ${bad.slice(0,5).join(', ')}${bad.length>5?` 외 ${bad.length-5}명`:''}`,'err');
      return;
    }
    const sum = ids.reduce((t,id)=>t+indivAmts[id], 0);
    const students = ids.map(id=>{
      const s = STUDENTS.find(x=>x.id===id);
      return {id, name:s?.name||'', grade:studentGrade(id)||'', classId:studentClass(id)?.id||'', className:studentClass(id)?.name||'', amt:indivAmts[id]};
    });
    const modeName = expMode==='refund' ? '개별 반환 ↩️' : '개별 청구 ✏️';
    if(!confirm(`${modeName}\n· 대상: ${ids.length}명\n· 합계: ₩${won(sum)}\n(학생별 금액은 신청 내역 상세에서 확인)\n\n신청할까요?`)) return;
    record = {
      org: expOrg, mode: expMode, date, semester, teacher, subject, items, detail,
      total: sum, per: null, count: ids.length,
      schoolQty: 0, schoolTotal: 0,
      students, bank, holder, account, schoolNote,
      createdByUid: CU.uid, createdByName: CU.name||'',
      createdAt: Timestamp.now()
    };
  }

  try {
    window.showLoading && window.showLoading(editingId?'수정 내용을 저장하는 중…':'신청서를 저장하는 중…');
    if(editingId){
      // ── 수정 저장 ──
      const upd = {...record};
      delete upd.createdByUid; delete upd.createdByName; delete upd.createdAt; delete upd.org;
      upd.receiptCount = existingReceipts.length + receipts.length;
      upd.updatedAt = Timestamp.now();
      upd.updatedByName = CU.name||'';
      await updateDoc(doc(db,'expenses',editingId), upd);
      // 삭제한 기존 영수증 제거
      for(const rid of removedReceiptIds){
        try { await deleteDoc(doc(db,'expenseReceipts',rid)); } catch(e4){}
      }
      // 새 영수증 추가
      let baseIdx = existingReceipts.reduce((m,r)=>Math.max(m, r.idx||0), 0);
      for(let i=0;i<receipts.length;i++){
        window.setLoadStep && window.setLoadStep(`영수증 업로드 중… (${i+1}/${receipts.length})`, 40 + Math.round((i+1)/Math.max(1,receipts.length)*50));
        await addDoc(collection(db,'expenseReceipts'), {
          expenseId: editingId, org: expOrg, date, subject,
          idx: ++baseIdx, dataUrl: receipts[i],
          createdByUid: CU.uid, createdByName: CU.name||'',
          createdAt: Timestamp.now()
        });
      }
    } else {
      // ── 새 신청 ──
      record.receiptCount = receipts.length;
      const ref = await addDoc(collection(db,'expenses'), record);
      for(let i=0;i<receipts.length;i++){
        window.setLoadStep && window.setLoadStep(`영수증 업로드 중… (${i+1}/${receipts.length})`, 30 + Math.round((i+1)/receipts.length*60));
        await addDoc(collection(db,'expenseReceipts'), {
          expenseId: ref.id,
          org: expOrg, date, subject,
          idx: i+1,
          dataUrl: receipts[i],
          createdByUid: CU.uid, createdByName: CU.name||'',
          createdAt: Timestamp.now()
        });
      }
      // 경비 관리자에게 알림 쪽지
      const modeName = record.mode==='refund'?'개별 반환':record.mode==='indiv'?'개별 청구':'균등 청구';
      const amtLine = record.mode==='refund'?`반환 합계 ₩${won(record.total)}`:`청구 합계 ₩${won(record.total)}`;
      await sendMsg(
        expManagerUids(expOrg),
        `[수행성 경비 신청] ${teacher} · ${subject}`,
        `${ORGS[expOrg]||expOrg} · ${semKor(semester)}\n담당: ${teacher}\n과목: ${subject}\n구매: ${items}\n방식: ${modeName}\n${amtLine} (대상 ${record.count}명)\n신청일: ${date}\n\n확인 후 입금 처리를 부탁드립니다. (수행성 경비 → 신청 내역에서 확인)`
      );
    }
    // 계좌 정보를 내 계정에 저장 (다음 신청 시 자동 입력)

let listTrash = false;   // 휴지통 보기

// 수정 가능 여부
//  - 신청자 본인: 아무도 결재하지 않았고, 지급 전일 때만
//  - 회계(경비지급) 담당자: 언제나 가능
function canEditReq(r){
  if(r.deleted) return false;
  if(isPayManager()) return true;
  if(r.createdByUid !== CU.uid) return false;
  if(r.paid) return false;
  const anyApproved = (r.chain||[]).some(c=>c.status==='approved');
  return !anyApproved;
}
// 왜 못 고치는지 안내
function editBlockReason(r){
  if(r.paid) return '지급이 완료되어 수정할 수 없습니다. (회계 담당자에게 문의)';
  if((r.chain||[]).some(c=>c.status==='approved')) return '이미 결재가 시작되어 수정할 수 없습니다. (회계 담당자에게 문의)';
  return '';
}

  try {

// ── 영구 삭제 (회계 담당자만) ──
async function purgePayReq(id){
  if(!isPayManager()){ toast('권한이 없습니다.','err'); return; }
  const r = PAY_REQUESTS.find(x=>x.id===id); if(!r) return;
  if(!confirm('영구 삭제하면 되돌릴 수 없습니다.\n영수증까지 모두 지웁니다. 진행할까요?')) return;
  window.showLoading && window.showLoading('삭제하는 중…');
  try {
    const rs = await getDocs(query(collection(db,'payReceipts'), where('requestId','==',id)));
    for(const d of rs.docs){ await deleteDoc(doc(db,'payReceipts',d.id)); }
    await deleteDoc(doc(db,'payRequests',id));
    await addLog('요청서 영구삭제', `${r.applicantName||''} · ₩${won(r.total)}`);
    window.hideLoading && window.hideLoading();
    toast('영구 삭제했습니다.','ok');
    if(curTab==='report') await renderReport(); else await renderList();
  } catch(e){ window.hideLoading && window.hideLoading(); toast('삭제 실패: '+(e.message||''),'err'); }
}

// 요청서 → 신청 폼에 채우기 (editId가 있으면 수정 모드)
async function loadIntoForm(r, editId){
  window.showLoading && window.showLoading('불러오는 중…');
  try {
    prEditId = editId || null;
    prMode = r.mode==='income' ? 'income' : 'expense';
    prOrg  = r.org || myOrgs()[0];
    if(r.bank) prBank = { bank:r.bank.bank||'', holder:r.bank.holder||'', account:r.bank.account||'' };
    // 영수증 불러오기 (항목별)
    const rcMap = {};
    try {
      const snap = await getDocs(query(collection(db,'payReceipts'), where('requestId','==',r.id)));
      snap.forEach(d=>{ const rc=d.data();
        if(!rcMap[rc.rowIdx]) rcMap[rc.rowIdx]=[];
        rcMap[rc.rowIdx].push(rc.dataUrl);
      });
    } catch(e){}
    prRows = (r.rows||[]).map((row,i)=>({
      cat_major: row.cat_major||'', cat_item: row.cat_item||'',
      name: row.name||'', qty: row.qty||1, price: row.price||0, note: row.note||'',
      receipts: rcMap[i] || []
    }));
    if(!prRows.length) prRows = [newPrRow()];
    prPending = { date:r.date||todayYMD(), name:r.applicantName||CU.name||'', dept:r.dept||'', purpose:r.purpose||'' };

    showTab('new');

}

function viewExpense(id){
  const e = EXPENSES.find(x=>x.id===id); if(!e) return;

  (e.students||[]).forEach(st=>charged.set(st.id, st));
  const indivMode = (e.mode==='indiv'||e.mode==='refund');
  const giFn = c => {
    const gs = new Set();
    (c.students||[]).forEach(sid=>{ const g=(c.grades||{})[sid]; if(g) gs.add(g); });
    const arr = [...gs].sort((a,b)=>(parseInt(a,10)||99)-(parseInt(b,10)||99));
    return { label: arr.length ? arr.map(g=>String(g).replace('학년','')).join('·')+'학년' : '', min: arr.length ? (parseInt(arr[0],10)||99) : 999 };
  };
  const orgClasses = CLASSES.filter(c=>c.org===e.org)
    .map(c=>({...c, __gi: giFn(c)}))
    .sort((a,b)=> a.__gi.min - b.__gi.min || (a.name||'').localeCompare(b.name||'','ko'));
  const seen = new Set();
  let rosterHTML = orgClasses.map(c=>{
    const studs = (c.students||[]).map(sid=>STUDENTS.find(s=>s.id===sid)).filter(s=>s && (s.status||'active')!=='quit');

    studs.sort((a,b)=>{

      return ga-gb || (a.name||'').localeCompare(b.name||'','ko');

      <div style="font-size:13px;font-weight:700;color:var(--gm);margin-bottom:5px">${esc(c.name||'')}${c.__gi.label?` <span style="color:var(--tl);font-weight:400">· ${esc(c.__gi.label)}</span>`:''} <span style="color:var(--tl);font-weight:400">— 체크 ${chk}/${studs.length}명</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${studs.map(s=>{
          seen.add(s.id);
          const st = charged.get(s.id);
          const isLeave = (s.status||'active')==='leave';

        }).join('')}
      </div>
    </div>`;
  }).join('');
  // 현재 반편성에 없는 청구 학생 (반 변경·퇴원 등)
  const extra = (e.students||[]).filter(st=>!seen.has(st.id));
  if(extra.length){
    rosterHTML += `<div style="margin-bottom:8px">
      <div style="font-size:13px;font-weight:700;color:var(--tl);margin-bottom:5px">현재 명단 외 (반 변경·퇴원 등)</div>

    </div>`;
  }
  const clsHTML = rosterHTML;

  const mv = document.createElement('div'); mv.className='mov'; mv.id='exview-mod';
  mv.innerHTML = `<div class="mbk" onclick="document.getElementById('exview-mod').remove()"></div>
    <div class="mbox">
      <div class="mtitle">${esc(e.subject)}</div>
      <div class="msub">${esc(e.date)} · ${e.semester?esc(semKor(e.semester))+' · ':''}${esc(e.teacher||e.createdByName||'')} · ${ORGS[e.org]||e.org}</div>
      <div style="background:var(--iv);border-radius:10px;padding:14px 16px;font-size:13.5px;line-height:2">
        <div><b>구매 목록</b> : ${esc(e.items||'-')}</div>
        ${e.detail?`<div><b>세부 내용</b> : ${esc(e.detail)}</div>`:''}
        ${e.mode==='indiv'||e.mode==='refund'

// 영수증 불러오기 (상세보기)
async function loadReceipts(expenseId){
  const box = $I('rc-list');
  if(!box) return;
  try {
    const snap = await getDocs(query(collection(db,'expenseReceipts'), where('expenseId','==',expenseId)));
    const arr = [];
    snap.forEach(d=>arr.push({id:d.id, ...d.data()}));
    arr.sort((a,b)=>(a.idx||0)-(b.idx||0));
    if(!arr.length){ box.innerHTML = '<span style="font-size:13px;color:var(--tl)">첨부된 영수증이 없습니다.</span>'; return; }
    box.innerHTML = arr.map(r=>`
      <div style="width:86px;height:86px;border:1px solid var(--ivd);border-radius:8px;overflow:hidden">
        <img src="${r.dataUrl}" style="width:100%;height:100%;object-fit:cover;cursor:pointer" onclick="openImageOverlay(this.src)" title="영수증 ${r.idx||''}">
      </div>`).join('');
  } catch(err){
    box.innerHTML = `<span style="font-size:13px;color:#dc2626">영수증을 불러올 수 없습니다: ${esc(err.message||'')}</span>`;
  }
}

async function delExpense(id){
  const e = EXPENSES.find(x=>x.id===id); if(!e) return;
  if(!isExpManager(e.org)){ toast('경비 관리자와 슈퍼관리자만 삭제할 수 있습니다.','err'); return; }
  if(!confirm(`"${e.subject}" (${e.date}) 신청을 삭제할까요?\n청구 대상 ${e.count}명의 기록과 영수증이 함께 삭제됩니다.`)) return;
  try {
    // 영수증 먼저 삭제
    try {
      const snap = await getDocs(query(collection(db,'expenseReceipts'), where('expenseId','==',id)));
      const dels = [];
      snap.forEach(d=>dels.push(deleteDoc(doc(db,'expenseReceipts',d.id))));
      await Promise.all(dels);
    } catch(e3){}
    await deleteDoc(doc(db,'expenses',id));
    toast('삭제했습니다.');
    renderList();
  } catch(e2){ toast('삭제 실패: '+e2.message,'err'); }
}
window.delExpense = delExpense;

// 날짜시각 포맷 (Timestamp → "2026-07-07 14:30")
function fmtDateTime(ts){
  try {
    const d = ts?.toDate ? ts.toDate() : (ts?.seconds ? new Date(ts.seconds*1000) : new Date(ts));
    if(isNaN(d.getTime())) return '';
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  } catch(e){ return ''; }
}

// 입금 확인 체크/취소 (경비 관리자·슈퍼만)
async function togglePaid(id, paid){
  const e = EXPENSES.find(x=>x.id===id); if(!e) return;
  if(!isExpManager(e.org)){ toast('경비 관리자만 입금 확인을 할 수 있습니다.','err'); return; }
  if(paid && !confirm(`"${e.subject}" (${e.teacher||e.createdByName}) 건을 입금 완료로 표시할까요?\n신청한 선생님께 입금 안내 쪽지가 발송됩니다.`)) return;
  if(!paid && !confirm('입금 확인을 취소할까요?')) return;
  try {
    window.showLoading && window.showLoading(paid?'입금 확인 처리 중…':'취소 처리 중…');
    const upd = paid
      ? { paid:true, paidAt:Timestamp.now(), paidByUid:CU.uid, paidByName:CU.name||'' }

// 엑셀 내보내기
function exportPayExcel(){
  const all = PAY_REQUESTS.filter(r=>r.org===rpOrg && (r.date||'').startsWith(rpMonth) && !r.deleted);
  if(!all.length){ toast('해당 월에 데이터가 없습니다.','err'); return; }
  try {
    ensureXLSX().then(()=>{
      const wb=XLSX.utils.book_new();
      // 요청서 목록
      const a1=[['날짜','구분','신청자','부서','용도','금액','상태','지급일','은행','계좌','예금주']];
      all.forEach(r=>{
        const st = r.mode==='income'?'수입' : r.status==='rejected'?'반려' : r.paid?'지급완료' : r.status==='approving'?'결재중':'지급대기';
        a1.push([r.date||'', r.mode==='income'?'수입':'지출', r.applicantName||r.createdByName||'', r.dept||'', r.purpose||'', r.total||0, st,
          r.paidAt?fmtDT(r.paidAt):'', r.bank?.bank||'', r.bank?.account||'', r.bank?.holder||'']);
      });
      const ws1=XLSX.utils.aoa_to_sheet(a1); ws1['!cols']=[{wch:11},{wch:6},{wch:9},{wch:9},{wch:26},{wch:12},{wch:9},{wch:16},{wch:11},{wch:16},{wch:9}];
      XLSX.utils.book_append_sheet(wb, ws1, '요청서 목록');
      // 항목 상세
      const a2=[['날짜','신청자','대분류','세부','품목','수량','단가','소계','비고']];
      all.forEach(r=>(r.rows||[]).forEach(row=>{
        a2.push([r.date||'', r.applicantName||'', row.cat_major||'', row.cat_item||'', row.name||'', row.qty||0, row.price||0, row.sub||0, row.note||'']);
      }));
      const ws2=XLSX.utils.aoa_to_sheet(a2); ws2['!cols']=[{wch:11},{wch:9},{wch:14},{wch:16},{wch:20},{wch:6},{wch:11},{wch:12},{wch:16}];
      XLSX.utils.book_append_sheet(wb, ws2, '항목 상세');
      // 계정과목별 집계
      const bymap={};
      all.filter(r=>r.mode!=='income').forEach(r=>(r.rows||[]).forEach(row=>{
        const k=row.cat_major||'미분류'; bymap[k]=(bymap[k]||0)+(row.sub||0);
      }));
      const a3=[['계정과목(대분류)','금액']];
      Object.keys(bymap).sort().forEach(k=>a3.push([k,bymap[k]]));
      a3.push(['합계', Object.values(bymap).reduce((s,v)=>s+v,0)]);
      const ws3=XLSX.utils.aoa_to_sheet(a3); ws3['!cols']=[{wch:20},{wch:14}];
      XLSX.utils.book_append_sheet(wb, ws3, '계정과목별 집계');
      XLSX.writeFile(wb, `경비지급_${rpMonth}_${ORGS[rpOrg]||rpOrg}.xlsx`);
      toast('엑셀 파일을 저장했습니다.','ok');
    });
  } catch(e){ toast('엑셀 실패: '+(e.message||''),'err'); }
}
window.exportPayExcel = exportPayExcel;

// ══════════ 📋 월별 취합표 (계정과목 대분류별) ══════════
function buildMonthlySheetHTML(){
  const all = PAY_REQUESTS.filter(r=>r.org===rpOrg && (r.date||'').startsWith(rpMonth) && r.status!=='rejected' && !r.deleted);
  const exp = all.filter(r=>r.mode!=='income');
  const inc = all.filter(r=>r.mode==='income');
  // 지출: 대분류 > 세부 집계
  const tree={};
  exp.forEach(r=>(r.rows||[]).forEach(row=>{
    const M=row.cat_major||'미분류', S=row.cat_item||'-';
    if(!tree[M]) tree[M]={items:{}, total:0};
    tree[M].items[S]=(tree[M].items[S]||0)+(row.sub||0);
    tree[M].total+=(row.sub||0);
  }));
  const majors=Object.keys(tree).sort((a,b)=>tree[b].total-tree[a].total);
  const expTotal=majors.reduce((s,m)=>s+tree[m].total,0);
  // 수입 집계
  const incMap={};
  inc.forEach(r=>(r.rows||[]).forEach(row=>{ const k=row.cat_major||'기타'; incMap[k]=(incMap[k]||0)+(row.sub||0); }));
  const incTotal=Object.values(incMap).reduce((s,v)=>s+v,0);

  const specialSet=new Set(EXPENSE_CATS.filter(c=>c.special).map(c=>c.major));

  const expRows = majors.map(M=>{
    const items=Object.keys(tree[M].items).sort();
    const isSp=specialSet.has(M);
    return items.map((S,i)=>`<tr>
      ${i===0?`<td class="ms-major" rowspan="${items.length}">${esc(M)}${isSp?'<div class="ms-sp">별도 통장</div>':''}</td>`:''}
      <td class="ms-item">${esc(S)}</td>
      <td class="ms-amt">₩${won(tree[M].items[S])}</td>
      ${i===0?`<td class="ms-mtot" rowspan="${items.length}">₩${won(tree[M].total)}</td>`:''}
    </tr>`).join('');
  }).join('');

  const incRows = Object.keys(incMap).sort().map(k=>`<tr>
    <td class="ms-item" colspan="2">${esc(k)}</td><td class="ms-amt">₩${won(incMap[k])}</td><td class="ms-mtot">₩${won(incMap[k])}</td>
  </tr>`).join('');

  const [y,m]=rpMonth.split('-');
  return `<div class="ms-doc">
    <div class="ms-head">
      <div class="ms-title">${esc(ORGS[rpOrg]||rpOrg)} 월별 경비 취합표</div>
      <div class="ms-sub">${y}년 ${Number(m)}월 (1일~말일) · 지출 ${exp.length}건 · 수입 ${inc.length}건 · 출력일 ${todayYMD()}</div>
    </div>
    <table class="ms-tbl">
      <thead><tr><th style="width:130px">대분류</th><th>세부 항목</th><th style="width:120px">금액</th><th style="width:120px">소계</th></tr></thead>
      <tbody>
        <tr class="ms-sec"><td colspan="4">■ 지출</td></tr>
        ${expRows||'<tr><td colspan="4" class="ms-empty">지출 내역 없음</td></tr>'}
        <tr class="ms-sum"><td colspan="3">지출 합계</td><td class="ms-mtot">₩${won(expTotal)}</td></tr>
        <tr class="ms-sec"><td colspan="4">■ 수입</td></tr>
        ${incRows||'<tr><td colspan="4" class="ms-empty">수입 내역 없음</td></tr>'}
        <tr class="ms-sum"><td colspan="3">수입 합계</td><td class="ms-mtot">₩${won(incTotal)}</td></tr>
      </tbody>
      <tfoot><tr><td colspan="3">월 수입 − 지출 차액</td><td class="ms-diff">₩${won(incTotal-expTotal)}</td></tr></tfoot>
    </table>
  </div>`;
}

let _payRcCache = null;
function paySeqMap(){
  const list = PAY_REQUESTS.filter(r=>r.org===rpOrg && (r.date||'').startsWith(rpMonth) && r.status!=='rejected' && !r.deleted)
    .sort((a,b)=>(a.date||'').localeCompare(b.date||'') || (a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
  const map={}; list.forEach((r,i)=>{ map[r.id]='P'+String(i+1).padStart(3,'0'); });
  return { list, map };
}

async function buildPayReceiptHTML(){
  const { list, map } = paySeqMap();
  const withRc = list.filter(r=>(r.rows||[]).some(x=>x.receiptCount>0));
  const blocks=[];
  for(const r of withRc){
    const snap=await getDocs(query(collection(db,'payReceipts'), where('requestId','==',r.id)));
    const arr=[]; snap.forEach(d=>arr.push(d.data()));
    arr.sort((a,b)=>(a.rowIdx-b.rowIdx)||(a.idx-b.idx));
    blocks.push({ req:r, seq:map[r.id], receipts:arr });
  }
  _payRcCache = blocks;

  const classify = (dataUrl)=> new Promise(res=>{
    const im=new Image();
    im.onload=()=>{ const ra=im.naturalWidth/im.naturalHeight;
      res(ra>1.15?'wide':ra<0.72?'tall':'short'); };
    im.onerror=()=>res('short');
    im.src=dataUrl;
  });

  let cards='';
  for(const b of blocks){
    const r=b.req;
    let cells='';
    for(let i=0;i<b.receipts.length;i++){
      const rc=b.receipts[i];
      const type=await classify(rc.dataUrl);
      const row=(r.rows||[])[rc.rowIdx];
      const label=row?`${row.cat_major||''}${row.cat_item?' › '+row.cat_item:''} · ${row.name||''}`:'';
      cells+=`<div class="prc-cell ${type}">
        <div class="prc-no">${b.seq}-${rc.rowIdx+1}.${rc.idx}</div>
        <img src="${rc.dataUrl}">
        ${label?`<div class="prc-lbl">${esc(label)}</div>`:''}
      </div>`;
    }
    cards+=`<div class="prc-card">
      <div class="prc-hd">
        <span class="prc-seq">${b.seq}</span>
        <span class="prc-purpose">${esc(r.purpose||'(용도 미기재)')}</span>
        <span class="prc-meta">${esc(r.applicantName||'')} · ${esc(r.dept||'')} · ${esc(r.date||'')} · <b>₩${won(r.total)}</b> · 영수증 ${b.receipts.length}장</span>
      </div>
      <div class="prc-grid">${cells}</div>
    </div>`;
  }
  const [y,m]=rpMonth.split('-');
  return `<div class="prc-doc">
    <div class="prc-head">
      <div class="prc-title">${esc(ORGS[rpOrg]||rpOrg)} 경비 지급 영수증 취합</div>
      <div class="prc-sub">${y}년 ${Number(m)}월 (1일~말일) · 신청 ${blocks.length}건 · 날짜순 · 출력일 ${todayYMD()}</div>
    </div>
    ${cards||'<p style="text-align:center;color:#bbb;padding:30px">첨부된 영수증이 없습니다.</p>'}
    <div class="prc-foot">※ 번호(P###)는 신청 건, P###-항목.장 순으로 표기됩니다. 취합표의 번호와 대조하세요.</div>
  </div>`;
}

let openRepCls = {};
function renderReportClassGroups(list, students){
  // 학생을 학년별로 묶기 (grade 기준, 없으면 학년 미지정)
  const gradeNum = g => parseInt(String(g||'').replace(/[^0-9]/g,''),10)||99;
  const gradeLabel = g => { const n=parseInt(String(g||'').replace(/[^0-9]/g,''),10); return n?`${n}학년`:'학년 미지정'; };
  const byCls = {};
  students.forEach(s=>{
    const k = gradeLabel(s.grade);
    (byCls[k] = byCls[k] || []).push(s);
  });
  // 학년 정렬: 학년 숫자순
  const clsKeys = Object.keys(byCls).sort((a,b)=>{
    const ma = Math.min(...byCls[a].map(s=>gradeNum(s.grade)));
    const mb = Math.min(...byCls[b].map(s=>gradeNum(s.grade)));
    return ma-mb || a.localeCompare(b,'ko');
  });
  const palette = ['#0891b2','#7c3aed','#db2777','#d97706','#059669','#2563eb','#dc2626','#4f46e5','#0d9488','#c026d3'];
  return clsKeys.map((k,ki)=>{
    const studs = byCls[k].sort((a,b)=>gradeNum(a.grade)-gradeNum(b.grade)||(a.name||'').localeCompare(b.name||'','ko'));
    const clsCharge = studs.reduce((t,s)=>t+s.charge,0);
    const clsRefund = studs.reduce((t,s)=>t+s.refund,0);
    const clsNet = clsCharge - clsRefund;
    const accent = palette[ki%palette.length];
    const open = !!openRepCls[k];
    return `<div class="gr-card ${open?'open':''}" data-rcls="${esc(k)}">

function toggleRepCls(k){
  openRepCls[k] = !openRepCls[k];
  const card = document.querySelector(`.gr-card[data-rcls="${k.replace(/"/g,'\\"')}"]`);
  if(!card) return;
  const body = card.querySelector('.gr-body');
  const inner = card.querySelector('.gr-body-inner');
  if(openRepCls[k]){
    card.classList.add('open');
    body.style.maxHeight = inner.scrollHeight + 'px';
    setTimeout(()=>{ if(openRepCls[k]) body.style.maxHeight='none'; }, 320);
  } else {
    body.style.maxHeight = inner.scrollHeight + 'px';
    requestAnimationFrame(()=>{ body.style.maxHeight='0px'; card.classList.remove('open'); });
  }
}

function viewClassSheet(gradeKey){
  const list = EXPENSES.filter(e=>e.org===reportOrg && e.semester===reportSem)
    .sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const gradeNum = g => parseInt(String(g||'').replace(/[^0-9]/g,''),10)||99;
  const gradeLabel = g => { const n=parseInt(String(g||'').replace(/[^0-9]/g,''),10); return n?`${n}학년`:'학년 미지정'; };
  // 이 학년에 속한 학생이 참여한 신청만
  const stuMap = new Map();
  const items = [];
  list.forEach(e=>{
    const members = (e.students||[]).filter(s=>gradeLabel(s.grade)===gradeKey);
    if(!members.length) return;
    items.push(e);
    members.forEach(s=>{ if(!stuMap.has(s.id)) stuMap.set(s.id, {id:s.id, name:s.name, grade:s.grade, className:s.className}); });
  });
  const students = [...stuMap.values()].sort((a,b)=>gradeNum(a.grade)-gradeNum(b.grade)||(a.name||'').localeCompare(b.name||'','ko'));
  // 학생별·항목별 금액 매트릭스
  const amtOf = (e, sid) => { const s=(e.students||[]).find(x=>x.id===sid); return s? (e.mode==='refund'? -(s.amt||0) : (s.amt||0)) : null; };

  // 출력용 전역 저장
  // 이 학년에 포함된 반 이름들 (학년순 정렬된 students에서 추출)
  const classNames = [...new Set(students.map(s=>s.className).filter(Boolean))];
  lastSheet = { gradeKey, classNames, semKor: semKor(reportSem), orgName: ORGS[reportOrg]||reportOrg, items, students, amtOf };

  const mv = document.createElement('div'); mv.className='mov'; mv.id='class-sheet-mod';
  mv.innerHTML = `<div class="mbk" onclick="document.getElementById('class-sheet-mod').remove()"></div>
    <div class="mbox" style="max-width:${Math.min(1100, 340+items.length*120)}px">

      ${items.length?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
        <button class="bm" onclick="printSheet('auto')">🖨️ PDF 출력 (자동)</button>
        <button class="bm" onclick="printSheet('a5')">A5 세로</button>
        <button class="bm" onclick="printSheet('a4')">A4 가로</button>
        <button class="bm" onclick="imageSheet()">🖼️ 이미지 저장</button>
      </div>`:''}
      ${items.length ? `
      <div style="overflow-x:auto">
        <table class="mx-tbl" style="min-width:100%">
          <colgroup><col style="width:96px">${items.map(()=>'<col style="width:118px">').join('')}<col style="width:92px"></colgroup>
          <thead>
            <tr>
              <th class="mx-name mx-h">과목</th>
              ${items.map(e=>`<th class="mx-item mx-h"><span style="font-size:9px;opacity:.85;font-weight:600">${expenseSeqNo(e.id)}</span><br>${esc(e.subject)}${e.mode==='refund'?'<br><span style="font-size:10px;font-weight:400">(반환)</span>':''}</th>`).join('')}
              <th class="mx-tot mx-h" rowspan="5">개인<br>합계</th>
            </tr>
            <tr>
              <th class="mx-name mx-h2">담당</th>
              ${items.map(e=>`<th class="mx-item mx-h2">${esc(e.teacher||'-')}</th>`).join('')}
            </tr>
            <tr>
              <th class="mx-name mx-h2">신청일</th>
              ${items.map(e=>`<th class="mx-item mx-h2">${esc(e.date||'-')}</th>`).join('')}
            </tr>
            <tr>

              ${items.map(e=>`<th class="mx-item mx-h3">${e.mode==='refund'?'↩️ ':''}₩${won(Math.abs(e.per|| ((e.students||[]).find(s=>true)?.amt) || 0))}${e.mode==='equal'?'/인':''}</th>`).join('')}

      ` : '<p class="empty">이 반의 청구 내역이 없습니다.</p>'}

let lastSheet = null;

// PDF 라이브러리 동적 로드
function loadH2C(){ if(window.html2canvas||document.getElementById('h2c-script'))return; const sc=document.createElement('script'); sc.id='h2c-script'; sc.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'; document.head.appendChild(sc); }
loadH2C();
function ensureJsPDF(){
  return new Promise((resolve,reject)=>{
    if(window.jspdf&&window.jspdf.jsPDF) return resolve();
    let sc=document.getElementById('jspdf-script');
    if(sc){ const chk=setInterval(()=>{ if(window.jspdf&&window.jspdf.jsPDF){clearInterval(chk);resolve();} },100); setTimeout(()=>{clearInterval(chk); if(!(window.jspdf&&window.jspdf.jsPDF))reject(new Error('PDF 모듈 로드 실패'));},8000); return; }
    sc=document.createElement('script'); sc.id='jspdf-script'; sc.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    sc.onload=()=>resolve(); sc.onerror=()=>reject(new Error('PDF 모듈을 불러올 수 없습니다.')); document.head.appendChild(sc);
  });
}
function ensureH2C(){
  return new Promise((resolve,reject)=>{
    if(window.html2canvas) return resolve();
    loadH2C();
    const chk=setInterval(()=>{ if(window.html2canvas){clearInterval(chk);resolve();} },100);
    setTimeout(()=>{clearInterval(chk); if(!window.html2canvas)reject(new Error('이미지 모듈 로드 실패'));},8000);
  });
}

// 안내장 HTML 생성 (인쇄용, 세로/가로 레이아웃)
function buildSheetHTML(landscape){
  const s = lastSheet; if(!s) return '';
  const { gradeKey, classNames, semKor:sem, orgName, items, students, amtOf } = s;
  // 제목 부제: 학년 + 반 이름 (반 하나면 "2학년 로이반", 여러 개면 "2학년 (로이반·이레반)")
  const cls = classNames||[];
  const gradeTitle = cls.length===1 ? `${gradeKey} ${cls[0]}` : cls.length>1 ? `${gradeKey} (${cls.join('·')})` : gradeKey;
  const won2 = n => (n||0).toLocaleString('ko-KR');
  const perLine = (e)=> e.mode==='refund'?`↩️ ₩${won2(Math.abs(e.per||0))}`:`₩${won2(e.per|| ((e.students||[]).find(x=>true)?.amt) || 0)}${e.mode==='equal'?'/인':''}`;
  const cell = (e,sid)=>{ const a=amtOf(e,sid); if(a===null) return '<td class="x">·</td>'; const isRef=a<0; return `<td class="${isRef?'ref':'chg'}">${isRef?'−':''}₩${won2(Math.abs(a))}</td>`; };

  // 칸 폭 계산: 이름칸 + 항목N칸 + 합계칸
  const nameW = landscape ? 60 : 52;
  const totW = landscape ? 80 : 64;
  const pad = landscape ? 30 : 26;
  // 문서 최대 내부폭 (A5세로 559-2*26=507, A4가로 1123-2*30=1063)
  const maxInner = landscape ? 1063 : 507;
  // 항목칸 폭: 남는 폭을 항목수로 나눔 (최소값 보장)
  const availForItems = maxInner - nameW - totW;
  let itemColW = Math.floor(availForItems / items.length);
  const minItemW = landscape ? 72 : 64;
  itemColW = Math.max(minItemW, itemColW);
  // 실제 표 폭
  const tableW = nameW + itemColW*items.length + totW;
  // 문서 내부폭 = 표폭(최대 maxInner). 이보다 표가 작으면 문서를 표폭에 맞춤 → 좌우 여백 동일
  const innerW = Math.min(tableW, maxInner);
  const docW = innerW + pad*2;

  const colgroup = `<colgroup>
    <col style="width:${nameW}px">
    ${items.map(()=>`<col style="width:${itemColW}px">`).join('')}
    <col style="width:${totW}px">
  </colgroup>`;

  // 헤더: 항목 정보를 행별로 분리 (라벨 행 + 항목 값)
  const headRows2 = `
    <tr class="h-subj"><th class="nm hd">이름</th>${items.map(e=>`<th class="ic subj"><span style="font-size:8.5px;opacity:.85;font-weight:600">${expenseSeqNo(e.id)}</span><br>${esc(e.subject)}${e.mode==='refund'?'<br>(반환)':''}</th>`).join('')}<th class="tot hd">개인<br>합계</th></tr>
    <tr class="h-sub"><td class="rl">담당</td>${items.map(e=>`<td class="ic2">${esc(e.teacher||'-')}</td>`).join('')}<td class="rl2"></td></tr>
    <tr class="h-sub"><td class="rl">신청일</td>${items.map(e=>`<td class="ic2">${esc(e.date||'-')}</td>`).join('')}<td class="rl2"></td></tr>
    <tr class="h-sub"><td class="rl">세부내용</td>${items.map(e=>`<td class="ic2 det">${esc(e.items||'')}${e.detail?'<br>'+esc(e.detail):''}</td>`).join('')}<td class="rl2"></td></tr>
    <tr class="h-per"><td class="rl">1인당</td>${items.map(e=>`<td class="ic2 per">${perLine(e)}</td>`).join('')}<td class="rl2"></td></tr>`;

  const bodyRows = students.map(st=>{
    let sum=0;
    const tds = items.map(e=>{ const a=amtOf(e,st.id); if(a!==null) sum+=a; return cell(e,st.id); }).join('');
    return `<tr><th class="nm">${esc(st.name)}<span class="cls">${esc(st.className||'')}</span></th>${tds}<td class="tot">₩${won2(sum)}</td></tr>`;
  }).join('');
  const footTds = items.map(e=>{ const t=students.reduce((tt,st)=>tt+(amtOf(e,st.id)||0),0); return `<td class="ft">₩${won2(Math.abs(t))}</td>`; }).join('');
  const grand = students.reduce((tt,st)=>tt+items.reduce((x,e)=>x+(amtOf(e,st.id)||0),0),0);

  const table = `<table class="sheet-tbl">
    ${colgroup}
    <thead>${headRows2}</thead>
    <tbody>${bodyRows}</tbody>
    <tfoot><tr><th class="nm">항목합계</th>${footTds}<td class="tot">₩${won2(grand)}</td></tr></tfoot>
  </table>`;

  return `<div class="sheet-doc ${landscape?'land':'port'}" style="width:${docW}px;padding:${pad}px">
    <div class="sheet-head">
      <div class="sh-title">${esc(orgName)} 수행성 경비 안내</div>
      <div class="sh-sub">${esc(sem)} · ${esc(gradeTitle)}</div>
    </div>
    ${table}
    <div class="sheet-foot">※ 금액이 적힌 칸이 청구 항목이며, 반환은 (−)로 표시됩니다. 문의는 담당 선생님께 해주세요.</div>
  </div>`;
}
