<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학사일정 · 교사 선교사</title>
<meta name="theme-color" content="#1e2e5c">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
:root {
  --gd:#1e2e5c; --gm:#2b3990; --gl:#5a70cc; --gp:#e8ecf8;
  --gold:#c9a84c; --goldd:#a8873a; --goldp:#fdf3d8;
  --iv:#f5f0e8; --ivd:#e8e0d0;
  --tx:#1a1a2e; --ts:#4a4a6a; --tl:#8888aa; --wh:#ffffff;
  --sh:0 2px 12px rgba(30,46,92,0.10); --r:12px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--iv);color:var(--tx);min-height:100vh;}

#gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#eef0f8 0%,#f5f0e8 60%,#fdf3d8 100%);padding:24px;text-align:center;}
.gbox{background:var(--wh);border-radius:24px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(30,46,92,0.12);}
.gtitle{font-size:22px;font-weight:800;color:var(--gd);margin-bottom:8px;}
.gsub{font-size:14px;color:var(--ts);line-height:1.6;margin-bottom:20px;}
.gbtn{display:inline-block;width:100%;padding:14px;background:linear-gradient(135deg,#2b3990,#1e2e5c);color:var(--wh);border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;}

#ms{display:none;flex-direction:column;min-height:100vh;}
.ah{background:linear-gradient(135deg,#1e2e5c,#12194a);color:var(--wh);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.ahl{display:flex;align-items:center;gap:12px;}
.ahi{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.aht{font-size:16px;font-weight:700;}
.ahr{text-align:right;}
#hn{font-size:15px;font-weight:600;}
#hi{font-size:11px;opacity:.7;margin-top:2px;}
.homebtn{background:rgba(255,255,255,0.15);color:var(--wh);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;margin-top:4px;text-decoration:none;display:inline-block;}

.tc{padding:20px 16px;max-width:1100px;margin:0 auto;width:100%;}
.actitle{font-size:17px;font-weight:800;color:var(--gd);margin-bottom:6px;}
.adesc{font-size:13px;color:var(--ts);margin-bottom:14px;line-height:1.5;}
.acard{background:var(--wh);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px;}

.bp{background:linear-gradient(135deg,#2b3990,#1e2e5c);color:var(--wh);border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.bs{background:var(--iv);color:var(--ts);border:1.5px solid var(--ivd);border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;}
.bm{background:var(--gp);color:var(--gm);border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}

.fgrp{display:flex;flex-direction:column;margin-bottom:12px;}
.fgrp label{font-size:12px;font-weight:700;color:var(--ts);margin-bottom:5px;}
.fgrp input,.fgrp select{height:40px;border:1.5px solid var(--ivd);border-radius:8px;padding:0 12px;font-size:14px;background:var(--iv);outline:none;width:100%;font-family:inherit;}

.calwrap{background:var(--wh);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:16px;}
.calwrap iframe{width:100%;border:0;display:block;height:640px;}
.calbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px;}
.calchip{padding:7px 14px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--ivd);background:var(--wh);color:var(--ts);}
.calchip.on{background:var(--gm);color:var(--wh);border-color:var(--gm);}

.callist{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
.calitem{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--wh);border:1px solid var(--ivd);border-radius:10px;}
.calname{font-size:15px;font-weight:700;color:var(--gd);flex:1;}
.calid{font-size:11px;color:var(--tl);word-break:break-all;}
.empty{text-align:center;color:var(--tl);padding:30px;font-size:14px;}

.mov{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.mbk{position:absolute;inset:0;background:rgba(20,25,60,0.5);}
.mbox{position:relative;background:var(--wh);border-radius:16px;padding:24px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.mtitle{font-size:18px;font-weight:800;color:var(--gd);margin-bottom:4px;}
.msub{font-size:13px;color:var(--ts);margin-bottom:16px;line-height:1.5;}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gd);color:var(--wh);padding:12px 24px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#dc2626;} .toast.ok{background:var(--gm);}
.help{background:var(--goldp);border:1px solid var(--gold);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--goldd);line-height:1.6;margin-top:10px;}
</style>
<link rel="stylesheet" href="ui.css">
<script src="loading.js"></script>
<script src="modal-close.js"></script>
<script src="topnav.js"></script>
</head>
<body>

<div id="gate">
  <div class="gbox">
    <div class="gtitle">학사일정</div>
    <div class="gsub" id="gate-msg">로그인 확인 중...</div>
    <a class="gbtn" id="gate-btn" href="index.html" style="display:none">로그인 화면으로</a>
  </div>
</div>

<div id="ms">
  <header class="ah">
    <div class="ahl" onclick="location.href='index.html#home'" style="cursor:pointer">
      <div class="ahi">📅</div>
      <div class="aht">학사일정</div>
    </div>
    <div class="ahr">
      <div id="hn"></div>
      <div id="hi"></div>
      <a class="homebtn" href="index.html">← 메인으로</a>
    </div>
  </header>
  <div class="tc" id="main-body"></div>
</div>

<div id="mwrap"></div>
<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, collection, getDocs, addDoc, updateDoc, deleteDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCtgr79jKqkec6HwqkxYNxSubWAhfEkM7g",
  authDomain: "daniel-amatz.firebaseapp.com",
  projectId: "daniel-amatz",
  storageBucket: "daniel-amatz.firebasestorage.app",
  messagingSenderId: "455744290312",
  appId: "1:455744290312:web:3ce7e7d3e58f6f1d185bbd",
  measurementId: "G-E91V0S88T8"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $I = id => document.getElementById(id);
const ORGS = {jihyebit:'지혜빛', daniel:'다니엘 아마츠'};
let CU = null;
let CALS = [];        // 등록된 캘린더 목록
let activeCalId = ''; // 현재 보고 있는 캘린더 (''=전체 합쳐보기)

function toast(msg, type=''){
  const t = $I('toast'); t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(window.__tt); window.__tt = setTimeout(()=>t.className='toast', 2500);
}
const isAdmin = () => CU && ['super','org_admin','tab_admin'].includes(CU.role);
const canManage = () => CU && ['super','org_admin'].includes(CU.role);

async function logActivity(action, category, target){
  if(!CU) return;
  try { await addDoc(collection(db,'activityLogs'), {
    uid:CU.uid, name:CU.name||'', role:CU.role||'', org:CU.org||'',
    action, category, target:target||'', detail:'', at:Timestamp.now()
  }); } catch(e){}
}

onAuthStateChanged(auth, async (user) => {
  if(!user){
    $I('gate-msg').textContent = '로그인이 필요합니다. 메인 화면에서 먼저 로그인해주세요.';
    $I('gate-btn').style.display = 'inline-block';
    return;
  }
  try {
    const snap = await getDoc(doc(db,'staff',user.uid));
    if(!snap.exists()){ $I('gate-msg').textContent='교직원 정보를 찾을 수 없습니다.'; $I('gate-btn').style.display='inline-block'; return; }
    CU = { uid:user.uid, ...snap.data() };
    const ac = CU.acStatus || 'active';
    if(ac==='leave'||ac==='quit'){ $I('gate-msg').textContent = ac==='quit'?'퇴직 처리된 계정입니다.':'휴직 중인 계정입니다.'; $I('gate-btn').style.display='inline-block'; return; }
    $I('gate').style.display='none'; $I('ms').style.display='flex';
    if(window.renderTopNav) renderTopNav('calendar', CU.role);
    window.showLoading && window.showLoading('불러오는 중…');
    $I('hn').textContent = CU.name;
    $I('hi').textContent = `${ORGS[CU.org]||CU.org} · ${CU.dept||''}`;
    await loadCals();
    window.hideLoading && window.hideLoading();
    renderMain();
  } catch(e){ $I('gate-msg').textContent='오류: '+e.message; $I('gate-btn').style.display='inline-block'; }
});

async function loadCals(){
  const snap = await getDocs(collection(db,'calendars'));
  CALS = [];
  snap.forEach(d=>CALS.push({id:d.id, ...d.data()}));
  CALS.sort((a,b)=>(a.order||0)-(b.order||0));
}

// 구글 캘린더 임베드 URL 생성 (여러 캘린더 합쳐보기 지원)
function buildEmbedUrl(calIds){
  const base = 'https://calendar.google.com/calendar/embed';
  const params = [
    'ctz=Asia/Seoul',
    'mode=MONTH',
    'showTitle=0',
    'showPrint=0',
    'showCalendars=0',
    'wkst=1'
  ];
  // 색상 팔레트
  const colors = ['%231e2e5c','%23c9a84c','%232b3990','%23d97706','%237c3aed','%230369a1','%2316a34a','%23dc2626'];
  calIds.forEach((cid,i)=>{
    params.push('src=' + encodeURIComponent(cid));
    params.push('color=' + colors[i % colors.length]);
  });
  return base + '?' + params.join('&');
}

function renderMain(){
  if(!CALS.length){
    $I('main-body').innerHTML = `
      <div class="acard">
        <h3 class="actitle">📅 학사일정</h3>
        <p class="adesc">구글 캘린더를 연결해 학사일정을 한눈에 봅니다.</p>
        <div class="empty">아직 등록된 캘린더가 없습니다.${canManage()?'<br>아래에서 캘린더를 추가해주세요.':'<br>관리자가 캘린더를 등록하면 표시됩니다.'}</div>
      </div>
      ${canManage()?manageCardHTML():''}`;
    return;
  }

  // 보기 칩: 전체 + 개별
  const chips = `<div class="calchip ${activeCalId===''?'on':''}" onclick="setActiveCal('')">전체 보기</div>` +
    CALS.map(c=>`<div class="calchip ${activeCalId===c.id?'on':''}" onclick="setActiveCal('${c.id}')">${c.name}</div>`).join('');

  // 임베드할 캘린더 ID 목록
  const ids = activeCalId==='' ? CALS.map(c=>c.calId) : [CALS.find(c=>c.id===activeCalId)?.calId].filter(Boolean);
  const embedUrl = buildEmbedUrl(ids);

  $I('main-body').innerHTML = `
    <div class="acard">
      <h3 class="actitle">📅 학사일정</h3>
      <p class="adesc">연결된 구글 캘린더의 일정을 표시합니다. 캘린더를 선택해 따로 보거나 전체를 함께 볼 수 있습니다.</p>
      <div class="calbar">${chips}</div>
    </div>
    <div class="calwrap"><iframe src="${embedUrl}" loading="lazy"></iframe></div>
    ${canManage()?manageCardHTML():''}`;
}
window.renderMain = renderMain;

function setActiveCal(id){ activeCalId = id; renderMain(); }
window.setActiveCal = setActiveCal;

function manageCardHTML(){
  return `
    <div class="acard">
      <h3 class="actitle">⚙️ 캘린더 관리</h3>
      <p class="adesc">표시할 구글 캘린더를 등록합니다. 캘린더는 "공개"로 설정되어 있어야 표시됩니다. <b>↑↓ 버튼으로 순서를 바꾸면 홈 화면의 학사일정 순서도 함께 바뀝니다.</b></p>
      <button class="bp" onclick="openCalForm()">＋ 캘린더 추가</button>
      <div class="callist">
        ${CALS.length?CALS.map((c,i)=>`<div class="calitem">
          <div style="display:flex;flex-direction:column;gap:2px">
            <button class="bm" style="padding:2px 8px;${i===0?'opacity:.3;pointer-events:none':''}" onclick="moveCal('${c.id}',-1)">↑</button>
            <button class="bm" style="padding:2px 8px;${i===CALS.length-1?'opacity:.3;pointer-events:none':''}" onclick="moveCal('${c.id}',1)">↓</button>
          </div>
          <div style="flex:1">
            <div class="calname">${c.name}</div>
            <div class="calid">${c.calId}</div>
          </div>
          <button class="bm" onclick="openCalForm('${c.id}')">수정</button>
          <button class="bm" style="background:#fee2e2;color:#dc2626" onclick="delCal('${c.id}')">삭제</button>
        </div>`).join(''):'<p class="empty">등록된 캘린더가 없습니다.</p>'}
      </div>
      <div class="help">
        <b>캘린더 ID 찾는 법</b><br>
        구글 캘린더(웹) → 해당 캘린더 옆 ⋮ → <b>설정 및 공유</b> → "액세스 권한"에서 <b>공개 사용 설정</b> 체크 → 아래 <b>캘린더 통합</b>에서 <b>캘린더 ID</b> 복사<br>
        예시: <span style="word-break:break-all">abcd1234@group.calendar.google.com</span><br>
        ※ 다른 사람에게 공유받은 캘린더는 그 캘린더 주인이 "공개"로 설정해야 표시됩니다.
      </div>
    </div>`;
}

function openCalForm(editId){
  const c = editId ? CALS.find(x=>x.id===editId) : null;
  $I('mwrap').innerHTML = `
    <div class="mov"><div class="mbk" onclick="closeMod()"></div>
    <div class="mbox">
      <div class="mtitle">${c?'캘린더 수정':'캘린더 추가'}</div>
      <div class="msub">캘린더 이름과 구글 캘린더 ID를 입력하세요.</div>
      <div class="fgrp"><label>캘린더 이름</label><input id="cal-name" value="${c?.name||''}" placeholder="예: 다니엘 전체일정"></div>
      <div class="fgrp"><label>구글 캘린더 ID</label><input id="cal-id" value="${c?.calId||''}" placeholder="xxxx@group.calendar.google.com"></div>
      <div class="mact">
        <button class="bs" onclick="closeMod()">취소</button>
        <button class="bp" onclick="saveCal('${c?.id||''}')">저장</button>
      </div>
    </div></div>`;
}
window.openCalForm = openCalForm;
function closeMod(){ $I('mwrap').innerHTML=''; }
window.closeMod = closeMod;

async function saveCal(editId){
  const name = $I('cal-name').value.trim();
  const calId = $I('cal-id').value.trim();
  if(!name) return toast('캘린더 이름을 입력하세요.','err');
  if(!calId) return toast('캘린더 ID를 입력하세요.','err');
  try {
    if(editId){
      await updateDoc(doc(db,'calendars',editId), {name, calId});
      logActivity('수정','학사일정',name);
      toast('수정되었습니다.','ok');
    } else {
      const maxOrder = CALS.length ? Math.max(...CALS.map(c=>c.order||0)) : 0;
      await addDoc(collection(db,'calendars'), {name, calId, order:maxOrder+1, createdAt:Timestamp.now()});
      logActivity('입력','학사일정',name);
      toast('추가되었습니다.','ok');
    }
    closeMod();
    await loadCals();
    renderMain();
  } catch(e){ toast('저장 실패: '+e.message,'err'); }
}
window.saveCal = saveCal;

async function delCal(id){
  const c = CALS.find(x=>x.id===id);
  if(!confirm(`"${c?.name}" 캘린더를 목록에서 삭제할까요?\n(구글 캘린더 자체는 삭제되지 않습니다)`)) return;
  try {
    await deleteDoc(doc(db,'calendars',id));
    logActivity('삭제','학사일정',c?.name||'');
    toast('삭제되었습니다.');
    if(activeCalId===id) activeCalId='';
    await loadCals();
    renderMain();
  } catch(e){ toast('삭제 실패: '+e.message,'err'); }
}
window.delCal = delCal;

// 캘린더 순서 이동 (배열 재배치 후 order 전체 재부여)
async function moveCal(id, dir){
  const idx = CALS.findIndex(c=>c.id===id);
  if(idx<0) return;
  const swapIdx = idx + dir;
  if(swapIdx<0 || swapIdx>=CALS.length) return;
  // 배열에서 위치 교환
  const arr = [...CALS];
  [arr[idx], arr[swapIdx]] = [arr[swapIdx], arr[idx]];
  try {
    // 새 순서대로 order 0,1,2... 재부여
    for(let i=0;i<arr.length;i++){
      if((arr[i].order ?? -1) !== i){
        await updateDoc(doc(db,'calendars',arr[i].id), {order:i});
      }
    }
    await loadCals();
    renderMain();
    toast('순서를 변경했습니다.','ok');
  } catch(e){ toast('변경 실패: '+e.message,'err'); }
}
window.moveCal = moveCal;
</script>
</body>
</html>
