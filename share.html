<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수행성 경비 안내</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:#eef0ee;min-height:100vh;padding:14px}
  .top{max-width:1100px;margin:0 auto 12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .brand{font-size:15px;font-weight:800;color:#1b4332}
  .tt{font-size:12px;color:#7a8a80}
  .btnrow{display:flex;gap:8px}
  .btn{border:1px solid #cfd8d2;background:#fff;color:#2d6a4f;font-family:inherit;font-weight:700;font-size:13px;padding:9px 16px;border-radius:9px;cursor:pointer}
  .btn.primary{background:#2d6a4f;border-color:#2d6a4f;color:#fff}
  .paper{max-width:1100px;margin:0 auto;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.07);padding:18px;overflow-x:auto}
  #sheet{min-width:fit-content}
  .state{max-width:520px;margin:80px auto;background:#fff;border-radius:14px;padding:40px 30px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.07)}
  .state .ico{font-size:40px;margin-bottom:12px}
  .state .t1{font-size:17px;font-weight:800;color:#1b4332;margin-bottom:8px}
  .state .t2{font-size:13px;color:#7a8a80;line-height:1.7}
  .foot{max-width:1100px;margin:14px auto 30px;text-align:center;font-size:11.5px;color:#a8b5ac}
  @media(max-width:640px){ body{padding:8px} .paper{padding:10px;border-radius:10px} }
</style>
</head>
<body>

<div id="loading" class="state"><div class="ico">📄</div><div class="t1">안내표를 불러오는 중…</div><div class="t2">잠시만 기다려 주세요.</div></div>

<div id="view" style="display:none">
  <div class="top">
    <div>
      <div class="brand" id="v-title">수행성 경비 안내</div>
      <div class="tt" id="v-sub"></div>
    </div>
    <div class="btnrow">
      <button class="btn primary" onclick="saveImage()">🖼️ 이미지 저장</button>
    </div>
  </div>
  <div class="paper"><div id="sheet"></div></div>
  <div class="foot">본 안내표는 링크 생성 시점의 내용입니다 · 문의는 담당 선생님께</div>
</div>

<div id="err" class="state" style="display:none">
  <div class="ico">🔍</div>
  <div class="t1">안내표를 찾을 수 없어요</div>
  <div class="t2">링크가 정확한지 확인해 주세요.<br>링크가 삭제되었거나 만료되었을 수 있습니다.<br>담당 선생님께 새 링크를 요청해 주세요.</div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyCtgr79jKqkec6HwqkxYNxSubWAhfEkM7g",
  authDomain: "daniel-amatz.firebaseapp.com",
  projectId: "daniel-amatz",
  storageBucket: "daniel-amatz.firebasestorage.app",
  messagingSenderId: "455744290312",
  appId: "1:455744290312:web:3ce7e7d3e58f6f1d185bbd"
});
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get('id');
const $ = s=>document.querySelector(s);

function showErr(){ $('#loading').style.display='none'; $('#err').style.display='block'; }

(async ()=>{
  if(!id){ showErr(); return; }
  try {
    const snap = await getDoc(doc(db,'sharedSheets', id));
    if(!snap.exists()){ showErr(); return; }
    const d = snap.data();
    document.title = d.title || '수행성 경비 안내';
    $('#v-title').textContent = d.title || '수행성 경비 안내';
    const dt = d.createdAt?.toDate ? d.createdAt.toDate() : null;
    $('#v-sub').textContent = dt ? `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')} 기준` : '';
    // 생성 시점의 스타일 + 표 HTML 그대로 표시
    const st = document.createElement('style'); st.textContent = d.css || '';
    document.head.appendChild(st);
    $('#sheet').innerHTML = d.html || '';
    $('#loading').style.display='none';
    $('#view').style.display='block';
  } catch(e){ showErr(); }
})();

// ── 이미지 저장 (모바일: 공유 시트 / PC: 다운로드) ──
let h2cLoading=false;
function loadH2C(){
  if(window.html2canvas || h2cLoading) return; h2cLoading=true;
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  document.head.appendChild(s);
}
loadH2C();

window.saveImage = async function(){
  try {
    if(!window.html2canvas){
      loadH2C();
      await new Promise((res,rej)=>{ const c=setInterval(()=>{ if(window.html2canvas){clearInterval(c);res();} },100);
        setTimeout(()=>{clearInterval(c); if(!window.html2canvas) rej(new Error('이미지 모듈 로드 실패 (인터넷 확인)'));},8000); });
    }
    const node = document.querySelector('#sheet .sheet-doc') || document.getElementById('sheet');
    const canvas = await window.html2canvas(node, {scale:2, backgroundColor:'#ffffff', useCORS:true});
    const filename = (document.title||'수행성경비') + '.png';
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)
      || (navigator.maxTouchPoints > 1 && /Macintosh/.test(navigator.userAgent));
    if(isMobile && navigator.canShare){
      try {
        const blob = await new Promise(r=>canvas.toBlob(r,'image/png'));
        const file = new File([blob], filename, {type:'image/png'});
        if(navigator.canShare({files:[file]})){ await navigator.share({files:[file]}); return; }
      } catch(e){ if(e.name==='AbortError') return; }
    }
    const a=document.createElement('a'); a.href=canvas.toDataURL('image/png'); a.download=filename;
    document.body.appendChild(a); a.click(); a.remove();
  } catch(e){ alert('이미지 저장 실패: '+(e.message||'')); }
};
</script>
</body>
</html>
