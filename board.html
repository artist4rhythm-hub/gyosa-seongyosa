<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게시판 · 교사 선교사</title>
<meta name="theme-color" content="#1E3932">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="stylesheet" href="ui.css">
<script src="loading.js"></script>
<script src="modal-close.js"></script>
<script src="menu.js"></script>
<script src="sidebar.js"></script>
<script type="module" src="badges.js"></script>
<script type="module" src="presence.js"></script>
<link rel="stylesheet" href="theme.css">
<style>
:root {
  --gd:#1E3932; --gm:#00704A; --gl:#D4E9E2; --gp:#E8F3EF;
  --gold:#B08D3C; --goldd:#8A6410; --goldp:#F7EFD8;
  --iv:#F2F0EB; --ivd:#E3E1DA;
  --tx:#1F2320; --ts:#5A6560; --tl:#93A09A; --wh:#ffffff;
  --sh:0 2px 12px rgba(30,57,50,0.08); --r:12px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--iv);color:var(--tx);min-height:100vh;}

#gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#E8F3EF 0%,#F2F0EB 60%,#F7EFD8 100%);padding:24px;text-align:center;}
.gbox{background:var(--wh);border-radius:24px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(30,57,50,0.12);}
.gtitle{font-size:22px;font-weight:800;color:var(--gd);margin-bottom:8px;}
.gsub{font-size:14px;color:var(--ts);line-height:1.6;margin-bottom:20px;}
.gbtn{display:inline-block;width:100%;padding:14px;background:linear-gradient(135deg,#00704A,#1E3932);color:var(--wh);border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;}

#ms{display:none;flex-direction:column;width:100%;}
.ah{display:none;}
.pg-links{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.pg-link{padding:7px 14px;border-radius:8px;background:var(--wh);border:1px solid var(--ivd);color:var(--gm);font-size:13px;font-weight:600;text-decoration:none;}
.pg-link:hover{background:var(--gp);}
.ah{background:linear-gradient(135deg,#1E3932,#16302A);color:var(--wh);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.ahl{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;cursor:pointer;}
.ahi{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.aht{font-size:16px;font-weight:700;}
.ahr{text-align:right;}
#hn{font-size:15px;font-weight:600;}
#hi{font-size:11px;opacity:.7;margin-top:2px;}
.homebtn{background:rgba(255,255,255,0.15);color:var(--wh);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;margin-top:4px;text-decoration:none;display:inline-block;}

.subtb{display:flex;gap:4px;background:var(--wh);padding:8px 16px;border-bottom:1px solid var(--ivd);overflow-x:auto;}
.subtbtn{padding:8px 14px;background:transparent;border:none;border-radius:8px;font-size:14px;font-weight:600;color:var(--ts);cursor:pointer;white-space:nowrap;}
.subtbtn.active{background:var(--gp);color:var(--gm);}

.tc{padding:0;max-width:820px;margin:0 auto;width:100%;}
.actitle{font-size:17px;font-weight:800;color:var(--gd);margin-bottom:6px;}
.adesc{font-size:13px;color:var(--ts);margin-bottom:14px;line-height:1.5;}
.acard{background:var(--wh);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px;}

.bp{background:linear-gradient(135deg,#00704A,#1E3932);color:var(--wh);border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.bs{background:var(--iv);color:var(--ts);border:1.5px solid var(--ivd);border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;}
.bm{background:var(--gp);color:var(--gm);border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}

.fgrp{display:flex;flex-direction:column;margin-bottom:12px;}
.fgrp label{font-size:12px;font-weight:700;color:var(--ts);margin-bottom:5px;}
.fgrp input:not([type="checkbox"]),.fgrp select,.fgrp textarea{border:1.5px solid var(--ivd);border-radius:8px;padding:10px 12px;font-size:14px;background:var(--iv);outline:none;width:100%;font-family:inherit;}

.post-item{padding:16px;border:1px solid var(--ivd);border-radius:10px;margin-bottom:10px;cursor:pointer;background:var(--wh);transition:background .15s;}
.post-item:hover{background:var(--iv);}
.post-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
.post-title{font-weight:700;font-size:15px;color:var(--gd);}
.post-date{font-size:11px;color:var(--tl);white-space:nowrap;}
.post-meta{font-size:12px;color:var(--ts);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.post-excerpt{font-size:13px;color:var(--ts);margin-top:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.vid-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;background:var(--danger-bg);color:var(--danger);padding:2px 7px;border-radius:100px;font-weight:600;}
.link-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;background:var(--gp);color:var(--gm);padding:2px 7px;border-radius:100px;font-weight:600;}
.empty{text-align:center;color:var(--tl);padding:36px;font-size:14px;}

.video-wrap{position:relative;width:100%;padding-bottom:56.25%;border-radius:10px;overflow:hidden;margin:14px 0;background:#000;}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
.link-card{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--ivd);border-radius:10px;margin:14px 0;text-decoration:none;color:var(--gm);font-size:13px;background:var(--iv);word-break:break-all;}

.mov{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.mbk{position:absolute;inset:0;background:rgba(20,25,60,0.5);}
.mbox{position:relative;background:var(--wh);border-radius:16px;padding:24px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-height:92vh;overflow-y:auto;}
.mtitle{font-size:18px;font-weight:800;color:var(--gd);margin-bottom:4px;}
.msub{font-size:13px;color:var(--ts);margin-bottom:16px;line-height:1.5;}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap;}
.readbody{white-space:pre-wrap;font-size:14px;line-height:1.7;color:var(--tx);margin:12px 0;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gd);color:var(--wh);padding:12px 24px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#dc2626;} .toast.ok{background:var(--gm);}
.dept-btn{padding:6px 14px;border:1.5px solid var(--ivd);background:var(--wh);border-radius:100px;font-size:13px;font-weight:600;color:var(--ts);cursor:pointer;}
.dept-btn.on{background:var(--gm);color:#fff;border-color:var(--gm);}
</style>
</head>
<body>
<div id="topnav-container"></div>

<div id="gate">
  <div class="gbox">
    <div class="gtitle">게시판</div>
    <div class="gsub" id="gate-msg">로그인 확인 중...</div>
    <a class="gbtn" id="gate-btn" href="index.html" style="display:none">로그인 화면으로</a>
  </div>
</div>

<div id="ms">
  <div class="pg-links"><a class="pg-link" href="index.html#home">← 메인으로</a></div>
  <div class="subtb" id="board-tabs"></div>
  <div id="dept-tabs" style="display:none;gap:6px;padding:8px 16px;background:var(--iv);border-bottom:1px solid var(--ivd);flex-wrap:wrap"></div>
  <div class="tc" id="board-body"></div>
</div>

<div id="mwrap"></div>
<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc, updateDoc, deleteDoc, query, where, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCtgr79jKqkec6HwqkxYNxSubWAhfEkM7g",
  authDomain: "daniel-amatz.firebaseapp.com",
  projectId: "daniel-amatz",
  storageBucket: "daniel-amatz.firebasestorage.app",
  messagingSenderId: "455744290312",
  appId: "1:455744290312:web:3ce7e7d3e58f6f1d185bbd",
  measurementId: "G-E91V0S88T8"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $I = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');
const ORGS = {jihyebit:'지혜빛', daniel:'다니엘 아마츠'};
let CU = null;
let POSTS = [];
let curBoard = 'all';   // all | daniel | jihyebit
let curDept = '';       // 다니엘 부서 하위선택: '' (전체) | 초등부 | 중등부 | 행정실
const BOARD_DEPTS = { daniel: ['초등부','중등부','행정실'], jihyebit: [] };
let CATEGORIES = [];    // 글 분류 목록
let searchKeyword = '';

function toast(msg, type=''){ const t=$I('toast'); t.textContent=msg; t.className='toast show '+type; clearTimeout(window.__tt); window.__tt=setTimeout(()=>t.className='toast',2500); }
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtFull(ts){ if(!ts) return ''; const d=ts.toDate?ts.toDate():new Date(ts); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function fmtShort(ts){ if(!ts) return ''; const d=ts.toDate?ts.toDate():new Date(ts); const now=new Date(); if(d.toDateString()===now.toDateString()) return `${pad(d.getHours())}:${pad(d.getMinutes())}`; return `${d.getMonth()+1}/${d.getDate()}`; }
const myOrgs = () => CU.role==='super' ? ['jihyebit','daniel'] : (CU.orgs&&CU.orgs.length?CU.orgs:[CU.org]);
const isAdmin = () => ['super','org_admin','tab_admin'].includes(CU.role);

// 유튜브 링크 → 영상 ID 추출
function youtubeId(url){
  if(!url) return null;
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([A-Za-z0-9_-]{11})/
  ];
  for(const p of patterns){ const m=url.match(p); if(m) return m[1]; }
  return null;
}
// 이미지 링크 판정 (.jpg/.png/.gif/.webp 등으로 끝나거나 이미지 호스팅)
function isImageUrl(url){
  if(!url) return false;
  if(/\.(jpe?g|png|gif|webp|bmp|svg)(\?.*)?$/i.test(url)) return true;
  // 일부 이미지 호스팅 (직접 링크)
  if(/(?:i\.imgur\.com|images\.unsplash\.com|cdn\.|googleusercontent\.com)/i.test(url)) return true;
  return false;
}
// 링크 종류 → 미디어 HTML
function linkMedia(url){
  if(!url) return '';
  const vid = youtubeId(url);
  if(vid) return `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${vid}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
  if(isImageUrl(url)) return `<img src="${esc(url)}" style="max-width:100%;border-radius:10px;margin:14px 0" loading="lazy" alt="첨부 이미지" onerror="this.style.display='none'">`;
  return `<a class="link-card" href="${esc(url)}" target="_blank" rel="noopener">🔗 ${esc(url)}</a>`;
}

onAuthStateChanged(auth, async (user)=>{
  if(!user){ $I('gate-msg').textContent='로그인이 필요합니다. 메인 화면에서 먼저 로그인해주세요.'; $I('gate-btn').style.display='inline-block'; return; }
  try {
    const snap = await getDoc(doc(db,'staff',user.uid));
    if(!snap.exists()){ $I('gate-msg').textContent='교직원 정보를 찾을 수 없습니다.'; $I('gate-btn').style.display='inline-block'; return; }
    CU = { uid:user.uid, ...snap.data() };
    const ac = CU.acStatus||'active';
    if(ac==='leave'||ac==='quit'){ $I('gate-msg').textContent= ac==='quit'?'퇴직 처리된 계정입니다.':'휴직 중인 계정입니다.'; $I('gate-btn').style.display='inline-block'; return; }
    $I('gate').style.display='none'; $I('ms').style.display='flex';
    window.ORGS = ORGS;
  if(window.guardPage && !guardPage(CU, 'board')) return;
  renderShell('board', CU);
    window.showLoading && window.showLoading('불러오는 중…');
    
    
    buildBoardTabs();
    await loadCategories();
    await loadStaff();
    await loadPosts();
    window.hideLoading && window.hideLoading();
    showBoard('all');
    // 홈 카드에서 넘어온 경우 (?post=ID) 해당 글 바로 열기
    try {
      const pid = new URLSearchParams(location.search).get('post');
      if(pid && POSTS.some(p=>p.id===pid)){
        const tp = POSTS.find(p=>p.id===pid);
        if(tp.board && tp.board!=='all') showBoard(tp.board);
        openPost(pid);
        history.replaceState(null, '', 'board.html');   // 새로고침 시 반복 방지
      }
    } catch(e){}
    // 마지막 게시판 방문 시각 갱신 (홈 '새 게시글' 알림 리셋용)
    updateDoc(doc(db,'staff',CU.uid), {lastBoardSeen:Timestamp.now()}).catch(()=>{});
  } catch(e){ $I('gate-msg').textContent='오류: '+e.message; $I('gate-btn').style.display='inline-block'; }
});

async function loadCategories(){
  try {
    const d = await getDoc(doc(db,'boardConfig','categories'));
    CATEGORIES = d.exists() && Array.isArray(d.data().list) ? d.data().list : [];
  } catch(e){ CATEGORIES = []; }
}

let STAFF = [];  // 멘션용 교직원 목록
async function loadStaff(){
  try {
    const snap = await getDocs(collection(db,'staff'));
    STAFF = [];
    snap.forEach(d=>{ const s=d.data(); if((s.acStatus||'active')==='active') STAFF.push({uid:d.id, name:s.name}); });
  } catch(e){ STAFF = []; }
}

// 내가 볼 수 있는 게시판 목록
function myBoards(){
  const boards = [{key:'all', label:'📋 전체'}];
  const orgs = myOrgs();
  if(orgs.includes('daniel')) boards.push({key:'daniel', label:'다니엘 아마츠'});
  if(orgs.includes('jihyebit')) boards.push({key:'jihyebit', label:'지혜빛'});
  return boards;
}

function buildBoardTabs(){
  const tabs = myBoards();
  $I('board-tabs').innerHTML = tabs.map(t=>`<button class="subtbtn ${t.key===curBoard?'active':''}" id="bt-${t.key}" onclick="showBoard('${t.key}')">${t.label}</button>`).join('');
}

async function loadPosts(){
  const snap = await getDocs(collection(db,'boardPosts'));
  POSTS = [];
  snap.forEach(d=>POSTS.push({id:d.id, ...d.data()}));
  POSTS.sort((a,b)=>(b.createdAt?.toMillis?.()||0)-(a.createdAt?.toMillis?.()||0));
}

function canSeeBoard(key){
  if(key==='all') return true;
  return myOrgs().includes(key);
}

function showBoard(key){
  if(!canSeeBoard(key)){ toast('접근 권한이 없습니다.','err'); return; }
  curBoard = key;
  curDept = '';  // 게시판 바꾸면 부서 선택 초기화
  document.querySelectorAll('.subtbtn').forEach(b=>b.classList.remove('active'));
  $I('bt-'+key)?.classList.add('active');
  renderDeptTabs();
  renderBoard();
}
window.showBoard = showBoard;

// 부서 하위 탭 (다니엘 등 부서가 있는 게시판에서만)
function renderDeptTabs(){
  const wrap = $I('dept-tabs');
  if(!wrap) return;
  const depts = BOARD_DEPTS[curBoard] || [];
  if(!depts.length){ wrap.innerHTML=''; wrap.style.display='none'; return; }
  wrap.style.display='flex';
  const btn = (key,label) => `<button class="dept-btn ${curDept===key?'on':''}" onclick="showDept('${key}')">${label}</button>`;
  wrap.innerHTML = btn('','전체') + depts.map(d=>btn(d,d)).join('');
}

function showDept(dept){
  curDept = dept;
  renderDeptTabs();
  renderBoard();
}
window.showDept = showDept;

function renderBoard(){
  const boardName = curBoard==='all'?'전체 게시판':ORGS[curBoard];
  const deptLabel = curDept ? ' · '+curDept : '';
  const desc = curBoard==='all'
    ? '모든 기관 선생님이 함께 보는 게시판입니다.'
    : `${ORGS[curBoard]}${curDept?' '+curDept:''} 소속 선생님이 보는 게시판입니다.`;
  const now = Date.now();
  const isPinned = p => p.pinned && (!p.pinUntil || (p.pinUntil?.toMillis?.()||0) > now);

  // 검색 중이면 전체 게시판(내가 볼 수 있는) 통합 검색, 아니면 현재 게시판
  let list;
  const kw = searchKeyword.trim().toLowerCase();
  if(kw){
    const visibleBoards = myBoards().map(b=>b.key);
    list = POSTS.filter(p=>visibleBoards.includes(p.board))
      .filter(p=>(p.title||'').toLowerCase().includes(kw) || (p.content||'').toLowerCase().includes(kw));
  } else {
    list = POSTS.filter(p=>p.board===curBoard);
    // 부서 필터: 특정 부서 선택 시 그 부서 글만, '전체'면 다 보임
    if(curDept) list = list.filter(p=>(p.boardDept||'')===curDept);
  }

  // 고정글 분리 (검색 중이 아닐 때만 고정 우선)
  const pinned = !kw ? list.filter(isPinned) : [];
  const normal = !kw ? list.filter(p=>!isPinned(p)) : list;

  const catChip = p => p.category ? `<span style="font-size:11px;background:var(--goldp);color:var(--goldd);padding:1px 8px;border-radius:100px;font-weight:700;margin-right:4px">${esc(p.category)}</span>` : '';
  const deptChip = p => p.boardDept ? `<span style="font-size:11px;background:var(--info-bg);color:#0369a1;padding:1px 8px;border-radius:100px;font-weight:700;margin-right:4px">${esc(p.boardDept)}</span>` : '';
  const postRow = (p, pin) => {
    const vid = youtubeId(p.link);
    const img = !vid && isImageUrl(p.link);
    const photoBadge = (p.imageCount||0)>0 ? `<span class="link-badge">📷 ${p.imageCount}장</span>` : '';
    const badge = photoBadge + (vid ? '<span class="vid-badge">▶ 영상</span>' : img ? '<span class="link-badge">🖼️ 이미지</span>' : (p.link?'<span class="link-badge">🔗 링크</span>':''));
    const cc = (p.commentCount||0);
    const likeCnt = (p.likes||[]).length;
    const boardTag = kw ? `<span style="font-size:11px;color:var(--tl)">[${p.board==='all'?'전체':ORGS[p.board]}]</span> ` : '';
    return `<div class="post-item" onclick="openPost('${p.id}')" ${pin?'style="background:var(--gold-bg);border-color:var(--gold)"':''}>
      <div class="post-top"><span class="post-title">${pin?'📌 ':''}${boardTag}${deptChip(p)}${catChip(p)}${esc(p.title)}</span><span class="post-date">${fmtShort(p.createdAt)}</span></div>
      <div class="post-meta">${esc(p.authorName)} ${badge} ${cc>0?`<span style="color:var(--gm)">💬 ${cc}</span>`:''} ${likeCnt>0?`<span style="color:var(--danger)">♥ ${likeCnt}</span>`:''}</div>
      ${p.content?`<div class="post-excerpt">${esc(p.content)}</div>`:''}
    </div>`;
  };
  const pinnedHtml = pinned.length ? pinned.map(p=>postRow(p,true)).join('') : '';
  const normalHtml = normal.map(p=>postRow(p,false)).join('');

  // ══ 보드판: 카드형 미리보기 (검색 중이 아닐 때만) ══
  const unread = p => !(p.readBy||[]).includes(CU.uid);
  const thumbOf = p => {
    if(p.firstThumb) return { src:p.firstThumb, video:false };          // 첨부 사진 1번
    const vid = youtubeId(p.link);
    if(vid) return { src:`https://img.youtube.com/vi/${vid}/mqdefault.jpg`, video:true };
    if(isImageUrl(p.link)) return { src:p.link, video:false };
    return null;
  };

// ══════════ 📷 게시글 사진 첨부 (2단 저장: 썸네일 + FHD) ══════════
let cpImgs = [];         // 새로 추가: {thumb, full} / 기존: {id, thumb, existing:true}
const CP_IMG_MAX = 4;

// 파일 → {thumb(480px), full(1920px, ≤700KB)}
function compressBoardImage(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const make = (MAX, q0, cap) => {
          let w = img.width, h = img.height;
          if(Math.max(w,h) > MAX){ const r = MAX/Math.max(w,h); w = Math.round(w*r); h = Math.round(h*r); }
          const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
          cv.getContext('2d').drawImage(img, 0, 0, w, h);
          let q = q0, data = cv.toDataURL('image/jpeg', q);
          while(cap && data.length > cap && q > 0.4){ q -= 0.08; data = cv.toDataURL('image/jpeg', q); }
          return data;
        };
        resolve({
          thumb: make(480, 0.7, 80*1024),          // 목록·보드판용 (~40KB)
          full:  make(1920, 0.8, 700*1024)          // Full HD 열람용 (≤700KB)
        });
      };
      img.onerror = () => reject(new Error('이미지를 읽을 수 없습니다.'));
      img.src = ev.target.result;
    };
    reader.onerror = () => reject(new Error('파일을 읽을 수 없습니다.'));
    reader.readAsDataURL(file);
  });
}

async function addComposeImages(files){
  if(!files || !files.length) return;
  const room = CP_IMG_MAX - cpImgs.length;
  if(room <= 0) return toast(`사진은 최대 ${CP_IMG_MAX}장까지입니다.`,'err');
  const picked = Array.from(files).slice(0, room);
  if(files.length > room) toast(`최대 ${CP_IMG_MAX}장 — ${picked.length}장만 추가합니다.`,'err');
  window.showLoading && window.showLoading('사진 압축 중…');
  try {
    for(let i=0;i<picked.length;i++){
      window.setLoadStep && window.setLoadStep(`사진 ${i+1}/${picked.length} 압축 중…`, Math.round((i+1)/picked.length*100));
      const r = await compressBoardImage(picked[i]);
      cpImgs.push(r);
    }
  } catch(e){ toast('사진 처리 실패: '+(e.message||''),'err'); }
  window.hideLoading && window.hideLoading();
  renderComposeImgs();
}

// 수정 모드: 기존 사진 불러오기
async function loadComposeImgs(postId){
  try {
    const snap = await getDocs(query(collection(db,'boardImages'), where('postId','==',postId)));
    const arr = [];
    snap.forEach(d=>{ const x=d.data(); arr.push({ id:d.id, thumb:x.thumb, order:x.order||0, existing:true }); });
    arr.sort((a,b)=>(a.order||0)-(b.order||0));
    cpImgs = arr;
    renderComposeImgs();
  } catch(e){}
}

// 저장 후 이미지 반영 (신규 업로드 + 삭제 처리) → {imageCount, firstThumb}
async function persistPostImages(postId){
  // 1) 기존 중 삭제된 것 정리: 현재 cpImgs의 existing id 집합과 DB 비교
  const keepIds = new Set(cpImgs.filter(x=>x.existing).map(x=>x.id));
  try {
    const snap = await getDocs(query(collection(db,'boardImages'), where('postId','==',postId)));
    const dels = [];
    snap.forEach(d=>{ if(!keepIds.has(d.id)) dels.push(d.id); });
    for(const id of dels){ await deleteDoc(doc(db,'boardImages',id)); }
  } catch(e){}
  // 2) 새 이미지 업로드 + order 재부여
  for(let i=0;i<cpImgs.length;i++){
    const im = cpImgs[i];
    if(im.existing){
      try { await updateDoc(doc(db,'boardImages',im.id), { order:i }); } catch(e){}
    } else {
      try {
        const ref = await addDoc(collection(db,'boardImages'), {
          postId, order:i, thumb:im.thumb, data:im.full, createdAt:Timestamp.now()
        });
        im.id = ref.id; im.existing = true; delete im.full;
      } catch(e){ toast('사진 업로드 실패: '+(e.message||''),'err'); }
    }
  }
  return {
    imageCount: cpImgs.length,
    firstThumb: cpImgs.length ? cpImgs[0].thumb : ''
  };
}

async function submitPost(){
  const board = $I('cp-board').value;
  const title = $I('cp-title').value.trim();
  const content = $I('cp-content').value.trim();
  const link = $I('cp-link').value.trim();
  const category = $I('cp-cat')?.value || '';
  const boardDept = $I('cp-dept')?.value || '';
  const pinned = $I('cp-pin')?.checked || false;
  if(!title) return toast('제목을 입력하세요.','err');
  if(!content && !link && !cpImgs.length) return toast('내용·링크·사진 중 하나는 입력하세요.','err');
  const data = {
    board, boardDept, title, content, link, category,
    authorUid:CU.uid, authorName:CU.name, authorOrg:CU.org||'',
    pinned, commentCount:0, likes:[], readBy:[],
    createdAt:Timestamp.now()
  };
  if(pinned){ data.pinUntil = calcPinUntil(); }
  try {
    const ref = await addDoc(collection(db,'boardPosts'), data);
    if(cpImgs.length){
      window.showLoading && window.showLoading('사진 업로드 중…');
      const imeta = await persistPostImages(ref.id);
      await updateDoc(doc(db,'boardPosts',ref.id), imeta);
      window.hideLoading && window.hideLoading();
    }
    notifyMentions(`${title} ${content}`, ref.id, title, board);
    clearDraft();
    toast('게시글을 등록했습니다.','ok');
    closeMod();
    await loadPosts();
    showBoard(board);
    if(boardDept) showDept(boardDept);
  } catch(e){ toast('등록 실패: '+e.message,'err'); }
}
window.submitPost = submitPost;

// @이름 멘션 → 해당 교직원에게 알림
function notifyMentions(text, postId, postTitle, board){
  if(!text || !STAFF.length) return;
  const mentioned = new Set();
  STAFF.forEach(st=>{
    if(!st.name) return;
    // "@이름" 패턴 (이름 앞에 @)
    if(text.includes('@'+st.name) && st.uid!==CU.uid){
      mentioned.add(st.uid);
    }
  });
  mentioned.forEach(uid=>{
    addDoc(collection(db,'boardNotifs'), {
      toUid:uid, postId, postTitle, board:board||'',
      fromName:CU.name, text:'회원님을 언급했습니다.',
      type:'mention', read:false, createdAt:Timestamp.now()
    }).catch(()=>{});
  });
}

// 고정 만료 시각 계산
function calcPinUntil(){
  const period = Number($I('cp-pin-period')?.value || '7');
  if(period===0) return null; // 계속
  return Timestamp.fromMillis(Date.now() + period*24*60*60*1000);
}

async function saveEdit(id){
  const p = POSTS.find(x=>x.id===id); if(!p) return;
  const board = $I('cp-board').value;
  const title = $I('cp-title').value.trim();
  const content = $I('cp-content').value.trim();
  const link = $I('cp-link').value.trim();
  const category = $I('cp-cat')?.value || '';
  const boardDept = $I('cp-dept')?.value || '';
  const pinned = $I('cp-pin')?.checked || false;
  if(!title) return toast('제목을 입력하세요.','err');
  const data = {board, boardDept, title, content, link, category, pinned, updatedAt:Timestamp.now()};
  if(pinned){ if(!p.pinned || $I('cp-pin-period')) data.pinUntil = calcPinUntil(); }
  else { data.pinUntil = null; }
  try {
    window.showLoading && window.showLoading('저장 중…');
    const imeta = await persistPostImages(id);
    await updateDoc(doc(db,'boardPosts',id), { ...data, ...imeta });
    window.hideLoading && window.hideLoading();
    toast('수정했습니다.','ok');
    closeMod();
    await loadPosts();
    showBoard(board);
  } catch(e){ window.hideLoading && window.hideLoading(); toast('수정 실패: '+e.message,'err'); }
}
window.saveEdit = saveEdit;

// ── 글 상세 ──
async function openPost(id){
  const p = POSTS.find(x=>x.id===id); if(!p) return;
  const media = linkMedia(p.link);
  const mine = p.authorUid===CU.uid;
  const canDelete = mine || isAdmin();
  const canPin = mine || isAdmin();
  const now = Date.now();
  const pinnedNow = p.pinned && (!p.pinUntil || (p.pinUntil?.toMillis?.()||0) > now);
  const catBadge = p.category ? `<span style="font-size:11px;background:var(--goldp);color:var(--goldd);padding:2px 8px;border-radius:100px;font-weight:700;margin-right:6px">${esc(p.category)}</span>` : '';
  const liked = (p.likes||[]).includes(CU.uid);
  const likeCnt = (p.likes||[]).length;
  const readCnt = (p.readBy||[]).length;
  $I('mwrap').innerHTML = `
    <div class="mov"><div class="mbk" onclick="closeMod()"></div>
    <div class="mbox">
      <div class="mtitle">${pinnedNow?'📌 ':''}${esc(p.title)}</div>
      <div class="msub">${catBadge}${esc(p.authorName)} · ${fmtFull(p.createdAt)}${p.updatedAt?' (수정됨)':''} · ${p.board==='all'?'전체':ORGS[p.board]}</div>
      ${media}
      ${(p.imageCount||0)>0?`<div id="post-imgs" style="display:flex;flex-direction:column;gap:10px;margin:12px 0"><div style="font-size:12.5px;color:var(--tl);text-align:center;padding:16px;background:var(--iv);border-radius:10px">📷 사진 ${p.imageCount}장 불러오는 중…</div></div>`:''}
      ${p.content?`<div class="readbody">${esc(p.content)}</div>`:''}
      <div style="display:flex;align-items:center;gap:12px;margin:14px 0 4px">
        <button onclick="toggleLike('${p.id}')" style="display:inline-flex;align-items:center;gap:6px;background:${liked?'var(--danger-bg)':'var(--iv)'};border:1.5px solid ${liked?'var(--danger)':'var(--ivd)'};border-radius:100px;padding:8px 16px;font-size:14px;font-weight:700;color:${liked?'#dc2626':'var(--ts)'};cursor:pointer">
          ${liked?'♥':'♡'} 좋아요 <span id="like-cnt">${likeCnt}</span>
        </button>
        <span style="font-size:12px;color:var(--tl)" title="이 글을 읽은 사람 수">👁 ${readCnt}명 읽음 <span id="read-names" style="cursor:pointer;color:var(--gm);text-decoration:underline" onclick="showReaders('${p.id}')">보기</span></span>
      </div>
      <div class="mact">
        ${canPin?`<button class="bs" onclick="togglePin('${p.id}')">${pinnedNow?'📌 고정 해제':'📌 상단 고정'}</button>`:''}
        ${mine?`<button class="bs" onclick="openCompose('${p.id}')">수정</button>`:''}
        ${canDelete?`<button class="bs" style="color:var(--danger)" onclick="delPost('${p.id}')">삭제</button>`:''}
        <button class="bp" onclick="closeMod()">닫기</button>
      </div>
      <div style="border-top:1px solid var(--ivd);margin-top:18px;padding-top:16px">
        <div style="font-weight:700;font-size:14px;color:var(--gd);margin-bottom:10px">💬 댓글 <span id="cmt-count" style="color:var(--gm)"></span></div>
        <div id="cmt-list"><div class="empty" style="padding:14px">불러오는 중...</div></div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <input type="text" id="cmt-input" placeholder="댓글을 입력하세요..." style="flex:1;border:1.5px solid var(--ivd);border-radius:8px;padding:10px 12px;font-size:14px;background:var(--iv)" onkeydown="if(event.key==='Enter')addComment('${p.id}')">
          <button class="bp" onclick="addComment('${p.id}')">등록</button>
        </div>
      </div>
    </div></div>`;
  loadComments(id);
  markBoardNotifRead(id);
  markRead(id);  if((p.imageCount||0)>0) loadPostImages(id);
}
window.openPost = openPost;

// 글 상세: FHD 사진 지연 로드
async function loadPostImages(postId){
  const box = $I('post-imgs'); if(!box) return;
  try {
    const snap = await getDocs(query(collection(db,'boardImages'), where('postId','==',postId)));
    const arr = [];
    snap.forEach(d=>{ const x=d.data(); arr.push({ order:x.order||0, data:x.data }); });
    arr.sort((a,b)=>a.order-b.order);
    if(!arr.length){ box.innerHTML=''; return; }
    box.innerHTML = arr.map((im,i)=>`
      <img src="${im.data}" loading="lazy" onclick="openLightbox(${i})"
        style="width:100%;border-radius:12px;display:block;cursor:zoom-in;border:1px solid var(--ivd)">`).join('');
    window.__lbImgs = arr.map(x=>x.data);
  } catch(e){
    box.innerHTML = '<div style="font-size:12px;color:var(--danger);padding:10px;text-align:center">사진을 불러오지 못했습니다.</div>';
  }
}

// 라이트박스 (원본 크게 보기)
function openLightbox(i){
  const imgs = window.__lbImgs || [];
  if(!imgs[i]) return;
  let cur = i;
  const lb = document.createElement('div'); lb.id='lightbox';
  lb.style.cssText = 'position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;padding:20px;cursor:zoom-out';
  lb.innerHTML = `
    <img id="lb-img" src="${imgs[cur]}" style="max-width:96%;max-height:92%;border-radius:8px;object-fit:contain;cursor:default" onclick="event.stopPropagation()">
    ${imgs.length>1?`
      <button id="lb-prev" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer">‹</button>
      <button id="lb-next" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer">›</button>
      <div id="lb-cnt" style="position:absolute;bottom:18px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;background:rgba(0,0,0,.5);padding:5px 14px;border-radius:100px">${cur+1} / ${imgs.length}</div>`:''}
    <button style="position:absolute;top:14px;right:16px;width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:17px;cursor:pointer">✕</button>`;
  const show = () => {
    const im = lb.querySelector('#lb-img'); if(im) im.src = imgs[cur];
    const c = lb.querySelector('#lb-cnt'); if(c) c.textContent = `${cur+1} / ${imgs.length}`;
  };
  lb.addEventListener('click', ()=>lb.remove());
  lb.querySelector('#lb-prev')?.addEventListener('click', e=>{ e.stopPropagation(); cur=(cur-1+imgs.length)%imgs.length; show(); });
  lb.querySelector('#lb-next')?.addEventListener('click', e=>{ e.stopPropagation(); cur=(cur+1)%imgs.length; show(); });
  document.body.appendChild(lb);
}
window.openLightbox = openLightbox;

// 좋아요 토글
async function toggleLike(id){
  const p = POSTS.find(x=>x.id===id); if(!p) return;
  const likes = p.likes || [];
  const liked = likes.includes(CU.uid);
  const newLikes = liked ? likes.filter(u=>u!==CU.uid) : [...likes, CU.uid];
  p.likes = newLikes;
  try {
    await updateDoc(doc(db,'boardPosts',id), {likes:newLikes});
    // 상세 버튼 갱신
    openPost(id);
    renderBoard();
  } catch(e){ toast('실패: '+e.message,'err'); p.likes = likes; }
}
window.toggleLike = toggleLike;

// 읽음 처리 (readBy에 내 uid 추가)
async function markRead(id){
  const p = POSTS.find(x=>x.id===id); if(!p) return;
  const readBy = p.readBy || [];
  if(readBy.includes(CU.uid)) return; // 이미 읽음
  const newRead = [...readBy, CU.uid];
  p.readBy = newRead;
  try { await updateDoc(doc(db,'boardPosts',id), {readBy:newRead}); } catch(e){}
}

// 읽은 사람 목록 보기
async function showReaders(id){
  const p = POSTS.find(x=>x.id===id); if(!p) return;
  const readBy = p.readBy || [];
  if(!readBy.length){ toast('아직 읽은 사람이 없습니다.'); return; }
  // uid → 이름
  let names = [];
  try {
    const snap = await getDocs(collection(db,'staff'));
    const map = {};
    snap.forEach(d=>{ map[d.id] = d.data().name; });
    names = readBy.map(uid=>map[uid]||'(알 수 없음)');
  } catch(e){ names = readBy.map(()=>'(불러오기 실패)'); }
  alert(`👁 읽은 사람 (${names.length}명)\n\n${names.join(', ')}`);
}
window.showReaders = showReaders;

// 이 글에 대한 내 댓글 알림 읽음 처리
async function markBoardNotifRead(postId){
  try {
    const snap = await getDocs(collection(db,'boardNotifs'));
    snap.forEach(d=>{
      const n=d.data();
      if(n.postId===postId && n.toUid===CU.uid && !n.read){
        updateDoc(doc(db,'boardNotifs',d.id), {read:true}).catch(()=>{});
      }
    });
  } catch(e){}
}

// ── 댓글 ──
let curComments = [];
async function loadComments(postId){
  const box = $I('cmt-list'); if(!box) return;
  try {
    const snap = await getDocs(collection(db,'boardComments'));
    curComments = [];
    snap.forEach(d=>{ const c={id:d.id, ...d.data()}; if(c.postId===postId) curComments.push(c); });
    curComments.sort((a,b)=>(a.createdAt?.toMillis?.()||0)-(b.createdAt?.toMillis?.()||0));
    const cntEl=$I('cmt-count'); if(cntEl) cntEl.textContent = curComments.length||'';
    if(!curComments.length){ box.innerHTML='<div class="empty" style="padding:14px">아직 댓글이 없습니다.</div>'; return; }
    // 부모 댓글(원댓글)과 답글 분리
    const parents = curComments.filter(c=>!c.parentId);
    const childrenOf = pid => curComments.filter(c=>c.parentId===pid);
    box.innerHTML = parents.map(c=>commentHtml(c, postId, false) + childrenOf(c.id).map(ch=>commentHtml(ch, postId, true)).join('')).join('');
  } catch(e){ box.innerHTML='<div class="empty" style="padding:14px">댓글을 불러올 수 없습니다.</div>'; }
}
window.loadComments = loadComments;

function commentHtml(c, postId, isReply){
  const mine = c.authorUid===CU.uid;
  const canDel = mine || isAdmin();
  return `<div style="padding:10px 0;border-bottom:1px solid var(--ivd);${isReply?'margin-left:24px;border-left:2px solid var(--gp);padding-left:12px':''}">
    <div style="display:flex;justify-content:space-between;gap:8px">
      <span style="font-weight:600;font-size:13px;color:var(--gd)">${isReply?'↳ ':''}${esc(c.authorName)}</span>
      <span style="font-size:11px;color:var(--tl)">${fmtShort(c.createdAt)}${canDel?` · <span style="color:var(--danger);cursor:pointer" onclick="delComment('${c.id}','${c.postId}')">삭제</span>`:''}</span>
    </div>
    <div style="font-size:13px;color:var(--tx);margin-top:3px;white-space:pre-wrap">${esc(c.text)}</div>
    ${!isReply?`<button onclick="showReplyInput('${c.id}','${postId}')" style="background:none;border:none;color:var(--gm);font-size:12px;cursor:pointer;padding:4px 0;margin-top:2px">↩ 답글</button><div id="reply-box-${c.id}"></div>`:''}
  </div>`;
}

function showReplyInput(parentId, postId){
  const box = $I('reply-box-'+parentId); if(!box) return;
  if(box.innerHTML){ box.innerHTML=''; return; } // 토글
  box.innerHTML = `<div style="display:flex;gap:6px;margin:6px 0 2px 16px">
    <input type="text" id="reply-input-${parentId}" placeholder="답글..." style="flex:1;border:1.5px solid var(--ivd);border-radius:8px;padding:8px 10px;font-size:13px;background:var(--iv)" onkeydown="if(event.key==='Enter')addComment('${postId}','${parentId}')">
    <button class="bm" onclick="addComment('${postId}','${parentId}')">등록</button>
  </div>`;
  $I('reply-input-'+parentId)?.focus();
}
window.showReplyInput = showReplyInput;

async function addComment(postId, parentId){
  const input = parentId ? $I('reply-input-'+parentId) : $I('cmt-input');
  if(!input) return;
  const text = input.value.trim();
  if(!text) return;
  const post = POSTS.find(p=>p.id===postId);
  try {
    await addDoc(collection(db,'boardComments'), {
      postId, text, parentId: parentId||null,
      authorUid:CU.uid, authorName:CU.name, createdAt:Timestamp.now()
    });
    const newCount = (post?.commentCount||0)+1;
    await updateDoc(doc(db,'boardPosts',postId), {commentCount:newCount});
    if(post) post.commentCount = newCount;
    // 알림 대상: 글쓴이 + 이 글에 댓글 단 사람들 (나 제외)
    const targets = new Set();
    if(post && post.authorUid) targets.add(post.authorUid);
    curComments.forEach(c=>{ if(c.authorUid) targets.add(c.authorUid); });
    targets.delete(CU.uid);
    const postTitle = post?.title || '게시글';
    for(const uid of targets){
      addDoc(collection(db,'boardNotifs'), {
        toUid:uid, postId, postTitle, board:post?.board||'',
        fromName:CU.name, text:text.slice(0,40),
        read:false, createdAt:Timestamp.now()
      }).catch(()=>{});
    }
    input.value='';
    // 댓글 내 멘션 처리
    if(post) notifyMentions(text, postId, post.title||'게시글', post.board);
    loadComments(postId);
    renderBoard();
  } catch(e){ toast('댓글 등록 실패: '+e.message,'err'); }
}
window.addComment = addComment;

async function delComment(id, postId){
  if(!confirm('댓글을 삭제할까요? (답글도 함께 삭제됩니다)')) return;
  const post = POSTS.find(p=>p.id===postId);
  try {
    // 이 댓글 + 답글들 삭제
    const children = curComments.filter(c=>c.parentId===id);
    let removed = 1;
    await deleteDoc(doc(db,'boardComments',id));
    for(const ch of children){ await deleteDoc(doc(db,'boardComments',ch.id)); removed++; }
    const newCount = Math.max(0,(post?.commentCount||removed)-removed);
    await updateDoc(doc(db,'boardPosts',postId), {commentCount:newCount});
    if(post) post.commentCount = newCount;
    loadComments(postId);
    renderBoard();
  } catch(e){ toast('삭제 실패: '+e.message,'err'); }
}
window.delComment = delComment;

async function delPost(id){
  const p = POSTS.find(x=>x.id===id); if(!p) return;
  if(!confirm('이 게시글을 삭제할까요?')) return;
  try {
    // 첨부 사진 먼저 삭제
    try {
      const isnap = await getDocs(query(collection(db,'boardImages'), where('postId','==',id)));
      for(const d of isnap.docs){ await deleteDoc(doc(db,'boardImages',d.id)); }
    } catch(e2){}
    await deleteDoc(doc(db,'boardPosts',id));
    toast('삭제했습니다.');
    closeMod();
    await loadPosts();
    renderBoard();
  } catch(e){ toast('삭제 실패: '+e.message,'err'); }
}
window.delPost = delPost;

// 빠른 고정/해제 (기본 7일)
async function togglePin(id){
  const p = POSTS.find(x=>x.id===id); if(!p) return;
  const now = Date.now();
  const pinnedNow = p.pinned && (!p.pinUntil || (p.pinUntil?.toMillis?.()||0) > now);
  try {
    if(pinnedNow){
      await updateDoc(doc(db,'boardPosts',id), {pinned:false, pinUntil:null});
      toast('고정을 해제했습니다.');
    } else {
      await updateDoc(doc(db,'boardPosts',id), {pinned:true, pinUntil:Timestamp.fromMillis(now+7*24*60*60*1000)});
      toast('상단에 고정했습니다. (7일간)','ok');
    }
    closeMod();
    await loadPosts();
    renderBoard();
  } catch(e){ toast('실패: '+e.message,'err'); }
}
window.togglePin = togglePin;
</script>
