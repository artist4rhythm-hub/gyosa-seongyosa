// 발급일 기준 만 나이 계산
function calcAge(birth, refDate){
  if(!birth || birth.length<10) return '';
  const b = new Date(birth+'T00:00:00');
  const r = refDate ? new Date(refDate+'T00:00:00') : new Date();
  let age = r.getFullYear() - b.getFullYear();
  const m = r.getMonth() - b.getMonth();
  if(m < 0 || (m===0 && r.getDate() < b.getDate())) age--;
  return age;
}

function toast(msg, type=''){
  const t = $I('toast'); t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(window.__tt); window.__tt = setTimeout(()=>t.className='toast', 2500);
}
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 라벨 글자를 각각 span으로 감싸 flex 양끝 배치 (2글자든 4글자든 좌우폭 동일)
function labelHTML(text){
  const chars = text.split('').map(c=>`<span>${c}</span>`).join('');
  return `<span class="cert-label">${chars}</span>`;
}
const isAdmin = () => CU && ['super','org_admin','tab_admin'].includes(CU.role);
const myOrgs = () => CU.role==='super' ? ['jihyebit','daniel'] : (CU.orgs&&CU.orgs.length?CU.orgs:[CU.org]);

// 학년·부서·반 판정
function studentGrade(sid){
  for(const c of CLASSES){
    if((c.students||[]).includes(sid) && c.grades && c.grades[sid]) return c.grades[sid];
  }
  return '';
}
function studentClass(sid){ return CLASSES.find(c=>(c.students||[]).includes(sid)); }
function gradeToDept(grade){
  const n = parseInt(grade,10);
  if(isNaN(n)) return '';
  if(n>=1 && n<=5) return '초등부';
  if(n>=6 && n<=9) return '중등부';
  if(n>=10 && n<=12) return '고등부';
  return '';
}
// 부서 → 교육과정 문구
function deptCourse(dept){
  if(dept==='초등부') return '초등교육과정';
  if(dept==='중등부') return '중등교육과정';
  if(dept==='고등부') return '고등교육과정';
  return '교육과정';
}
// 이 학생을 담임이 발급할 수 있는지 (자기 반 학생) 또는 관리자
function canIssue(s){
  if(CU.role==='super' || CU.role==='org_admin') return myOrgs().includes(s.org);
  if(CU.role==='tab_admin'){
    // 부서장: 같은 기관+같은 부서
    if(!myOrgs().includes(s.org)) return false;
    const dept = gradeToDept(studentGrade(s.id));
    return CU.dept==='행정실' || CU.dept===dept || !CU.dept;
  }
  // 교사: 담임인 반의 학생
  const c = studentClass(s.id);
  return c && (c.teacherUid===CU.uid || (c.deputies||[]).includes(CU.uid));
}

// 날짜 포맷: YYYY-MM-DD → "YYYY년 M월 D일"
function korDate(raw){
  if(!raw) return '';
  const str = String(raw).trim();
  // 숫자 그룹 3개 추출 (구분자: - / . 공백 년월일 등 무엇이든)
  const nums = str.match(/\d+/g);
  if(!nums || nums.length<3) return str; // 파싱 불가 시 원본
  let [y, m, d] = nums.map(Number);
  // 2자리 연도 보정 (예: 05 → 2005, 99 → 1999)
  if(y < 100){ y += (y <= 40 ? 2000 : 1900); }
  if(m<1||m>12||d<1||d>31) return str; // 이상값이면 원본
  return `${y}년 ${m}월 ${d}일`;
}
function todayYMD(){ const n=new Date(); return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`; }

// ── 로그인 ──
onAuthStateChanged(auth, async (user) => {
  if(!user){
    $I('gate-msg').textContent = '로그인이 필요합니다.';
    $I('gate-btn').style.display = 'inline-block';
    return;
  }
  try {
    const snap = await getDoc(doc(db,'staff',user.uid));
    if(!snap.exists()){ $I('gate-msg').textContent='등록되지 않은 계정입니다.'; return; }
    CU = { uid:user.uid, ...snap.data() };
    if((CU.acStatus||'active')!=='active'){ $I('gate-msg').textContent='비활성화된 계정입니다.'; return; }
  } catch(e){ $I('gate-msg').textContent='오류: '+e.message; return; }

  $I('gate').style.display='none';
  $I('ms').style.display='flex';
  
  
  window.ORGS = ORGS;
  if(window.guardPage && !guardPage(CU, 'cert')) return;
  renderShell('cert', CU);

  await loadData();
  renderIssue();
});

async function loadData(){
  window.showLoading('학생 정보를 불러오는 중…');
  try {
    window.setLoadStep('학생 명단 불러오는 중…', 25);
    const ss = await getDocs(collection(db,'students'));
    STUDENTS = []; ss.forEach(d=>STUDENTS.push({id:d.id, ...d.data()}));
    window.setLoadStep('반 편성 정보 불러오는 중…', 55);
    const cs = await getDocs(collection(db,'classes'));
    CLASSES = []; cs.forEach(d=>CLASSES.push({id:d.id, ...d.data()}));
    window.setLoadStep('교직원 정보 불러오는 중…', 80);
    const st = await getDocs(collection(db,'staff'));
    STAFF_ALL = []; st.forEach(d=>STAFF_ALL.push({uid:d.id, ...d.data()}));
    window.setLoadStep('거의 다 됐어요…', 94);
  } catch(e){ toast('데이터 로드 실패: '+e.message,'err'); }
  finally { window.hideLoading(); }
}

function showTab(t){
  curTab = t;
  $I('tb-issue').classList.toggle('on', t==='issue');
  $I('tb-staff').classList.toggle('on', t==='staff');
  $I('tb-list').classList.toggle('on', t==='list');
  $I('tab-issue').style.display = t==='issue'?'':'none';

  if(t==='issue') renderIssue();
  if(t==='staff') renderStaffIssue();
  if(t==='list') renderList();

// 학생 목록만 갱신 (입력창은 건드리지 않음 → 검색 중복입력 방지)
let openGrades = {}; // 펼쳐진 학년 기억
function renderStudentList(){
  const list = $I('issue-slist');
  if(!list) return;
  const students = STUDENTS
    .filter(s=>(s.status||'active')==='active')
    .filter(s=>s.org===issueOrg)
    .filter(s=>canIssue(s))
    .filter(s=>!issueSearch || (s.name||'').includes(issueSearch));

  if(!students.length){
    list.innerHTML = '<p class="empty">발급 가능한 학생이 없습니다.</p>';
    return;
  }

  // 검색 중이면 평면 목록 (결과 바로 보이게)
  if(issueSearch){
    const sorted = [...students].sort((a,b)=>(studentGrade(a.id)||'').localeCompare(studentGrade(b.id)||'')||(a.name||'').localeCompare(b.name||'','ko'));
    list.innerHTML = sorted.map(s=>studentItemHTML(s)).join('');
    return;
  }

  // 학년별 그룹
  const byGrade = {};
  students.forEach(s=>{
    const g = studentGrade(s.id) || '(학년 미지정)';
    (byGrade[g] = byGrade[g] || []).push(s);
  });
  // 학년 정렬 (숫자 학년 우선, 미지정 맨뒤)
  const grades = Object.keys(byGrade).sort((a,b)=>{
    const na=parseInt(a,10), nb=parseInt(b,10);
    if(isNaN(na)&&isNaN(nb)) return 0;
    if(isNaN(na)) return 1;
    if(isNaN(nb)) return -1;
    return na-nb;
  });

  const palette = ['#0891b2','#7c3aed','#db2777','#d97706','#059669','#2563eb','#dc2626','#4f46e5','#0d9488','#c026d3','#ea580c','#65a30d'];
  list.innerHTML = grades.map((g,gi)=>{
    const arr = byGrade[g].sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'));
    const dept = gradeToDept(g);
    const accent = palette[gi % palette.length];
    const open = !!openGrades[g];
    return `<div class="gr-card ${open?'open':''}" data-grade="${esc(g)}">
      <div class="gr-head" onclick="toggleGrade('${esc(g)}')">
        <span style="width:10px;height:10px;border-radius:50%;background:${accent};flex-shrink:0"></span>
        <span style="flex:1;font-size:15px;font-weight:700;color:var(--gd)">${esc(g)}${dept?` <span style="font-size:12px;color:var(--tl);font-weight:400">· ${dept}</span>`:''}</span>
        <span style="font-size:12px;color:var(--tl)">${arr.length}명</span>
        <span class="gr-arrow">▼</span>
      </div>
      <div class="gr-body">
        <div class="gr-body-inner">
          ${arr.map(s=>studentItemHTML(s)).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
  // 열린 학년의 body 높이 설정 (애니메이션)
  grades.forEach(g=>{
    if(openGrades[g]){
      const card = list.querySelector(`.gr-card[data-grade="${cssEsc(g)}"]`);
      if(card){ const body=card.querySelector('.gr-body'); const inner=card.querySelector('.gr-body-inner'); if(body&&inner) body.style.maxHeight = inner.scrollHeight+'px'; }
    }
  });
}
function cssEsc(s){ return String(s).replace(/"/g,'\\"'); }
function studentItemHTML(s){
  const g = studentGrade(s.id);
  const cfg = ORG_CONFIG[s.org] || {};
  let metaLeft;
  if(cfg.layout==='age'){
    const age = calcAge(s.birth, todayYMD());
    metaLeft = (age!=='' ? `만 ${age}세` : '') + (g?` · ${g}`:'');
  } else {
    const dept = gradeToDept(g);
    metaLeft = `${g?g+' · ':''}${dept||''}`;
  }
  return `<div class="sitem" onclick="openPreview('${s.id}')" style="margin-bottom:6px">
    <div style="flex:1">
      <div class="sname">${esc(s.name)} <span style="font-size:12px;color:${s.gender==='남'?'#2b6cb0':'#d53f8c'}">${esc(s.gender||'')}</span></div>
      <div class="smeta">${metaLeft}${s.birth?' · '+s.birth:''}</div>
    </div>
    <button class="bm">증명서 확인 ›</button>
  </div>`;
}
function toggleGrade(g){
  const willOpen = !openGrades[g];
  openGrades[g] = willOpen;
  const list = $I('issue-slist');
  const card = list?.querySelector(`.gr-card[data-grade="${cssEsc(g)}"]`);
  if(!card) { renderStudentList(); return; }
  const body = card.querySelector('.gr-body');
  const inner = card.querySelector('.gr-body-inner');
  if(willOpen){
    card.classList.add('open');
    body.style.maxHeight = inner.scrollHeight + 'px';
    // 애니메이션 후 auto로 (내용 늘어나도 대응)
    setTimeout(()=>{ if(openGrades[g]) body.style.maxHeight = 'none'; }, 320);
  } else {
    // 닫기: 현재 높이 고정 후 0으로
    body.style.maxHeight = inner.scrollHeight + 'px';
    requestAnimationFrame(()=>{ body.style.maxHeight = '0px'; card.classList.remove('open'); });
  }
}
window.toggleGrade = toggleGrade;

// 재직기간: 입사일 ~ 기준일 → "N년 N개월"
function tenureText(hireDate, refDate){
  if(!hireDate) return '';
  const a = new Date(hireDate+'T00:00:00');
  const b = new Date((refDate||todayYMD())+'T00:00:00');
  if(isNaN(a) || b < a) return '';
  let months = (b.getFullYear()-a.getFullYear())*12 + (b.getMonth()-a.getMonth());
  if(b.getDate() < a.getDate()) months--;
  const y = Math.floor(months/12), m = months%12;
  if(y<=0 && m<=0) return '1개월 미만';
  return `${y>0?y+'년 ':''}${m>0?m+'개월':''}`.trim();
}

async function doIssueStaff(uid, org){
  const s = STAFF_ALL.find(x=>x.uid===uid); if(!s) return;
  const cfg = ORG_CONFIG[org]; if(!cfg){ toast('이 기관은 발급을 지원하지 않습니다.','err'); return; }
  const issueDate = todayYMD();

  const birth = $I('sv-birth')?.value?.trim() || '';
  const address = $I('sv-address')?.value?.trim() || '';
  const hireDate = $I('sv-hireDate')?.value?.trim() || '';
  const position = $I('sv-position')?.value?.trim() || '';
  const purpose = $I('sv-purpose')?.value?.trim() || '제출용';

  const missing = [];
  if(!birth) missing.push('생년월일');
  if(!address) missing.push('집 주소');
  if(!hireDate) missing.push('입사일');
  if(!position) missing.push('직위');
  if(missing.length){
    toast(`${missing.join(', ')}을(를) 입력해주세요.`,'err');
    return;
  }
  if(!$I('sv-confirm')?.checked){
    toast('내용 확인 후 "이상 없음"에 체크해주세요.','err');
    return;
  }

  try {
    // 인사정보에 반영
    const updates = {};
    if(birth !== (s.birth||'')) updates.birth = birth;
    if(address !== (s.address||'')) updates.address = address;
    if(hireDate !== (s.hireDate||'')) updates.hireDate = hireDate;
    if(position !== (s.position||'')) updates.position = position;
    if(Object.keys(updates).length){
      await updateDoc(doc(db,'staff',uid), updates);
      Object.assign(s, updates);
    }

    // 문서번호: [코드]-E-YYMMDD-NN
    const datePart = issueDate.slice(2).replace(/-/g,'');
    const prefix = `${cfg.code}-E-${datePart}-`;
    const snap = await getDocs(query(collection(db,'certificates'), where('docNoDate','==',datePart), where('org','==',org), where('kind','==','employ')));
    const seq = snap.size + 1;
    const docNo = prefix + pad(seq);

    const record = {
      docNo, docNoDate: datePart, seq,
      kind: 'employ', type: '재직', org,
      staffUid: uid, studentName: s.name||'',   // 목록 표시 재사용
      grade: position,                           // 목록에서 직위로 표시
      birth, address, hireDate, position, purpose,
      issueDate,
      issuedByUid: CU.uid, issuedByName: CU.name||'',
      createdAt: Timestamp.now()
    };
    await addDoc(collection(db,'certificates'), record);
    closeStaffPreview();
    toast(`발급 완료 (${docNo})`,'ok');
    showTab('list');
  } catch(e){ toast('발급 실패: '+e.message,'err'); }
}
window.doIssueStaff = doIssueStaff;

async function doIssue(sid){
  const s = STUDENTS.find(x=>x.id===sid);
  if(!s) return;
  const cfg = ORG_CONFIG[s.org];
  if(!cfg){ toast('이 기관은 증명서 발급을 지원하지 않습니다.','err'); return; }
  const issueDate = todayYMD();

  // 입력 필드에서 값 수집
  const newAddr = $I('pv-address')?.value.trim() || '';
  const newBirth = $I('pv-birth')?.value.trim() || '';
  const newAdmit = $I('pv-admitDate')?.value.trim() || '';

  // 필수 항목 검증
  const missing = [];
  if(!newAddr) missing.push('주소');
  if(!newBirth) missing.push('생년월일');
  if(cfg.layout==='grade' && !newAdmit) missing.push('입학일');
  if(missing.length){
    toast(`${missing.join(', ')}을(를) 입력해주세요.`,'err');
    const km = missing[0]==='주소'?'address':missing[0]==='생년월일'?'birth':'admitDate';
    const first = $I('pv-'+km);
    if(first){ first.focus(); first.style.borderColor='#dc2626'; }
    return;
  }
  // 확인 체크 검증
  if(!$I('pv-confirm')?.checked){
    toast('내용 확인 후 "이상 없음"에 체크해주세요.','err');
    return;
  }

  try {
    // 바뀐/입력된 정보를 학생 정보에 반영
    const updates = {};
    if(newAddr !== (s.address||'')) updates.address = newAddr;
    if(newBirth !== (s.birth||'')) updates.birth = newBirth;
    if($I('pv-admitDate') && newAdmit !== (s.admitDate||'')) updates.admitDate = newAdmit;
    if(Object.keys(updates).length){
      await updateDoc(doc(db,'students',sid), updates);
      Object.assign(s, updates);
    }

    // 문서번호: [코드]-C-YYMMDD-NN (그날+기관 발급 순번)
    const datePart = issueDate.slice(2).replace(/-/g,''); // YYMMDD
    const prefix = `${cfg.code}-C-${datePart}-`;
    const snap = await getDocs(query(collection(db,'certificates'), where('docNoDate','==',datePart), where('org','==',s.org)));
    const seq = snap.size + 1;
    const docNo = prefix + pad(seq);

    const g = studentGrade(s.id);
    const dept = gradeToDept(g);
    const record = {
      docNo, docNoDate: datePart, seq,
      type: cfg.verb, org: s.org,
      studentId: sid, studentName: s.name||'',
      grade: g||'', dept: dept||'', course: deptCourse(dept),
      birth: s.birth||'', address: s.address||'', admitDate: s.admitDate||'',
      issueDate,
      issuedByUid: CU.uid, issuedByName: CU.name||'',
      createdAt: Timestamp.now()
    };
    if(cfg.layout==='age'){ record.ageText = `만 ${calcAge(s.birth, issueDate)}세`; }
    await addDoc(collection(db,'certificates'), record);
    closePreview();
    toast(`발급 완료 (${docNo})`,'ok');
    showTab('list');
  } catch(e){ toast('발급 실패: '+e.message,'err'); }
}
window.doIssue = doIssue;

            <div style="flex:1;min-width:180px">
              <div style="font-size:15px;font-weight:700;color:var(--gd)">${esc(c.studentName)} <span style="font-size:12px;color:var(--tl);font-weight:400">${esc(c.grade||'')} · ${esc(c.type)}증명서</span></div>
              <div style="font-size:12px;color:var(--tl);margin-top:2px">${esc(c.docNo)} · 발급일 ${esc(c.issueDate)} · ${esc(c.issuedByName||'')}</div>
            </div>
            <button class="bm" onclick="previewCert('${c.id}')">미리보기</button>
            <button class="bs" style="padding:8px 14px" onclick="pdfCert('${c.id}')">📄 PDF (도장 없이)</button>
            <button class="bs" style="padding:8px 14px" onclick="imageCert('${c.id}')">🖼️ 이미지 (도장 포함)</button>
            ${CU.role==='super' ? `<button class="bm" style="background:#fee2e2;color:#dc2626" onclick="delCert('${c.id}')">삭제</button>` : ''}
          </div>`).join('') : '<p class="empty">아직 발급된 증명서가 없습니다.</p>'}
      </div>
    </div>`;
}
window.renderList = renderList;

// 발급 기록으로부터 증명서 HTML 재생성 (발급 당시 값 사용)
function buildCertFromRecord(c, opts){
  if(c.kind === 'employ'){
    return buildEmployCert({
      org: c.org, docNo: c.docNo, issueDate: c.issueDate,
      name: c.studentName, birth: c.birth, address: c.address,
      hireDate: c.hireDate, position: c.position, purpose: c.purpose,
      hideStamp: opts && opts.hideStamp
    });
  }
  return buildCert({
    org: c.org, docNo: c.docNo, issueDate: c.issueDate,
    grade: c.grade, name: c.studentName, birth: c.birth,
    address: c.address, admitDate: c.admitDate,
    course: c.course || deptCourse(c.dept),
    ageText: c.ageText,
    hideStamp: opts && opts.hideStamp
  });
}

function previewCert(id){
  const c = CERTS.find(x=>x.id===id); if(!c) return;
  const mv = document.createElement('div'); mv.className='mov'; mv.id='cview-mod';
  mv.innerHTML = `<div class="mbk" onclick="document.getElementById('cview-mod').remove()"></div>
    <div class="mbox" style="max-width:720px">
      <div class="mtitle">${esc(c.docNo)}</div>
      <div class="zoom-bar">
        <button class="zoom-btn" onclick="zoomCert(-1)">−</button>
        <span class="zoom-label" id="zoom-label">62%</span>
        <button class="zoom-btn" onclick="zoomCert(1)">＋</button>
        <button class="zoom-btn" style="width:auto;padding:0 10px;font-size:13px" onclick="zoomCert(0)">맞춤</button>
      </div>
      <div class="cert-preview-wrap"><div class="cert-scale" id="pv-cert">${buildCertFromRecord(c)}</div></div>
      <div class="mact">
        <button class="bs" onclick="document.getElementById('cview-mod').remove()">닫기</button>
        <button class="bs" onclick="pdfCert('${c.id}')">📄 PDF (도장 없이)</button>
        <button class="bp" onclick="imageCert('${c.id}')">🖼️ 이미지 (도장 포함)</button>
      </div>
    </div>`;
  $I('mwrap').appendChild(mv);
  _certZoom = 0.62; applyCertZoom();
}
window.previewCert = previewCert;

// 미리보기 확대/축소
let _certZoom = 0.62;
function zoomCert(dir){
  if(dir===0){ _certZoom = 0.62; }
  else { _certZoom = Math.min(1.5, Math.max(0.3, _certZoom + dir*0.12)); }
  applyCertZoom();
}
function applyCertZoom(){
  const el = $I('pv-cert');
  if(el){ el.style.transform = `scale(${_certZoom})`; }
  const lb = $I('zoom-label');
  if(lb){ lb.textContent = Math.round(_certZoom*100)+'%'; }
}
window.zoomCert = zoomCert;

// 증명서를 A4 캔버스로 렌더 (공통) — hideStamp로 도장 유무
async function renderCertCanvas(c, hideStamp){
  if(!window.html2canvas){ loadHtml2Canvas(); throw new Error('이미지 모듈 로딩 중입니다. 잠시 후 다시 시도하세요.'); }
  const MM = 3.779527559;
  const W = Math.round(210 * MM);   // 794px
  const H = Math.round(297 * MM);   // 1123px
  const holder = document.createElement('div');
  holder.style.cssText = `position:fixed;left:-9999px;top:0;width:${W}px;height:${H}px;background:#fff;overflow:hidden;`;
  holder.innerHTML = buildCertFromRecord(c, {hideStamp});
  document.body.appendChild(holder);
  const sheet = holder.querySelector('.cert-sheet');
  if(sheet){ sheet.style.width = W+'px'; sheet.style.minHeight = H+'px'; sheet.style.height = H+'px'; sheet.style.margin = '0'; sheet.style.boxSizing='border-box'; }
  try {
    if(document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch(e){} }
    await new Promise(r=>setTimeout(r,400));
    const canvas = await window.html2canvas(sheet, {
      backgroundColor: (ORG_CONFIG[c.org]?.theme?.bg)||'#fffdf9',
      width: W, height: H, windowWidth: W, windowHeight: H,
      scale: 2, useCORS:true, logging:false
    });
    return canvas;
  } finally { holder.remove(); }
}

// PDF 저장 (도장 없이) — 인쇄 후 행정실 직인 날인용
async function pdfCert(id){
  const c = CERTS.find(x=>x.id===id); if(!c) return;
  toast('PDF를 만드는 중…');
  try {
    await ensureJsPDF();
    const canvas = await renderCertCanvas(c, true); // 도장 없이
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
    pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
    pdf.save(`${c.type}증명서_${c.studentName}_${c.docNo}.pdf`);
    toast('PDF를 저장했습니다. (도장 없이)','ok');
  } catch(e){ toast('PDF 저장 실패: '+(e.message||''),'err'); }
}
window.pdfCert = pdfCert;

// 이미지 저장 (도장 포함) — 바로 사용
async function imageCert(id){
  const c = CERTS.find(x=>x.id===id); if(!c) return;
  toast('이미지를 만드는 중…');
  try {
    const canvas = await renderCertCanvas(c, false); // 도장 포함
    const link = document.createElement('a');
    link.download = `${c.type}증명서_${c.studentName}_${c.docNo}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    toast('이미지를 저장했습니다. (도장 포함)','ok');
  } catch(e){ toast('이미지 저장 실패: '+(e.message||''),'err'); }
}
window.imageCert = imageCert;

function loadHtml2Canvas(){
  if(window.html2canvas || document.getElementById('h2c-script')) return;
  const sc = document.createElement('script');
  sc.id='h2c-script';
  sc.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  document.head.appendChild(sc);
}
loadHtml2Canvas();

// jsPDF 동적 로드
function ensureJsPDF(){
  return new Promise((resolve, reject)=>{
    if(window.jspdf && window.jspdf.jsPDF) return resolve();
    let sc = document.getElementById('jspdf-script');
    if(sc){
      // 로딩 중이면 대기
      const chk = setInterval(()=>{ if(window.jspdf&&window.jspdf.jsPDF){ clearInterval(chk); resolve(); } }, 100);
      setTimeout(()=>{ clearInterval(chk); if(!(window.jspdf&&window.jspdf.jsPDF)) reject(new Error('PDF 모듈 로드 실패')); }, 8000);
      return;
    }
    sc = document.createElement('script');
    sc.id = 'jspdf-script';
    sc.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    sc.onload = ()=> resolve();
    sc.onerror = ()=> reject(new Error('PDF 모듈을 불러올 수 없습니다.'));
    document.head.appendChild(sc);
  });
}

async function delCert(id){
  if(CU.role!=='super'){ toast('슈퍼관리자만 삭제할 수 있습니다.','err'); return; }
  const c = CERTS.find(x=>x.id===id); if(!c) return;
  if(!confirm(`${c.studentName} 학생의 증명서(${c.docNo})를 발급 목록에서 삭제할까요?`)) return;
  try {
    await deleteDoc(doc(db,'certificates',id));
    toast('삭제했습니다.');
    renderList();
  } catch(e){ toast('삭제 실패: '+e.message,'err'); }
}
window.delCert = delCert;
