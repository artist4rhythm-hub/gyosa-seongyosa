<style>
:root {
  --gd:#1e2e5c; --gm:#2b3990; --gl:#5a70cc; --gp:#e8ecf8;
  --gold:#c9a84c; --goldd:#a8873a; --goldp:#fdf3d8;
  --iv:#f5f0e8; --ivd:#e8e0d0;
  --tx:#1a1a2e; --ts:#4a4a6a; --tl:#8888aa; --wh:#ffffff;
  --sh:0 2px 12px rgba(30,46,92,0.10); --r:12px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--iv);color:var(--tx);min-height:100vh;}

#gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#eef0f8 0%,#f5f0e8 60%,#fdf3d8 100%);padding:24px;text-align:center;}
.gbox{background:var(--wh);border-radius:24px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(30,46,92,0.12);}
.gtitle{font-size:22px;font-weight:800;color:var(--gd);margin-bottom:8px;}
.gsub{font-size:14px;color:var(--ts);line-height:1.6;margin-bottom:20px;}
.gbtn{display:inline-block;width:100%;padding:14px;background:linear-gradient(135deg,#2b3990,#1e2e5c);color:var(--wh);border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;}

#ms{display:none;flex-direction:column;min-height:100vh;}
.ah{background:linear-gradient(135deg,#1e2e5c,#12194a);color:var(--wh);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.ahl{display:flex;align-items:center;gap:12px;}
.ahi{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.aht{font-size:16px;font-weight:700;}
.ahr{text-align:right;}
#hn{font-size:15px;font-weight:600;}
#hi{font-size:11px;opacity:.7;margin-top:2px;}
.homebtn{background:rgba(255,255,255,0.15);color:var(--wh);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;margin-top:4px;text-decoration:none;display:inline-block;}

.tc{padding:20px 16px;max-width:1100px;margin:0 auto;width:100%;}
.actitle{font-size:17px;font-weight:800;color:var(--gd);margin-bottom:6px;}
.adesc{font-size:13px;color:var(--ts);margin-bottom:14px;line-height:1.5;}
.acard{background:var(--wh);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:16px;}

.bp{background:linear-gradient(135deg,#2b3990,#1e2e5c);color:var(--wh);border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.bs{background:var(--iv);color:var(--ts);border:1.5px solid var(--ivd);border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;}
.bm{background:var(--gp);color:var(--gm);border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}

.subtabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.subtbtn{padding:9px 18px;border-radius:100px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid var(--ivd);background:var(--wh);color:var(--ts);}
.subtbtn.on{background:var(--gm);color:var(--wh);border-color:var(--gm);}

.fgrp{display:flex;flex-direction:column;margin-bottom:12px;}
.fgrp label{font-size:12px;font-weight:700;color:var(--ts);margin-bottom:5px;}
.fgrp input,.fgrp select{height:40px;border:1.5px solid var(--ivd);border-radius:8px;padding:0 12px;font-size:14px;background:var(--iv);outline:none;width:100%;font-family:inherit;}

.slist{display:flex;flex-direction:column;gap:8px;}
.sitem{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--wh);border:1px solid var(--ivd);border-radius:10px;cursor:pointer;transition:border-color .12s,background .12s;}
.sitem:hover{border-color:var(--gm);background:var(--gp);}
.sname{font-size:15px;font-weight:700;color:var(--gd);}
.smeta{font-size:12px;color:var(--tl);margin-top:2px;}
/* 학년 아코디언 */
.gr-card{border:1px solid var(--ivd);border-radius:12px;margin-bottom:8px;overflow:hidden;background:var(--wh);}
.gr-head{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;background:#fafbfc;transition:background .12s;}
.gr-head:hover{background:var(--gp);}
.gr-arrow{font-size:12px;color:var(--tl);transition:transform .25s ease;}
.gr-card.open .gr-arrow{transform:rotate(180deg);}
.gr-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.gr-body-inner{padding:8px 12px 12px;}

.clist{display:flex;flex-direction:column;gap:10px;}
.citem{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--wh);border:1px solid var(--ivd);border-radius:10px;flex-wrap:wrap;}

.empty{text-align:center;color:var(--tl);padding:30px;font-size:14px;}

.mov{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
.mbk{position:absolute;inset:0;background:rgba(20,25,60,0.5);}
.mbox{position:relative;background:var(--wh);border-radius:16px;padding:24px;width:100%;max-width:640px;box-shadow:0 20px 60px rgba(0,0,0,0.3);margin:auto;}
.mtitle{font-size:18px;font-weight:800;color:var(--gd);margin-bottom:4px;}
.msub{font-size:13px;color:var(--ts);margin-bottom:16px;line-height:1.5;}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gd);color:var(--wh);padding:12px 24px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#dc2626;} .toast.ok{background:var(--gm);}

/* ===== 졸라맨 로딩 오버레이 ===== */
#loadOverlay{position:fixed;inset:0;z-index:2000;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(150deg,#eef0f8 0%,#f5f0e8 55%,#fdf3d8 100%);}
#loadOverlay.show{display:flex;}
.load-stage{width:200px;height:160px;position:relative;margin-bottom:8px;}
.load-svg{width:100%;height:100%;overflow:visible;}
.load-caption{font-size:15px;font-weight:700;color:var(--gd);margin-bottom:4px;min-height:20px;text-align:center;}
.load-sub{font-size:12.5px;color:var(--tl);margin-bottom:18px;min-height:16px;text-align:center;}
.load-bar{width:220px;height:8px;background:#e2ddd0;border-radius:100px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,0.08);}
.load-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#2b3990,#5a70cc);border-radius:100px;transition:width .4s ease;}
.load-pct{font-size:11px;color:var(--tl);margin-top:8px;font-variant-numeric:tabular-nums;}

/* 졸라맨 애니메이션 */
@keyframes sm-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes sm-armL{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-24deg)}}
@keyframes sm-armR{0%,100%{transform:rotate(0deg)}50%{transform:rotate(24deg)}}
@keyframes sm-legL{0%,100%{transform:rotate(6deg)}50%{transform:rotate(-6deg)}}
@keyframes sm-legR{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
@keyframes sm-note{0%{opacity:0;transform:translateY(0) scale(.6)}30%{opacity:1}100%{opacity:0;transform:translateY(-40px) scale(1.1)}}
@keyframes sm-shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-4deg)}75%{transform:rotate(4deg)}}
.sm-body{animation:sm-bounce 0.6s ease-in-out infinite;transform-origin:center;}
.sm-armL{animation:sm-armL 0.35s ease-in-out infinite;transform-origin:top center;}
.sm-armR{animation:sm-armR 0.35s ease-in-out infinite;transform-origin:top center;}
.sm-legL{animation:sm-legL 0.6s ease-in-out infinite;transform-origin:top center;}
.sm-legR{animation:sm-legR 0.6s ease-in-out infinite;transform-origin:top center;}
.sm-note{animation:sm-note 1.1s ease-out infinite;}
.sm-note.n2{animation-delay:.4s;} .sm-note.n3{animation-delay:.8s;}
.sm-inst{animation:sm-shake 0.4s ease-in-out infinite;transform-origin:center;}
@media (prefers-reduced-motion:reduce){
  .sm-body,.sm-armL,.sm-armR,.sm-legL,.sm-legR,.sm-note,.sm-inst{animation:none;}
}

/* ===== 증명서 A4 레이아웃 (고급) ===== */
.cert-sheet{
  position:relative;background:#fffdf9;width:210mm;min-height:297mm;padding:22mm 20mm;margin:0 auto;
  font-family:'Nanum Myeongjo','Noto Serif KR',serif;color:#1a1a1a;box-sizing:border-box;
}
/* 외곽 이중 테두리 */
.cert-sheet::before{
  content:'';position:absolute;top:10mm;left:10mm;right:10mm;bottom:10mm;
  border:1.5px solid #b8935a;pointer-events:none;z-index:2;
}
.cert-sheet::after{
  content:'';position:absolute;top:11.5mm;left:11.5mm;right:11.5mm;bottom:11.5mm;
  border:0.5px solid #c9a84c;pointer-events:none;z-index:2;
}
.cert-bg{position:absolute;top:52%;left:50%;transform:translate(-50%,-50%);width:110mm;opacity:0.06;pointer-events:none;z-index:0;}
.cert-inner{position:relative;z-index:1;padding:2mm 8mm;}
.cert-docno{text-align:right;font-size:10.5pt;color:#555;letter-spacing:1px;margin-bottom:12mm;}
.cert-title{
  text-align:center;font-size:34pt;font-weight:800;letter-spacing:16px;color:#1a2440;
  margin:0 0 4mm;text-indent:16px;
}
.cert-title-line{width:52mm;height:2px;background:linear-gradient(90deg,transparent,#b8935a,transparent);margin:0 auto 16mm;}
.cert-fields{margin:0 10mm 12mm;min-height:62mm;}
.cert-row{display:flex;font-size:13.5pt;margin-bottom:6.5mm;line-height:1.5;align-items:baseline;}
.cert-label{width:26mm;flex-shrink:0;color:#333;font-weight:600;display:inline-flex;justify-content:space-between;}
.cert-label>span{display:inline-block;}
.cert-colon{width:6mm;flex-shrink:0;color:#999;}
.cert-value{flex:1;color:#111;border-bottom:0.5px dotted #ccc;padding-bottom:1mm;word-break:keep-all;overflow-wrap:break-word;}
.cert-value.addr-val{font-size:12.5pt;line-height:1.45;}
.cert-statement{text-align:center;font-size:13.5pt;line-height:2.1;margin:16mm 0 22mm;color:#222;}
.cert-statement b{font-weight:700;color:#1a2440;}
.cert-org{text-align:center;margin-top:8mm;}
.cert-orgname{font-size:22pt;font-weight:800;letter-spacing:3px;color:#1a2440;}
.cert-orgen{font-size:8.5pt;letter-spacing:4px;color:#888;margin-top:2px;font-family:serif;}
.cert-rep{position:relative;display:inline-block;margin-top:10mm;font-size:15pt;letter-spacing:2px;}
.cert-rep .repname{font-weight:700;letter-spacing:4px;}
.cert-rep .stamp{position:absolute;right:-19mm;top:50%;transform:translateY(-50%);width:21mm;opacity:0.92;}
.cert-footer{position:absolute;bottom:16mm;left:20mm;right:20mm;font-size:8.5pt;color:#555;z-index:1;padding:0 8mm;}
.cert-footer .fline{width:100%;height:1px;background:linear-gradient(90deg,transparent,#b8935a 20%,#b8935a 80%,transparent);margin-bottom:3mm;}
.cert-footer .addr{margin-bottom:2.5mm;line-height:1.7;color:#444;text-align:center;}
.cert-footer .note{color:#777;font-size:7.8pt;line-height:1.65;}

/* 미리보기 축소 */
.cert-preview-wrap{background:#e8e8ee;padding:20px;border-radius:12px;overflow:auto;max-height:70vh;}
.cert-scale{transform:scale(0.62);transform-origin:top center;}

// 라벨 글자를 각각 span으로 감싸 flex 양끝 배치 (2글자든 4글자든 좌우폭 동일)
function labelHTML(text){

  return `<span class="cert-label">${chars}</span>`;
}
const isAdmin = () => CU && ['super','org_admin','tab_admin'].includes(CU.role);
const myOrgs = () => CU.role==='super' ? ['jihyebit','daniel'] : (CU.orgs&&CU.orgs.length?CU.orgs:[CU.org]);

// 학년·부서·반 판정
function studentGrade(sid){
  for(const c of CLASSES){
    if((c.students||[]).includes(sid) && c.grades && c.grades[sid]) return c.grades[sid];
  }
  return '';
}
function studentClass(sid){ return CLASSES.find(c=>(c.students||[]).includes(sid)); }
function gradeToDept(grade){
  const n = parseInt(grade,10);
  if(isNaN(n)) return '';
  if(n>=1 && n<=5) return '초등부';
  if(n>=6 && n<=9) return '중등부';
  if(n>=10 && n<=12) return '고등부';
  return '';
}
// 부서 → 교육과정 문구
function deptCourse(dept){
  if(dept==='초등부') return '초등교육과정';
  if(dept==='중등부') return '중등교육과정';
  if(dept==='고등부') return '고등교육과정';
  return '교육과정';
}
// 이 학생을 담임이 발급할 수 있는지 (자기 반 학생) 또는 관리자
function canIssue(s){
  if(CU.role==='super' || CU.role==='org_admin') return myOrgs().includes(s.org);
  if(CU.role==='tab_admin'){
    // 부서장: 같은 기관+같은 부서
    if(!myOrgs().includes(s.org)) return false;
    const dept = gradeToDept(studentGrade(s.id));
    return CU.dept==='행정실' || CU.dept===dept || !CU.dept;
  }
  // 교사: 담임인 반의 학생
  const c = studentClass(s.id);
  return c && (c.teacherUid===CU.uid || (c.deputies||[]).includes(CU.uid));
}

// 날짜 포맷: YYYY-MM-DD → "YYYY년 M월 D일"
function korDate(raw){
  if(!raw) return '';
  const str = String(raw).trim();
  // 숫자 그룹 3개 추출 (구분자: - / . 공백 년월일 등 무엇이든)
  const nums = str.match(/\d+/g);
  if(!nums || nums.length<3) return str; // 파싱 불가 시 원본
  let [y, m, d] = nums.map(Number);
  // 2자리 연도 보정 (예: 05 → 2005, 99 → 1999)
  if(y < 100){ y += (y <= 40 ? 2000 : 1900); }
  if(m<1||m>12||d<1||d>31) return str; // 이상값이면 원본
  return `${y}년 ${m}월 ${d}일`;
}
function todayYMD(){ const n=new Date(); return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`; }

let openGrades = {}; // 펼쳐진 학년 기억
function renderStudentList(){
  const list = $I('issue-slist');
  if(!list) return;
  const students = STUDENTS
    .filter(s=>(s.status||'active')==='active')
    .filter(s=>s.org==='daniel')
    .filter(s=>canIssue(s))
    .filter(s=>!issueSearch || (s.name||'').includes(issueSearch));

  if(!students.length){
    list.innerHTML = '<p class="empty">발급 가능한 학생이 없습니다.</p>';
    return;
  }

  // 검색 중이면 평면 목록 (결과 바로 보이게)
  if(issueSearch){
    const sorted = [...students].sort((a,b)=>(studentGrade(a.id)||'').localeCompare(studentGrade(b.id)||'')||(a.name||'').localeCompare(b.name||'','ko'));
    list.innerHTML = sorted.map(s=>studentItemHTML(s)).join('');
    return;
  }

  // 학년별 그룹
  const byGrade = {};
  students.forEach(s=>{
    const g = studentGrade(s.id) || '(학년 미지정)';
    (byGrade[g] = byGrade[g] || []).push(s);
  });
  // 학년 정렬 (숫자 학년 우선, 미지정 맨뒤)
  const grades = Object.keys(byGrade).sort((a,b)=>{
    const na=parseInt(a,10), nb=parseInt(b,10);
    if(isNaN(na)&&isNaN(nb)) return 0;
    if(isNaN(na)) return 1;
    if(isNaN(nb)) return -1;
    return na-nb;
  });

  const palette = ['#0891b2','#7c3aed','#db2777','#d97706','#059669','#2563eb','#dc2626','#4f46e5','#0d9488','#c026d3','#ea580c','#65a30d'];
  list.innerHTML = grades.map((g,gi)=>{
    const arr = byGrade[g].sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'));
    const dept = gradeToDept(g);
    const accent = palette[gi % palette.length];
    const open = !!openGrades[g];
    return `<div class="gr-card ${open?'open':''}" data-grade="${esc(g)}">
      <div class="gr-head" onclick="toggleGrade('${esc(g)}')">
        <span style="width:10px;height:10px;border-radius:50%;background:${accent};flex-shrink:0"></span>
        <span style="flex:1;font-size:15px;font-weight:700;color:var(--gd)">${esc(g)}${dept?` <span style="font-size:12px;color:var(--tl);font-weight:400">· ${dept}</span>`:''}</span>
        <span style="font-size:12px;color:var(--tl)">${arr.length}명</span>
        <span class="gr-arrow">▼</span>
      </div>
      <div class="gr-body">
        <div class="gr-body-inner">
          ${arr.map(s=>studentItemHTML(s)).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
  // 열린 학년의 body 높이 설정 (애니메이션)
  grades.forEach(g=>{
    if(openGrades[g]){
      const card = list.querySelector(`.gr-card[data-grade="${cssEsc(g)}"]`);
      if(card){ const body=card.querySelector('.gr-body'); const inner=card.querySelector('.gr-body-inner'); if(body&&inner) body.style.maxHeight = inner.scrollHeight+'px'; }
    }
  });
}
function cssEsc(s){ return String(s).replace(/"/g,'\\"'); }
function studentItemHTML(s){
  const g = studentGrade(s.id);
  const dept = gradeToDept(g);
  return `<div class="sitem" onclick="openPreview('${s.id}')" style="margin-bottom:6px">
    <div style="flex:1">
      <div class="sname">${esc(s.name)} <span style="font-size:12px;color:${s.gender==='남'?'#2b6cb0':'#d53f8c'}">${esc(s.gender||'')}</span></div>
      <div class="smeta">${g?g+' · ':''}${dept||''}${s.birth?' · '+s.birth:''}</div>
    </div>
    <button class="bm">증명서 확인 ›</button>
  </div>`;
}
function toggleGrade(g){
  const willOpen = !openGrades[g];
  openGrades[g] = willOpen;
  const list = $I('issue-slist');
  const card = list?.querySelector(`.gr-card[data-grade="${cssEsc(g)}"]`);
  if(!card) { renderStudentList(); return; }
  const body = card.querySelector('.gr-body');
  const inner = card.querySelector('.gr-body-inner');
  if(willOpen){
    card.classList.add('open');
    body.style.maxHeight = inner.scrollHeight + 'px';
    // 애니메이션 후 auto로 (내용 늘어나도 대응)
    setTimeout(()=>{ if(openGrades[g]) body.style.maxHeight = 'none'; }, 320);
  } else {
    // 닫기: 현재 높이 고정 후 0으로
    body.style.maxHeight = inner.scrollHeight + 'px';
    requestAnimationFrame(()=>{ body.style.maxHeight = '0px'; card.classList.remove('open'); });
  }
}

// ── 발급 실행 ──
async function doIssue(sid){
  const s = STUDENTS.find(x=>x.id===sid);
  if(!s) return;
  const newAddr = $I('pv-addr')?.value.trim() || '';
  const issueDate = todayYMD();
  try {
    // 주소가 바뀌었으면 학생 정보 갱신
    if(newAddr !== (s.address||'')){
      await updateDoc(doc(db,'students',sid), {address:newAddr});
      s.address = newAddr;
    }
    // 문서번호 생성: DA-C-YYMMDD-NN (그날 발급 순번)
    const datePart = issueDate.slice(2).replace(/-/g,''); // YYMMDD
    const prefix = `DA-C-${datePart}-`;
    // 오늘 발급된 다니엘 증명서 개수 조회
    const snap = await getDocs(query(collection(db,'certificates'), where('docNoDate','==',datePart), where('org','==','daniel')));
    const seq = snap.size + 1;
    const docNo = prefix + pad(seq);

    const g = studentGrade(s.id);
    const dept = gradeToDept(g);
    const record = {
      docNo, docNoDate: datePart, seq,
      type:'재학', org:'daniel',
      studentId: sid, studentName: s.name||'',
      grade: g||'', dept: dept||'', course: deptCourse(dept),
      birth: s.birth||'', address: newAddr, admitDate: s.admitDate||'',
      issueDate,
      issuedByUid: CU.uid, issuedByName: CU.name||'',
      createdAt: Timestamp.now()
    };
    await addDoc(collection(db,'certificates'), record);
    closePreview();
    toast(`발급 완료 (${docNo})`,'ok');
    showTab('list');
  } catch(e){ toast('발급 실패: '+e.message,'err'); }
}
window.doIssue = doIssue;

    });
    setLoadStep('정리하는 중…', 90);
  } catch(e){ hideLoading(); box.innerHTML = `<div class="acard"><p class="empty">불러올 수 없습니다: ${esc(e.message)}</p></div>`; return; }
  finally { hideLoading(); }

  box.innerHTML = `
    <div class="acard">
      <h3 class="actitle">📋 발급 목록</h3>
      <p class="adesc">발급된 증명서 목록입니다. 같은 기관 선생님과 관리자가 열람할 수 있습니다. 각 항목에서 A4 인쇄 또는 이미지로 저장하세요.</p>
      <div class="clist">
        ${CERTS.length ? CERTS.map(c=>`
          <div class="citem">
            <div style="flex:1;min-width:180px">
              <div style="font-size:15px;font-weight:700;color:var(--gd)">${esc(c.studentName)} <span style="font-size:12px;color:var(--tl);font-weight:400">${esc(c.grade||'')} · ${esc(c.type)}증명서</span></div>
              <div style="font-size:12px;color:var(--tl);margin-top:2px">${esc(c.docNo)} · 발급일 ${esc(c.issueDate)} · ${esc(c.issuedByName||'')}</div>
            </div>
            <button class="bm" onclick="previewCert('${c.id}')">미리보기</button>
            <button class="bs" style="padding:8px 14px" onclick="printCert('${c.id}')">🖨️ A4 인쇄</button>
            <button class="bs" style="padding:8px 14px" onclick="imageCert('${c.id}')">🖼️ 이미지 저장</button>
            ${CU.role==='super' ? `<button class="bm" style="background:#fee2e2;color:#dc2626" onclick="delCert('${c.id}')">삭제</button>` : ''}
          </div>`).join('') : '<p class="empty">아직 발급된 증명서가 없습니다.</p>'}
      </div>
    </div>`;
}
window.renderList = renderList;

// 발급 기록으로부터 증명서 HTML 재생성 (발급 당시 값 사용)
function buildCertFromRecord(c){
  const cfg = ORG_CONFIG[c.org];
  return `
  <div class="cert-sheet">
    <img class="cert-bg" src="${cfg.logo}" alt="" onerror="this.style.display='none'">
    <div class="cert-inner">
      <div class="cert-docno">문서번호 : ${esc(c.docNo)}</div>
      <div class="cert-title">${esc(cfg.certTitle)}</div>
      <div class="cert-title-line"></div>
      <div class="cert-fields">
        <div class="cert-row">${labelHTML("학년")}<span class="cert-colon">:</span><span class="cert-value">${esc(c.grade||'-')}</span></div>
        <div class="cert-row">${labelHTML("성명")}<span class="cert-colon">:</span><span class="cert-value">${esc(c.studentName||'')}</span></div>
        <div class="cert-row">${labelHTML("생년월일")}<span class="cert-colon">:</span><span class="cert-value">${esc(korDate(c.birth))}</span></div>
        <div class="cert-row">${labelHTML("주소")}<span class="cert-colon">:</span><span class="cert-value addr-val">${esc(c.address||'-')}</span></div>
        <div class="cert-row">${labelHTML("입학")}<span class="cert-colon">:</span><span class="cert-value">${esc(korDate(c.admitDate))}</span></div>
      </div>
      <div class="cert-statement">
        위 사람은 <b>${esc(korDate(c.issueDate))}</b> 현재, '${esc(cfg.orgName)}'에서<br>
        <b>${esc(c.course||deptCourse(c.dept))}</b>에 참여하고 있음을 확인 합니다.
      </div>
      <div class="cert-org">
        <div class="cert-orgname">${esc(cfg.orgName)}</div>
        <div class="cert-orgen">${esc(cfg.orgEn)}</div>
        <div class="cert-rep">
          대표자 &nbsp; <span class="repname">${esc(cfg.rep)}</span> <span style="font-size:10pt">(인)</span>
          <img class="stamp" src="${cfg.stamp}" alt="" onerror="this.style.display='none'">
        </div>
      </div>
    </div>
    <div class="cert-footer">
      <div class="fline"></div>
      <div class="addr">${esc(cfg.address)}　|　TEL. ${esc(cfg.phone)}</div>
      ${cfg.notes.map(n=>`<div class="note">· ${esc(n)}</div>`).join('')}
    </div>
  </div>`;
}

function previewCert(id){
  const c = CERTS.find(x=>x.id===id); if(!c) return;
  const mv = document.createElement('div'); mv.className='mov'; mv.id='cview-mod';
  mv.innerHTML = `<div class="mbk" onclick="document.getElementById('cview-mod').remove()"></div>
    <div class="mbox" style="max-width:720px">
      <div class="mtitle">${esc(c.docNo)}</div>
      <div class="cert-preview-wrap"><div class="cert-scale">${buildCertFromRecord(c)}</div></div>
      <div class="mact">
        <button class="bs" onclick="document.getElementById('cview-mod').remove()">닫기</button>
        <button class="bs" onclick="printCert('${c.id}')">🖨️ A4 인쇄</button>
        <button class="bp" onclick="imageCert('${c.id}')">🖼️ 이미지 저장</button>
      </div>
    </div>`;
  $I('mwrap').appendChild(mv);
}
window.previewCert = previewCert;

// 증명서 인쇄용 CSS (새 창에 삽입)
function certPrintCSS(){
  return `
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@400;600;700;900&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#fff;}
    .cert-sheet{position:relative;background:#fffdf9;width:210mm;min-height:297mm;padding:22mm 20mm;margin:0 auto;font-family:'Nanum Myeongjo','Noto Serif KR',serif;color:#1a1a1a;}
    .cert-sheet::before{content:'';position:absolute;top:10mm;left:10mm;right:10mm;bottom:10mm;border:1.5px solid #b8935a;pointer-events:none;}
    .cert-sheet::after{content:'';position:absolute;top:11.5mm;left:11.5mm;right:11.5mm;bottom:11.5mm;border:0.5px solid #c9a84c;pointer-events:none;}
    .cert-bg{position:absolute;top:52%;left:50%;transform:translate(-50%,-50%);width:110mm;opacity:0.06;pointer-events:none;}
    .cert-inner{position:relative;z-index:1;padding:6mm 8mm;}
    .cert-docno{text-align:right;font-size:10.5pt;color:#555;letter-spacing:1px;margin-bottom:16mm;}
    .cert-title{text-align:center;font-size:34pt;font-weight:800;letter-spacing:16px;color:#1a2440;margin:0 0 4mm;text-indent:16px;}
    .cert-title-line{width:52mm;height:2px;background:linear-gradient(90deg,transparent,#b8935a,transparent);margin:0 auto 20mm;}
    .cert-fields{margin:0 10mm 14mm;min-height:62mm;}
    .cert-row{display:flex;font-size:13.5pt;margin-bottom:6.5mm;line-height:1.5;align-items:baseline;}
    .cert-label{width:26mm;flex-shrink:0;color:#333;font-weight:600;display:inline-flex;justify-content:space-between;}
    .cert-label>span{display:inline-block;}
    .cert-colon{width:6mm;flex-shrink:0;color:#999;}
    .cert-value{flex:1;color:#111;border-bottom:0.5px dotted #ccc;padding-bottom:1mm;word-break:keep-all;overflow-wrap:break-word;}
    .cert-value.addr-val{font-size:12.5pt;line-height:1.45;}
    .cert-statement{text-align:center;font-size:13.5pt;line-height:2.1;margin:16mm 0 22mm;color:#222;}
    .cert-statement b{font-weight:700;color:#1a2440;}
    .cert-org{text-align:center;margin-top:8mm;}
    .cert-orgname{font-size:22pt;font-weight:800;letter-spacing:3px;color:#1a2440;}
    .cert-orgen{font-size:8.5pt;letter-spacing:4px;color:#888;margin-top:2px;}
    .cert-rep{position:relative;display:inline-block;margin-top:10mm;font-size:15pt;letter-spacing:2px;}
    .cert-rep .repname{font-weight:700;letter-spacing:4px;}
    .cert-rep .stamp{position:absolute;right:-19mm;top:50%;transform:translateY(-50%);width:21mm;opacity:0.92;}
    .cert-footer{position:absolute;bottom:16mm;left:20mm;right:20mm;font-size:8.5pt;color:#555;padding:0 8mm;}
    .cert-footer .fline{width:100%;height:1px;background:linear-gradient(90deg,transparent,#b8935a 20%,#b8935a 80%,transparent);margin-bottom:3mm;}
    .cert-footer .addr{margin-bottom:2.5mm;line-height:1.7;color:#444;text-align:center;}
    .cert-footer .note{color:#777;font-size:7.8pt;line-height:1.65;}
    @page{size:A4;margin:0;}
    @media print{ html,body{width:210mm;} }
  `;
}

// A4 인쇄 (별도 창)
function printCert(id){
  const c = CERTS.find(x=>x.id===id); if(!c) return;
  const w = window.open('', '_blank', 'width=800,height=1000');
  if(!w){ toast('팝업이 차단되었습니다. 팝업 허용 후 다시 시도하세요.','err'); return; }
  w.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>${esc(c.type)}증명서 - ${esc(c.studentName)}</title>
    <style>${certPrintCSS()}</style></head><body>${buildCertFromRecord(c)}</body></html>`);
  w.document.close();
  // 폰트·이미지 로딩 대기 후 인쇄
  w.onload = () => { setTimeout(()=>{ w.focus(); w.print(); }, 600); };
}
window.printCert = printCert;

// 이미지 저장 (html2canvas)
async function imageCert(id){
  const c = CERTS.find(x=>x.id===id); if(!c) return;
  if(!window.html2canvas){ toast('이미지 모듈 로딩 중... 잠시 후 다시 시도하세요.','err'); loadHtml2Canvas(); return; }
  // 임시 렌더 (실측 크기)
  const holder = document.createElement('div');
  holder.style.cssText='position:fixed;left:-9999px;top:0;background:#fff;';
  holder.innerHTML = buildCertFromRecord(c);
  document.body.appendChild(holder);
  const sheet = holder.querySelector('.cert-sheet');
  try {
    // 웹폰트·이미지 로딩 대기
    if(document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch(e){} }
    await new Promise(r=>setTimeout(r,400));
    const canvas = await window.html2canvas(sheet, {backgroundColor:'#fffdf9', scale:2, useCORS:true, logging:false});
    const link = document.createElement('a');
    link.download = `${c.type}증명서_${c.studentName}_${c.docNo}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    toast('이미지를 저장했습니다.','ok');
  } catch(e){ toast('이미지 저장 실패: '+e.message,'err'); }
  finally { holder.remove(); }
}
window.imageCert = imageCert;

function loadHtml2Canvas(){
  if(window.html2canvas || document.getElementById('h2c-script')) return;
  const sc = document.createElement('script');
  sc.id='h2c-script';
  sc.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  document.head.appendChild(sc);
}
loadHtml2Canvas();

async function delCert(id){
  if(CU.role!=='super'){ toast('슈퍼관리자만 삭제할 수 있습니다.','err'); return; }
  const c = CERTS.find(x=>x.id===id); if(!c) return;
  if(!confirm(`${c.studentName} 학생의 증명서(${c.docNo})를 발급 목록에서 삭제할까요?`)) return;
  try {
    await deleteDoc(doc(db,'certificates',id));
    toast('삭제했습니다.');
    renderList();
  } catch(e){ toast('삭제 실패: '+e.message,'err'); }
}
window.delCert = delCert;
</script>
