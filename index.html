<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교사 선교사</title>
<meta name="theme-color" content="#1E3932">
<link rel="manifest" href="manifest.json">
<!-- iOS 홈 화면 앱 아이콘 -->
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="교사선교사">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="stylesheet" href="theme.css">
<style>
:root {
  --gd:#1E3932; --gm:#00704A; --gl:#D4E9E2; --gp:#E8F3EF;
  --gold:#B08D3C; --goldd:#8A6410; --goldp:#F7EFD8;
  --iv:#F2F0EB; --ivd:#E3E1DA;
  --tx:#1F2320; --ts:#5A6560; --tl:#93A09A; --wh:#ffffff;
  --sh:0 2px 12px rgba(30,57,50,0.08); --r:12px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--iv);color:var(--tx);min-height:100vh;}

/* 로그인 */
#ls{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(150deg,#E8F3EF 0%,#F2F0EB 60%,#F7EFD8 100%);padding:24px;}
.lbox{background:var(--wh);border-radius:24px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(30,57,50,0.12),0 2px 12px rgba(0,0,0,0.06);}
.llogo{text-align:center;margin-bottom:32px;}
.licon{display:none;}
.ltitle{font-size:26px;font-weight:800;color:var(--gd);letter-spacing:-0.5px;margin-bottom:4px;}
.lsubtitle{font-size:13px;color:var(--tl);}
.dbadge{display:inline-block;background:#fef3c7;color:#b45309;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;margin-top:10px;}
.lf{margin-bottom:14px;}
.lf label{display:block;font-size:13px;font-weight:600;color:var(--ts);margin-bottom:6px;}
.lf input{width:100%;padding:12px 14px;border:1.5px solid var(--ivd);border-radius:var(--rs);font-size:15px;outline:none;transition:border-color .2s;background:var(--iv);}
.lf input:focus{border-color:var(--gl);background:var(--wh);}
#lbtn{width:100%;padding:14px;background:linear-gradient(135deg,#00704A,#1E3932);color:var(--wh);border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:0 4px 14px rgba(30,57,50,0.28);}
#lbtn:hover{opacity:.92;}
.dac{margin-top:20px;background:var(--iv);border-radius:10px;padding:14px;}
.dact{font-size:11px;font-weight:700;color:var(--tl);margin-bottom:10px;}
.dab{width:100%;text-align:left;background:var(--wh);border:1.5px solid var(--ivd);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.dab:hover{border-color:var(--gl);}
.dan{font-size:13px;font-weight:700;}
.dar{font-size:11px;color:var(--tl);margin-top:2px;}
.dtag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;}

/* 헤더 */
#ms{display:none;flex-direction:column;width:100%;}
.ah{display:none;}
.pg-links{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;justify-content:flex-end;}
.pg-link{padding:7px 14px;border-radius:8px;background:var(--wh);border:1px solid var(--ivd);color:var(--gm);font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;font-family:inherit;}
.pg-link:hover{background:var(--gp);}
.ah{background:linear-gradient(135deg,#1E3932,#16302A);color:var(--wh);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.ahl{display:flex;align-items:center;gap:12px;}
.ahi{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.aht{font-size:16px;font-weight:700;}
.ahr{text-align:right;}
#hn{font-size:15px;font-weight:600;}
#hi{font-size:11px;opacity:.7;margin-top:2px;}
.lgbtn{background:rgba(255,255,255,0.15);color:var(--wh);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;margin-top:4px;}

/* 탭 */
.tb{background:var(--wh);border-bottom:1px solid var(--ivd);display:flex;padding:0 16px;gap:4px;overflow-x:auto;}
.tbtn{padding:14px 18px;background:none;border:none;border-bottom:3px solid transparent;font-size:14px;font-weight:600;color:var(--tl);cursor:pointer;white-space:nowrap;transition:all .2s;}
.tbtn.active{color:var(--gd);border-bottom-color:var(--gold);}

/* 하위 탭 */
.subtb{background:#eeeadf;border-bottom:1px solid var(--ivd);display:flex;padding:0 16px;gap:2px;}
.subtbtn{padding:10px 16px;background:none;border:none;border-bottom:2px solid transparent;font-size:13px;font-weight:600;color:var(--tl);cursor:pointer;white-space:nowrap;transition:all .2s;}
.subtbtn.active{color:var(--gd);border-bottom-color:var(--gold);}

/* 콘텐츠 */
.tc{padding:0;max-width:960px;margin:0 auto;width:100%;}

/* 달력 */
.mnav{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px;}
.mlb{font-size:18px;font-weight:700;color:var(--gd);}
.ibtn{background:var(--wh);border:1.5px solid var(--ivd);border-radius:8px;width:36px;height:36px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gd);}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:var(--wh);border-radius:var(--r);padding:12px;box-shadow:var(--sh);}
.ch{text-align:center;font-size:12px;font-weight:700;color:var(--ts);padding:6px 0;}
.cc{min-height:76px;border-radius:8px;padding:6px;background:var(--iv);}
.cc.click{cursor:pointer;transition:background .15s;}
.cc.click:hover{background:var(--gp);}
.cc.empty{background:none;}
.cc.tod{background:#edf0fa;outline:2px solid var(--gold);}
.cc.wknd .cd{color:#dc2626;}
.cc.hol{background:#fef2f2;}
.cc.hol .cd{color:#dc2626;}
.cc.nwd{background:#f5f5f5;}
.cc.nwd .cd{color:#ccc;}
.cd{font-size:12px;font-weight:700;display:block;margin-bottom:3px;}
.cbadge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;margin-top:2px;max-width:100%;overflow:hidden;}
.cbp{font-size:8px;opacity:.7;margin-right:2px;}
.cmemo{display:block;font-size:9px;color:var(--tl);margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.auto-dim{opacity:.55;}

/* 모달 공통 */
.mov{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.mbk{position:absolute;inset:0;background:rgba(0,0,0,0.45);}
.mbox{position:relative;background:var(--wh);border-radius:20px 20px 0 0;padding:28px 20px 40px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;}
.mtitle{font-size:17px;font-weight:700;margin-bottom:4px;color:var(--gd);}
.msub{font-size:12px;color:var(--tl);margin-bottom:16px;min-height:16px;}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}

/* 대항목 */
.sp{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.spb{padding:10px 4px;border-radius:8px;border:2px solid transparent;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;opacity:.6;}
.spb.on{opacity:1;transform:scale(1.04);box-shadow:0 2px 8px rgba(0,0,0,0.13);}
.sublb{font-size:12px;font-weight:600;color:var(--ts);margin-bottom:8px;}
.ss{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;min-height:40px;}
.ssb{padding:8px 14px;border-radius:8px;border:2px solid var(--ivd);background:var(--iv);font-size:13px;font-weight:600;cursor:pointer;color:var(--ts);transition:all .15s;}
.ssb.on{border-color:var(--gm);background:var(--gp);color:var(--gd);}

/* 메모 */
.mlabel{display:block;font-size:13px;font-weight:600;color:var(--ts);margin-bottom:6px;}
.minput{width:100%;padding:10px 12px;border:1.5px solid var(--ivd);border-radius:8px;font-size:14px;resize:none;outline:none;background:var(--iv);}
.minput:focus{border-color:var(--gl);}

/* 버튼 */
.bp{background:var(--gm);color:var(--wh);border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.bs{background:var(--ivd);color:var(--ts);border:none;border-radius:8px;padding:10px 20px;font-size:14px;cursor:pointer;}
.bd{background:#fee2e2;color:#dc2626;border:none;border-radius:8px;padding:10px 20px;font-size:14px;cursor:pointer;}
.bm{background:var(--gp);color:var(--gd);border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;}
.bx{background:none;border:none;color:#dc2626;font-size:14px;cursor:pointer;padding:2px 6px;}

/* 관리자 */
.asc{display:flex;flex-direction:column;gap:20px;}
.acard{background:var(--wh);border-radius:var(--r);padding:20px;box-shadow:var(--sh);}
.actitle{font-size:15px;font-weight:700;color:var(--gd);margin-bottom:16px;}
.adesc{font-size:13px;color:var(--ts);margin-bottom:14px;}

/* 폼 그리드 - 모든 input/select 동일 높이 40px */
.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.fg2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px;}
.fgrp{display:flex;flex-direction:column;}
.fgrp label{font-size:12px;font-weight:600;color:var(--ts);margin-bottom:4px;}
.fgrp input:not([type="checkbox"]):not([type="radio"]),
.fgrp select{
  width:100%;height:40px;padding:0 12px;
  border:1.5px solid var(--ivd);border-radius:8px;
  font-size:14px;outline:none;background:var(--iv);
  appearance:none;-webkit-appearance:none;
}
.fgrp input[type="checkbox"],.fgrp input[type="radio"]{cursor:pointer;flex-shrink:0;}
.tab-badge{display:inline-block;min-width:17px;height:17px;line-height:17px;background:#dc2626;color:#fff;font-size:10px;font-weight:700;border-radius:100px;padding:0 5px;margin-left:5px;text-align:center;vertical-align:middle;}
.fgrp input[type="date"],
.fgrp input[type="month"]{padding:0 10px;}
.fgrp input:focus,.fgrp select:focus{border-color:var(--gl);}

/* 필터 행 */
.frow{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.frow select,.frow input[type="month"]{
  height:40px;padding:0 12px;
  border:1.5px solid var(--ivd);border-radius:8px;
  font-size:14px;background:var(--iv);outline:none;
}

/* 목록 아이템 */
.wplist,.hlist,.slist{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
.wpitem,.hitem,.sitem{display:flex;align-items:center;gap:10px;background:var(--iv);padding:10px 14px;border-radius:8px;font-size:13px;flex-wrap:wrap;}
.wporg,.hdate,.sname{font-weight:700;color:var(--gd);min-width:80px;}
.wpdates,.hname,.sid{flex:1;color:var(--ts);}
.wptag{font-size:10px;background:var(--gp);color:var(--gd);padding:2px 8px;border-radius:100px;font-weight:700;}
.horg,.srole{color:var(--tl);font-size:12px;}
.rbadge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px;}
.r-super{background:#1E3932;color:white;}
.r-org{background:#00704A;color:white;}
.r-tab{background:var(--gp);color:var(--gd);}
.r-teacher{background:var(--ivd);color:var(--ts);}

/* 테이블 */
.otable{width:100%;border-collapse:collapse;font-size:13px;}
.otable th{background:#1E3932;color:var(--wh);padding:10px 8px;text-align:left;font-size:12px;}
.otable td{padding:9px 8px;border-bottom:1px solid var(--ivd);vertical-align:middle;}
.otable tr:hover td{background:var(--iv);}
.sbadge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;}
.empty{color:var(--tl);font-size:14px;text-align:center;padding:24px;}

/* 토스트 */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gd);color:var(--wh);padding:12px 24px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#dc2626;}
.toast.ok{background:var(--gm);}

@media(max-width:640px){
  .fg{grid-template-columns:repeat(2,1fr);}
  .cc{min-height:60px;}
  .sp{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:400px){.fg{grid-template-columns:1fr;}}
</style>

async function createAcc() {
  const name = $I('nn').value.trim(), id = $I('nid').value.trim(), pw = $I('npw').value;
  const role = $I('nr').value;
  if (!name || !id || !pw) return toast('이름, 아이디, 비밀번호를 입력하세요.', 'err');
  if (pw.length < 6) return toast('비밀번호는 6자 이상이어야 합니다.', 'err');

  // 권한별 기관/부서 처리
  let org, dept, orgs;
  if (role === 'org_admin') {
    // 기관관리자: 체크박스로 여러 기관 선택
    orgs = [];
    if ($I('nm-jihyebit')?.checked) orgs.push('jihyebit');
    if ($I('nm-daniel')?.checked) orgs.push('daniel');
    if (orgs.length === 0) return toast('관리 기관을 하나 이상 선택하세요.', 'err');
    org = orgs[0];   // 대표 기관 (호환용)
    dept = '전체';
  } else {
    // 교사/탭관리자: 단일 기관
    org = $I('no').value;
    dept = $I('nd').value;
    orgs = [org];
  }

  try {
    const { initializeApp: iApp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const { getAuth: gAuth, createUserWithEmailAndPassword: cUser } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
    const sub = iApp(firebaseConfig, 'sub-' + Date.now());
    const subAuth = gAuth(sub);
    const cred = await cUser(subAuth, korEmail(id), pw);
    await subAuth.signOut();
    await setDoc(doc(db, 'staff', cred.user.uid), {
      uid: cred.user.uid, id, name, org, orgs, dept, role,
      acStatus: 'active',
      createdAt: Timestamp.now()
    });
    toast(`${name} 선생님 계정이 발급되었습니다.`, 'ok');
    logActivity('입력', '계정', `${name} (${id}) 계정 발급`);
    $I('nn').value = ''; $I('nid').value = ''; $I('npw').value = '';
    if ($I('nm-jihyebit')) $I('nm-jihyebit').checked = false;
    if ($I('nm-daniel')) $I('nm-daniel').checked = false;
    await loadStaff();
  } catch(e) {
    if (e.code === 'auth/email-already-in-use') toast('이미 사용 중인 아이디입니다.', 'err');
    else toast('발급 실패: ' + e.message, 'err');
  }
}
window.createAcc = createAcc;

// ── 교직원 목록 로드 (Firebase) ──────────────
async function loadStaff() {
  const el = $I('slist'); if (!el) return;
  const isSU = CU.role === 'super';
  const orgFilter = $I('sf-org')?.value || '';
  const allowed = myOrgs();   // 내가 볼 수 있는 기관들
  let q = collection(db, 'staff');
  const snap = await getDocs(q);
  const list = [];
  snap.forEach(d => {
    const s = { ...d.data(), uid: d.id };
    // 이 선생님이 속한 기관들 (단수 org + 복수 orgs 합침)
    const sOrgs = s.orgs && s.orgs.length ? s.orgs : [s.org];
    // 권한 필터: 내 관리 기관과 겹치는 선생님만
    if (!sOrgs.some(o => allowed.includes(o))) return;
    // 드롭다운 필터
    if (orgFilter && !sOrgs.includes(orgFilter)) return;
    list.push(s);
  });
  el.innerHTML = list.length ? list.map(s => {
    const ac = s.acStatus || 'active';
    const acBadge = ac==='leave' ? '<span class="rbadge" style="background:#fef3c7;color:#b45309">휴직</span>'
      : ac==='quit' ? '<span class="rbadge" style="background:#fee2e2;color:#dc2626">퇴직</span>' : '';
    const ll = s.lastLogin?.seconds ? new Date(s.lastLogin.seconds*1000) : null;
    const llStr = ll ? `최근 로그인 ${ll.getFullYear()}.${pad(ll.getMonth()+1)}.${pad(ll.getDate())}` : '로그인 기록 없음';
    return `
    <div class="sitem" style="flex-wrap:wrap;gap:8px;${ac!=='active'?'opacity:.6':''}">
      <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:200px;flex-wrap:wrap">
        <span class="sname">${s.name}</span>
        <span class="sid" style="color:var(--tl);font-size:12px">${s.id}</span>
        <span style="font-size:12px;color:var(--ts)">${s.role==='org_admin' ? (s.orgs&&s.orgs.length?s.orgs.map(o=>ORGS[o]||o).join(', '):ORGS[s.org]||s.org) : (ORGS[s.org]||s.org)+(s.dept!=='전체'?' · '+s.dept:'')}</span>
        <span class="rbadge ${s.role==='super'?'r-super':s.role==='org_admin'?'r-org':s.role==='tab_admin'?'r-tab':'r-teacher'}">${ROLES[s.role]||s.role}</span>
        ${acBadge}
        <span style="font-size:11px;color:var(--tl)">${llStr}</span>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button class="bm" onclick="openEditStaff('${s.uid}','${s.name}','${s.org}','${s.dept}','${s.role}')">✏️ 수정</button>
        <button class="bm" style="background:#fef3c7;color:#b45309" onclick="openResetPw('${s.uid}')">🔑 비번</button>
        ${isSU?`<button class="bm" style="background:#ede9fe;color:#7c3aed" onclick="showPw('${s.uid}')">👁 확인</button>`:''}        ${s.uid!==CU.uid?`<button class="bm" style="background:#fee2e2;color:#dc2626" onclick="deleteStaff('${s.uid}')">🗑 삭제</button>`:''}
      </div>
    </div>`;
  }).join('') : '<p class="empty">교직원이 없습니다.</p>';
}

// ── 달력 데이터 로드 (Firebase) ──────────────
async function drawCal() {
  const y = curMon.getFullYear(), m = curMon.getMonth();
  $I('mlb').textContent = `${y}년 ${m+1}월`;
  const g = $I('cg'); g.innerHTML = '';
  ['일','월','화','수','목','금','토'].forEach(d => {
    const h = document.createElement('div'); h.className = 'ch'; h.textContent = d; g.appendChild(h);
  });

  const holMap = {}, wps = [], recMap = {};
  try {
    // 공휴일 로드 (전체 가져와서 필터 - 색인 불필요)
    const holSnap = await getDocs(collection(db, 'holidays'));
    holSnap.forEach(d => {
      const h = d.data();
      if (h.org === CU.org || h.org === 'all') holMap[h.date] = h.name;
    });

    // 근무기간 로드 (전체 가져와서 필터)
    const wpSnap = await getDocs(collection(db, 'workPeriods'));
    wpSnap.forEach(d => { const w = d.data(); if (w.org === CU.org) wps.push(w); });

    // 내 출근 기록 로드 (전체 가져와서 필터)
    const sd = `${y}-${pad(m+1)}-01`, ed = `${y}-${pad(m+1)}-${pad(new Date(y,m+1,0).getDate())}`;
    const recSnap = await getDocs(collection(db, 'attendance'));
    recSnap.forEach(d => {
      const r = d.data();
      if (r.uid === CU.uid && r.date >= sd && r.date <= ed) recMap[r.date] = { id: d.id, ...r };
    });
  } catch(e) {
    console.log('달력 데이터 로드 중 일부 오류 (무시 가능):', e);
  }

  // 해당 날짜의 자동 상태 판정: 'work'(정상출근) / 'vacation'(정기휴가) / null
  function autoStatus(ds) {
    const dow = new Date(ds+'T00:00:00').getDay(), wknd = dow===0||dow===6;
    // 방학기간이 근무기간보다 우선
    const vac = wps.find(w => w.type==='vacation' && ds>=w.s && ds<=w.e && (!wknd || w.wknd));
    if (vac) return 'vacation';
    const work = wps.find(w => w.type!=='vacation' && ds>=w.s && ds<=w.e && (!wknd || w.wknd));
    if (work) return 'work';
    return null;
  }

  const fd = new Date(y,m,1).getDay();
  for (let i=0; i<fd; i++) { const b=document.createElement('div'); b.className='cc empty'; g.appendChild(b); }
  const dim = new Date(y,m+1,0).getDate(), tstr = fmtD(new Date());

  for (let d=1; d<=dim; d++) {
    const ds = `${y}-${pad(m+1)}-${pad(d)}`;
    const dow = new Date(y,m,d).getDay(), wknd = dow===0||dow===6;
    const hol = holMap[ds], rec = recMap[ds], isT = ds===tstr;
    const auto = autoStatus(ds);              // 'work' | 'vacation' | null
    const work = auto==='work', vacAuto = auto==='vacation';
    let cls = 'cc';
    if (isT) cls += ' tod';
    if (wknd) cls += ' wknd';
    if (hol) cls += ' hol';
    if (!auto && !hol && !rec) cls += ' nwd';
    let badge = '';
    if (hol) {
      badge = `<span class="cbadge" style="background:#fee2e2;color:#dc2626;font-weight:700">${hol}</span>`;
    } else if (rec) {
      const inf = SINF[rec.sub] || {l:rec.sub,c:'#555',b:'#eee',pl:''};
      const pl = (inf.pl&&inf.pl!==inf.l)?`<span class="cbp">${inf.pl}·</span>`:'';
      badge = `<span class="cbadge" style="background:${inf.b};color:${inf.c}">${pl}${inf.l}</span>`;
    } else if (work) {
      badge = `<span class="cbadge auto-dim" style="background:#E8F3EF;color:#00704A">정상출근</span>`;
    } else if (vacAuto) {
      badge = `<span class="cbadge auto-dim" style="background:#e0f2fe;color:#0369a1">정기휴가</span>`;
    }
    const cell = document.createElement('div');
    cell.className = cls;
    cell.innerHTML = `<span class="cd">${d}</span>${badge}${rec?.memo?`<span class="cmemo">${rec.memo}</span>`:''}`;
    if (!hol) {
      cell.classList.add('click');
      const autoDefault = work ? {l:'정상출근',c:'#00704A',b:'#E8F3EF',pl:'정상출근',sub:'정상출근',memo:'',auto:true}
        : vacAuto ? {l:'정기휴가',c:'#0369a1',b:'#e0f2fe',pl:'연차',sub:'정기휴가',memo:'',auto:true}
        : null;
      cell.onclick = () => openMod(ds, rec ? {...SINF[rec.sub],sub:rec.sub,memo:rec.memo,manual:true,id:rec.id} : autoDefault);
    }
    g.appendChild(cell);
  }
}

// ── 전체 현황 / 통계 (Firebase) ──────────────
async function getAllRows(sd, ed, orgFilter, uidFilter) {
  const allowed = myOrgs();   // 권한상 볼 수 있는 기관
  const snap = await getDocs(collection(db,'attendance'));
  const manRows = [];
  snap.forEach(d => {
    const r = {id:d.id,...d.data()};
    if (r.date < sd || r.date > ed) return;
    if (!allowed.includes(r.org)) return;       // 권한 필터
    if (orgFilter && r.org!==orgFilter) return;
    if (uidFilter && r.uid!==uidFilter) return;
    manRows.push(r);
  });

  // 자동 정상출근 계산
  const staffSnap = await getDocs(collection(db,'staff'));
  const staffList = [];
  staffSnap.forEach(d => {
    const s = {uid:d.id,...d.data()};
    const sOrgs = s.orgs && s.orgs.length ? s.orgs : [s.org];
    if (!sOrgs.some(o => allowed.includes(o))) return;   // 권한 필터
    if (orgFilter && !sOrgs.includes(orgFilter)) return;
    if (uidFilter && s.uid!==uidFilter) return;
    staffList.push(s);
  });

  const wpSnap = await getDocs(collection(db,'workPeriods'));
  const wps = []; wpSnap.forEach(d=>wps.push(d.data()));

  const holSnap = await getDocs(collection(db,'holidays'));
  const holDates = new Set();
  holSnap.forEach(d=>{ if(!orgFilter||d.data().org==='all'||d.data().org===orgFilter) holDates.add(d.data().date); });

  const autoRows = [];
  for (const s of staffList) {
    const sOrgs = s.orgs && s.orgs.length ? s.orgs : [s.org];
    let d = new Date(sd+'T00:00:00'), end = new Date(ed+'T00:00:00');
    while (d<=end) {
      const ds = fmtD(d);
      const dow = d.getDay(), wknd = dow===0||dow===6;
      // 이 교직원 소속 기관의 기간만 적용 (방학 우선)
      const inPeriod = (w) => sOrgs.includes(w.org) && ds>=w.s && ds<=w.e && (!wknd || w.wknd);
      const isVac = wps.some(w => w.type==='vacation' && inPeriod(w));
      const isWork = wps.some(w => w.type!=='vacation' && inPeriod(w));
      const hasManual = manRows.some(r=>r.uid===s.uid&&r.date===ds);
      if (!hasManual && !holDates.has(ds)) {
        if (isVac) autoRows.push({uid:s.uid,name:s.name,org:s.org,dept:s.dept||'',date:ds,sub:'정기휴가',memo:'',auto:true});
        else if (isWork) autoRows.push({uid:s.uid,name:s.name,org:s.org,dept:s.dept||'',date:ds,sub:'정상출근',memo:'',auto:true});
      }
      d.setDate(d.getDate()+1);
    }
  }
  return [...autoRows,...manRows];
}

xt-align:center;font-weight:700;color:var(--gd)">${monthData.reduce((s,d)=>s+d.total,0)}</td></tr></tbody></table></div></div></div>`;

function toCSV(rows){return rows.map(r=>r.map(c=>'"'+(String(c??'').replace(/"/g,'""'))+'"').join(',')).join('\n');}
function dlCSV(filename,rows){const bom='\uFEFF';const csv=bom+toCSV(rows);const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);}

  staffSnap.forEach(d=>{const s={uid:d.id,...d.data()};if(org&&s.org!==org)return;byUid[s.uid]={name:s.name,org:ORGS[s.org]||s.org,dept:s.dept,counts:{}};TREE.forEach(p=>{p.s.forEach(s2=>{byUid[s.uid].counts[s2.k]=0;});});});
  rows.forEach(r=>{if(byUid[r.uid]&&byUid[r.uid].counts[r.sub]!==undefined)byUid[r.uid].counts[r.sub]++;});
  const subHeaders=TREE.flatMap(p=>p.s.map(s=>s.l));

  const h2=['','','',...subHeaders,''];
  const dataRows=Object.values(byUid).map(p=>{const subs=TREE.flatMap(par=>par.s.map(s=>p.counts[s.k]||0));return [p.name,p.org,p.dept,...subs,subs.reduce((a,b)=>a+b,0)];});
  dlCSV(`출근통계_${year}년_${org?ORGS[org]:'전체'}.csv`,[h1,h2,...dataRows]);

}

// 이번 달 생일 (학생 + 선생님, 기관별, 시점별 구분)
async function loadHomeBirthdays(){
  const box = $I('home-birthday');
  if(!box) return;
  const now = new Date();
  const thisMonth = now.getMonth()+1; // 1~12
  const today = now.getDate();
  const orgNames = {jihyebit:'지혜빛', daniel:'다니엘 아마츠'};
  const myOrgList = CU.role==='super' ? ['jihyebit','daniel'] : (CU.orgs&&CU.orgs.length?CU.orgs:[CU.org]);

  try {
    const studSnap = await getDocs(collection(db,'students'));
    const students = [];
    studSnap.forEach(d=>{ const s={id:d.id,...d.data()}; if(myOrgList.includes(s.org)) students.push(s); });
    const staffSnap = await getDocs(collection(db,'staff'));
    const teachers = [];
    staffSnap.forEach(d=>{ const s={id:d.id,...d.data()}; if((s.acStatus||'active')==='active'){
      const sOrgs = s.role==='super'?['jihyebit','daniel']:(s.orgs&&s.orgs.length?s.orgs:[s.org]);
      if(sOrgs.some(o=>myOrgList.includes(o))) teachers.push(s);
    }});

    // 사람 → {name, day, month, gender, isTeacher, org, orgsList}
    const toPerson = (p, isTeacher) => {
      const b = p.birth||'';
      if(b.length<7) return null;
      const mm = Number(b.slice(5,7)), dd = Number(b.slice(8,10))||0;
      const orgsList = isTeacher
        ? (p.role==='super'?['jihyebit','daniel']:(p.orgs&&p.orgs.length?p.orgs:[p.org]))
        : [p.org];
      return {name:p.name, month:mm, day:dd, gender:p.gender||'', isTeacher, orgsList};
    };
    // 다가올 생일 계산용: 오늘부터 며칠 뒤인지 (같은 해 기준, 월/일만)
    const daysUntil = (mm, dd) => {
      const y = now.getFullYear();
      let target = new Date(y, mm-1, dd);
      target.setHours(0,0,0,0);
      const t0 = new Date(y, now.getMonth(), today); t0.setHours(0,0,0,0);
      let diff = Math.round((target - t0)/(1000*60*60*24));
      if(diff < -180) diff += 365; // 연말→연초 넘어가는 경우 보정
      return diff;
    };

    const allPeople = [
      ...students.map(s=>toPerson(s,false)),
      ...teachers.map(t=>toPerson(t,true))
    ].filter(Boolean);

    const icon = p => p.isTeacher ? '👩‍🏫' : (p.gender==='남' ? '👦' : p.gender==='여' ? '👧' : '🧒');
    const orgTag = p => {
      if(myOrgList.length<=1) return '';
      const names = p.orgsList.filter(o=>myOrgList.includes(o)).map(o=>orgNames[o]||o);
      return names.length ? `<span style="font-size:11px;color:var(--tl)">${names.join('·')}</span>` : '';
    };
    const chip = (p, bg, border, extra) => `<span style="display:inline-flex;align-items:center;gap:5px;background:${bg};border:1px solid ${border};border-radius:100px;padding:5px 12px;margin:0 6px 6px 0;font-size:13px">
      ${icon(p)} <b>${esc(p.name)}</b> <span style="color:var(--tl);font-size:12px">${p.month}/${p.day}</span> ${orgTag(p)}${extra||''}</span>`;

    // 분류
    const todayList = allPeople.filter(p=>p.month===thisMonth && p.day===today).sort((a,b)=>a.name.localeCompare(b.name,'ko'));
    const upcoming = allPeople.filter(p=>{ const d=daysUntil(p.month,p.day); return d>=1 && d<=7; }).sort((a,b)=>daysUntil(a.month,a.day)-daysUntil(b.month,b.day));
    const restMonth = allPeople.filter(p=>p.month===thisMonth && p.day>today && daysUntil(p.month,p.day)>7).sort((a,b)=>a.day-b.day);
    const pastMonth = allPeople.filter(p=>p.month===thisMonth && p.day<today).sort((a,b)=>a.day-b.day);

    let html = '';
    if(todayList.length){
      html += `<div style="margin-bottom:14px"><div style="font-size:13px;font-weight:700;color:#d97706;margin-bottom:8px">🎉 오늘 생일</div>${todayList.map(p=>chip(p,'#fef3c7','#fcd34d')).join('')}</div>`;
    }
    if(upcoming.length){
      html += `<div style="margin-bottom:14px"><div style="font-size:13px;font-weight:700;color:#0891b2;margin-bottom:8px">⏰ 다가올 생일 (7일 이내)</div>${upcoming.map(p=>{ const d=daysUntil(p.month,p.day); return chip(p,'#e0f2fe','#bae6fd',`<span style="font-size:11px;color:#0891b2;font-weight:700">D-${d}</span>`); }).join('')}</div>`;
    }
    if(restMonth.length){
      html += `<div style="margin-bottom:14px"><div style="font-size:13px;font-weight:700;color:#6b7280;margin-bottom:8px">📅 이번 달 남은 생일</div>${restMonth.map(p=>chip(p,'#f9fafb','#eef0f4')).join('')}</div>`;
    }
    if(pastMonth.length){

const GCAL_API_KEY = 'AIzaSyD0PFJeynpexhNLmZhHm1l8M7kfEQW57cg';
async function loadHomeSchedule(){
  const box = $I('home-schedule');
  if(!box) return;
  try {
    const snap = await getDocs(collection(db,'calendars'));
    const cals = [];
    snap.forEach(d=>{ const c=d.data(); if(c.calId) cals.push({name:c.name||'(이름없음)', calId:c.calId, order:c.order??999}); });
    cals.sort((a,b)=>(a.order)-(b.order));
    if(!cals.length){
      box.innerHTML = `<div style="font-size:15px;font-weight:800;color:var(--gd);margin-bottom:8px;display:flex;align-items:center;gap:7px"><span>📅</span> 학사일정</div><div style="font-size:13px;color:var(--tl)">등록된 캘린더가 없습니다. 학사일정에서 캘린더를 먼저 등록하세요.</div>`;
      return;
    }
    // 기간: 오늘 0시 ~ 다음 주 일요일까지 (넉넉히 21일)
    const now = new Date();
    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const end = new Date(start); end.setDate(end.getDate()+21);
    const timeMin = start.toISOString();
    const timeMax = end.toISOString();

    // 캘린더별로 일정 저장
    const calData = []; // {name, calId, events:[]}
    for(const cal of cals){
      const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.calId)}/events`
        + `?key=${GCAL_API_KEY}&timeMin=${encodeURIComponent(timeMin)}&timeMax=${encodeURIComponent(timeMax)}`
        + `&singleEvents=true&orderBy=startTime&maxResults=100`;
      const evs = [];
      try {
        const res = await fetch(url);
        if(res.ok){
          const data = await res.json();
          (data.items||[]).forEach(ev=>{
            const s = ev.start?.dateTime || ev.start?.date;
            if(!s) return;
            evs.push({ title: ev.summary||'(제목 없음)', start:s, isAllDay:!ev.start?.dateTime, date:s.slice(0,10) });
          });
        }
      } catch(e){}
      evs.sort((a,b)=>a.start.localeCompare(b.start));
      calData.push({...cal, events:evs});
    }

    // 날짜 경계 계산
    const todayStr = ymd(start);
    const tmr = new Date(start); tmr.setDate(tmr.getDate()+1);
    const tmrStr = ymd(tmr);
    // 이번 주 일요일(주말 끝) 계산: 월요일 시작 기준 이번주 끝(일)
    const dow = start.getDay(); // 0=일
    const daysToSun = dow===0 ? 0 : 7-dow;
    const thisWeekEnd = new Date(start); thisWeekEnd.setDate(thisWeekEnd.getDate()+daysToSun);
    const thisWeekEndStr = ymd(thisWeekEnd);
    const nextWeekEnd = new Date(thisWeekEnd); nextWeekEnd.setDate(nextWeekEnd.getDate()+7);
    const nextWeekEndStr = ymd(nextWeekEnd);

    const dnames=['일','월','화','수','목','금','토'];
    const fmtTime = ev => { if(ev.isAllDay) return '종일'; const d=new Date(ev.start); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; };
    const evRow = ev => {
      const d = new Date(ev.date+'T00:00:00');
      return `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f4f4f7">
        <span style="min-width:60px;font-size:11px;color:var(--tl)">${d.getMonth()+1}/${d.getDate()}(${dnames[d.getDay()]})</span>
        <span style="min-width:44px;font-size:12px;color:#6b7280;font-weight:600">${fmtTime(ev)}</span>
        <span style="flex:1;font-size:13.5px;color:#1f2937">${esc(ev.title)}</span>
      </div>`;
    };
    // 그룹 분류 함수
    const groupEvents = evs => {
      const today = evs.filter(e=>e.date===todayStr);
      const tomorrow = evs.filter(e=>e.date===tmrStr);
      const thisWeek = evs.filter(e=>e.date>tmrStr && e.date<=thisWeekEndStr);
      const nextWeek = evs.filter(e=>e.date>thisWeekEndStr && e.date<=nextWeekEndStr);
      return {today, tomorrow, thisWeek, nextWeek};
    };
    const groupBlock = (label, arr, color) => {
      if(!arr.length) return '';
      return `<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:700;color:${color};margin-bottom:2px">${label}</div>${arr.map(evRow).join('')}</div>`;
    };

    // 캘린더별 아코디언 카드
    let html = `<div style="font-size:15px;font-weight:800;color:var(--gd);margin-bottom:14px;display:flex;align-items:center;gap:7px"><span>📅</span> 학사일정 <span style="font-size:12px;color:var(--tl);font-weight:400">(캘린더를 눌러 펼치기)</span></div>`;
    const palette = ['#0891b2','#7c3aed','#db2777','#d97706','#059669','#2563eb','#dc2626','#4f46e5'];
    calData.forEach((cal,ci)=>{
      const g = groupEvents(cal.events);
      const total = g.today.length+g.tomorrow.length+g.thisWeek.length+g.nextWeek.length;
      const accent = palette[ci % palette.length];
      const inner = (groupBlock('오늘', g.today, '#0891b2')
        + groupBlock('내일', g.tomorrow, '#6b7280')
        + groupBlock('이번 주', g.thisWeek, '#6b7280')
        + groupBlock('다음 주', g.nextWeek, '#b0b4bd')) || '<div style="font-size:13px;color:var(--tl);padding:6px 0">예정된 일정이 없습니다.</div>';
      html += `<div style="border:1px solid #eef0f4;border-radius:12px;margin-bottom:8px;overflow:hidden">
        <div onclick="toggleCalAcc(${ci})" style="display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;background:#fafbfc">
          <span style="width:10px;height:10px;border-radius:50%;background:${accent};flex-shrink:0"></span>
          <span style="flex:1;font-size:14px;font-weight:700;color:#374151">${esc(cal.name)}</span>
          <span style="font-size:12px;color:var(--tl)">${total>0?total+'건':'없음'}</span>
          <span id="cal-arrow-${ci}" style="font-size:12px;color:var(--tl);transition:transform .15s">▼</span>
        </div>
        <div id="cal-body-${ci}" style="display:none;padding:10px 14px 14px">${inner}</div>
      </div>`;
    });
    box.innerHTML = html;
  } catch(e){
    box.innerHTML = `<div style="font-size:15px;font-weight:800;color:var(--gd);margin-bottom:8px">📅 학사일정</div><div style="font-size:13px;color:var(--tl)">일정을 불러올 수 없습니다. (${esc(e.message||'')})</div>`;
  }
}

// ── 메인 알림: 결재할 문서 + 안 읽은 쪽지 ──
async function loadNotifications(){
  let approvalCnt = 0, msgCnt = 0;
  try {
    const snap = await getDocs(collection(db,'approvals'));
    snap.forEach(d=>{
      const a = d.data();
      if(a.status==='progress'){
        const step = (a.line||[])[a.currentStep];
        if(step && step.uid===CU.uid) approvalCnt++;
      }
    });
  } catch(e){}
  try {
    const snap = await getDocs(collection(db,'messages'));
    snap.forEach(d=>{
      const m = d.data();
      if((m.toUids||[]).includes(CU.uid) && !(m.readBy||[]).includes(CU.uid)) msgCnt++;
    });
  } catch(e){}
  let boardCnt = 0;
  try {
    const snap = await getDocs(collection(db,'boardNotifs'));
    snap.forEach(d=>{ const n=d.data(); if(n.toUid===CU.uid && !n.read) boardCnt++; });
  } catch(e){}
  // 새 게시글 (마지막 방문 이후 올라온 남의 글, 내가 볼 수 있는 게시판)
  let newPostCnt = 0;
  try {
    const lastSeen = CU.lastBoardSeen?.toMillis?.() || 0;
    const myOrgList = CU.role==='super' ? ['jihyebit','daniel'] : (CU.orgs&&CU.orgs.length?CU.orgs:[CU.org]);
    const snap = await getDocs(collection(db,'boardPosts'));
    snap.forEach(d=>{
      const p = d.data();
      const t = p.createdAt?.toMillis?.() || 0;
      const visible = p.board==='all' || myOrgList.includes(p.board);
      if(visible && p.authorUid!==CU.uid && t > lastSeen) newPostCnt++;
    });
  } catch(e){}
  // 경비 지급 요청서: 내가 결재할 건 + (회계면) 지급 대기
  let payCnt = 0, payWaitCnt = 0;
  try {
    const [reqSnap, mgrSnap] = await Promise.all([
      getDocs(collection(db,'payRequests')),
      getDoc(doc(db,'payConfig','managers')).catch(()=>null)
    ]);
    const mgrList = (mgrSnap && mgrSnap.exists()) ? (mgrSnap.data().list||[]) : [];
    const isPayMgr = CU.role==='super' || mgrList.includes(CU.uid);
    reqSnap.forEach(d=>{
      const r = d.data();
      if(r.status==='approving' && r.chain && r.chain[r.chainIndex]?.uid===CU.uid) payCnt++;
      if(isPayMgr && !r.paid && r.status==='submitted') payWaitCnt++;
    });
  } catch(e){}

  renderNotifBadges(approvalCnt, msgCnt, boardCnt, newPostCnt);
  window.__notif = {approvalCnt, msgCnt, boardCnt, newPostCnt, payCnt, payWaitCnt};
  // 사이드바 뱃지는 badges.js가 담당 (모든 페이지 동일 기준)
  // 홈이 열려 있으면 숫자 갱신
  if($I('c-home') && $I('c-home').style.display!=='none') renderHome();
}

  const apTab = $I('t-approval'), msgTab = $I('t-message');

  }

    else if(b) b.remove();
  }
  // 알림 배너

    const parts = [];
    if(approvalCnt>0) parts.push(`<a href="approval.html" style="color:#b45309;font-weight:700;text-decoration:none">🗂️ 결재할 문서 ${approvalCnt}건</a>`);

    let banner = $I('notif-banner');
    if(!banner){
      banner = document.createElement('div');
      banner.id = 'notif-banner';
      banner.style.cssText = 'background:#fff7ed;border:1.5px solid var(--gold);border-radius:10px;padding:12px 16px;margin:0 0 14px;font-size:14px;display:flex;gap:16px;flex-wrap:wrap;align-items:center';

    banner.innerHTML = `<span style="font-weight:700;color:var(--gd)">🔔 알림</span> ${parts.join('<span style="color:var(--tl)">·</span> ')}`;
  }

// 기간 일괄 저장 (targetUid가 null이면 본인, 있으면 해당 교직원)
async function saveBulk(targetUid){
  const s=$I('bk-s').value, e=$I('bk-e').value, sub=$I('bk-sub').value, memo=$I('bk-memo').value.trim();
  const incWknd=$I('bk-wknd')?.checked;
  if(!s||!e) return toast('시작일과 종료일을 선택하세요.','err');
  if(s>e) return toast('종료일이 시작일보다 빠릅니다.','err');
  // 대상 교직원 정보
  let target;
  if(targetUid){ target=STAFF_CACHE[targetUid]; if(!target) return toast('대상 교직원을 찾을 수 없습니다.','err'); }
  else target=CU;
  // 날짜 순회
  const days=[];
  let d=new Date(s+'T00:00:00'), end=new Date(e+'T00:00:00');
  while(d<=end){ const dow=d.getDay(); if(incWknd||(dow!==0&&dow!==6)) days.push(fmtD(d)); d.setDate(d.getDate()+1); }
  if(!days.length) return toast('선택 기간에 입력할 날짜가 없습니다.','err');
  if(days.length>120) return toast('기간이 너무 깁니다. (최대 120일)','err');
  if(!confirm(`${target.name} 선생님에게 ${days.length}일을 '${sub}'(으)로 일괄 입력할까요?\n(기존 기록은 덮어씁니다)`)) return;
  toast('저장 중...');
  // 기존 기록 조회 (해당 기간/대상)
  const snap=await getDocs(collection(db,'attendance'));
  const existing={};
  snap.forEach(doc0=>{ const r=doc0.data(); if(r.uid===target.uid&&r.date>=s&&r.date<=e) existing[r.date]={id:doc0.id}; });
  // 저장

async function saveBulkAdm(){
  const uid=$I('ba-uid')?.value, s=$I('ba-s').value, e=$I('ba-e').value;
  const sub=$I('ba-sub').value, memo=$I('ba-memo').value.trim();
  const incWknd=$I('ba-wknd')?.value==='true';
  if(!uid) return toast('대상 교직원을 선택하세요.','err');
  if(!s||!e) return toast('시작일과 종료일을 선택하세요.','err');
  if(s>e) return toast('종료일이 시작일보다 빠릅니다.','err');

  if(!target) return toast('대상 교직원을 찾을 수 없습니다.','err');
  const days=[];
  let d=new Date(s+'T00:00:00'), end=new Date(e+'T00:00:00');

  if(!days.length) return toast('선택 기간에 입력할 날짜가 없습니다.','err');
  if(days.length>120) return toast('기간이 너무 깁니다. (최대 120일)','err');
  if(!confirm(`${target.name} 선생님에게 ${days.length}일을 '${sub}'(으)로 일괄 입력할까요?\n(기존 기록은 덮어씁니다)`)) return;
  toast('저장 중...');
  const snap=await getDocs(collection(db,'attendance'));
  const existing={};
  snap.forEach(doc0=>{ const r=doc0.data(); if(r.uid===uid&&r.date>=s&&r.date<=e) existing[r.date]={id:doc0.id}; });
  let cnt=0;
  for(const ds of days){
    const data={uid:target.uid,name:target.name,org:target.org,dept:target.dept||'',date:ds,sub,memo,updatedAt:Timestamp.now()};
    if(existing[ds]) await updateDoc(doc(db,'attendance',existing[ds].id),data);
    else await addDoc(collection(db,'attendance'),data);
    cnt++;
  }
  toast(`${target.name} 선생님에게 ${cnt}일이 일괄 입력되었습니다.`,'ok');
  logActivity('입력', '출근부', `${target.name} ${s}~${e} ${sub} (관리자 일괄 ${cnt}일)`);
  $I('ba-s').value='';$I('ba-e').value='';$I('ba-memo').value='';
}

// ── 로그인 기록 통계 (슈퍼관리자) ──────────────
async function renderLoginLog(){
  const el = $I('ca-log'); if(!el) return;
  if(CU.role!=='super'){ el.innerHTML='<div class="acard"><p class="empty">슈퍼관리자만 볼 수 있습니다.</p></div>'; return; }
  el.innerHTML = '<div class="acard"><p class="empty">불러오는 중...</p></div>';
  await reloadStaffCache();

  // 로그인 기록 로드
  const snap = await getDocs(collection(db,'loginLogs'));
  const logs = [];
  snap.forEach(d=>{ const l=d.data(); if(l.at?.seconds) logs.push({...l, ts:l.at.seconds*1000}); });
  if(!logs.length){ el.innerHTML='<div class="acard"><h3 class="actitle">🔐 로그인 기록</h3><p class="empty">아직 로그인 기록이 없습니다.</p></div>'; return; }

  logs.sort((a,b)=>b.ts-a.ts);
  const now = Date.now();
  const DAY = 86400000;

  // ── 전체 통계 ──
  const total = logs.length;
  const last30 = logs.filter(l=>now-l.ts < 30*DAY).length;
  const last7 = logs.filter(l=>now-l.ts < 7*DAY).length;
  // 활성 사용자 수 (기록 있는 고유 uid)
  const uniqUsers = new Set(logs.map(l=>l.uid)).size;
  const avgPerUser = uniqUsers ? (total/uniqUsers).toFixed(1) : 0;

  // ── 시간대별 (0~23시) ──
  const byHour = new Array(24).fill(0);
  logs.forEach(l=>{ byHour[new Date(l.ts).getHours()]++; });
  const maxHour = Math.max(...byHour);
  const peakHour = byHour.indexOf(maxHour);

  // ── 요일별 ──
  const dowNames = ['일','월','화','수','목','금','토'];
  const byDow = new Array(7).fill(0);
  logs.forEach(l=>{ byDow[new Date(l.ts).getDay()]++; });
  const maxDow = Math.max(...byDow);

  // ── 사용자별 ──
  const byUser = {};
  logs.forEach(l=>{
    if(!byUser[l.uid]) byUser[l.uid] = {name:l.name, org:l.org, count:0, last:0};
    byUser[l.uid].count++;
    if(l.ts > byUser[l.uid].last) byUser[l.uid].last = l.ts;
  });
  // 휴면 의심: 14일 이상 로그인 없음 (전체 교직원 중)
  const dormant = [];
  Object.values(STAFF_CACHE).forEach(s=>{
    const u = byUser[s.uid];
    const lastTs = u ? u.last : (s.lastLogin?.seconds ? s.lastLogin.seconds*1000 : 0);
    if((s.acStatus||'active')==='active' && (!lastTs || now-lastTs > 14*DAY)){
      dormant.push({name:s.name, org:s.org, last:lastTs});
    }
  });

  const fmtDate = ts => { if(!ts) return '기록 없음'; const d=new Date(ts); return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`; };

  // 시간대 막대 (간단 텍스트 바)
  const hourBars = byHour.map((c,h)=>{
    if(c===0) return '';
    const w = Math.round(c/maxHour*100);
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;font-size:12px">
      <span style="width:38px;color:var(--ts)">${pad(h)}시</span>
      <div style="flex:1;background:var(--gp);border-radius:4px;height:16px;overflow:hidden"><div style="width:${w}%;height:100%;background:var(--gm)"></div></div>
      <span style="width:30px;text-align:right;color:var(--tl)">${c}</span>
    </div>`;
  }).join('');

  const dowBars = byDow.map((c,i)=>{
    const w = maxDow ? Math.round(c/maxDow*100) : 0;
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;font-size:12px">
      <span style="width:38px;color:var(--ts)">${dowNames[i]}요일</span>
      <div style="flex:1;background:var(--gp);border-radius:4px;height:16px;overflow:hidden"><div style="width:${w}%;height:100%;background:var(--gold)"></div></div>
      <span style="width:30px;text-align:right;color:var(--tl)">${c}</span>
    </div>`;
  }).join('');

  // 사용자별 표 (로그인 많은 순)
  const userRows = Object.values(byUser).sort((a,b)=>b.count-a.count).map(u=>`
    <tr><td style="padding:6px 8px;border-bottom:1px solid var(--ivd);font-weight:600">${u.name}</td>
    <td style="padding:6px 8px;border-bottom:1px solid var(--ivd)">${ORGS[u.org]||u.org}</td>
    <td style="padding:6px 8px;border-bottom:1px solid var(--ivd);text-align:center">${u.count}</td>
    <td style="padding:6px 8px;border-bottom:1px solid var(--ivd);font-size:12px">${fmtDate(u.last)}</td></tr>`).join('');

  const dormantHTML = dormant.length
    ? dormant.map(d=>`${d.name}(${ORGS[d.org]||d.org}, ${d.last?fmtDate(d.last):'기록없음'})`).join(', ')
    : '없음';

  const stat = (label,val,color) => `<div style="flex:1;min-width:90px;background:var(--iv);border-radius:10px;padding:14px;text-align:center">
    <div style="font-size:22px;font-weight:800;color:${color||'var(--gm)'}">${val}</div>
    <div style="font-size:11px;color:var(--ts);margin-top:2px">${label}</div></div>`;

  el.innerHTML = `
  <div class="asc">
    <div class="acard">
      <h3 class="actitle">🔐 로그인 기록 통계</h3>
      <p class="adesc">전체 로그인 기록을 분석합니다. 개인 감시보다 시스템 활용도·보안 점검 용도로 활용하세요.</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
        ${stat('총 로그인',total)}
        ${stat('최근 7일',last7)}
        ${stat('최근 30일',last30)}
        ${stat('1인 평균',avgPerUser,'var(--goldd)')}
        ${stat('주 접속시간',peakHour+'시','var(--gd)')}
      </div>
    </div>

    <div class="acard">
      <h3 class="actitle" style="font-size:15px">⏰ 시간대별 로그인</h3>
      <div style="margin-top:10px">${hourBars||'<p class="empty">데이터 없음</p>'}</div>
    </div>

    <div class="acard">
      <h3 class="actitle" style="font-size:15px">📅 요일별 로그인</h3>
      <div style="margin-top:10px">${dowBars}</div>
    </div>

    <div class="acard">
      <h3 class="actitle" style="font-size:15px">⚠️ 휴면 의심 계정 (14일 이상 미접속)</h3>
      <div style="font-size:13px;color:var(--ts);line-height:1.7;margin-top:6px">${dormantHTML}</div>
    </div>

    <div class="acard">
      <h3 class="actitle" style="font-size:15px">👥 교직원별 로그인 현황</h3>
      <div style="overflow-x:auto;margin-top:10px">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr style="background:var(--iv)">
            <th style="padding:8px;text-align:left">이름</th><th style="padding:8px;text-align:left">기관</th>
            <th style="padding:8px;text-align:center">횟수</th><th style="padding:8px;text-align:left">최근 로그인</th>
          </tr></thead>
          <tbody>${userRows}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}
window.renderLoginLog = renderLoginLog;

// ── 전체 데이터 백업 (슈퍼관리자/기관관리자) ──────────────
async function downloadBackup(){
  const st = $I('backup-status');
  const setSt = m => { if(st) st.textContent = m; };
  setSt('데이터 수집 중...');
  try {
    const allowed = myOrgs();
    const isSU = CU.role === 'super';
    // 백업할 컬렉션 목록
    const cols = ['staff','students','classes','attendance','workPeriods','holidays','notices','activityLogs','loginLogs'];
    const data = {};
    for(const c of cols){
      const snap = await getDocs(collection(db, c));
      const arr = [];
      snap.forEach(d => arr.push({ _id:d.id, ...d.data() }));
      data[c] = arr;
      setSt(`${c} 수집 중... (${arr.length}건)`);
    }

    // 기관관리자는 본인 기관 데이터만 (슈퍼는 전체)
    if(!isSU){
      const inOrg = (o) => allowed.includes(o);
      const matchStaff = (s) => { const so=s.orgs&&s.orgs.length?s.orgs:[s.org]; return so.some(inOrg); };
      data.staff = data.staff.filter(matchStaff);
      data.students = data.students.filter(s=>inOrg(s.org));
      data.classes = data.classes.filter(c=>inOrg(c.org));
      data.attendance = data.attendance.filter(r=>inOrg(r.org));
      data.workPeriods = data.workPeriods.filter(w=>inOrg(w.org));
      data.holidays = data.holidays.filter(h=>h.org==='all'||inOrg(h.org));
      data.notices = data.notices.filter(n=>n.scope==='all'||inOrg(n.org));
      // 로그류는 기관관리자 백업에서 제외 (개인정보/전체로그)
      data.activityLogs = [];
      data.loginLogs = [];
    }

    setSt('백업 파일 생성 중...');
    const now = new Date();
    const stamp = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;
    const html = buildBackupHTML(data, now, isSU);
    const blob = new Blob([html], {type:'text/html;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `교사선교사_백업_${stamp}.html`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    logActivity('백업', '데이터', `전체 백업 다운로드`);
    setSt(`✓ 백업 완료 (${stamp})`);
  } catch(e){
    setSt('백업 실패: ' + e.message);
    toast('백업 실패: ' + e.message, 'err');
  }
}
window.downloadBackup = downloadBackup;

// 공지가 현재 유저(또는 지정 staff)에게 해당하는지 판정
function noticeMatches(n, u){
  if(n.scope==='all') return true;
  if(n.scope==='org') return (u.orgs&&u.orgs.length?u.orgs:[u.org]).includes(n.org);
  if(n.scope==='dept') return ((u.orgs&&u.orgs.length?u.orgs:[u.org]).includes(n.org)) && u.dept===n.dept;
  if(n.scope==='user') return n.uid===u.uid;
  return false;
}
// 공지 작성 권한 (슈퍼/기관관리자)
function canWriteNotice(){ return ['super','org_admin'].includes(CU.role); }

// 공지 탭 렌더링
async function renderNotice(){
  const el=$I('notice-body'); if(!el) return;
  el.innerHTML='<p class="empty">불러오는 중...</p>';
  await reloadStaffCache();
  const snap=await getDocs(collection(db,'notices'));
  let notices=[]; snap.forEach(d=>notices.push({id:d.id,...d.data()}));
  // 나에게 해당하는 공지만
  notices=notices.filter(n=>noticeMatches(n,CU)||canWriteNotice());
  notices.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

  const writeBtn=canWriteNotice()
    ? `<button class="bp" style="margin-bottom:16px" onclick="openNoticeForm()">✏️ 새 공지 작성</button>` : '';

  const cards=notices.length?notices.map(n=>{
    const mine=noticeMatches(n,CU);
    const unread=mine && !(n.readBy||[]).includes(CU.uid);
    const scopeLabel = n.scope==='all'?'전체'
      : n.scope==='org'?`${ORGS[n.org]||n.org}`
      : n.scope==='dept'?`${ORGS[n.org]||n.org} · ${n.dept}`
      : n.scope==='user'?`개인: ${STAFF_CACHE[n.uid]?.name||'?'}`:'';
    const dt=n.createdAt?.seconds?new Date(n.createdAt.seconds*1000):null;
    const dstr=dt?`${dt.getFullYear()}.${pad(dt.getMonth()+1)}.${pad(dt.getDate())} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`:'';
    const readCount=(n.readBy||[]).length;
    const admInfo=canWriteNotice()
      ? `<div style="margin-top:8px"><button class="bm" style="font-size:12px" onclick="showReadStatus('${n.id}')">👁 읽음 현황 (${readCount})</button>
         <button class="bm" style="font-size:12px;background:#fee2e2;color:#dc2626" onclick="delNotice('${n.id}')">🗑 삭제</button></div>` : '';
    return `<div class="acard" style="margin-bottom:12px;${unread?'border-left:4px solid #dc2626':''}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        ${n.important?'<span style="background:#dc2626;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px">중요</span>':''}
        ${unread?'<span style="background:#dc2626;color:#fff;font-size:10px;padding:2px 8px;border-radius:100px">NEW</span>':''}
        <span style="background:var(--gp);color:var(--gm);font-size:11px;font-weight:600;padding:2px 8px;border-radius:100px">${scopeLabel}</span>
      </div>
      <div style="font-weight:700;font-size:15px;color:var(--gd);margin-bottom:4px">${n.title}</div>
      <div style="font-size:14px;color:var(--ts);white-space:pre-wrap;line-height:1.6">${n.body}</div>
      <div style="font-size:11px;color:var(--tl);margin-top:8px">${n.author||''} · ${dstr}</div>
      ${admInfo}
    </div>`;
  }).join(''):'<p class="empty">공지사항이 없습니다.</p>';

  el.innerHTML=`<div class="asc">${writeBtn}${cards}</div>`;

  // 읽음 처리 (나에게 해당하는 안 읽은 공지)
  for(const n of notices){
    if(noticeMatches(n,CU) && !(n.readBy||[]).includes(CU.uid)){
      try{ await updateDoc(doc(db,'notices',n.id),{readBy:[...(n.readBy||[]),CU.uid]}); }catch(e){}
    }
  }
  updateNoticeDot();
}
window.renderNotice = renderNotice;

  try{

  renderSBtns(sid,isEdit);

  const sc=$I(sid); if(!sc) return;

}

// ── 누락 함수들 (Firebase 버전) ─────────────
function onRoleChange(){
  const role = $I('nr')?.value;
  const single = $I('org-single'), multi = $I('org-multi'), deptGrp = $I('dept-grp');
  if(role === 'org_admin'){
    // 기관관리자: 다중 기관 선택, 부서 숨김
    if(single) single.style.display='none';
    if(multi) multi.style.display='';
    if(deptGrp) deptGrp.style.display='none';
  } else {
    // 교사/탭관리자: 단일 기관, 부서 표시
    if(single) single.style.display='';
    if(multi) multi.style.display='none';
    if(deptGrp) deptGrp.style.display='';
  }
}
window.onRoleChange = onRoleChange;

function toggleFMode(){
  const m=$I('fmode')?.value;
  if(!m) return;
  const isRange=m==='range';
  if($I('fm')) $I('fm').style.display=isRange?'none':'';
  if($I('fds')) $I('fds').style.display=isRange?'':'none';
  if($I('fdsep')) $I('fdsep').style.display=isRange?'':'none';
  if($I('fde')) $I('fde').style.display=isRange?'':'none';
  loadOv();
}

          비밀번호 재설정은 Firebase 콘솔에서 직접 변경하거나, 추후 Cloud Function으로 구현됩니다.
        </div>
        <div class="mact">
          <button class="bp" onclick="document.getElementById('reset-pw-mod').remove()">확인</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(el);
}
